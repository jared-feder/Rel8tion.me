function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function safeUrl(url){
  if(!url) return "";
  return /^https?:\/\//i.test(url) ? url : `https://${url}`;
}

function formatPhone(p){
  let c = String(p || "").replace(/\D/g,"");
  return c.length === 10 ? "+1" + c : (c ? "+" + c : "");
}

function displayPhone(p){
  let c = String(p || "").replace(/\D/g,"");
  if(c.length === 11 && c.startsWith("1")) c = c.slice(1);
  if(c.length === 10){
    return `(${c.slice(0,3)}) ${c.slice(3,6)}-${c.slice(6)}`;
  }
  return p || "";
}

function money(v){
  const n = Number(v || 0);
  return n ? "$" + n.toLocaleString() : "";
}

function setBackground(){

  app.className = "buyer-app-layer";

function socialBtn(label, url){

  `;
}

function setPre(v){
  document.getElementById("pre").value = v;
  document.getElementById("yesBtn").classList.remove("active-pre");
  document.getElementById("noBtn").classList.remove("active-pre");
  if(v === "yes") document.getElementById("yesBtn").classList.add("active-pre");
  if(v === "no") document.getElementById("noBtn").classList.add("active-pre");
}

function saveContact(name, phone, email){
  const contact = `BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone || ""}
EMAIL:${email || ""}
END:VCARD`;

  const blob = new Blob([contact], { type: "text/vcard" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${String(name || "agent").replace(/\s+/g, "-").toLowerCase()}.vcf`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toggleLeadForm(force){
  if(typeof force === "boolean"){
    formOpen = force;
  } else {
    formOpen = !formOpen;
  }

  const wrap = document.getElementById("leadFormWrap");
  const btn = document.getElementById("openFormBtn");
  const btnText = document.getElementById("openFormBtnText");

  if(wrap){
    if(formOpen){
      wrap.classList.remove("hidden");
      wrap.scrollIntoView({ behavior: "smooth", block: "start" });
    } else {
      wrap.classList.add("hidden");
    }
  }

  if(btn && btnText){
    btnText.textContent = formOpen ? "Hide Matching Form" : "Unlock Matching Form";
  }
}

async function fetchJson(url, options = {}){
  const res = await fetch(url, options);
  const raw = await res.text().catch(() => "");
  if(!res.ok) throw new Error(raw || `Request failed: ${res.status}`);
  try{
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    throw new Error("Invalid JSON response: " + raw);
  }
}

function glassShell(inner){
  return `

}

      <p class="text-slate-500 text-lg font-bold animate-pulse">${esc(msg)}</p>
    </div>
  `);

}

function showError(title, message){
  document.getElementById("app").innerHTML = glassShell(`
    <div class="text-center py-6">
      <div class="mb-8">
        <img src="${REL8TION_LOGO}" class="h-16 md:h-20 mx-auto drop-shadow-sm" alt="Rel8tion">

}

async function init(){
  showLoading();

  try{
    if(!agentSlug){
      showError("Missing Agent", "This page is missing the agent slug in the URL.");
      return;
    }

    const agents = await fetchJson(`${SUPABASE_URL}/rest/v1/agents?slug=eq.${encodeURIComponent(agentSlug)}&select=*`, {
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      }
    });

    agentData = Array.isArray(agents) ? agents[0] : null;

    if(!agentData){
      showError("Agent Not Found", "We couldn't find the agent tied to this page.");
      return;
    }

    try{
      await new Promise((resolve) => {
        if(!navigator.geolocation) return resolve();

        navigator.geolocation.getCurrentPosition(async (pos) => {
          try{
            const houses = await fetchJson(`${SUPABASE_URL}/rest/v1/rpc/find_nearest_open_house`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "apikey": KEY,
                "Authorization": "Bearer " + KEY
              },
              body: JSON.stringify({
                user_lat: pos.coords.latitude,
                user_lng: pos.coords.longitude
              })
            });

            if(Array.isArray(houses) && houses.length){
              detectedHouse = houses[0];
            }
          } catch(e){
            console.log("Open house lookup skipped", e);
          }
          resolve();
        }, () => resolve(), {
          enableHighAccuracy: true,
          timeout: 12000,
          maximumAge: 0
        });
      });
    } catch(e){}

    renderBuyer();

  }catch(e){
    console.log(e);
    showError("Something Went Wrong", "Please try again.");
  }
}

async function submitLead(){
  const btn = document.getElementById("submitBtn");
  const status = document.getElementById("status");

  const form = {
    name: document.getElementById("name").value.trim(),
    phone: formatPhone(document.getElementById("phone").value),
    email: document.getElementById("email").value.trim(),
    areas: document.getElementById("areas").value,
    price: document.getElementById("price").value,
    notes: document.getElementById("notes").value.trim(),
    preapproved: document.getElementById("pre").value,
    consent: document.getElementById("consent").checked,
    agent_slug: agentSlug,
    chip_uid: uid || null,
    property_address: detectedHouse?.address || "",
    property_price: detectedHouse?.price || null
  };

  if(!form.name || !form.phone){
    status.innerText = "Please enter your name and phone number.";
    return;
  }

  if(!form.preapproved){
    status.innerText = "Please select whether you are pre-approved.";
    return;
  }

  if(!form.consent){
    status.innerText = "Please check the consent box to continue.";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Sending...";
  status.innerText = "";

  try{
    const leadRes = await fetch(`${SUPABASE_URL}/rest/v1/leads`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      },
      body: JSON.stringify(form)
    });

    if(!leadRes.ok){
      const raw = await leadRes.text().catch(() => "");
      throw new Error(raw || "Failed saving lead");
    }

    const smsRes = await fetch(SMS_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      },
      body: JSON.stringify({
        agent_phone: agentData?.phone || "",
        buyer_phone: form.phone,
        buyer_name: form.name,
        areas: form.areas,
        price: form.price,
        preapproved: form.preapproved
      })
    });

    if(!smsRes.ok){
      const raw = await smsRes.text().catch(() => "");
      console.log("SMS warning:", raw);
    }

    btn.innerText = "Submitted ✓";
    status.innerText = "Perfect. You're in. We’ll be in touch shortly with next steps and matching homes.";
  } catch(e){
    console.log(e);
    btn.disabled = false;
    btn.innerText = "🔥 Show Me the Best Match";
    status.innerText = "Something went wrong. Please try again.";
  }
}

init();
