function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function slugify(text){
  return String(text || "")
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/(^-|-$)/g, "");
}

function randSuffix(){
  return Math.random().toString(36).slice(2, 5);
}

function normalizePhone(v){
  const digits = String(v || "").replace(/\D/g, "");
  if(digits.length === 10){
    return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  }
  return v || "";
}

function normalizePhoneForMatch(v){
  let digits = String(v || "").replace(/\D/g, "");

  if(digits.length === 11 && digits.startsWith("1")){
    digits = digits.slice(1);
  }

  return digits;
}

function money(v){
  const n = Number(v || 0);
  if(!n) return "";
  return "$" + n.toLocaleString();

function getStatus(h){
  try{
    const now = new Date();
    const start = h?.open_start ? new Date(h.open_start) : null;
    const end = h?.open_end ? new Date(h.open_end) : null;

    if(start && end && now >= start && now <= end){
      return { label: "LIVE NOW", color: "#16a34a", icon: "🟢" };
    }
    if(start && now < start){
      return { label: "UPCOMING", color: "#2563eb", icon: "🔵" };
    }
    return { label: "ENDED", color: "#6b7280", icon: "⚪" };
  }catch(e){
    return { label: "OPEN HOUSE", color: "#2563eb", icon: "📍" };
  }
}

      </div>
      <p class="mt-4 text-xs text-slate-400 font-bold uppercase tracking-[0.22em]">⚡ This only takes a second...</p>
    </div>
  `);

  const steps = [
    "Analyzing your location...",
    "Matching nearby listings...",
    "Checking your chip setup...",
    "Preparing your Rel8tion activation..."
  ];

  let i = 0;
  clearInterval(state.loaderInterval);
  state.loaderInterval = setInterval(() => {
    i++;
    const el = document.getElementById("loaderText");
    if(!el) return;
    if(i < steps.length){
      el.textContent = steps[i];
    } else {
      clearInterval(state.loaderInterval);
    }
  }, 1200);
}

async function fetchJson(url, options = {}){
  debug("FETCH", { url, method: options.method || "GET" });

  const res = await fetch(url, options);
  const raw = await res.text().catch(() => "");

  debug("FETCH RESPONSE", { url, status: res.status, ok: res.ok, raw });

  if(!res.ok){
    throw new Error(raw || `Request failed: ${res.status}`);
  }

  try{
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    throw new Error("Invalid JSON response: " + raw);
  }
}

async function applyBranding(name){
  const neutralBrand = {
    name: name || "",
    logo_url: null,
    primary_color: "#38bdf8",
    accent_color: "#2563eb",
    bg_color: "#ffffff",
    text_color: "#0f172a",
    font_family: "Inter",
    button_style: "rounded"
  };

  if(!name){
    state.currentBrand = neutralBrand;
    return;
  }

  try{
    const all = await fetchJson(`${SUPABASE_URL}/rest/v1/brokerages?select=*`, {
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      }
    });

    const clean = String(name).toLowerCase().trim();

    const brand = all.find(x => {
      const brandName = String(x.name || "").toLowerCase().trim();

      if(brandName && clean === brandName) return true;
      if(brandName && clean.includes(brandName)) return true;

      if(Array.isArray(x.match_keywords)){
        return x.match_keywords.some(k =>
          clean.includes(String(k || "").toLowerCase().trim())
        );
      }

      return false;
    });

    state.currentBrand = brand
      ? {
          ...neutralBrand,
          ...brand,
          name: name
        }
      : neutralBrand;

    debug("APPLY BRANDING RESULT", state.currentBrand);
  }catch(e){
    console.log("Branding lookup failed", e);
    debug("BRANDING LOOKUP FAILED", { message: e?.message || String(e) });

    state.currentBrand = neutralBrand;
  }
}

async function loadAgentFromUID(){
  if(!state.uid) return;

  try{
    const keyData = await fetchJson(
      `${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(state.uid)}&select=*`,
      {
        headers: {
          "apikey": KEY,
          "Authorization": "Bearer " + KEY
        }
      }
    );

    if(!Array.isArray(keyData) || !keyData.length) return;

    state.keyRecord = keyData[0];
    debug("LOADED KEY RECORD", state.keyRecord);

    if(state.keyRecord.agent_slug){
      const agentData = await fetchJson(
        `${SUPABASE_URL}/rest/v1/agents?slug=eq.${encodeURIComponent(state.keyRecord.agent_slug)}&select=*`,
        {
          headers: {
            "apikey": KEY,
            "Authorization": "Bearer " + KEY
          }
        }
      );

      if(Array.isArray(agentData) && agentData.length){
        state.prefilledAgent = agentData[0];
        debug("LOADED PREFILLED AGENT", state.prefilledAgent);
        if(state.prefilledAgent.brokerage){
          await applyBranding(state.prefilledAgent.brokerage);
        }
      }
    }
  }catch(e){
    console.log("UID lookup failed", e);
    debug("UID LOOKUP FAILED", { message: e?.message || String(e) });
  }
}

async function startDetection(){
  showLoading("Scanning nearby listings...");

  if(!navigator.geolocation){
    showForm("", "Location detection is not supported on this device.");
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    try{
      debug("USER LOCATION", { lat: pos.coords.latitude, lng: pos.coords.longitude });

      const houses = await fetchJson(`${SUPABASE_URL}/rest/v1/rpc/find_nearest_open_house`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": KEY,
          "Authorization": "Bearer " + KEY
        },
        body: JSON.stringify({
          user_lat: pos.coords.latitude,
          user_lng: pos.coords.longitude
        })
      });

      debug("HOUSES RETURNED", houses);

      if(!Array.isArray(houses) || !houses.length){
        showForm("", "No nearby open house was found. Continue manually.");
        return;
      }

      state.nearbyHouses = houses;
      state.detectedHouse = houses.find(h => h.agent || h.agent_phone || h.agent_email) || houses[0];

      if(state.detectedHouse?.brokerage){
        await applyBranding(state.detectedHouse.brokerage);
      }

      showDetection();
    }catch(e){
      console.log("Detection failed", e);
      debug("DETECTION FAILED", { message: e?.message || String(e) });
      showForm("", "Detection failed. Continue manually.");
    }
  }, (geoErr) => {
    console.log("Geolocation error", geoErr);
    debug("GEOLOCATION ERROR", geoErr);
    showForm("", "Location permission was denied. Continue manually.");
  }, {
    enableHighAccuracy: true,
    timeout: 20000,
    maximumAge: 0
  });
}

function selectHouse(id){
  state.detectedHouse = state.nearbyHouses.find(h => String(h.id) === String(id));
  if(state.detectedHouse?.brokerage){

async function upsertAgent(agent){
  debug("UPSERT AGENT START", agent);

  const existing = await fetchJson(
    `${SUPABASE_URL}/rest/v1/agents?slug=eq.${encodeURIComponent(agent.slug)}&select=*`,
    {
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      }
    }
  );

  if(Array.isArray(existing) && existing.length){
    debug("AGENT EXISTS, PATCHING", existing[0]);

    const res = await fetch(`${SUPABASE_URL}/rest/v1/agents?slug=eq.${encodeURIComponent(agent.slug)}`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": KEY,
        "Authorization": "Bearer " + KEY,
        "Prefer": "return=representation"
      },
      body: JSON.stringify(agent)
    });

    const raw = await res.text().catch(() => "");
    debug("AGENT PATCH RESULT", { status: res.status, ok: res.ok, raw });

    if(!res.ok){
      throw new Error("Failed to update agent: " + raw);
    }

    state.prefilledAgent = { ...(existing[0] || {}), ...agent };
    return state.prefilledAgent;
  }

  debug("AGENT DOES NOT EXIST, CREATING");

  const res = await fetch(`${SUPABASE_URL}/rest/v1/agents`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": KEY,
      "Authorization": "Bearer " + KEY,
      "Prefer": "return=representation"
    },
    body: JSON.stringify(agent)
  });

  const raw = await res.text().catch(() => "");
  debug("AGENT POST RESULT", { status: res.status, ok: res.ok, raw });

  if(!res.ok){
    throw new Error("Failed to create agent: " + raw);
  }

  let created = null;
  try { created = raw ? JSON.parse(raw) : null; } catch(e){}

  state.prefilledAgent = Array.isArray(created) && created.length ? created[0] : agent;
  return state.prefilledAgent;
}

async function uploadFullProfilePhoto(slug){
  const photo = document.getElementById("full_photo");
  const file = photo?.files?.[0];
  if(!file) return state.prefilledAgent?.image_url || null;

  const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
  const path = `${slug}.${ext}`;

  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${PROFILE_BUCKET}/${path}`, {
    method: "POST",
    headers: {
      "apikey": KEY,
      "Authorization": "Bearer " + KEY,
      "x-upsert": "true",
      "Content-Type": file.type || "application/octet-stream"
    },
    body: file
  });

  const raw = await res.text().catch(() => "");
  debug("PHOTO UPLOAD RESULT", { status: res.status, ok: res.ok, raw, path });

  if(!res.ok){
    throw new Error("Photo upload failed: " + raw);
  }

  return `${SUPABASE_URL}/storage/v1/object/public/${PROFILE_BUCKET}/${path}`;
}

async function linkKeyToAgent(slug){
  if(!state.uid){
    throw new Error("Missing chip uid");
  }

  debug("LINK KEY START", { uid: state.uid, slug });

  const existingRows = await fetchJson(
    `${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(state.uid)}&select=*`,
    {
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      }
    }
  );

  debug("EXISTING KEY ROWS", existingRows);

  const payload = {
    uid: state.uid,
    agent_slug: slug,
    claimed: true
  };

  if(Array.isArray(existingRows) && existingRows.length){
    debug("KEY ROW EXISTS, PATCHING", payload);

    const patchRes = await fetch(
      `${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(state.uid)}`,
      {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "apikey": KEY,
          "Authorization": "Bearer " + KEY,
          "Prefer": "return=representation"
        },
        body: JSON.stringify({
          agent_slug: slug,
          claimed: true
        })
      }
    );

    const raw = await patchRes.text().catch(() => "");
    debug("KEY PATCH RESULT", { status: patchRes.status, ok: patchRes.ok, raw });

    if(!patchRes.ok){
      throw new Error("Failed patching existing key row: " + raw);
    }
  } else {
    debug("NO KEY ROW, INSERTING", payload);

    const insertRes = await fetch(
      `${SUPABASE_URL}/rest/v1/keys`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": KEY,
          "Authorization": "Bearer " + KEY,
          "Prefer": "return=representation"
        },
        body: JSON.stringify(payload)
      }
    );

    const raw = await insertRes.text().catch(() => "");
    debug("KEY INSERT RESULT", { status: insertRes.status, ok: insertRes.ok, raw });

    if(!insertRes.ok){
      throw new Error("Failed inserting new key row: " + raw);
    }
  }

  const verify = await fetchJson(
    `${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(state.uid)}&select=*`,
    {
      headers: {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
      }
    }
  );

  const keyRow = Array.isArray(verify) ? verify[0] : null;
  debug("KEY VERIFY", keyRow);

  if(!keyRow){
    throw new Error("Key row missing after save");
  }

  if(keyRow.claimed !== true){
    throw new Error("Key row did not save claimed=true");
  }

  if(keyRow.agent_slug !== slug){
    throw new Error(`Key row did not save correct slug. Expected ${slug}, got ${keyRow.agent_slug}`);
  }

  state.keyRecord = keyRow;
  return keyRow;
}

async function autoActivate(){
  const h = state.detectedHouse;
  debug("AUTO ACTIVATE CLICKED", h);

  if(!(h?.agent || h?.agent_phone || h?.agent_email)){
    showForm(h?.brokerage || "");
    return;
  }

  showLoading("Claiming your Rel8tionChip...");

  try{
    let existingAgent = null;
    const phone_normalized = normalizePhoneForMatch(h.agent_phone);

    if(state.prefilledAgent?.slug){
      existingAgent = state.prefilledAgent;
      debug("USING PREFILLED AGENT", existingAgent);
    }

    if(!existingAgent && phone_normalized){
      const matches = await fetchJson(
        `${SUPABASE_URL}/rest/v1/agents?phone_normalized=eq.${encodeURIComponent(phone_normalized)}&select=*`,
        {
          headers: {
            "apikey": KEY,
            "Authorization": "Bearer " + KEY
          }
        }
      );

      if(Array.isArray(matches) && matches.length){
        existingAgent = matches[0];
      }

      debug("PHONE_NORMALIZED MATCH AGENT", existingAgent);
    }

    if(!existingAgent && h.agent_email){
      const emailMatch = await fetchJson(
        `${SUPABASE_URL}/rest/v1/agents?email=eq.${encodeURIComponent(h.agent_email)}&select=*`,
        {
          headers: {
            "apikey": KEY,
            "Authorization": "Bearer " + KEY
          }
        }
      );

      if(Array.isArray(emailMatch) && emailMatch.length){
        existingAgent = emailMatch[0];
      }

      debug("EMAIL MATCH AGENT", existingAgent);
    }

    const baseSlug = slugify(h.agent || h.agent_email || h.agent_phone || "agent") || "agent";
    const slug = existingAgent?.slug || `${baseSlug}-${randSuffix()}`;

    const agent = {
      name: existingAgent?.name || h.agent || "Agent",
      phone: existingAgent?.phone || h.agent_phone || null,
      phone_normalized: existingAgent?.phone_normalized || phone_normalized || null,
      email: existingAgent?.email || h.agent_email || null,
      brokerage: existingAgent?.brokerage || h.brokerage || null,
      slug,
      image_url: existingAgent?.image_url || state.prefilledAgent?.image_url || null,
      instagram: existingAgent?.instagram || state.prefilledAgent?.instagram || null,
      website: existingAgent?.website || state.prefilledAgent?.website || null,
      facebook: existingAgent?.facebook || state.prefilledAgent?.facebook || null,
      bio: existingAgent?.bio || state.prefilledAgent?.bio || null
    };

    debug("AUTO ACTIVATE AGENT PAYLOAD", agent);

    await upsertAgent(agent);
    debug("AUTO AGENT UPSERT SUCCESS", { slug });

    const keyRow = await linkKeyToAgent(slug);
    debug("AUTO KEY LINK SUCCESS", keyRow);

    await sendActivationSMS(agent.phone, slug, agent.name);
    debug("AUTO SMS STEP DONE");

    window.location.href = `/onboarding?agent=${encodeURIComponent(slug)}`;
  }catch(e){
    console.error("Auto activate failed", e);
    debug("AUTO ACTIVATE FAILED", { message: e?.message || String(e) });

    showForm(
      h?.brokerage || "",
      "Auto-activation failed: " + (e?.message || "unknown error")
    );
  }
}

async function init(){

  debug("INIT START", { uid: state.uid });

  try{
    await loadAgentFromUID();

    debug("INIT STATE", {
      keyRecord: state.keyRecord,

    if(state.keyRecord?.claimed === true && state.keyRecord?.agent_slug){

      showIntro();
    }
  }catch(e){
    console.log("Init failed", e);
    debug("INIT FAILED", { message: e?.message || String(e) });
    showIntro();
  }
}
