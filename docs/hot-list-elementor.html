function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function fmtDate(dateStr){
  if(!dateStr) return "No date";
  const d = new Date(dateStr);
  return d.toLocaleString("en-US", {
    weekday: "short",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function shortMoney(n){
  if(!n) return "";
  return new Intl.NumberFormat("en-US", {
    style: "currency",
    currency: "USD",
    maximumFractionDigits: 0
  }).format(n);
}

function badgeClass(status){
  switch(status){
    case "sent":
    case "rendered":
    case "generated":
      return "bg-emerald-50 text-emerald-700";
    case "pending":
      return "bg-amber-50 text-amber-700";
    case "failed":
      return "bg-rose-50 text-rose-700";
    case "blocked_duplicate":
      return "bg-violet-50 text-violet-700";
    case "skipped_started":
    case "skipped_expired":
    case "not_scheduled":
      return "bg-slate-100 text-slate-700";
    default:
      return "bg-slate-100 text-slate-700";
  }
}

function getPhone(id){
  const row = rows.find(r => r.id === id);
  return (row?.agent_phone || "").replace(/\D/g, "");
}

function getFirstSms(id){
  const box = document.querySelector(`.firstSmsBox[data-id="${id}"]`);
  return box ? box.value.trim() : "";
}

function getFollowupSms(id){
  const box = document.querySelector(`.followupSmsBox[data-id="${id}"]`);
  return box ? box.value.trim() : "";
}

async function loadRows(){
  const now = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - 1);

  const end = new Date(now);
  end.setDate(end.getDate() + 7);

  const { data, error } = await supabase
    .from("agent_outreach_queue")
    .select("*")
    .neq("send_status", "sent")
    .gte("open_start", start.toISOString())
    .lte("open_start", end.toISOString())
    .order("open_start", { ascending: true })
    .limit(100);

  if(error){
    console.error(error);
    alert(error.message);
    return;
  }

  rows = data || [];
  render();
}

async function saveEdits(id){
  const firstText = getFirstSms(id);
  const followupText = getFollowupSms(id);
  const phone = getPhone(id);

  const { error } = await supabase
    .from("agent_outreach_queue")
    .update({
      selected_sms: firstText,
      followup_sms: followupText,
      sms_link: `sms:${phone}?body=${encodeURIComponent(firstText)}`,
      followup_sms_link: `sms:${phone}?body=${encodeURIComponent(followupText)}`
    })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await loadRows();
}

async function setApproval(id, approved){
  const { error } = await supabase
    .from("agent_outreach_queue")
    .update({
      approved_for_send: approved,
      review_status: approved ? "approved" : "pending"
    })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await loadRows();
}

async function markSent(id){
  const { error } = await supabase
    .from("agent_outreach_queue")
    .update({
      send_status: "sent",
      review_status: "approved",
      sent_at: new Date().toISOString()
    })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await loadRows();
}

async function skipRow(id){
  const { error } = await supabase
    .from("agent_outreach_queue")
    .update({
      review_status: "skipped",
      send_status: "archived",
      skipped_at: new Date().toISOString()
    })
    .eq("id", id);

  if(error){
    alert(error.message);
    return;
  }

  await loadRows();
}

async function triggerGenerate(limit = 200){
  const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-agent-outreach`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify({ limit })
  });

  const data = await res.json();

  if(!res.ok){
    throw new Error(data.error || "Failed to generate outreach.");
  }

  return data;
}

async function triggerRender(payload = { limit: 200 }){
  const res = await fetch(`${SUPABASE_URL}/functions/v1/trigger-agent-mockups`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if(!res.ok){
    throw new Error(data.error || "Failed to render mockups.");
  }

  return data;
}

async function generatePending(){
  try {
    await triggerGenerate(200);
    await triggerRender({ limit: 200 });
    await loadRows();
  } catch (error) {
    alert(error instanceof Error ? error.message : String(error));
  }
}

async function rerenderRow(id){
  try {
    await triggerRender({ ids: [id], force: true });
    await loadRows();
  } catch (error) {
    alert(error instanceof Error ? error.message : String(error));
  }
}

function bindEvents(){
  document.getElementById("refreshBtn")?.addEventListener("click", loadRows);
  document.getElementById("generateBtn")?.addEventListener("click", generatePending);

  document.querySelectorAll(".variantSelect").forEach(el => {
    el.addEventListener("change", (e) => {
      const id = e.target.dataset.id;
      const value = e.target.value;
      const box = document.querySelector(`.firstSmsBox[data-id="${id}"]`);
      if(box) box.value = value;
    });
  });

  document.querySelectorAll(".copyFirstBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const id = e.target.dataset.id;
      const text = getFirstSms(id);
      await navigator.clipboard.writeText(text);
      e.target.textContent = "Copied";
      setTimeout(() => e.target.textContent = "Copy First Text", 1200);
    });
  });

  document.querySelectorAll(".copyFollowupBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const id = e.target.dataset.id;
      const text = getFollowupSms(id);
      await navigator.clipboard.writeText(text);
      e.target.textContent = "Copied";
      setTimeout(() => e.target.textContent = "Copy Follow-Up", 1200);
    });
  });

  document.querySelectorAll(".openFirstBtn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const id = e.target.dataset.id;
      const text = getFirstSms(id);
      const phone = getPhone(id);
      window.location.href = `sms:${phone}?body=${encodeURIComponent(text)}`;
    });
  });

  document.querySelectorAll(".openFollowupBtn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      const id = e.target.dataset.id;
      const text = getFollowupSms(id);
      const phone = getPhone(id);
      window.location.href = `sms:${phone}?body=${encodeURIComponent(text)}`;
    });
  });

  document.querySelectorAll(".saveBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      await saveEdits(e.target.dataset.id);
    });
  });

  document.querySelectorAll(".approveBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      await setApproval(e.target.dataset.id, true);
    });
  });

  document.querySelectorAll(".unapproveBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      await setApproval(e.target.dataset.id, false);
    });
  });

  document.querySelectorAll(".sentBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      const id = e.target.dataset.id;
      await saveEdits(id);
      await markSent(id);
    });
  });

  document.querySelectorAll(".skipBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      await skipRow(e.target.dataset.id);
    });
  });

  document.querySelectorAll(".rerenderBtn").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      await rerenderRow(e.target.dataset.id);
    });
  });
}

loadRows();
</script>
