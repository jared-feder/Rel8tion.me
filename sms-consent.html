<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Rel8tion SMS Consent</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #cdf6ff, #f4fbff);
      color: #18235b;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .boot {
      width: min(420px, calc(100% - 32px));
      padding: 22px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 22px;
      background: rgba(255,255,255,.58);
      box-shadow: 0 24px 70px rgba(23,34,79,.16), inset 0 1px 0 rgba(255,255,255,.45);
      text-align: center;
      font-weight: 900;
    }
    .boot p {
      margin: 6px 0 0;
      color: #59657d;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="boot" aria-live="polite">
    <div>Opening Rel8tion SMS Consent</div>
    <p>Loading the public SMS consent form.</p>
  </main>
  <script>
    (async () => {
      const target = `/apps/rel8tion-app/sms-consent.html${window.location.search}${window.location.hash}`;
      try {
        const response = await fetch(target, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Consent page returned ${response.status}`);
        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        window.location.replace(target);
      }
    })();
  </script>
  <noscript>
    <a href="/apps/rel8tion-app/sms-consent.html">Open Rel8tion SMS Consent</a>
  </noscript>
</body>
</html>
