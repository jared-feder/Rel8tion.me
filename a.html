<!-- REL8TION /A PAGE - FULL DROP-IN HTML BLOCK -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<div id="app" class="min-h-screen flex items-center justify-center p-4 md:p-6 transition-all duration-700"></div>

<script>
const REL8TION_LOGO = "https://rel8tion.info/wp-content/uploads/2026/04/logo150x100trans.png";
const params = new URLSearchParams(location.search);
const agent = params.get("agent");
const uid = params.get("uid");

function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function render(content){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="w-full max-w-xl rounded-[38px] md:rounded-[46px] border border-white/90 bg-white p-6 md:p-10 shadow-[0_35px_90px_rgba(31,42,90,0.12)] text-center transition-all duration-500">
      <div class="mb-8">
        <img src="${REL8TION_LOGO}" class="h-16 md:h-20 mx-auto drop-shadow-sm" alt="Rel8tion">
      </div>
      ${content}
    </div>
  `;
  app.style.background = `
    radial-gradient(circle at top left, rgba(96,165,250,0.32), transparent 35%),
    radial-gradient(circle at bottom right, rgba(59,130,246,0.20), transparent 35%),
    linear-gradient(180deg, #eaf4ff 0%, #dceeff 45%, #eef6ff 100%)
  `;
}

function go(){
  if(agent){
    const target = uid
      ? `/b?agent=${encodeURIComponent(agent)}&uid=${encodeURIComponent(uid)}`
      : `/b?agent=${encodeURIComponent(agent)}`;
    window.location.replace(target);
    return;
  }

  render(`
    <h1 class="font-['Poppins'] text-[30px] md:text-[40px] leading-[0.98] font-black tracking-[-0.04em] text-slate-900 mb-3 uppercase">
      Missing Agent
    </h1>
    <p class="text-slate-500 text-[17px] md:text-[18px] leading-relaxed font-medium max-w-md mx-auto mb-6">
      This page is missing the agent slug in the URL.
    </p>
  `);
}

render(`
  <div class="py-10 md:py-14">
    <div class="w-20 h-20 border-8 border-slate-100 border-t-blue-600 rounded-full animate-spin mx-auto mb-8"></div>
    <h2 class="text-2xl md:text-3xl font-black mb-2 tracking-tight text-[#1f2a5a]">Opening Your Rel8tion Page ✨</h2>
    <p class="text-slate-500 text-lg font-bold animate-pulse">Sending you to the right place...</p>
  </div>
`);

setTimeout(go, 700);
</script>
