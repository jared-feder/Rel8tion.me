<script>
const REL8TION_LOGO = "https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png";
const params = new URLSearchParams(location.search);
const agent = params.get("agent");
const uid = params.get("uid");

function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function setBackground(){
  const app = document.getElementById("app");
  app.className = "redirect-app-layer";
}

function render(content){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="w-full max-w-xl rounded-[38px] md:rounded-[46px] border border-white/70 bg-white/20 backdrop-blur-[10px] p-6 md:p-10 text-center transition-all duration-500 shadow-[0_25px_60px_rgba(31,42,90,0.12),inset_0_1px_1px_rgba(255,255,255,0.35)]">
      <div class="mb-8">
        <img src="${REL8TION_LOGO}" class="h-16 md:h-20 mx-auto drop-shadow-sm" alt="Rel8tion">
      </div>
      ${content}
    </div>
  `;
  setBackground();
}

function go(){
  if(agent){
    const target = uid
      ? `/b?agent=${encodeURIComponent(agent)}&uid=${encodeURIComponent(uid)}`
      : `/b?agent=${encodeURIComponent(agent)}`;
    window.location.replace(target);
    return;
  }

  render(`
    <h1 class="font-['Poppins'] text-[30px] md:text-[40px] leading-[0.98] font-black tracking-[-0.04em] text-slate-900 mb-3 uppercase">
      Missing Agent
    </h1>
    <p class="text-slate-500 text-[17px] md:text-[18px] leading-relaxed font-medium max-w-md mx-auto mb-6">
      This page is missing the agent slug in the URL.
    </p>
  `);
}

render(`
  <div class="py-10 md:py-14">
    <div class="inline-flex items-center justify-center mb-6">
      <div class="px-4 py-2 rounded-full bg-white/55 border border-white/80 shadow-sm text-[11px] font-black uppercase tracking-[0.22em] text-slate-500">
        Opening Verified Experience
      </div>
    </div>

    <div class="w-20 h-20 border-8 border-slate-100/80 border-t-blue-600 rounded-full animate-spin mx-auto mb-8"></div>

    <h2 class="text-2xl md:text-3xl font-black mb-2 tracking-tight text-[#1f2a5a]">
      Refining Your Rel8tion Experience
    </h2>

    <p class="text-slate-500 text-lg font-bold animate-pulse">
      Preparing your smart next step...
    </p>

    <div class="mt-8 w-full h-3 rounded-full bg-slate-100/80 overflow-hidden">
      <div class="h-full rounded-full animate-[progressMove_1.3s_ease-in-out_infinite_alternate]" style="width:42%;background:linear-gradient(90deg,#38bdf8,#2563eb);"></div>
    </div>

    <p class="mt-4 text-xs text-slate-400 font-bold uppercase tracking-[0.22em]">
      This only takes a second
    </p>
  </div>
`);

setTimeout(go, 2000);
</script>
