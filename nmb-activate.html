<script>
const SUPABASE_URL = "https://nicanqrfqlbnlmnoernb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pY2FucXJmcWxibmxtbm9lcm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEwNzcsImV4cCI6MjA3NjczNzA3N30.FNE_8qVT4BZBrgdhYqvdwEzeCdbtUzBXndq_Us-WUjg";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const DEFAULT_LOGO_URL = "https://nicanqrfqlbnlmnoernb.supabase.co/storage/v1/object/public/verified-assets/company-logos/nationwide.png";

const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");

function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function getFileExt(file){
  const name = file?.name || "";
  const parts = name.split(".");
  return parts.length > 1 ? parts.pop().toLowerCase() : "jpg";
}

async function uploadHeadshot(file, uid){
  if (!file) return "";
  const ext = getFileExt(file);
  const cleanExt = ["jpg","jpeg","png","webp"].includes(ext) ? ext : "jpg";
  const path = `headshots/${uid}-${Date.now()}.${cleanExt}`;

  const { error } = await supabaseClient.storage
    .from("verified-assets")
    .upload(path, file, {
      cacheControl: "3600",
      upsert: true,
      contentType: file.type || "image/jpeg"
    });

  if (error) throw error;

  const { data } = supabaseClient.storage
    .from("verified-assets")
    .getPublicUrl(path);

  return data?.publicUrl || "";
}

function renderForm(existing = {}) {
  document.getElementById("activateMount").innerHTML = `
    <section class="glass-card rounded-[44px] px-6 py-16 md:p-20 text-center">
      <div class="inline-flex items-center px-4 py-2 rounded-full bg-white/40 border border-white/50 text-[10px] md:text-[11px] font-black uppercase tracking-widest text-slate-500 mb-6 shadow-sm">
        Rel8tion Verified Loan Officers & Industry Professionals
      </div>

      <h1 class="font-['Plus_Jakarta_Sans'] text-[40px] md:text-[72px] leading-[1.0] font-extrabold tracking-tighter text-slate-900 mb-6">
        Activate Your Rel8tionchip
      </h1>

      <p class="text-slate-700 text-lg md:text-2xl font-medium max-w-3xl mx-auto mb-10 leading-normal">
        Complete your verified page in one shot and go live instantly.
      </p>

      <form id="activateForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
        <input type="hidden" name="industry" value="${esc(existing.industry || 'loan')}">
        <input type="hidden" name="logo_url" value="${esc(existing.logo_url || DEFAULT_LOGO_URL)}">

        <div class="md:col-span-2">
          <label class="field-label">Full Name</label>
          <input class="field" name="full_name" required placeholder="Jared Smith" value="${esc(existing.full_name || '')}">
        </div>

        <div>
          <label class="field-label">Title</label>
          <input class="field" name="title" placeholder="Mortgage Loan Officer" value="${esc(existing.title || 'Mortgage Loan Officer')}">
        </div>

        <div>
          <label class="field-label">Company</label>
          <input class="field" name="company_name" placeholder="Nationwide Mortgage Bankers" value="${esc(existing.company_name || 'Nationwide Mortgage Bankers')}">
        </div>

        <div>
          <label class="field-label">Phone</label>
          <input class="field" name="phone" required placeholder="3477758059" value="${esc(existing.phone || '')}">
        </div>

        <div>
          <label class="field-label">Email</label>
          <input class="field" name="email" type="email" required placeholder="you@email.com" value="${esc(existing.email || '')}">
        </div>

        <div class="md:col-span-2">
          <label class="field-label">Headshot Upload</label>
          <input id="headshot_file" class="field" name="headshot_file" type="file" accept="image/png,image/jpeg,image/webp">
        </div>

        <div>
          <label class="field-label">Pre-Approval Link</label>
          <input class="field" name="cta_url" placeholder="https://..." value="${esc(existing.cta_url || '')}">
        </div>

        <div>
          <label class="field-label">Calendar Link</label>
          <input class="field" name="calendar_url" placeholder="https://..." value="${esc(existing.calendar_url || '')}">
        </div>

        <div class="md:col-span-2">
          <label class="field-label">Short Bio</label>
          <textarea class="field min-h-[120px]" name="bio" placeholder="Helping buyers get approved, move fast, and close with confidence.">${esc(existing.bio || '')}</textarea>
        </div>

        <div class="md:col-span-2">
          <label class="field-label">Areas Served</label>
          <input class="field" name="areas" placeholder="Long Island, Queens, Brooklyn" value="${esc(Array.isArray(existing.areas) ? existing.areas.join(', ') : '')}">
        </div>

        <div class="md:col-span-2 pt-2">
          <button id="submitBtn" type="submit" class="brand-button w-full px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide">
            Activate Verified Page
          </button>
        </div>

        <div class="md:col-span-2">
          <div id="status" class="text-center text-sm md:text-base text-slate-700 font-bold min-h-[24px]"></div>
        </div>
      </form>
    </section>
  `;

  document.getElementById("activateForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const form = e.target;
    const status = document.getElementById("status");
    const btn = document.getElementById("submitBtn");

    btn.disabled = true;
    btn.textContent = "Building Verified Page...";
    status.textContent = "";

    const formData = new FormData(form);
    const areas = String(formData.get("areas") || "")
      .split(",")
      .map(s => s.trim())
      .filter(Boolean);

    try {
      let uploadedPhotoUrl = existing.photo_url || "";
      const headshotFile = document.getElementById("headshot_file")?.files?.[0] || null;

      if (headshotFile) {
        status.textContent = "Uploading headshot...";
        uploadedPhotoUrl = await uploadHeadshot(headshotFile, uid);
      }

      status.textContent = "Activating verified page...";

      const payload = {
        p_uid: uid,
        p_industry: String(formData.get("industry") || "loan").trim(),
        p_full_name: String(formData.get("full_name") || "").trim(),
        p_title: String(formData.get("title") || "").trim(),
        p_company_name: String(formData.get("company_name") || "").trim(),
        p_phone: String(formData.get("phone") || "").trim(),
        p_email: String(formData.get("email") || "").trim(),
        p_photo_url: uploadedPhotoUrl,
        p_logo_url: String(formData.get("logo_url") || "").trim(),
        p_cta_url: String(formData.get("cta_url") || "").trim(),
        p_calendar_url: String(formData.get("calendar_url") || "").trim(),
        p_bio: String(formData.get("bio") || "").trim(),
        p_areas: areas
      };

      const { data, error } = await supabaseClient.rpc("verified_profiles_activate_or_create", payload);

      if (error) throw error;
      if (!data || !data.length || !data[0].slug) {
        throw new Error("Activation succeeded but no slug was returned.");
      }

      status.textContent = "Verified page activated. Redirecting...";
      window.location.href = "/nmb-verified/?slug=" + encodeURIComponent(data[0].slug);
    } catch (err) {
      console.error(err);
      status.textContent = err.message || "Activation failed.";
      btn.disabled = false;
      btn.textContent = "Activate Verified Page";
    }
  });
}

async function boot() {
  if (!uid) {
    document.getElementById("activateMount").innerHTML = `
      <section class="glass-card rounded-[44px] px-6 py-16 md:p-20 text-center">
        <h1 class="font-['Plus_Jakarta_Sans'] text-[40px] md:text-[72px] leading-[1.0] font-extrabold tracking-tighter text-slate-900 mb-6">
          Missing chip link
        </h1>
        <p class="text-slate-700 text-lg md:text-2xl font-medium max-w-3xl mx-auto leading-normal">
          This activation link is incomplete.
        </p>
      </section>
    `;
    return;
  }

  try {
    const { data, error } = await supabaseClient.rpc("verified_profiles_lookup", { p_uid: uid });
    if (error) throw error;

    const row = Array.isArray(data) && data.length ? data[0] : null;

    if (row && row.is_active && row.slug) {
      window.location.href = "/nmb-verified/?slug=" + encodeURIComponent(row.slug);
      return;
    }

    if (row) {
      const { data: fullRow } = await supabaseClient
        .from("verified_profiles")
        .select("*")
        .eq("uid", uid)
        .maybeSingle();

      renderForm(fullRow || row);
      return;
    }

    renderForm({});
  } catch (err) {
    console.error(err);
    renderForm({});
  }
}

boot();
</script>
