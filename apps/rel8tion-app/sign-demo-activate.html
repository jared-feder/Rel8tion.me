  <script>
    const SUPABASE_URL='https://nicanqrfqlbnlmnoernb.supabase.co';
    const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pY2FucXJmcWxibmxtbm9lcm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEwNzcsImV4cCI6MjA3NjczNzA3N30.FNE_8qVT4BZBrgdhYqvdwEzeCdbtUzBXndq_Us-WUjg';
    const SIGN_DEMO_SESSION_KEY='rel8tion_sign_demo_session';
    const EXTRA_SIGN_CHIP_SESSION_KEY='rel8tion_extra_sign_chip_pending';
    const HOST_SESSION_KEY='rel8tion_host_session';
    const params=new URLSearchParams(window.location.search);
    const state={uid:params.get('uid')||'',agentSlug:params.get('agent')||'',publicCode:params.get('code')||'',signId:params.get('sign_id')||'',signChipUid:params.get('sign_uid')||'',inventoryId:params.get('inventory_id')||'',source:params.get('source')||'',freshQr:params.get('fresh_qr')==='1',agent:null,sign:null,inventory:null,houses:[],suggestedHouse:null,selectedHouse:null,event:null,error:'',info:'',scanner:null};
    const headers=(extra={})=>({apikey:KEY,Authorization:`Bearer ${KEY}`,'Content-Type':'application/json',...extra});
    const esc=(str)=>String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#039;');
    const money=(v)=>{const n=Number(v||0);return n?'$'+n.toLocaleString():''};
    const agentDisplayName=()=>state.agent?.name||state.agentSlug||readSession()?.agentSlug||'—';
    const agentDisplayBrokerage=()=>state.agent?.brokerage||'';
    const agentProfileLine=()=>agentDisplayBrokerage()?`<div class="sub" style="margin-top:6px;">${esc(agentDisplayBrokerage())}</div>`:'';
    const isPendingFrontChip=(sign)=>String(sign?.primary_device_type||'')==='pending_front_buyer_chip'||String(sign?.uid_primary||'').startsWith('pending:');
    const registeredFrontChip=(sign)=>isPendingFrontChip(sign)?'':(sign?.uid_primary||'');
    const isEventPassFlow=()=>state.source==='event_pass'||state.inventory?.inventory_type==='event_pass'||readSession()?.source==='event_pass';
    const eventPassRoute=()=>`/pass?code=${encodeURIComponent(state.publicCode||state.sign?.public_code||'')}`;
    const livePublicRoute=()=>isEventPassFlow()?eventPassRoute():`/s?code=${encodeURIComponent(state.publicCode||state.sign?.public_code||'')}`;
    const getStatus=(h)=>{try{const now=new Date(),start=h?.open_start?new Date(h.open_start):null,end=h?.open_end?new Date(h.open_end):null,early=start?new Date(start.getTime()-2*60*60*1000):null,graceEnd=end?new Date(end.getTime()+6*60*60*1000):null,today=start&&start.toDateString()===now.toDateString(),nearStart=start&&Math.abs(start.getTime()-now.getTime())<=18*60*60*1000;if(start&&end&&now>=start&&(!graceEnd||now<=graceEnd))return{label:'LIVE NOW',color:'#16a34a'};if(early&&end&&now>=early&&now<start)return{label:'OPEN SOON',color:'#16a34a'};if(today||nearStart)return{label:'OPEN TODAY',color:'#16a34a'};if(start&&now<start)return{label:'UPCOMING',color:'#2563eb'};return{label:'ENDED',color:'#6b7280'}}catch{return{label:'OPEN HOUSE',color:'#2563eb'}}};
    const readSession=()=>{try{const raw=window.localStorage.getItem(SIGN_DEMO_SESSION_KEY);return raw?JSON.parse(raw):null}catch{return null}};
    const writeSession=(patch={})=>{const next={...(readSession()||{}),...patch,updatedAt:new Date().toISOString()};window.localStorage.setItem(SIGN_DEMO_SESSION_KEY,JSON.stringify(next));return next};
    const clearSession=()=>window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
    const readExtraChipSession=()=>{try{const raw=window.localStorage.getItem(EXTRA_SIGN_CHIP_SESSION_KEY);if(!raw)return null;const parsed=JSON.parse(raw);const ageMs=Date.now()-new Date(parsed.createdAt||0).getTime();if(!Number.isFinite(ageMs)||ageMs>15*60*1000){window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);return null}return parsed}catch{window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);return null}};
    const armExtraChipSession=()=>{const signId=state.signId||state.sign?.id,eventId=state.event?.id||'',publicCode=state.publicCode||state.sign?.public_code||'';if(!signId||!publicCode)throw new Error('Activate the sign before adding an extra NFC chip.');const payload={signId,publicCode,eventId,agentSlug:state.agentSlug||'',createdAt:new Date().toISOString()};window.localStorage.setItem(EXTRA_SIGN_CHIP_SESSION_KEY,JSON.stringify(payload));return payload};
    const readHostSession=()=>{try{const raw=window.localStorage.getItem(HOST_SESSION_KEY);if(!raw)return null;const parsed=JSON.parse(raw);const ageMs=Date.now()-new Date(parsed.createdAt||0).getTime();if(!Number.isFinite(ageMs)||ageMs>15*60*1000)return null;return parsed}catch{return null}};
    const mergeStateFromSession=()=>{const p=readSession();if(!p)return null;if(!state.uid&&p.uid)state.uid=p.uid;if(!state.agentSlug&&p.agentSlug&&(!state.uid||!p.uid||p.uid===state.uid))state.agentSlug=p.agentSlug;if(!state.publicCode&&p.publicCode)state.publicCode=p.publicCode;if(!state.signId&&p.signId)state.signId=p.signId;if(!state.inventoryId&&p.inventoryId)state.inventoryId=p.inventoryId;return p};
    async function request(path,options={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...options,headers:headers(options.headers)});const text=await res.text();if(!res.ok)throw new Error(text||`Request failed (${res.status})`);return text?JSON.parse(text):null}
    async function saveRemoteSession(patch={}){
      const local=readSession()||{},code=patch.publicCode||local.publicCode||state.publicCode;
      if(!code)return null;
      const now=new Date();
      const agentSlug=patch.agentSlug||local.agentSlug||state.agentSlug||null;
      const payload={public_code:code,sign_id:patch.signId||local.signId||state.signId||null,inventory_id:patch.inventoryId||local.inventoryId||state.inventoryId||null,agent_key_uid:patch.uid||local.uid||state.uid||null,agent_slug:agentSlug,owner_agent_slug:patch.ownerAgentSlug||local.ownerAgentSlug||state.sign?.owner_agent_slug||null,stage:patch.stage||local.stage||'waiting_for_agent_keychain',primary_chip_uid:patch.primaryChipUid||local.primaryChipUid||registeredFrontChip(state.sign)||null,secondary_chip_uid:patch.secondChipUid||patch.secondaryChipUid||local.secondChipUid||state.sign?.uid_secondary||null,status:patch.status||'pending',updated_at:now.toISOString(),expires_at:new Date(now.getTime()+45*60*1000).toISOString()};
      const existing=await request(`smart_sign_activation_sessions?public_code=eq.${encodeURIComponent(code)}&status=eq.pending&expires_at=gt.${encodeURIComponent(now.toISOString())}&select=id,agent_slug&order=updated_at.desc&limit=10`);
      const match=(existing||[]).find(row=>!agentSlug||!row.agent_slug||row.agent_slug===agentSlug);
      if(match?.id){const rows=await request(`smart_sign_activation_sessions?id=eq.${encodeURIComponent(match.id)}`,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(payload)});return rows?.[0]||null}
      const rows=await request('smart_sign_activation_sessions',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(payload)});
      return rows?.[0]||null;
    }
    async function rpc(name,body){const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`,{method:'POST',headers:headers(),body:JSON.stringify(body)});const text=await res.text();if(!res.ok)throw new Error(text||`RPC failed (${res.status})`);return text?JSON.parse(text):null}
    const render=(html)=>document.getElementById('app').innerHTML=html;

    const renderSuccess=()=>{const pass=isEventPassFlow(),h=state.selectedHouse,pending=readExtraChipSession(),pendingForSign=pending?.signId===(state.signId||state.sign?.id),dashboardParams=new URLSearchParams();if(state.agentSlug)dashboardParams.set('agent',state.agentSlug);if(state.uid)dashboardParams.set('uid',state.uid);if(state.event?.id)dashboardParams.set('event',state.event.id);if(state.signId||state.sign?.id)dashboardParams.set('sign_id',state.signId||state.sign?.id);if(state.publicCode)dashboardParams.set('code',state.publicCode);const dashboardUrl=`/agent-dashboard?${dashboardParams.toString()}`;const extraChipBlock=pass?`<div class="notice success" style="max-width:620px;margin:18px auto 0;text-align:left;"><div class="label">Event Pass is live</div><div style="font-size:16px;font-weight:800;line-height:1.35;margin-top:6px;">This code is strictly an Event Pass for this open house. It is not a public agent profile and it does not require front or rear smart-sign chip registration.</div></div>`:`<div class="notice warn" style="max-width:620px;margin:18px auto 0;text-align:left;"><div class="label">Optional extra buyer NFC chip</div><div style="font-size:16px;font-weight:800;line-height:1.35;margin-top:6px;">Use this only when the same physical sign needs another front buyer NFC chip. The extra chip will open the same live buyer check-in route. It does not replace the rear agent dashboard chip.</div>${pendingForSign?`<div class="notice success" style="margin-top:14px;">Extra buyer chip scan is armed. On iPhone, tap the extra front NFC chip and choose the NFC popup. Android can tap the chip the same way.</div>`:''}<div class="stack" style="margin-top:14px;"><button class="button secondary" onclick="window.armExtraBuyerChip()">Arm Extra Buyer NFC Chip</button><input id="extraChipInput" class="field" placeholder="Or paste extra buyer chip UID"><button class="button secondary" onclick="window.linkExtraBuyerChipManual()">Link Extra Buyer NFC Chip</button></div></div>`;render(`<div class="center"><div class="pill">${pass?'Event Pass live':'Sign locked live'}</div><h1>${pass?'Event Pass Activated':'Sign Activated'}</h1><p class="copy">The ${pass?'Event Pass':'sign'} is now live for this open house. Open the dashboard to watch check-ins, loan officer coverage, and the end-of-event summary.</p><div class="meta" style="max-width:760px;margin:18px auto 0;"><div class="meta-box"><div class="label">Address</div><div class="value">${esc(h?.address||'—')}</div></div><div class="meta-box"><div class="label">${pass?'Event Pass Code':'Sign Code'}</div><div class="value">${esc(state.publicCode||'—')}</div></div><div class="meta-box"><div class="label">Event ID</div><div class="value">${esc(state.event?.id||'—')}</div></div><div class="meta-box"><div class="label">Agent Profile</div><div class="value">${esc(agentDisplayName())}</div>${agentProfileLine()}</div></div>${state.extraChipLinked&&!pass?`<div class="notice success" style="max-width:620px;margin:18px auto 0;">Extra buyer NFC chip ${esc(state.extraChipLinked)} now opens this same live sign.</div>`:''}${state.error?`<div class="notice error" style="max-width:620px;margin:18px auto 0;">${esc(state.error)}</div>`:''}${extraChipBlock}<div class="stack" style="max-width:620px;margin:18px auto 0;"><a class="button primary" href="${esc(dashboardUrl)}">Open Agent Dashboard</a><a class="button secondary" href="${livePublicRoute()}">${pass?'Open Event Pass Route':'Open Live Sign Route'}</a><a class="button secondary" href="/event?event=${encodeURIComponent(state.event?.id||'')}">Open Buyer Check-In</a>${pass?'':`<button class="button secondary" onclick="window.renderDemoResetConfirm()">Reset This Demo Sign</button>`}<button class="button secondary" onclick="window.resetDemoSession()">Start Another Activation</button></div></div>`)};
    const renderDemoResetConfirm=()=>{const p=readSession()||{},code=state.publicCode||p.publicCode||'';render(`<div class="center"><div class="pill">Demo reset</div><h1>Reset This Demo Sign</h1><p class="copy">This deletes the open house event rows for this sign, removes the paired sign chips, clears the inventory claim, and lets this printed QR start over.</p><div class="meta" style="max-width:760px;margin:18px auto 0;"><div class="meta-box"><div class="label">Sign Code</div><div class="value">${esc(code||'—')}</div></div><div class="meta-box"><div class="label">Agent Key</div><div class="value">${esc(state.uid||p.uid||'not reset by default')}</div></div></div><div style="max-width:620px;margin:20px auto 0;" class="stack"><input id="resetCodeInput" class="field" placeholder="Type sign code to reset"><label class="notice warn" style="text-align:left;margin:0;"><input id="resetAgentKeyInput" type="checkbox" style="width:20px;height:20px;vertical-align:middle;margin-right:8px;">Also unclaim this current keychain UID</label><button class="button primary" onclick="window.resetDemoSignActivation()">Delete Last Full Sign Activation</button><button class="button secondary" onclick="window.resetDemoSession()">Cancel</button></div>${state.error?`<div class="notice error" style="max-width:620px;margin:16px auto 0;">${esc(state.error)}</div>`:''}</div>`)};
    async function loadAgentFromClaimedChip(){let keyRow=null;if(state.uid){const keyRows=await request(`keys?uid=eq.${encodeURIComponent(state.uid)}&select=*`);keyRow=keyRows?.[0]||null;if(keyRow?.agent_slug&&keyRow.agent_slug!==state.agentSlug){state.agentSlug=keyRow.agent_slug;writeSession({uid:state.uid,agentSlug:state.agentSlug})}}if(!state.agentSlug)throw new Error('Missing claimed agent context for sign demo.');const agentRows=await request(`agents?slug=eq.${encodeURIComponent(state.agentSlug)}&select=*`);state.agent=agentRows?.[0]||null;return state.agent}
    async function loadClaimSelectedOpenHouse(){const session=readHostSession();if(!session?.selectedOpenHouse||session.agentSlug!==state.agentSlug)return null;const saved=session.selectedOpenHouse;if(saved.id){const rows=await request(`open_houses?id=eq.${encodeURIComponent(saved.id)}&select=*&limit=1`).catch(()=>[]);if(rows?.[0]){state.suggestedHouse={...rows[0],_claimSelected:true};return state.suggestedHouse}}state.suggestedHouse={...saved,_claimSelected:true};return state.suggestedHouse}
    const extractPublicCode=(raw)=>{const value=String(raw||'').trim();if(!value)return'';try{const url=new URL(value,window.location.origin);return url.searchParams.get('code')||value}catch{return value}};
    async function getSignById(id){if(!id)return null;const rows=await request(`smart_signs?id=eq.${encodeURIComponent(id)}&select=*&limit=1`);return rows?.[0]||null}
    async function getSignByPublicCode(code){const rows=await request(`smart_signs?public_code=eq.${encodeURIComponent(code)}&select=*&limit=1`);return rows?.[0]||null}
    function assertSignAvailableForAgent(sign){if(!sign?.id||sign.inventory_pending)return;const p=readSession()||{},agent=state.agentSlug||p.agentSlug||'';if(sign.status==='active'||sign.active_event_id)throw new Error('This sign is already live. Use the demo reset first before registering it again.');if(sign.owner_agent_slug&&agent&&sign.owner_agent_slug!==agent)throw new Error(`This sign is already assigned to ${sign.owner_agent_slug}. Use a fresh sign QR or reset this demo sign first.`)}
    async function createSignFromInventory(inventory,firstChipUid){if(!firstChipUid)throw new Error('Tap the front buyer chip to create the smart sign activation row.');const inserted=await request('smart_signs',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({public_code:inventory.public_code,uid_primary:firstChipUid,activation_uid_primary:firstChipUid,primary_device_type:'front_buyer_chip',status:'inactive'})});const sign=Array.isArray(inserted)?inserted[0]:null;if(!sign?.id)throw new Error('Could not create the smart sign activation row from inventory.');return sign}
    async function createEventPassBackingSign(inventory){if(!inventory?.public_code)throw new Error('Missing Event Pass inventory code.');if(!state.uid||!state.agentSlug)throw new Error('Tap the claimed agent keychain before activating this Event Pass.');const now=new Date().toISOString();const inserted=await request('smart_signs',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify({public_code:inventory.public_code,owner_agent_slug:state.agentSlug,status:'inactive',activation_uid_primary:state.uid,primary_device_type:'event_pass_qr',activation_method:'event_pass_keychain',setup_confirmed_at:now})});const sign=Array.isArray(inserted)?inserted[0]:null;if(!sign?.id)throw new Error('Could not create the Event Pass activation row.');await linkInventoryToSign(inventory,sign);return sign}
    async function linkInventoryToSign(inventory,sign){if(!inventory?.id||!sign?.id)return;const patch={smart_sign_id:sign.id};if(!inventory.claimed_at)patch.claimed_at=new Date().toISOString();const rows=await request(`smart_sign_inventory?id=eq.${encodeURIComponent(inventory.id)}`,{method:'PATCH',headers:{Prefer:'return=representation'},body:JSON.stringify(patch)});state.inventory=Array.isArray(rows)?rows[0]:inventory;state.inventoryId=state.inventory?.id||inventory.id}

    window.resetDemoSession=()=>{stopQrScanner();clearSession();window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);const next=new URLSearchParams();if(state.uid)next.set('uid',state.uid);if(state.agentSlug)next.set('agent',state.agentSlug);window.location.href=next.toString()?`/sign-demo-activate.html?${next.toString()}`:'/sign-demo-activate.html'};
    async function init(){renderLoading('Checking claimed chip and sign context...');try{if(state.freshQr||state.publicCode&&!state.uid&&!state.agentSlug&&!state.signChipUid)clearSession();const p=mergeStateFromSession();if(p?.source==='event_pass')state.source='event_pass';if(state.uid)await loadAgentFromClaimedChip().catch(()=>null);if(state.signChipUid&&(state.publicCode||p?.publicCode)){state.publicCode=state.publicCode||p.publicCode;state.agentSlug=state.agentSlug||p?.agentSlug||'';state.uid=state.uid||p?.uid||'';if(state.uid)await loadAgentFromClaimedChip().catch(()=>null);const sign=await resolveSignByCode(state.publicCode);if(isEventPassFlow()){await proceedToListingDetection();return}const front=registeredFrontChip(sign);if(p?.stage==='waiting_for_second_sign_chip'){await registerSecondChip(state.signChipUid);return}if(front&&front!==state.signChipUid&&!sign.uid_secondary){await registerSecondChip(state.signChipUid);return}if(front===state.signChipUid&&!sign.uid_secondary){writeSession({signId:sign.id,publicCode:sign.public_code||state.publicCode,inventoryId:state.inventoryId||p?.inventoryId||'',primaryChipUid:state.signChipUid,stage:'waiting_for_second_sign_chip'});renderTapSign2();return}if(front&&sign?.uid_secondary){writeSession({signId:sign.id,publicCode:sign.public_code||state.publicCode,inventoryId:state.inventoryId||p?.inventoryId||'',primaryChipUid:front,secondChipUid:sign.uid_secondary,stage:'waiting_for_handshake'});renderHandshakeWait();return}await registerFirstChip(state.signChipUid);return}if(state.uid&&state.agentSlug&&p?.stage==='waiting_for_handshake'&&p.publicCode){state.publicCode=p.publicCode;state.signId=p.signId||state.signId;await proceedToListingDetection();return}if(state.uid&&state.agentSlug&&!state.publicCode&&!state.signChipUid){writeSession({uid:state.uid,agentSlug:state.agentSlug,stage:'waiting_for_sign_code',qrArmedAt:new Date().toISOString()});renderSignCode();return}if(!state.uid&&state.signChipUid&&p?.stage==='waiting_for_ urn}const front=registeredFrontChip(sign);if(!front){writeSession({uid:state.uid,agentSlug:state.agentSlug,ownerAgentSlug:sign.owner_agent_slug||'',publicCode:sign.public_code,signId:sign.id,primaryChipUid:'',stage:'waiting_for_sign_chip_1'});renderTapSign1();return}if(!sign.uid_secondary){writeSession({uid:state.uid,agentSlug:state.agentSlug,ownerAgentSlug:sign.owner_agent_slug||'',publicCode:sign.public_code,signId:sign.id,primaryChipUid:front,stage:'waiting_for_second_sign_chip'});renderTapSign2();return}await proceedToListingDetection();return}if(state.publicCode&&!state.uid){const sign=await resolveSignByCode(state.publicCode),pass=isEventPassFlow();writeSession({uid:'',agentSlug:'',publicCode:state.publicCode,signId:sign.id,ownerAgentSlug:sign.owner_agent_slug||'',inventoryId:state.inventoryId||p?.inventoryId||'',source:pass?'event_pass':state.source||p?.source||'',primaryChipUid:registeredFrontChip(sign),stage:'waiting_for_agent_keychain'});renderTapAgentKeychain();return}renderSignCode()}catch(err){renderMessage('Sign Demo Not Ready',err.message||'Missing sign-demo context.','error')}}
