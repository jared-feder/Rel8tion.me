<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/field-dashboard?role=loan_officer">
  <title>Opening Loan Officer Field Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          colors: {
            rel8tion: { sky: '#38bdf8', mist: '#e8f8ff', navy: '#1f2a5a', ink: '#17224f', teal: '#0ea5c8' }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            glass: '0 28px 70px rgba(23, 34, 79, 0.16), 0 2px 10px rgba(23, 34, 79, 0.06)'
          }
        }
      }
    };
  </script>
</head>
<body>
  <script>
    const target = new URL('/field-dashboard', window.location.origin);
    target.searchParams.set('role', 'loan_officer');
    for (const [key, value] of new URLSearchParams(window.location.search).entries()) {
      if (key !== 'role') target.searchParams.set(key, value);
    }
    window.location.replace(target.toString());
  </script>
  <p>Opening field dashboard...</p>
</body>
</html>
