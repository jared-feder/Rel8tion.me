<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loan Officer Coverage Sign | Rel8tion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 16% 10%, rgba(125,211,252,.42), transparent 28%),
        radial-gradient(circle at 86% 16%, rgba(167,243,208,.34), transparent 30%),
        linear-gradient(135deg, #eef8ff, #f8fbff 46%, #eefdf7);
      color: #0f172a;
    }
    .glass { border:1px solid rgba(255,255,255,.74); background:rgba(255,255,255,.68); box-shadow:0 24px 70px rgba(31,42,90,.12); backdrop-filter:blur(18px); }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:56px; border-radius:999px; padding:1rem 1.25rem; font-weight:900; }
    .btn-primary { color:white; background:linear-gradient(90deg,#06b6d4,#2563eb); box-shadow:0 18px 38px rgba(37,99,235,.22); }
    .btn-soft { background:rgba(255,255,255,.84); border:1px solid rgba(255,255,255,.9); color:#334155; }
  </style>
</head>
<body>
  <main id="app" class="min-h-screen flex items-center justify-center px-4 py-7"></main>
  <script type="module">
    import { ASSETS } from '/apps/rel8tion-app/src/core/config.js';
    import { esc } from '/apps/rel8tion-app/src/core/utils.js';

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    const SETUP_SESSION_KEY = 'rel8tion_lo_sign_setup_pending';
    const app = document.getElementById('app');

    function shell(content) {
      app.innerHTML = `
        <section class="w-full max-w-2xl glass rounded-[34px] p-6 sm:p-8 text-center">
          <img src="${ASSETS.rel8tionLogo}" alt="Rel8tion" class="h-16 w-auto mx-auto mb-6">
          ${content}
        </section>
      `;
    }

    function label(text) {
      return `<div class="inline-flex items-center px-4 py-2 rounded-full bg-white/60 border border-white/80 text-[11px] font-black uppercase tracking-[0.18em] text-slate-500 mb-5">${esc(text)}</div>`;
    }

    function profileName(profile) {
      return [profile?.full_name || profile?.slug, profile?.company_name].filter(Boolean).join(', ') || 'Assigned loan officer';
    }

    function readSetupSession() {
      try {
        const raw = window.localStorage.getItem(SETUP_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const expiresAt = new Date(parsed.expiresAt || parsed.createdAt || 0).getTime();
        if (!parsed.loanOfficerUid || !Number.isFinite(expiresAt) || expiresAt <= Date.now()) {
          window.localStorage.removeItem(SETUP_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        window.localStorage.removeItem(SETUP_SESSION_KEY);
        return null;
      }
    }

    function pendingSetupUrl() {
      const pending = readSetupSession();
      if (!pending?.loanOfficerUid) return '';
      const next = new URLSearchParams();
      if (code || pending.publicCode) next.set('code', code || pending.publicCode);
      next.set('uid', pending.loanOfficerUid);
      return `/lo-sign-setup?${next.toString()}`;
    }

    async function init() {
      if (!code) {
        shell(`
          ${label('Coverage Sign')}
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl sm:text-5xl font-extrabold text-slate-950 mb-4">Missing Sign Code</h1>
          <p class="text-slate-700 font-bold mb-6">This Loan Officer Coverage Sign link needs a public code.</p>
          <a class="btn btn-soft w-full" href="/">Go Home</a>
        `);
        return;
      }

      shell(`
        ${label('Coverage Sign')}
        <div class="mx-auto mb-5 h-14 w-14 rounded-full border-[6px] border-slate-200 border-t-sky-500 animate-spin"></div>
        <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold text-slate-950">Opening Coverage Sign</h1>
      `);

      try {
        const res = await fetch(`/api/lo-sign/action?code=${encodeURIComponent(code)}`, { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.error || 'Loan Officer Coverage Sign not found.');

        if (data.live && data.event_url) {
          window.location.replace(data.event_url);
          return;
        }

        if (data.profile) {
          shell(`
            ${label('Loan Officer Coverage Sign')}
            <h1 class="font-['Plus_Jakarta_Sans'] text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-950 mb-4">Coverage Sign Ready</h1>
            <p class="text-slate-700 text-lg font-bold leading-relaxed mb-4">A reusable loan-officer-owned sign that routes buyers to the current live event and helps the loan officer provide event coverage.</p>
            <div class="rounded-[24px] border border-white/80 bg-white/74 p-5 text-left mb-6">
              <div class="text-[11px] font-black uppercase tracking-[0.18em] text-slate-400 mb-2">Assigned Loan Officer</div>
              <div class="text-slate-950 font-black text-2xl">${esc(profileName(data.profile))}</div>
              <div class="text-slate-500 font-bold mt-1">${esc([data.profile.phone, data.profile.email].filter(Boolean).join(' | '))}</div>
            </div>
            <a class="btn btn-primary w-full" href="/lo-sign-activate?code=${encodeURIComponent(code)}">Activate Coverage</a>
          `);
          return;
        }

        const setupUrl = pendingSetupUrl();
        if (setupUrl) {
          window.location.replace(setupUrl);
          return;
        }
        shell(`
          ${label('Loan Officer Coverage Sign')}
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-950 mb-4">Sign Setup Needed</h1>
          <p class="text-slate-700 text-lg font-bold leading-relaxed mb-6">This Coverage Sign is not assigned to a verified loan officer yet.</p>
          ${setupUrl
            ? `<a class="btn btn-primary w-full" href="${esc(setupUrl)}">Continue Sign Setup</a>`
            : `<a class="btn btn-primary w-full" href="${esc(data.profile_activation_url || '/nmb-activate')}">Activate Loan Officer Profile</a>`}
        `);
      } catch (error) {
        shell(`
          ${label('Loan Officer Coverage Sign')}
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-950 mb-4">Invalid Coverage Sign</h1>
          <p class="text-slate-700 text-lg font-bold leading-relaxed mb-6">${esc(error.message || 'This Coverage Sign could not be found.')}</p>
          <a class="btn btn-soft w-full" href="https://rel8tion.me">Contact Rel8tion</a>
        `);
      }
    }

    init();
  </script>
</body>
</html>
