<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rel8tion Key Router</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f7ff]">
  <div class="min-h-screen flex items-center justify-center px-4" style="background:linear-gradient(180deg,#38bdf8 0%,#f0f7ff 60%,#f0f7ff 100%);">
    <div class="w-full max-w-xl rounded-[40px] border border-white/60 bg-white/20 backdrop-blur-md p-8 text-center shadow-[0_25px_50px_rgba(31,42,90,0.1)]">
      <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion" class="h-10 mx-auto mb-6">
      <h1 id="status" class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold tracking-tight text-slate-900 mb-3">Connecting...</h1>
      <p id="substatus" class="text-slate-600 text-lg font-medium">Checking your Rel8tion chip.</p>
    </div>
  </div>
  <script type="module">
    import { SUPABASE_URL, KEY } from '/apps/rel8tion-app/src/core/config.js?v=20260426-1108';
    import { saveHostSession } from '/apps/rel8tion-app/src/core/hostSession.js?v=20260426-1108';

    const SIGN_DEMO_SESSION_KEY = 'rel8tion_sign_demo_session';
    const AGENT_DASHBOARD_SESSION_KEY = 'rel8tion_agent_dashboard_pending';
    const LOAN_OFFICER_SESSION_KEY = 'rel8tion_loan_officer_pending';
    const KEY_RESET_SESSION_KEY = 'rel8tion_key_reset_pending';
    const ADD_KEYCHAIN_SESSION_KEY = 'rel8tion_add_keychain_pending';
    const EXTRA_SIGN_CHIP_SESSION_KEY = 'rel8tion_extra_sign_chip_pending';
    const ADD_KEYCHAIN_REMOTE_PREFIX = 'backup-keychain-';
    const BETA_KEYCHAIN_UID = '7ce5a51b-8202-4178-afc7-40a2e10e2a4d';
    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid');
    const signCode = params.get('code') || params.get('sign_code') || '';
    const statusEl = document.getElementById('status');
    const substatusEl = document.getElementById('substatus');

    function setStatus(title, subtitle = '') {
      statusEl.textContent = title;
      substatusEl.textContent = subtitle;
    }

    function isBetaKeychain(chipUid) {
      return chipUid === BETA_KEYCHAIN_UID;
    }

    function goToClaim() {
      window.location.href = `./claim?uid=${encodeURIComponent(uid)}`;
    }

    function readSignActivationSession() {
      try {
        const raw = window.localStorage.getItem(SIGN_DEMO_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.updatedAt || parsed.createdAt || parsed.qrArmedAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 45 * 60 * 1000) {
          window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
        return null;
      }
    }

    function readAgentDashboardSession() {
      try {
        const raw = window.localStorage.getItem(AGENT_DASHBOARD_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.createdAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 15 * 60 * 1000) {
          window.localStorage.removeItem(AGENT_DASHBOARD_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        return null;
      }
    }

    function readLoanOfficerSession() {
      try {
        const raw = window.localStorage.getItem(LOAN_OFFICER_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.createdAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 15 * 60 * 1000) {
          window.localStorage.removeItem(LOAN_OFFICER_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        return null;
      }
    }

    function readKeyResetSession() {
      try {
        const raw = window.localStorage.getItem(KEY_RESET_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.createdAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 10 * 60 * 1000) {
          window.localStorage.removeItem(KEY_RESET_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        window.localStorage.removeItem(KEY_RESET_SESSION_KEY);
        return null;
      }
    }

    function readAddKeychainSession() {
      try {
        const raw = window.localStorage.getItem(ADD_KEYCHAIN_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.createdAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 15 * 60 * 1000) {
          window.localStorage.removeItem(ADD_KEYCHAIN_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        window.localStorage.removeItem(ADD_KEYCHAIN_SESSION_KEY);
        return null;
      }
    }

    function normalizeRemoteAddKeychainSession(row) {
      if (!row?.agent_slug) return null;
      return {
        agentSlug: row.agent_slug,
        primaryUid: row.agent_key_uid || '',
        remoteSessionId: row.id || '',
        createdAt: row.updated_at || row.started_at || new Date().toISOString(),
        source: 'remote'
      };
    }

    async function findRemoteAddKeychainSession() {
      const now = new Date().toISOString();
      const prefix = encodeURIComponent(`${ADD_KEYCHAIN_REMOTE_PREFIX}%`);
      const rows = await request(
        `smart_sign_activation_sessions?status=eq.pending&sign_id=is.null&public_code=like.${prefix}&expires_at=gt.${encodeURIComponent(now)}&select=id,agent_slug,agent_key_uid,public_code,started_at,updated_at&order=updated_at.desc&limit=1`
      ).catch(() => []);
      const row = Array.isArray(rows) ? rows[0] : null;
      return normalizeRemoteAddKeychainSession(row);
    }

    async function readAnyAddKeychainSession() {
      return readAddKeychainSession() || await findRemoteAddKeychainSession();
    }

    async function finishAddKeychainSession(pending, status = 'completed') {
      window.localStorage.removeItem(ADD_KEYCHAIN_SESSION_KEY);
      if (!pending?.remoteSessionId) return;
      await request(`smart_sign_activation_sessions?id=eq.${encodeURIComponent(pending.remoteSessionId)}`, {
        method: 'PATCH',
        body: JSON.stringify({
          status,
          updated_at: new Date().toISOString()
        })
      }).catch(() => null);
    }

    function readExtraSignChipSession() {
      try {
        const raw = window.localStorage.getItem(EXTRA_SIGN_CHIP_SESSION_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        const ageMs = Date.now() - new Date(parsed.createdAt || 0).getTime();
        if (!Number.isFinite(ageMs) || ageMs > 15 * 60 * 1000) {
          window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);
          return null;
        }
        return parsed;
      } catch (_) {
        window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);
        return null;
      }
    }

    function saveAgentDashboardSession(sign = {}) {
      const payload = {
        signId: sign.id || '',
        publicCode: sign.public_code || '',
        eventId: sign.active_event_id || '',
        ownerAgentSlug: sign.owner_agent_slug || '',
        createdAt: new Date().toISOString()
      };
      if (!payload.signId && !payload.publicCode) return null;
      window.localStorage.setItem(AGENT_DASHBOARD_SESSION_KEY, JSON.stringify(payload));
      return payload;
    }

    function continueSignActivation(query = {}) {
      const next = new URLSearchParams();
      const pending = readSignActivationSession();
      if (pending?.uid) next.set('uid', pending.uid);
      if (pending?.agentSlug) next.set('agent', pending.agentSlug);
      if (pending?.publicCode) next.set('code', pending.publicCode);
      if (pending?.signId) next.set('sign_id', pending.signId);
      if (pending?.inventoryId) next.set('inventory_id', pending.inventoryId);
      if (signCode && !next.has('code')) next.set('code', signCode);
      for (const [key, value] of Object.entries(query)) {
        if (value) next.set(key, value);
      }
      window.location.href = `/sign-demo-activate.html?${next.toString()}`;
    }

    function goToLiveProfile(agentSlug) {
      if (!agentSlug) return;
      saveHostSession({ agentSlug, uid, source: 'claimed-chip-router' });
      const target = uid
        ? `${window.location.origin}/a?agent=${encodeURIComponent(agentSlug)}&uid=${encodeURIComponent(uid)}`
        : `${window.location.origin}/a?agent=${encodeURIComponent(agentSlug)}`;
      window.location.href = target;
    }

    function goToLiveSign(publicCode) {
      if (!publicCode) return;
      window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
      window.location.href = `${window.location.origin}/s?code=${encodeURIComponent(publicCode)}`;
    }

    function goToAgentDashboard({ agentSlug, eventId, signId, publicCode }) {
      if (!agentSlug) return;
      const next = new URLSearchParams();
      next.set('agent', agentSlug);
      if (uid) next.set('uid', uid);
      if (eventId) next.set('event', eventId);
      if (signId) next.set('sign_id', signId);
      if (publicCode) next.set('code', publicCode);
      window.localStorage.removeItem(AGENT_DASHBOARD_SESSION_KEY);
      window.location.href = `${window.location.origin}/apps/rel8tion-app/agent-dashboard?${next.toString()}`;
    }

    async function request(path, options = {}) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: {
          apikey: KEY,
          Authorization: `Bearer ${KEY}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      const raw = await response.text().catch(() => '');
      if (!response.ok) throw new Error(raw || `Request failed: ${response.status}`);
      return raw ? JSON.parse(raw) : null;
    }

    async function findRemoteSignActivationSession(stages = [], agentSlug = '') {
      const now = new Date().toISOString();
      const stageFilter = stages.length
        ? `&stage=in.(${stages.map((stage) => encodeURIComponent(stage)).join(',')})`
        : '';
      const agentFilter = agentSlug ? `&agent_slug=eq.${encodeURIComponent(agentSlug)}` : '';
      const rows = await request(
        `smart_sign_activation_sessions?status=eq.pending&sign_id=not.is.null&expires_at=gt.${encodeURIComponent(now)}${stageFilter}${agentFilter}&select=*&order=updated_at.desc&limit=1`
      ).catch(() => []);
      return Array.isArray(rows) ? rows[0] : null;
    }

    async function updateRemoteSignActivationSession(id, patch = {}) {
      if (!id) return null;
      const payload = {
        ...patch,
        updated_at: new Date().toISOString(),
        expires_at: new Date(Date.now() + 45 * 60 * 1000).toISOString()
      };
      const rows = await request(`smart_sign_activation_sessions?id=eq.${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify(payload)
      }).catch(() => []);
      return Array.isArray(rows) ? rows[0] : null;
    }

    async function loadVerifiedProfile(chipUid) {
      const rows = await request(`verified_profiles?uid=eq.${encodeURIComponent(chipUid)}&is_active=eq.true&select=*&limit=1`);
      return Array.isArray(rows) ? rows[0] : null;
    }

    async function activateLoanOfficerSession(pending, profile) {
      const existingRows = await request(`event_loan_officer_sessions?open_house_event_id=eq.${encodeURIComponent(pending.eventId)}&status=eq.live&select=*&limit=1`);
      const existing = Array.isArray(existingRows) ? existingRows[0] : null;
      const payload = {
        open_house_event_id: pending.eventId,
        verified_profile_uid: profile.uid,
        loan_officer_uid: uid,
        loan_officer_slug: profile.slug || '',
        loan_officer_name: profile.full_name || '',
        loan_officer_title: profile.title || '',
        loan_officer_company: profile.company_name || '',
        loan_officer_phone: profile.phone || '',
        loan_officer_email: profile.email || '',
        loan_officer_photo_url: profile.photo_url || '',
        loan_officer_cta_url: profile.cta_url || '',
        loan_officer_calendar_url: profile.calendar_url || '',
        status: 'live',
        signed_out_at: null,
        last_seen_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };
      if (existing?.id) {
        const rows = await request(`event_loan_officer_sessions?id=eq.${encodeURIComponent(existing.id)}`, {
          method: 'PATCH',
          headers: { Prefer: 'return=representation' },
          body: JSON.stringify(payload)
        });
        return Array.isArray(rows) ? rows[0] : null;
      }
      const rows = await request('event_loan_officer_sessions', {
        method: 'POST',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify(payload)
      });
      return Array.isArray(rows) ? rows[0] : null;
    }

    async function maybeHandlePendingLoanOfficerSession({ allowProfileActivation = true } = {}) {
      const pendingLoanOfficer = readLoanOfficerSession();
      if (!pendingLoanOfficer?.eventId) return false;

      setStatus('Checking NMB Key...', 'Looking up the loan officer profile.');
      const profile = await loadVerifiedProfile(uid);
      if (!profile?.uid) {
        if (!allowProfileActivation) {
          window.localStorage.removeItem(LOAN_OFFICER_SESSION_KEY);
          return false;
        }
        setStatus('Activate NMB Profile', 'This chip needs a verified loan officer profile first.');
        window.location.href = `${window.location.origin}/nmb-activate?uid=${encodeURIComponent(uid)}`;
        return true;
      }
      await activateLoanOfficerSession(pendingLoanOfficer, profile);
      window.localStorage.removeItem(LOAN_OFFICER_SESSION_KEY);
      setStatus('Loan Officer Live', 'Returning to the agent event dashboard.');
      goToAgentDashboard({
        agentSlug: pendingLoanOfficer.agentSlug,
        eventId: pendingLoanOfficer.eventId,
        signId: pendingLoanOfficer.signId,
        publicCode: pendingLoanOfficer.publicCode
      });
      return true;
    }

    async function findActiveSignByChipUid(chipUid) {
      const encodedUid = encodeURIComponent(chipUid);
      const response = await fetch(`${SUPABASE_URL}/rest/v1/smart_signs?or=(uid_primary.eq.${encodedUid},uid_secondary.eq.${encodedUid})&status=eq.active&select=id,public_code,uid_primary,uid_secondary,owner_agent_slug,active_event_id,primary_device_type,secondary_device_type&limit=1`, {
        headers: {
          apikey: KEY,
          Authorization: `Bearer ${KEY}`,
          'Content-Type': 'application/json'
        }
      });
      if (!response.ok) return null;
      const rows = await response.json().catch(() => []);
      const directSign = Array.isArray(rows) ? rows[0] : null;
      if (directSign) return directSign;
      const aliasSign = await findSignByChipAliasUid(chipUid).catch(() => null);
      return aliasSign?.status === 'active' ? aliasSign : null;
    }

    async function findSignByChipAliasUid(chipUid) {
      const aliasRows = await request(`smart_sign_chip_aliases?uid=eq.${encodeURIComponent(chipUid)}&active=eq.true&select=*&limit=1`).catch(() => []);
      const alias = Array.isArray(aliasRows) ? aliasRows[0] : null;
      if (!alias?.smart_sign_id) return null;
      const signRows = await request(`smart_signs?id=eq.${encodeURIComponent(alias.smart_sign_id)}&select=id,public_code,uid_primary,uid_secondary,owner_agent_slug,active_event_id,primary_device_type,secondary_device_type,status&limit=1`).catch(() => []);
      const sign = Array.isArray(signRows) ? signRows[0] : null;
      return sign ? { ...sign, alias_uid: chipUid, alias_device_type: alias.device_type || 'front_buyer_chip' } : null;
    }

    async function findAnySignByChipUid(chipUid) {
      const encodedUid = encodeURIComponent(chipUid);
      const rows = await request(`smart_signs?or=(uid_primary.eq.${encodedUid},uid_secondary.eq.${encodedUid},activation_uid_primary.eq.${encodedUid},activation_uid_secondary.eq.${encodedUid})&select=id,public_code,status,uid_primary,uid_secondary&limit=1`).catch(() => []);
      const directSign = Array.isArray(rows) ? rows[0] : null;
      return directSign || await findSignByChipAliasUid(chipUid).catch(() => null);
    }

    function activeSignChipRole(sign, chipUid) {
      if (!sign || !chipUid) return '';
      if (sign.alias_uid === chipUid) {
        return /front|buyer/i.test(sign.alias_device_type || '') ? 'front_buyer' : '';
      }
      if (sign.uid_secondary === chipUid) {
        return /keychain/i.test(sign.secondary_device_type || '') ? 'keychain' : 'rear_agent';
      }
      if (sign.uid_primary === chipUid) return 'front_buyer';
      return '';
    }

    function isKeychainLike(row) {
      const role = String(row?.device_role || '').trim().toLowerCase();
      return !role || role === 'keychain';
    }

    function resolveAdditionalKeychainSlot({ existingRow, agentKeys, scannedUid }) {
      const currentSlot = Number(existingRow?.assigned_slot);
      if (currentSlot === 1 || currentSlot === 2) return currentSlot;

      const otherKeychains = (agentKeys || [])
        .filter((row) => row?.uid !== scannedUid && isKeychainLike(row));
      const usedSlots = new Set(
        otherKeychains
          .map((row) => Number(row.assigned_slot))
          .filter((slot) => slot === 1 || slot === 2)
      );

      if (otherKeychains.length && !usedSlots.has(1)) {
        usedSlots.add(1);
      }

      if (otherKeychains.length >= 2) return null;
      if (!otherKeychains.length) return 1;
      if (!usedSlots.has(2)) return 2;
      if (!usedSlots.has(1)) return 1;
      return null;
    }

    async function maybeHandleAddKeychainSession() {
      const pending = await readAnyAddKeychainSession();
      if (!pending?.agentSlug) return false;

      setStatus('Adding Keychain...', 'Checking this chip before linking it as a backup.');

      const signMatch = await findAnySignByChipUid(uid);
      if (signMatch?.id) {
        setStatus('Sign Chip Detected', `This chip belongs to sign ${signMatch.public_code || signMatch.id}. Use a real keychain chip for the backup slot.`);
        return true;
      }

      const keyRows = await request(`keys?uid=eq.${encodeURIComponent(uid)}&select=*`).catch(() => []);
      const existingRow = Array.isArray(keyRows) ? keyRows[0] : null;

      if (existingRow?.claimed === true && existingRow.agent_slug && existingRow.agent_slug !== pending.agentSlug) {
        setStatus('Already Claimed', `This keychain is already claimed to ${existingRow.agent_slug}.`);
        return true;
      }

      if (pending.primaryUid && pending.primaryUid === uid && existingRow?.agent_slug === pending.agentSlug) {
        setStatus('Primary Keychain', 'This is already the primary keychain. Tap the backup keychain instead.');
        substatusEl.innerHTML = `This is already the primary keychain. Tap the backup keychain now, or <a class="font-black text-blue-700 underline" href="/onboarding?agent=${encodeURIComponent(pending.agentSlug)}&uid=${encodeURIComponent(uid)}">return to onboarding</a>.`;
        return true;
      }

      const agentKeys = await request(`keys?agent_slug=eq.${encodeURIComponent(pending.agentSlug)}&claimed=eq.true&select=uid,device_role,assigned_slot&order=assigned_slot.asc.nullslast`).catch(() => []);
      const slot = resolveAdditionalKeychainSlot({
        existingRow,
        agentKeys: Array.isArray(agentKeys) ? agentKeys : [],
        scannedUid: uid
      });

      if (!slot) {
        await finishAddKeychainSession(pending, 'cancelled');
        setStatus('Two Keychains Active', 'This agent already has both keychain slots active.');
        return true;
      }

      const payload = {
        uid,
        agent_slug: pending.agentSlug,
        claimed: true,
        device_role: 'keychain',
        assigned_slot: slot
      };

      if (existingRow?.uid) {
        await request(`keys?uid=eq.${encodeURIComponent(uid)}`, {
          method: 'PATCH',
          headers: { Prefer: 'return=representation' },
          body: JSON.stringify(payload)
        });
      } else {
        await request('keys', {
          method: 'POST',
          headers: { Prefer: 'return=representation' },
          body: JSON.stringify(payload)
        });
      }

      await finishAddKeychainSession(pending, 'completed');
      saveHostSession({ agentSlug: pending.agentSlug, uid, source: 'backup-keychain-added' });
      setStatus(slot === 2 ? 'Backup Added' : 'Keychain Added', 'Returning to onboarding.');
      window.location.href = `${window.location.origin}/onboarding?agent=${encodeURIComponent(pending.agentSlug)}&uid=${encodeURIComponent(uid)}&keychain_added=1`;
      return true;
    }

    async function maybeHandleExtraSignChipSession() {
      const pending = readExtraSignChipSession();
      if (!pending?.signId || !pending?.publicCode) return false;

      setStatus('Adding Buyer NFC Chip...', 'Checking this chip before linking it to the live sign.');

      const signMatch = await findAnySignByChipUid(uid);
      if (signMatch?.id && signMatch.id !== pending.signId) {
        setStatus('Sign Chip Detected', `This chip already belongs to sign ${signMatch.public_code || signMatch.id}.`);
        return true;
      }
      if (signMatch?.id === pending.signId) {
        window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);
        setStatus('Already Linked', 'This chip already opens this sign. Opening the live buyer route.');
        goToLiveSign(pending.publicCode);
        return true;
      }

      const keyRows = await request(`keys?uid=eq.${encodeURIComponent(uid)}&select=uid,claimed,agent_slug&limit=1`).catch(() => []);
      if (Array.isArray(keyRows) && keyRows[0]?.claimed === true) {
        setStatus('Keychain Detected', 'That UID is a claimed keychain. Use an extra front buyer NFC chip instead.');
        return true;
      }

      const existingAliasRows = await request(`smart_sign_chip_aliases?uid=eq.${encodeURIComponent(uid)}&select=*&limit=1`).catch(() => []);
      const existingAlias = Array.isArray(existingAliasRows) ? existingAliasRows[0] : null;
      const payload = {
        smart_sign_id: pending.signId,
        uid,
        device_type: 'front_buyer_chip',
        label: 'extra_front_buyer_chip',
        active: true,
        created_by_agent_slug: pending.agentSlug || null,
        updated_at: new Date().toISOString()
      };

      try {
        if (existingAlias?.id) {
          if (existingAlias.smart_sign_id && existingAlias.smart_sign_id !== pending.signId) {
            setStatus('Already Linked Elsewhere', 'That extra NFC chip is already linked to another smart sign.');
            return true;
          }
          await request(`smart_sign_chip_aliases?id=eq.${encodeURIComponent(existingAlias.id)}`, {
            method: 'PATCH',
            headers: { Prefer: 'return=representation' },
            body: JSON.stringify(payload)
          });
        } else {
          await request('smart_sign_chip_aliases', {
            method: 'POST',
            headers: { Prefer: 'return=representation' },
            body: JSON.stringify(payload)
          });
        }
      } catch (error) {
        setStatus('Extra Chip Setup Needed', 'The NFC chip alias table is not available yet. Apply the smart_sign_chip_aliases migration, then try again.');
        return true;
      }

      window.localStorage.removeItem(EXTRA_SIGN_CHIP_SESSION_KEY);
      setStatus('Extra Buyer Chip Linked', 'Opening the live buyer check-in route.');
      goToLiveSign(pending.publicCode);
      return true;
    }

    async function init() {
      if (!uid) {
        window.location.href = 'https://rel8tion.me/?kerror=missing_uid';
        return;
      }

      if (readKeyResetSession()) {
        setStatus('Key Reset Scanner', 'Opening the reset page for this scanned UID.');
        window.location.href = `${window.location.origin}/key-reset.html?uid=${encodeURIComponent(uid)}`;
        return;
      }

      const activeSign = await findActiveSignByChipUid(uid);
      if (activeSign?.public_code) {
        const role = activeSignChipRole(activeSign, uid);
        if (role === 'rear_agent') {
          window.localStorage.removeItem(LOAN_OFFICER_SESSION_KEY);
          saveAgentDashboardSession(activeSign);
          setStatus('Agent Side Found', 'Tap your Rel8tionChip keychain to verify and open the live event dashboard.');
          return;
        }
        if (role === 'front_buyer') {
          setStatus('Opening Sign', 'Loading the live buyer check-in route.');
          goToLiveSign(activeSign.public_code);
          return;
        }
      }

      if (await maybeHandleExtraSignChipSession()) {
        return;
      }

      setStatus('Checking Key...', 'Looking up your Rel8tion chip.');
      const response = await fetch(`${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(uid)}&select=*`, {
        headers: {
          apikey: KEY,
          Authorization: `Bearer ${KEY}`,
          'Content-Type': 'application/json'
        }
      });

      const raw = await response.text().catch(() => '');
      if (!response.ok) {
        setStatus('Connection Error', 'Unable to read your chip right now.');
        return;
      }

      const rows = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(rows) || rows.length === 0) {
        if (signCode) {
          setStatus('Smart Sign Chip', 'Opening sign setup for this printed sign.');
          continueSignActivation({ sign_uid: uid, code: signCode });
          return;
        }

        const pendingSignActivation = readSignActivationSession();
        if (
          pendingSignActivation?.publicCode
          && (pendingSignActivation.stage === 'waiting_for_sign_chip_1' || pendingSignActivation.stage === 'waiting_for_second_sign_chip')
        ) {
          setStatus('Smart Sign Chip', 'Continuing sign activation.');
          continueSignActivation({ sign_uid: uid });
          return;
        }

        const remoteSignActivation = await findRemoteSignActivationSession([
          'waiting_for_sign_chip_1',
          'waiting_for_second_sign_chip'
        ]);
        if (remoteSignActivation?.public_code) {
          setStatus('Smart Sign Chip', 'Continuing sign activation.');
          continueSignActivation({
            sign_uid: uid,
            code: remoteSignActivation.public_code,
            sign_id: remoteSignActivation.sign_id,
            inventory_id: remoteSignActivation.inventory_id,
            uid: remoteSignActivation.agent_key_uid,
            agent: remoteSignActivation.agent_slug
          });
          return;
        }

        if (await maybeHandlePendingLoanOfficerSession({ allowProfileActivation: true })) {
          return;
        }

        if (await maybeHandleAddKeychainSession()) {
          return;
        }

        window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
        setStatus('First Time Setup...', 'Sending you to activation.');
        goToClaim();
        return;
      }

      const record = rows[0];
      if (record.claimed === true && record.agent_slug) {
        const pendingAgentDashboard = readAgentDashboardSession();
        if (pendingAgentDashboard?.publicCode || pendingAgentDashboard?.signId) {
          if (pendingAgentDashboard.ownerAgentSlug && pendingAgentDashboard.ownerAgentSlug !== record.agent_slug) {
            setStatus('Wrong Keychain', `This dashboard belongs to ${pendingAgentDashboard.ownerAgentSlug}.`);
            return;
          }
          saveHostSession({ agentSlug: record.agent_slug, uid, source: 'agent-dashboard-keychain' });
          setStatus('Keychain Verified', 'Opening the live event dashboard.');
          goToAgentDashboard({
            agentSlug: record.agent_slug,
            eventId: pendingAgentDashboard.eventId,
            signId: pendingAgentDashboard.signId,
            publicCode: pendingAgentDashboard.publicCode
          });
          return;
        }

        const pendingSignActivation = readSignActivationSession();
        if (pendingSignActivation?.stage === 'waiting_for_agent_keychain' && pendingSignActivation.publicCode) {
          if (pendingSignActivation.ownerAgentSlug && pendingSignActivation.ownerAgentSlug !== record.agent_slug) {
            setStatus('Wrong Keychain', `This sign is assigned to ${pendingSignActivation.ownerAgentSlug}.`);
            return;
          }
          setStatus('Keychain Confirmed', 'Opening sign activation.');
          continueSignActivation({
            uid,
            agent: record.agent_slug,
            code: pendingSignActivation.publicCode,
            sign_id: pendingSignActivation.signId
          });
          return;
        }

        if (pendingSignActivation?.stage === 'waiting_for_handshake' && pendingSignActivation.agentSlug === record.agent_slug) {
          setStatus('Handshake Confirmed', 'Opening sign activation.');
          continueSignActivation({ uid, agent: record.agent_slug });
          return;
        }

        if (pendingSignActivation?.stage === 'waiting_for_handshake' && pendingSignActivation.publicCode && pendingSignActivation.signId && pendingSignActivation.ownerAgentSlug === record.agent_slug) {
          setStatus('Handshake Confirmed', 'Opening sign activation.');
          continueSignActivation({
            uid,
            agent: record.agent_slug,
            code: pendingSignActivation.publicCode,
            sign_id: pendingSignActivation.signId
          });
          return;
        }

        if (isBetaKeychain(uid)) {
          if (await maybeHandleAddKeychainSession()) {
            return;
          }
          window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
          window.localStorage.removeItem(LOAN_OFFICER_SESSION_KEY);
          setStatus('Beta Keychain', 'Opening the beta claim test menu.');
          window.location.href = `${window.location.origin}/claim?uid=${encodeURIComponent(uid)}`;
          return;
        }

        let remoteKeychainActivation = await findRemoteSignActivationSession([
          'waiting_for_agent_keychain',
          'waiting_for_handshake'
        ], record.agent_slug);
        if (!remoteKeychainActivation) {
          remoteKeychainActivation = await findRemoteSignActivationSession(['waiting_for_agent_keychain']);
        }
        if (remoteKeychainActivation?.public_code) {
          if (remoteKeychainActivation.owner_agent_slug && remoteKeychainActivation.owner_agent_slug !== record.agent_slug) {
            setStatus('Wrong Keychain', `This sign is assigned to ${remoteKeychainActivation.owner_agent_slug}.`);
            return;
          }
          await updateRemoteSignActivationSession(remoteKeychainActivation.id, {
            agent_key_uid: uid,
            agent_slug: record.agent_slug,
            stage: remoteKeychainActivation.stage === 'waiting_for_handshake' ? 'waiting_for_handshake' : 'waiting_for_sign_chip_1'
          });
          setStatus(
            remoteKeychainActivation.stage === 'waiting_for_handshake' ? 'Handshake Confirmed' : 'Keychain Confirmed',
            'Opening sign activation.'
          );
          continueSignActivation({
            uid,
            agent: record.agent_slug,
            code: remoteKeychainActivation.public_code,
            sign_id: remoteKeychainActivation.sign_id,
            inventory_id: remoteKeychainActivation.inventory_id
          });
          return;
        }

        if (await maybeHandlePendingLoanOfficerSession({ allowProfileActivation: false })) {
          return;
        }

        if (await maybeHandleAddKeychainSession()) {
          return;
        }

        setStatus('Already Active', 'Opening the live profile.');
        goToLiveProfile(record.agent_slug);
        return;
      }

      if (await maybeHandleAddKeychainSession()) {
        return;
      }

      setStatus('Setup Incomplete...', 'Finishing your activation.');
      window.localStorage.removeItem(SIGN_DEMO_SESSION_KEY);
      goToClaim();
    }

    init().catch(() => {
      setStatus('Connection Error', 'Something interrupted the chip lookup.');
    });
  </script>
</body>
</html>
