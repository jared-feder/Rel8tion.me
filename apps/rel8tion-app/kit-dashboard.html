<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rel8tion Open House Kit Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #17224f;
      --muted: #5b677d;
      --blue: #172c76;
      --sky: #39c6f4;
      --mint: #8ee6cf;
      --coral: #ff8a76;
      --paper: rgba(255,255,255,0.74);
      --line: rgba(255,255,255,0.8);
      --shadow: 0 26px 70px rgba(23,34,79,0.14);
      --danger: #9f1239;
      --success: #047857;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 8%, rgba(255,255,255,0.9) 0 11%, transparent 23%),
        radial-gradient(circle at 88% 12%, rgba(255,255,255,0.78) 0 10%, transparent 20%),
        linear-gradient(180deg, #57d0f7 0%, #edf9ff 48%, #f8fbff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 46% 0%, rgba(142,230,207,0.24), transparent 24%),
        radial-gradient(circle at 94% 76%, rgba(255,138,118,0.14), transparent 25%);
    }

    main {
      position: relative;
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .brand img {
      height: 50px;
      width: auto;
      filter: drop-shadow(0 10px 18px rgba(23,44,118,0.1));
    }

    .hero,
    .panel,
    .tile,
    .logo-option {
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      border-radius: 30px;
      padding: clamp(22px, 4vw, 38px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: clamp(36px, 6vw, 66px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(23,44,118,0.1);
      color: #334273;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .meta {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .status-stack {
      display: grid;
      gap: 10px;
      min-width: 260px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      min-height: 42px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(23,44,118,0.1);
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
    }

    .pill.success { color: var(--success); border-color: rgba(4,120,87,0.18); background: rgba(236,253,245,0.82); }
    .pill.warn { color: #a16207; border-color: rgba(161,98,7,0.18); background: rgba(254,252,232,0.82); }
    .pill.error { color: var(--danger); border-color: rgba(159,18,57,0.18); background: rgba(255,241,242,0.82); }

    .timeline {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .tile {
      border-radius: 20px;
      padding: 16px;
      min-height: 116px;
    }

    .tile span,
    .field span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .tile strong {
      display: block;
      color: var(--blue);
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 24px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .tile p {
      margin: 0;
      color: #475569;
      font-size: 13px;
      line-height: 1.38;
      font-weight: 750;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(330px, 0.95fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      border-radius: 28px;
      padding: clamp(20px, 3vw, 28px);
    }

    .panel h2 {
      margin: 0 0 14px;
      color: var(--blue);
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 28px;
      line-height: 1;
    }

    .panel p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 750;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 12px;
    }

    .logo-option {
      display: grid;
      gap: 10px;
      justify-items: center;
      border-radius: 18px;
      padding: 14px;
      min-height: 150px;
      cursor: pointer;
      color: var(--blue);
      text-align: center;
    }

    .logo-option.selected {
      outline: 3px solid rgba(57,198,244,0.42);
      background: rgba(239,249,255,0.9);
    }

    .logo-option img {
      width: 58px;
      height: 58px;
      object-fit: contain;
      border-radius: 14px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(23,44,118,0.08);
      padding: 8px;
    }

    .logo-option strong {
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: #344273;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(23,44,118,0.12);
      border-radius: 16px;
      background: rgba(255,255,255,0.86);
      color: var(--blue);
      font: 800 15px/1.3 Inter, sans-serif;
      outline: none;
      padding: 12px 14px;
      letter-spacing: 0;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: rgba(57,198,244,0.82);
      box-shadow: 0 0 0 4px rgba(57,198,244,0.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      background: var(--blue);
      color: white;
      font: 900 14px/1 Inter, sans-serif;
      cursor: pointer;
      padding: 0 16px;
      box-shadow: 0 14px 28px rgba(23,44,118,0.18);
    }

    .btn.secondary {
      color: var(--blue);
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(23,44,118,0.1);
      box-shadow: 0 10px 24px rgba(23,34,79,0.08);
    }

    .btn:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .notice {
      margin: 0 0 14px;
      border-radius: 18px;
      border: 1px solid rgba(23,44,118,0.1);
      background: rgba(255,255,255,0.72);
      padding: 13px 14px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.4;
    }

    .notice.success { color: var(--success); border-color: rgba(4,120,87,0.18); background: rgba(236,253,245,0.8); }
    .notice.error { color: var(--danger); border-color: rgba(159,18,57,0.18); background: rgba(255,241,242,0.8); }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      border-radius: 16px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(23,44,118,0.08);
      padding: 13px;
      min-height: 70px;
    }

    .field strong {
      display: block;
      color: var(--blue);
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .login {
      max-width: 620px;
      margin: 0 auto;
    }

    .loading {
      min-height: 64vh;
      display: grid;
      place-items: center;
      color: var(--blue);
      font-weight: 900;
    }

    .hidden { display: none; }

    @media (max-width: 860px) {
      main { width: min(100% - 18px, 1180px); padding-top: 12px; }
      .hero-grid,
      .layout,
      .timeline,
      .form-grid,
      .field-grid {
        grid-template-columns: 1fr;
      }
      .status-stack { min-width: 0; }
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion">
    </div>
    <div id="app" class="loading">Opening your kit dashboard...</div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const app = document.getElementById('app');
    const state = {
      orderId: params.get('order') || '',
      token: params.get('token') || '',
      order: null,
      logoChoices: []
    };

    function esc(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function firstPresent(...values) {
      return values.find((value) => String(value || '').trim()) || '';
    }

    function statusLabel(value) {
      return String(value || '').replace(/_/g, ' ');
    }

    function fmtDate(value, fallback = '-') {
      if (!value) return fallback;
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return fallback;
      return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function money(amount, currency = 'USD') {
      const cents = Number(amount);
      if (!Number.isFinite(cents)) return '-';
      try {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: String(currency || 'USD').toUpperCase()
        }).format(cents / 100);
      } catch (_) {
        return `$${(cents / 100).toFixed(2)}`;
      }
    }

    function phone(value) {
      let digits = String(value || '').replace(/\D/g, '');
      if (digits.length === 11 && digits.startsWith('1')) digits = digits.slice(1);
      if (digits.length === 10) return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
      return value || '-';
    }

    function timeline(order) {
      const paid = order?.paid_at ? new Date(order.paid_at) : new Date(order?.created_at || Date.now());
      const prep = new Date(paid.getTime() + 24 * 60 * 60 * 1000);
      const expected = new Date(paid.getTime() + 14 * 24 * 60 * 60 * 1000);
      const logoReady = order?.logo_choice_status && order.logo_choice_status !== 'not_started';
      return [
        { label: 'Payment', value: fmtDate(order?.paid_at || order?.created_at), text: statusLabel(order?.status || 'received'), done: true },
        { label: 'Logo', value: logoReady ? 'Selected' : 'Needed', text: logoReady ? statusLabel(order.logo_choice_status) : 'Choose below', done: logoReady },
        { label: 'Prep', value: fmtDate(prep), text: 'Kit review and chip prep', done: ['preparing', 'shipped', 'delivered'].includes(order?.fulfillment_status) },
        { label: 'Delivery', value: fmtDate(expected), text: 'Expected within 14 days', done: ['shipped', 'delivered'].includes(order?.fulfillment_status) }
      ];
    }

    function notice(message, type = '') {
      const el = document.getElementById('notice');
      if (!el) return;
      el.textContent = message;
      el.className = `notice ${type}`.trim();
    }

    async function api(action, payload = {}) {
      const response = await fetch('/api/kit/dashboard', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action,
          order_id: state.orderId,
          token: state.token,
          ...payload
        })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || 'Dashboard request failed.');
      }
      return data;
    }

    function saveAccess() {
      if (!state.orderId || !state.token) return;
      try {
        window.sessionStorage.setItem(`rel8tion_kit_dashboard_${state.orderId}`, state.token);
      } catch (_) {}
    }

    function recoverAccess() {
      if (state.token || !state.orderId) return;
      try {
        state.token = window.sessionStorage.getItem(`rel8tion_kit_dashboard_${state.orderId}`) || '';
      } catch (_) {}
    }

    async function load() {
      recoverAccess();
      if (!state.orderId || !state.token) {
        renderLogin();
        return;
      }
      try {
        const data = await api('load');
        state.order = data.order;
        state.logoChoices = data.logo_choices || [];
        saveAccess();
        renderDashboard();
      } catch (error) {
        renderLogin(error.message);
      }
    }

    function selectedLogoUrl(order) {
      return firstPresent(order.custom_logo_url, order.selected_logo_url);
    }

    function renderDashboard() {
      const order = state.order || {};
      const tl = timeline(order);
      const logoUrl = selectedLogoUrl(order);
      app.className = '';
      app.innerHTML = `
        <section class="hero">
          <div class="hero-grid">
            <div>
              <div class="eyebrow">Open House Kit Dashboard</div>
              <h1>${esc(order.agent_name || order.shipping_name || 'Your Rel8tion Kit')}</h1>
              <p class="meta">${esc([order.brokerage, order.email, phone(order.phone || order.phone_normalized)].filter(Boolean).join(' | '))}</p>
            </div>
            <div class="status-stack">
              <span class="pill success">Payment ${esc(statusLabel(order.status))}</span>
              <span class="pill ${order.logo_choice_status === 'not_started' ? 'warn' : 'success'}">Logo ${esc(statusLabel(order.logo_choice_status))}</span>
              <span class="pill">Fulfillment ${esc(statusLabel(order.fulfillment_status))}</span>
            </div>
          </div>
          <div class="timeline">
            ${tl.map((item) => `
              <div class="tile">
                <span>${esc(item.label)}</span>
                <strong>${esc(item.value)}</strong>
                <p>${esc(item.text)}</p>
              </div>
            `).join('')}
          </div>
        </section>

        <section class="layout">
          <div class="panel">
            <div id="notice" class="notice">Welcome to REL8TION. You made a smart decision. Your kit is moving; lock in the chip logo so fulfillment has the right artwork.</div>
            <h2>Chip Logo</h2>
            ${logoUrl ? `
              <div class="notice success">Current logo: ${esc(order.selected_logo_name || 'custom upload')}</div>
              <img src="${esc(logoUrl)}" alt="${esc(order.selected_logo_name || 'Selected logo')}" style="width:96px;height:96px;object-fit:contain;border-radius:20px;background:rgba(255,255,255,0.78);border:1px solid rgba(23,44,118,0.1);padding:12px;margin-bottom:14px;">
            ` : ''}
            <div class="logo-grid">
              ${state.logoChoices.map((logo) => `
                <button class="logo-option ${logo.id === order.selected_logo_id ? 'selected' : ''}" type="button" data-logo-id="${esc(logo.id)}">
                  <img src="${esc(logo.logo_url)}" alt="${esc(logo.display_name)}" loading="lazy">
                  <strong>${esc(logo.display_name)}</strong>
                </button>
              `).join('')}
            </div>

            <div style="margin-top:18px;">
              <h2>Upload Logo</h2>
              <div class="form-grid">
                <label>Logo File
                  <input id="logo-file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml">
                </label>
                <label>Notes For Print
                  <input id="logo-notes" value="${esc(order.logo_notes || '')}" placeholder="Use white version if needed">
                </label>
              </div>
              <div class="actions">
                <button id="upload-logo" class="btn" type="button">Upload Logo</button>
              </div>
            </div>
          </div>

          <aside class="panel">
            <h2>Secure Access</h2>
            <p>Your welcome link opens this setup dashboard. Add a password now; on supported phones you can also bind this browser to the phone lock.</p>
            <div class="form-grid">
              <label>Password
                <input id="password" type="password" autocomplete="new-password" placeholder="8+ characters">
              </label>
              <label>Confirm
                <input id="password-confirm" type="password" autocomplete="new-password" placeholder="Repeat password">
              </label>
            </div>
            <div class="actions">
              <button id="save-password" class="btn" type="button">${order.dashboard_password_set_at ? 'Update Password' : 'Set Password'}</button>
              <button id="phone-lock" class="btn secondary" type="button">${order.dashboard_device_lock_set_at ? 'Phone Lock Added' : 'Use Phone Lock'}</button>
            </div>

            <h2 style="margin-top:24px;">Order Details</h2>
            <div class="field-grid">
              <div class="field"><span>Amount</span><strong>${esc(money(order.amount_total, order.currency))}</strong></div>
              <div class="field"><span>Plan</span><strong>${esc(statusLabel(order.plan || '-'))}</strong></div>
              <div class="field"><span>Shipping</span><strong>${esc(order.address_summary || [order.shipping_city, order.shipping_state, order.shipping_postal_code].filter(Boolean).join(', ') || '-')}</strong></div>
              <div class="field"><span>Dashboard</span><strong>${order.dashboard_secured_at ? 'Secured' : 'Magic link access'}</strong></div>
              <div class="field"><span>Email</span><strong>${esc(statusLabel(order.welcome_email_status || 'pending'))}</strong></div>
              <div class="field"><span>Text</span><strong>${esc(statusLabel(order.welcome_sms_status || 'pending'))}</strong></div>
            </div>
          </aside>
        </section>
      `;

      document.querySelectorAll('[data-logo-id]').forEach((button) => {
        button.addEventListener('click', () => selectLogo(button.dataset.logoId));
      });
      document.getElementById('upload-logo')?.addEventListener('click', uploadLogo);
      document.getElementById('save-password')?.addEventListener('click', savePassword);
      document.getElementById('phone-lock')?.addEventListener('click', enablePhoneLock);
    }

    async function selectLogo(logoId) {
      notice('Saving logo selection.');
      try {
        const data = await api('update_logo', {
          logo_id: logoId,
          logo_notes: document.getElementById('logo-notes')?.value || ''
        });
        state.order = data.order;
        state.logoChoices = data.logo_choices || state.logoChoices;
        renderDashboard();
        notice('Logo selection saved.', 'success');
      } catch (error) {
        notice(error.message, 'error');
      }
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Logo file could not be read.'));
        reader.readAsDataURL(file);
      });
    }

    async function uploadLogo() {
      const file = document.getElementById('logo-file')?.files?.[0];
      if (!file) {
        notice('Choose a logo file first.', 'error');
        return;
      }
      notice('Uploading logo.');
      try {
        const dataUrl = await readFileAsDataUrl(file);
        const data = await api('upload_logo', {
          file_name: file.name,
          content_type: file.type,
          data_url: dataUrl,
          logo_notes: document.getElementById('logo-notes')?.value || ''
        });
        state.order = data.order;
        state.logoChoices = data.logo_choices || state.logoChoices;
        renderDashboard();
        notice('Custom logo uploaded and selected.', 'success');
      } catch (error) {
        notice(error.message, 'error');
      }
    }

    async function savePassword() {
      const password = document.getElementById('password')?.value || '';
      const confirm = document.getElementById('password-confirm')?.value || '';
      if (password !== confirm) {
        notice('Passwords do not match.', 'error');
        return;
      }
      notice('Saving password.');
      try {
        const data = await api('set_password', { password });
        state.order = data.order;
        renderDashboard();
        notice('Dashboard password saved.', 'success');
      } catch (error) {
        notice(error.message, 'error');
      }
    }

    function bufferToBase64Url(buffer) {
      const bytes = new Uint8Array(buffer);
      let value = '';
      bytes.forEach((byte) => { value += String.fromCharCode(byte); });
      return btoa(value).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    async function enablePhoneLock() {
      if (!window.PublicKeyCredential || !navigator.credentials?.create) {
        notice('This browser does not expose phone-lock/passkey setup.', 'error');
        return;
      }
      notice('Waiting for phone lock.');
      try {
        const challenge = crypto.getRandomValues(new Uint8Array(32));
        const userId = crypto.getRandomValues(new Uint8Array(16));
        const credential = await navigator.credentials.create({
          publicKey: {
            challenge,
            rp: { name: 'REL8TION' },
            user: {
              id: userId,
              name: state.order.email || state.order.id,
              displayName: state.order.agent_name || state.order.shipping_name || 'REL8TION Kit'
            },
            pubKeyCredParams: [
              { type: 'public-key', alg: -7 },
              { type: 'public-key', alg: -257 }
            ],
            authenticatorSelection: { userVerification: 'required' },
            timeout: 60000,
            attestation: 'none'
          }
        });
        const credentialId = credential?.rawId ? bufferToBase64Url(credential.rawId) : '';
        try {
          window.localStorage.setItem(`rel8tion_kit_phone_lock_${state.order.id}`, credentialId);
        } catch (_) {}
        const data = await api('register_device_lock', {
          device_label: navigator.userAgent.slice(0, 120)
        });
        state.order = data.order;
        renderDashboard();
        notice('Phone lock registered for this browser.', 'success');
      } catch (error) {
        notice(error.message || 'Phone lock was not completed.', 'error');
      }
    }

    function renderLogin(message = '') {
      app.className = 'login';
      app.innerHTML = `
        <section class="hero">
          <div class="eyebrow">Open House Kit Dashboard</div>
          <h1>Secure Access</h1>
          <p class="meta">Open the link from your welcome email/text, or sign in with the password you set for this kit.</p>
          ${message ? `<div class="notice error" style="margin-top:16px;">${esc(message)}</div>` : ''}
          <div class="form-grid" style="margin-top:18px;">
            <label>Order ID
              <input id="login-order" value="${esc(state.orderId)}" autocomplete="off">
            </label>
            <label>Email
              <input id="login-email" type="email" autocomplete="email">
            </label>
            <label>Password
              <input id="login-password" type="password" autocomplete="current-password">
            </label>
          </div>
          <div class="actions">
            <button id="login" class="btn" type="button">Open Dashboard</button>
          </div>
        </section>
      `;
      document.getElementById('login')?.addEventListener('click', async () => {
        try {
          const data = await api('login', {
            order_id: document.getElementById('login-order')?.value || '',
            email: document.getElementById('login-email')?.value || '',
            password: document.getElementById('login-password')?.value || ''
          });
          state.orderId = data.order.id;
          state.token = data.token;
          state.order = data.order;
          saveAccess();
          window.history.replaceState({}, '', `/kit-dashboard?order=${encodeURIComponent(state.orderId)}&token=${encodeURIComponent(state.token)}`);
          await load();
        } catch (error) {
          renderLogin(error.message);
        }
      });
    }

    load();
  </script>
</body>
</html>
