<script>
const SUPABASE_URL = "https://nicanqrfqlbnlmnoernb.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pY2FucXJmcWxibmxtbm9lcm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEwNzcsImV4cCI6MjA3NjczNzA3N30.FNE_8qVT4BZBrgdhYqvdwEzeCdbtUzBXndq_Us-WUjg";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function esc(str){
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatPhone(p){
  const digits = String(p || "").replace(/\D/g, "");
  if (digits.length === 10) return `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  if (digits.length === 11 && digits[0] === "1") return `+1 (${digits.slice(1,4)}) ${digits.slice(4,7)}-${digits.slice(7)}`;
  return p || "";
}

function getSlugFromUrl(){
  const qs = new URLSearchParams(window.location.search);
  return qs.get("slug") || "";
}

function buildVCard(profile){
  const lines = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    `FN:${profile.full_name || ""}`,
    `ORG:${profile.company_name || ""}`,
    `TITLE:${profile.title || ""}`,
    profile.phone ? `TEL;TYPE=CELL:${profile.phone}` : "",
    profile.email ? `EMAIL:${profile.email}` : "",
    profile.cta_url ? `URL:${profile.cta_url}` : "",
    "END:VCARD"
  ].filter(Boolean);

  return "data:text/vcard;charset=utf-8," + encodeURIComponent(lines.join("\\n"));
}

function render(html){
  document.getElementById("verifiedApp").innerHTML = html;
}

(async function(){
  const slug = getSlugFromUrl();

  if (!slug) {
    render(`
      <div class="max-w-4xl mx-auto">
        <section class="glass-card rounded-[44px] px-6 py-16 md:p-20 text-center">
          <h1 class="font-['Plus_Jakarta_Sans'] text-[40px] md:text-[72px] leading-[1.0] font-extrabold tracking-tighter text-slate-900 mb-6">
            Missing slug
          </h1>
          <p class="text-slate-700 text-lg md:text-2xl font-medium max-w-3xl mx-auto leading-normal">
            This verified page is missing its profile link.
          </p>
        </section>
      </div>
    `);
    return;
  }

  const { data, error } = await supabaseClient
    .from("verified_profiles")
    .select("*")
    .eq("slug", slug)
    .eq("is_active", true)
    .single();

  if (error || !data) {
    render(`
      <div class="max-w-4xl mx-auto">
        <section class="glass-card rounded-[44px] px-6 py-16 md:p-20 text-center">
          <h1 class="font-['Plus_Jakarta_Sans'] text-[40px] md:text-[72px] leading-[1.0] font-extrabold tracking-tighter text-slate-900 mb-6">
            Verified page not found
          </h1>
          <p class="text-slate-700 text-lg md:text-2xl font-medium max-w-3xl mx-auto leading-normal">
            This professional page is unavailable.
          </p>
        </section>
      </div>
    `);
    return;
  }

  const phoneDisplay = formatPhone(data.phone);
  const photo = data.photo_url || "https://via.placeholder.com/280x280.png?text=Profile";
  const logoUrl = data.logo_url || "https://nicanqrfqlbnlmnoernb.supabase.co/storage/v1/object/public/verified-assets/company-logos/nationwide.png";
  const saveContact = buildVCard(data);
  const areas = Array.isArray(data.areas) ? data.areas : [];

  render(`
    <div class="max-w-5xl mx-auto space-y-8">
      <section class="glass-card rounded-[44px] px-6 py-16 md:p-20 text-center">
        <div class="inline-flex items-center px-4 py-2 rounded-full bg-white/40 border border-white/50 text-[10px] md:text-[11px] font-black uppercase tracking-widest text-slate-500 mb-6 shadow-sm">

        </div>

        <h1 class="font-['Plus_Jakarta_Sans'] text-[40px] md:text-[72px] leading-[1.0] font-extrabold tracking-tighter text-slate-900 mb-4">
          ${esc(data.full_name || "")}

        <div class="text-slate-700 text-lg md:text-2xl font-bold mb-6">
          ${esc(data.title || "")}

        <div class="glass-card rounded-[38px] p-8 max-w-md mx-auto mb-6">
          <img src="${esc(logoUrl)}" alt="${esc(data.company_name || "Company")}" class="max-h-[44px] w-auto max-w-full object-contain mx-auto mb-3">
          <div class="text-slate-800 text-sm md:text-base font-bold">
            ${esc(data.company_name || "")}
          </div>
        </div>

        <p class="text-slate-700 text-lg md:text-2xl font-medium max-w-4xl mx-auto mb-8 leading-normal">
          ${esc(data.bio || "")}
        </p>

        ${areas.length ? `
          <div class="flex flex-wrap items-center justify-center gap-2 mb-8">
            ${areas.map(area => `<span class="pill">${esc(area)}</span>`).join("")}
          </div>
        ` : ""}

        <div class="flex flex-col md:flex-row items-center justify-center gap-4 mb-4">
          <a href="tel:${esc(data.phone || "")}" class="brand-button w-full md:w-auto px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide">
            Call Now
          </a>
          <a href="sms:${esc(data.phone || "")}" class="secondary-button w-full md:w-auto px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide inline-flex justify-center">
            Text Me
          </a>
        </div>

        <div class="flex flex-col md:flex-row items-center justify-center gap-4 mb-8">
          <a href="${saveContact}" download="${esc((data.slug || 'contact') + '.vcf')}" class="brand-button w-full md:w-auto px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide">
            Save Contact
          </a>

          ${data.cta_url ? `
            <a href="${esc(data.cta_url)}" target="_blank" rel="noopener" class="secondary-button w-full md:w-auto px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide inline-flex justify-center">
              Start Pre-Approval
            </a>
          ` : ""}

          ${data.calendar_url ? `
            <a href="${esc(data.calendar_url)}" target="_blank" rel="noopener" class="secondary-button w-full md:w-auto px-10 py-4 rounded-full font-bold text-base md:text-lg uppercase tracking-wide inline-flex justify-center">
              Book a Call
            </a>
          ` : ""}
        </div>

        <div class="text-slate-700 text-sm md:text-base font-bold space-y-1">
          <div>${esc(phoneDisplay)}</div>
          <div class="break-all">${esc(data.email || "")}</div>
        </div>
      </section>

      <section class="glass-card rounded-[44px] p-10 md:p-16">
        <div class="text-center mb-10">
          <h2 class="text-[32px] md:text-[48px] font-extrabold text-slate-900">A Network Built on Real Interactions</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <article class="bg-white/35 rounded-[32px] p-8 border border-white/50">
            <h3 class="text-2xl font-extrabold text-slate-900 mb-3">Real Professionals</h3>
            <p class="text-slate-700 font-medium">No fake profiles. No bots pretending to be real people. No AI-generated users filling the network.</p>
          </article>
          <article class="bg-white/35 rounded-[32px] p-8 border border-white/50">
            <h3 class="text-2xl font-extrabold text-slate-900 mb-3">Activated by Rel8tionchip</h3>
            <p class="text-slate-700 font-medium">Profiles are activated through real-world interaction using a physical Rel8tionchip, not anonymous signup forms.</p>
          </article>
          <article class="bg-white/35 rounded-[32px] p-8 border border-white/50">
            <h3 class="text-2xl font-extrabold text-slate-900 mb-3">No Fake Reviews</h3>
            <p class="text-slate-700 font-medium">Rel8tion is built on trusted contact and verified identity, not inflated ratings, review farms, or directory spam.</p>
          </article>
          <article class="bg-white/35 rounded-[32px] p-8 border border-white/50">
            <h3 class="text-2xl font-extrabold text-slate-900 mb-3">One Tap at a Time</h3>
            <p class="text-slate-700 font-medium">Every verified page starts with a real in-person interaction happening in real time, one tap at a time.</p>
          </article>
        </div>
      </section>
    </div>
  `);
})();
</script>
