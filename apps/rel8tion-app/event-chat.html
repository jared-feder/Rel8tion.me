<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Event Chat | Rel8tion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 16% 12%, rgba(125,211,252,.42), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(167,243,208,.35), transparent 30%),
        linear-gradient(135deg, #eef8ff, #f8fbff 46%, #eefdf7);
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main id="app" class="min-h-screen px-4 py-7"></main>
  <script type="module">
    import { ASSETS } from '/apps/rel8tion-app/src/core/config.js';
    import { esc } from '/apps/rel8tion-app/src/core/utils.js';

    const params = new URLSearchParams(window.location.search);
    const conversationId = params.get('cid') || params.get('conversation') || '';
    const token = params.get('token') || '';
    const state = {
      loading: true,
      busy: false,
      error: '',
      notice: '',
      conversation: null,
      messages: []
    };

    function app(html) {
      document.getElementById('app').innerHTML = html;
      bind();
    }

    function shell(content) {
      app(`
        <section class="mx-auto flex min-h-[calc(100vh-3.5rem)] w-full max-w-2xl flex-col rounded-[34px] border border-white/70 bg-white/74 p-5 shadow-[0_24px_70px_rgba(31,42,90,.12)] backdrop-blur-md sm:p-7">
          <div class="mb-5 text-center">
            <img src="${ASSETS.rel8tionLogo}" alt="Rel8tion" class="mx-auto h-14 w-auto">
          </div>
          ${content}
        </section>
      `);
    }

    function initials(name) {
      const parts = String(name || 'Event Support').trim().split(/\s+/).filter(Boolean);
      return `${parts[0]?.[0] || 'E'}${parts[1]?.[0] || 'S'}`.toUpperCase();
    }

    function supportCard(conversation) {
      const name = conversation?.loan_officer_name || 'Rel8tion event support';
      const company = conversation?.metadata?.loan_officer_company || '';
      const phone = conversation?.loan_officer_phone || '';
      const photo = conversation?.metadata?.loan_officer_photo_url || '';
      return `
        <div class="mb-4 rounded-[24px] border border-sky-100 bg-sky-50/90 p-4">
          <div class="flex items-center gap-3">
            ${photo ? `<img src="${esc(photo)}" alt="${esc(name)}" class="h-14 w-14 shrink-0 rounded-full bg-white object-cover shadow-sm" onerror="this.outerHTML='<div class=&quot;flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-white text-lg font-black text-sky-700 shadow-sm&quot;>${esc(initials(name))}</div>';">` : `<div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-white text-lg font-black text-sky-700 shadow-sm">${esc(initials(name))}</div>`}
            <div class="min-w-0">
              <div class="text-[11px] font-black uppercase tracking-[.16em] text-sky-700">Live Event Support</div>
              <div class="mt-1 text-lg font-black text-slate-950">${esc(name)}</div>
              <div class="text-sm font-bold text-slate-500">${esc(company || phone || 'Available through this chat')}</div>
            </div>
          </div>
        </div>
      `;
    }

    function messageBubble(message) {
      const own = message.sender_role === 'buyer';
      return `
        <div class="flex ${own ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[86%] rounded-2xl ${own ? 'bg-sky-600 text-white' : 'bg-white text-slate-700 ring-1 ring-slate-100'} px-4 py-3">
            <div class="text-[10px] font-black uppercase tracking-[.12em] ${own ? 'text-sky-50' : 'text-slate-400'}">${esc(message.sender_name || (own ? 'You' : 'Event Support'))}</div>
            <div class="mt-1 whitespace-pre-wrap text-sm font-bold leading-relaxed">${esc(message.body || '')}</div>
          </div>
        </div>
      `;
    }

    async function api(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
      return data;
    }

    async function loadChat() {
      if (!conversationId || !token) {
        state.loading = false;
        state.error = 'This chat link is missing its access code. Ask event support to send a fresh link.';
        render();
        return;
      }
      try {
        const payload = await api('/api/event-chat/list', {
          conversation_id: conversationId,
          access_token: token,
          viewer: 'buyer'
        });
        state.conversation = payload.conversations?.[0] || null;
        state.messages = state.conversation ? (payload.messagesByConversation?.[state.conversation.id] || []) : [];
        state.loading = false;
        state.busy = false;
        render();
      } catch (error) {
        state.loading = false;
        state.busy = false;
        state.error = error.message || 'Could not load this chat.';
        render();
      }
    }

    async function sendMessage() {
      const textarea = document.getElementById('reply');
      const body = textarea?.value?.trim() || '';
      if (!body || state.busy) return;
      state.busy = true;
      state.error = '';
      render();
      try {
        await api('/api/event-chat/send', {
          conversation_id: conversationId,
          access_token: token,
          sender_role: 'buyer',
          sender_name: state.conversation?.buyer_name || 'Buyer',
          sender_phone: state.conversation?.buyer_phone || '',
          body
        });
        state.notice = 'Message sent.';
        await loadChat();
      } catch (error) {
        state.busy = false;
        state.error = error.message || 'Could not send your message.';
        render();
      }
    }

    function render() {
      if (state.loading) {
        shell(`
          <div class="flex flex-1 flex-col items-center justify-center text-center">
            <div class="mb-5 h-14 w-14 animate-spin rounded-full border-[6px] border-slate-200 border-t-sky-500"></div>
            <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold text-slate-950">Opening Chat</h1>
          </div>
        `);
        return;
      }

      if (state.error && !state.conversation) {
        shell(`
          <div class="flex flex-1 flex-col items-center justify-center text-center">
            <div class="mb-3 text-[11px] font-black uppercase tracking-[.18em] text-slate-400">Event Chat</div>
            <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold text-slate-950">Chat Unavailable</h1>
            <p class="mt-3 text-base font-bold leading-relaxed text-slate-600">${esc(state.error)}</p>
          </div>
        `);
        return;
      }

      shell(`
        <div class="mb-4">
          <div class="text-[11px] font-black uppercase tracking-[.18em] text-slate-400">Rel8tion Event Chat</div>
          <h1 class="mt-1 font-['Plus_Jakarta_Sans'] text-3xl font-extrabold leading-tight text-slate-950">${esc(state.conversation?.buyer_name ? `Hi ${state.conversation.buyer_name}` : 'Open House Chat')}</h1>
          <p class="mt-2 text-sm font-bold leading-relaxed text-slate-500">Messages here are for this open-house event. Financing help is only provided when you request it.</p>
        </div>
        ${supportCard(state.conversation)}
        <div class="min-h-0 flex-1 rounded-[24px] border border-white/80 bg-white/70 p-3">
          <div id="messages" class="grid max-h-[52vh] gap-2 overflow-y-auto pr-1">
            ${state.messages.length ? state.messages.map(messageBubble).join('') : `<div class="rounded-2xl bg-white p-4 text-sm font-bold text-slate-500 ring-1 ring-slate-100">No messages yet.</div>`}
          </div>
        </div>
        <div class="mt-4 grid gap-2">
          ${state.error ? `<div class="rounded-[18px] border border-rose-200 bg-rose-50 p-4 text-sm font-black text-rose-700">${esc(state.error)}</div>` : ''}
          ${state.notice ? `<div class="rounded-[18px] border border-sky-200 bg-sky-50 p-4 text-sm font-black text-sky-700">${esc(state.notice)}</div>` : ''}
          <textarea id="reply" rows="3" class="w-full rounded-[20px] border border-slate-200 bg-white px-4 py-3 text-base font-bold outline-none focus:border-sky-400" placeholder="Write a reply..."></textarea>
          <button id="sendBtn" type="button" class="inline-flex min-h-[54px] items-center justify-center rounded-full bg-sky-600 px-5 py-3 text-base font-black text-white" ${state.busy ? 'disabled' : ''}>${state.busy ? 'Sending...' : 'Send Message'}</button>
          <button id="reloadBtn" type="button" class="inline-flex min-h-[48px] items-center justify-center rounded-full bg-white px-5 py-3 text-sm font-black text-slate-700 ring-1 ring-slate-200">Reload Chat</button>
        </div>
      `);
      const messages = document.getElementById('messages');
      if (messages) messages.scrollTop = messages.scrollHeight;
    }

    function bind() {
      document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
      document.getElementById('reloadBtn')?.addEventListener('click', loadChat);
    }

    loadChat();
  </script>
</body>
</html>
