<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL8TION COMMAND</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          colors: {
            rel8tion: {
              sky: '#38bdf8',
              mist: '#e8f8ff',
              navy: '#1f2a5a',
              ink: '#17224f',
              teal: '#0ea5c8'
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif']
          },
          boxShadow: {
            glass: '0 28px 70px rgba(23, 34, 79, 0.16), 0 2px 10px rgba(23, 34, 79, 0.06)'
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --sky: #38bdf8;
      --sky-strong: #2563eb;
      --teal: #1f2a5a;
      --teal-strong: #161e40;
      --ink: #1f2a5a;
      --muted: #64748b;
      --soft: #f0f7ff;
      --line: rgba(255, 255, 255, .72);
      --glass: rgba(255, 255, 255, .50);
      --glass-strong: rgba(255, 255, 255, .74);
      --ok: #0f7b5f;
      --warn: #9a5b00;
      --bad: #b42318;
      --violet: #6657d9;
      --orange: #f97316;
      --shadow: 0 32px 90px rgba(23, 34, 79, .18), inset 0 1px 0 rgba(255,255,255,.50);
      --soft-shadow: 0 18px 44px rgba(23, 34, 79, .11), inset 0 1px 0 rgba(255,255,255,.42);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(56,189,248,.88) 0%, rgba(221,246,255,.82) 42%, rgba(248,252,255,.96) 100%),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDYwMCAyMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZyI+PHBhdGggZD0iTTEyMCwxNTAgQzgwLDE1MCA2MCwxMzAgNjAsMTAwIEM2MCw4MCA4MCw2MCAxMTAsNjAgQzEyMCwzMCAxNTAsMTAgMTkwLDEwIEMyNDAsMTAgMjcwLDQwIDI4MCw3MCBDMzEwLDcwIDM0MCw5MCAzNDAsMTIwIEMzNDAsMTUwIDMxMCwxNTAgMjgwLDE1MCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjgyIi8+PHBhdGggZD0iTTQ1MCwxMjAgQzQyMCwxMjAgNDAwLDEwNSA0MDAsODUgQzQwMCw3MCA0MTUsNTUgNDM1LDU1IEM0NDUsMzUgNDY1LDIwIDQ5MCwyMCBDNTI1LDIwIDU0NSw0MCA1NTUsNjAgQzU3NSw2MCA1OTUsNzUgNTk1LDk1IEM1OTUsMTIwIDU3NSwxMjAgNTUwLDEyMCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjU4Ii8+PHBhdGggZD0iTTMwLDE4MCBDMTAsMTgwIDAsMTcwIDAsMTU1IEMwLDE0MCAxNSwxMzAgMzAsMTMwIEMzNSwxMTUgNTAsMTA1IDcwLDEwNSBDOTUsMTA1IDExMCwxMjAgMTE1LDEzNSBDMTMwLDEzNSAxNDUsMTQ1IDE0NSwxNjAgQzE0NSwxNjAgMTMwLDE4MCAxMTUsMTgwIFoiIGZpbGw9IiNmZmZmZmYiIG9wYWNpdHk9IjAuNjgiLz48L3N2Zz4=");
      background-repeat: repeat-x;
      background-size: 800px auto;
      background-position: 0 8px;
      opacity: .72;
      animation: drift 120s linear infinite;
    }

    body::after {
      z-index: 0;
      top: auto;
      height: 70vh;
      background:
        linear-gradient(180deg, rgba(240,247,255,.08), rgba(240,247,255,.92)),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
      opacity: .30;
    }

    @keyframes drift {
      from { background-position-x: 0; }
      to { background-position-x: 800px; }
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .58; }

    #app {
      position: relative;
      z-index: 1;
    }

    .app {
      min-height: 100vh;
      padding: 34px 22px;
    }

    .command-shell {
      width: min(1520px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: calc(100vh - 68px);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.84);
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.42), rgba(226,246,255,.22)),
        rgba(255,255,255,.18);
      backdrop-filter: blur(28px) saturate(175%);
      -webkit-backdrop-filter: blur(28px) saturate(175%);
      box-shadow: var(--shadow);
    }

    .command-sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 18px;
      padding: 20px 12px;
      border-right: 1px solid rgba(255,255,255,.54);
      background:
        linear-gradient(180deg, rgba(255,255,255,.68), rgba(255,255,255,.36)),
        rgba(255,255,255,.34);
      backdrop-filter: blur(24px) saturate(165%);
      -webkit-backdrop-filter: blur(24px) saturate(165%);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px 14px;
      border-bottom: 1px solid rgba(122,148,173,.16);
    }

    .sidebar-brand img {
      width: 64px;
      height: auto;
      flex: 0 0 auto;
    }

    .sidebar-brand strong {
      display: block;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .sidebar-brand span {
      display: block;
      margin-top: 4px;
      color: #62748a;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .area-nav {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .nav-button {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #31465f;
      padding: 10px 11px;
      text-align: left;
      font-weight: 900;
    }

    .nav-button svg {
      width: 18px;
      height: 18px;
      color: #66839e;
    }

    .nav-button:hover,
    .nav-button.active {
      border-color: rgba(91,141,255,.20);
      background: linear-gradient(90deg, rgba(255,255,255,.92), rgba(236,245,255,.74));
      color: #2445d8;
      box-shadow: 0 10px 24px rgba(72, 91, 150, .08);
    }

    .nav-button.active svg { color: #2445d8; }

    .sidebar-card {
      margin: 0 6px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72), rgba(228,247,255,.38)),
        rgba(255,255,255,.38);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      box-shadow: var(--soft-shadow);
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .sidebar-card .value {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    .command-workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(240,247,255,.42)),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
    }

    .topbar {
      min-height: 58px;
      display: grid;
      grid-template-columns: minmax(260px, 430px) minmax(190px, 280px) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.84);
      border-radius: 8px;
      background: rgba(255,255,255,.56);
      backdrop-filter: blur(20px) saturate(165%);
      -webkit-backdrop-filter: blur(20px) saturate(165%);
      box-shadow: var(--soft-shadow);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 17px;
      height: 17px;
      color: #6b7d92;
      transform: translateY(-50%);
    }

    .search-wrap .field {
      padding-left: 38px;
      font-weight: 800;
    }

    .command-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, .8fr);
      gap: 12px;
      align-items: stretch;
    }

    .hero-panel,
    .score-panel {
      border: 1px solid rgba(255,255,255,.84);
      border-radius: 8px;
      background: rgba(255,255,255,.54);
      backdrop-filter: blur(22px) saturate(165%);
      -webkit-backdrop-filter: blur(22px) saturate(165%);
      box-shadow: var(--soft-shadow);
      padding: 16px;
    }

    .hero-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(255,255,255,.68), rgba(222,247,255,.32)),
        rgba(255,255,255,.42);
    }

    .hero-label {
      color: #41708d;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .hero-title {
      margin: 5px 0 0;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: clamp(30px, 4vw, 56px);
      font-weight: 800;
      line-height: .95;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 720px;
      margin-top: 9px;
      color: #4a6075;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .hero-stack {
      display: grid;
      gap: 8px;
      min-width: 190px;
    }

    .hero-mini {
      border: 1px solid rgba(122,148,173,.18);
      border-radius: 8px;
      background: rgba(255,255,255,.76);
      padding: 10px;
    }

    .score-panel {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .score-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.92) 0 53%, transparent 54%),
        conic-gradient(var(--teal) calc(var(--score, 74) * 1%), rgba(207, 222, 235, .62) 0);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.86), 0 14px 32px rgba(23,32,51,.08);
    }

    .score-ring span {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .header-actions,
    .row-actions,
    .control-row,
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass-strong);
      color: var(--ink);
      padding: 9px 12px;
      font-weight: 900;
      line-height: 1;
      max-width: 100%;
      white-space: normal;
      text-align: center;
      box-shadow: 0 8px 20px rgba(23,32,51,.04);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .btn svg { width: 17px; height: 17px; }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
    .btn.primary:hover { background: var(--teal-strong); border-color: var(--teal-strong); }
    .btn.soft { background: rgba(255,255,255,.58); }
    .btn.bad { color: var(--bad); border-color: rgba(180,35,24,.25); background: rgba(255,247,247,.8); }

    .select,
    .field,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(119, 146, 173, .42);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      outline: none;
      font-weight: 800;
      padding: 9px 11px;
    }

    textarea {
      resize: vertical;
      min-height: 104px;
      max-height: 240px;
      line-height: 1.45;
      font-weight: 600;
    }

    .select:focus,
    .field:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15,143,189,.16);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 10px;
    }

    .stat-card,
    .glass-card,
    .outreach-card {
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.62), rgba(236,249,255,.34)),
        var(--glass);
      backdrop-filter: blur(22px) saturate(165%);
      -webkit-backdrop-filter: blur(22px) saturate(165%);
      box-shadow: var(--soft-shadow);
    }

    .stat-card {
      position: relative;
      overflow: hidden;
      padding: 13px;
      min-height: 108px;
      display: grid;
      align-content: space-between;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.70), rgba(246,251,255,.38)),
        var(--glass);
    }

    .stat-card::after {
      content: "";
      position: absolute;
      inset: auto -18px -28px auto;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(15,143,189,.12);
    }

    .stat-card.sky::after { background: rgba(40,168,223,.16); }
    .stat-card.violet::after { background: rgba(102,87,217,.14); }
    .stat-card.green::after { background: rgba(15,123,95,.14); }
    .stat-card.orange::after { background: rgba(249,115,22,.16); }
    .stat-card.rose::after { background: rgba(244,63,94,.13); }

    .stat-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(122,148,173,.18);
      background: rgba(255,255,255,.72);
      color: var(--teal);
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
    }

    .stat-card .value {
      position: relative;
      z-index: 1;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
    }

    .stat-card .label {
      color: #446175;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .meter {
      position: relative;
      z-index: 1;
      height: 5px;
      border-radius: 999px;
      background: rgba(122,148,173,.16);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), #13b287);
    }

    .main-grid {
      display: grid;
      gap: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      padding: 6px 2px 0;
    }

    .section-head h2 {
      margin: 0;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section-head .sub {
      margin-top: 4px;
      color: #426175;
      font-size: 13px;
      font-weight: 800;
    }

    .outreach-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .outreach-card {
      overflow: visible;
      background:
        linear-gradient(135deg, rgba(255,255,255,.62), rgba(232,248,255,.30)),
        rgba(255,255,255,.42);
    }

    .outreach-main {
      display: grid;
      grid-template-columns: minmax(250px, 320px) minmax(0, 1fr);
      min-height: 100%;
    }

    .media-col {
      background: rgba(255,255,255,.22);
      border-right: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .listing-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.72);
      background: #dff3ff;
      display: block;
    }

    .image-fallback {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.72);
      background: linear-gradient(135deg, rgba(55,189,244,.28), rgba(255,255,255,.74));
      display: grid;
      place-items: center;
      padding: 12px;
      text-align: center;
      color: #31566a;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .agent-strip {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(255,255,255,.72);
    }

    .avatar,
    .avatar-fallback {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: #0f8fbd;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .agent-name {
      font-weight: 900;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .agent-meta {
      color: #526a7b;
      font-size: 12px;
      font-weight: 800;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }

    .card-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .address {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .open-time {
      color: #526a7b;
      font-size: 12px;
      font-weight: 800;
      margin-top: 5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.68);
      color: #334155;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.ok { border-color: rgba(15,123,95,.24); background: rgba(236,253,245,.78); color: var(--ok); }
    .badge.warn { border-color: rgba(154,91,0,.26); background: rgba(255,247,237,.86); color: var(--warn); }
    .badge.bad { border-color: rgba(180,35,24,.24); background: rgba(255,241,242,.82); color: var(--bad); }
    .badge.info { border-color: rgba(15,143,189,.24); background: rgba(240,249,255,.82); color: var(--teal-strong); }

    .mini-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.58);
      padding: 10px;
      display: grid;
      gap: 7px;
    }

    .mini-title {
      color: #456173;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .message-list {
      display: grid;
      gap: 7px;
      max-height: 220px;
      overflow: auto;
      padding-right: 3px;
    }

    .msg {
      border-radius: 8px;
      border: 1px solid rgba(136,164,190,.28);
      background: rgba(255,255,255,.76);
      padding: 8px 9px;
    }

    .msg.outbound {
      background: rgba(236,253,245,.74);
      border-color: rgba(15,123,95,.22);
    }

    .msg.optout {
      background: rgba(255,241,242,.84);
      border-color: rgba(180,35,24,.22);
    }

    .msg-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .07em;

    }

    .msg-body,

    .reply-box {

    .reply-footer {

    .action-panel {

    .accepted-summary-grid {

    .accepted-summary-item {

    .conversation-preview {

      background:
        linear-gradient(180deg, rgba(255,255,255,.93), rgba(239,249,255,.88)),

    .coverage-head {

    .coverage-choice-grid {

    .coverage-choice {

    .coverage-form {
      border: 1px solid rgba(136,164,190,.28);
      border-radius: 8px;

      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .coverage-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .coverage-field {
      display: grid;
      gap: 5px;
    }

      color: #456173;
      font-size: 11px;
      font-weight: 900;

      letter-spacing: .08em;
    }

    .coverage-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 1120px) {
      .command-shell { grid-template-columns: 1fr; }
      .command-sidebar {
        grid-template-rows: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(122,148,173,.18);
      }
      .area-nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .topbar { grid-template-columns: 1fr auto; }
      .search-wrap { grid-column: 1 / -1; }
      .command-hero { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .outreach-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 980px) {
      .outreach-main { grid-template-columns: 1fr; }
      .media-col { border-right: 0; border-bottom: 1px solid var(--line); }
      .action-grid,
      .drip-grid { grid-template-columns: 1fr; }
      .accepted-summary-grid { grid-template-columns: 1fr; }
      .confirmed-report-grid { grid-template-columns: 1fr; }
      .confirmed-card { grid-template-columns: 1fr; }
      .report-media { min-height: 240px; }
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }
      .command-shell { min-height: calc(100vh - 20px); }
      .command-sidebar,
      .command-workspace { padding: 10px; }
      .sidebar-brand { padding-inline: 4px; }
      .area-nav { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
      .header-actions { justify-content: flex-start; }
      .hero-panel { grid-template-columns: 1fr; }
      .score-panel { grid-template-columns: 1fr; }
      .score-ring { width: 92px; height: 92px; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .action-grid,
      .drip-grid { grid-template-columns: 1fr; }
      .data-row { grid-template-columns: 1fr; }
      .report-grid { grid-template-columns: 1fr; }
      .assignment-grid { grid-template-columns: 1fr; }
      .assignment-actions { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
      .report-toolbar { justify-content: flex-start; }
      .report-detail-grid { grid-template-columns: 1fr; }
      .coverage-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script>
    const ADMIN_UID_KEY = 'rel8tion_admin_uid';
    const ADMIN_TOKEN_KEY = 'rel8tion_admin_token';
    const DRAFTS_KEY = 'rel8tion_admin_reply_drafts';
    const AREA_KEY = 'rel8tion_admin_area';

    const AREAS = [
      ['outreach', 'Outreach command'],
      ['leads', 'Leads'],
      ['crm', 'Agent CRM'],
      ['signs', 'Signs and events'],
      ['lo', 'Loan officers'],
      ['payments', 'Payments'],
      ['reports', 'Reports']
    ];

    const state = {
      verified: false,
      loading: false,
      sendingKey: '',
      actionKey: '',
      error: '',
      area: window.localStorage.getItem(AREA_KEY) || 'outreach',
      query: '',
      outreachFilter: 'needs_reply',
      reportWindow: 'upcoming',
      reportSort: 'auto',
      coveragePickerKey: '',
      inbox: [],
      counts: { all: 0, inbound: 0, needs_reply: 0, interested: 0, opt_out: 0 },
      command: null,
      loadedAt: '',
      drafts: readDrafts()
    };

    const app = document.getElementById('app');
    const toast = document.getElementById('toast');

    const params = new URLSearchParams(window.location.search);
    const uidParam = params.get('uid') || params.get('admin_uid') || '';
    const tokenParam = params.get('token') || params.get('admin_token') || '';
    if (uidParam) window.localStorage.setItem(ADMIN_UID_KEY, uidParam);
    if (tokenParam) window.localStorage.setItem(ADMIN_TOKEN_KEY, tokenParam);

    function credential() {
      return {
        uid: window.localStorage.getItem(ADMIN_UID_KEY) || '',
        token: window.localStorage.getItem(ADMIN_TOKEN_KEY) || ''
      };
    }

    function authHeaders() {
      const cred = credential();
      const headers = { 'Content-Type': 'application/json' };
      if (cred.uid) headers['x-admin-uid'] = cred.uid;
      if (cred.token) headers['x-admin-token'] = cred.token;
      return headers;
    }

    function readDrafts() {
      try {
        return JSON.parse(window.localStorage.getItem(DRAFTS_KEY) || '{}') || {};
      } catch (_) {
        return {};
      }
    }

    function saveDrafts() {
      window.localStorage.setItem(DRAFTS_KEY, JSON.stringify(state.drafts));
    }

    function editableControl(element) {
      if (!element || element === document.body || typeof element.closest !== 'function') return null;
      return element.closest('textarea, input, select, [contenteditable="true"]');
    }

    function isCommandEditing() {
      const active = editableControl(document.activeElement);
      if (!active || active.disabled || active.readOnly) return false;
      return Boolean(active.closest('.command-shell, .coverage-modal'));
    }

    function captureUiState() {
      const active = editableControl(document.activeElement);
      const hasSelection = active && typeof active.selectionStart === 'number';
      return {
        scrollX: window.scrollX || 0,
        scrollY: window.scrollY || 0,
        activeId: active?.id || '',
        activeValue: active && 'value' in active ? active.value : undefined,
        selectionStart: hasSelection ? active.selectionStart : null,
        selectionEnd: hasSelection ? active.selectionEnd : null
      };
    }

    function restoreUiState(snapshot) {
      if (!snapshot) return;
      window.requestAnimationFrame(() => {
        const active = snapshot.activeId ? document.getElementById(snapshot.activeId) : null;
        if (active && !active.disabled) {
          if (snapshot.activeValue !== undefined && 'value' in active && active.value !== snapshot.activeValue) {
            active.value = snapshot.activeValue;
          }
          active.focus({ preventScroll: true });
          if (typeof active.setSelectionRange === 'function' && snapshot.selectionStart !== null) {
            active.setSelectionRange(snapshot.selectionStart, snapshot.selectionEnd ?? snapshot.selectionStart);
          }
        }
        window.scrollTo(snapshot.scrollX || 0, snapshot.scrollY || 0);
      });
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function fmtDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return '';
      return new Intl.DateTimeFormat('en-US', {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
    }

    function fmtPhone(value) {
      const digits = String(value || '').replace(/\D/g, '');
      const ten = digits.length === 11 && digits.startsWith('1') ? digits.slice(1) : digits;
      if (ten.length !== 10) return value || '';
      return `(${ten.slice(0, 3)}) ${ten.slice(3, 6)}-${ten.slice(6)}`;
    }

    function money(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return '';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
    }

    function initials(value) {
      return String(value || 'R')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase())
        .join('') || 'R';
    }

    function domId(value) {
      return `k_${String(value || '').replace(/[^a-z0-9_-]/gi, '_')}`;
    }

    function isOptOutThread(thread) {
      return Boolean(thread?.any_opt_out || thread?.latest_reply_opt_out || thread?.review_status === 'opted_out');
    }

    function isHandledThread(thread) {
      return ['interested', 'confirmed_open_house', 'accepted_open_house', 'drip_scheduled'].includes(thread?.review_status);
    }

    function needsReply(thread) {
      return thread?.direction !== 'outbound' && !isOptOutThread(thread) && !isHandledThread(thread);
    }

    function threadText(thread) {
      const messages = Array.isArray(thread?.messages) ? thread.messages : [];
      return [
        thread?.latest_reply_body,
        ...messages
          .filter((message) => message.direction !== 'outbound')
          .map((message) => message.body)
      ].filter(Boolean).join(' ').toLowerCase();
    }

    function isInterestedThread(thread) {
      if (!thread || isOptOutThread(thread)) return false;
      if (isHandledThread(thread)) return true;
      const text = threadText(thread);
      if (!text) return false;
      if (/\b(no|stop|remove|unsubscribe|wrong number|not interested|do not|don't)\b/i.test(text)) return false;
      return /\b(yes|yeah|yep|sure|absolutely|ok|okay|come by|stop by|come over|please come|that works|sounds good|interested|available|schedule|call me|text me)\b/i.test(text);
    }

    function badge(text, type = 'info') {
      return `<span class="badge ${type}">${esc(text)}</span>`;
    }

    function statusBadge(thread) {
      if (isOptOutThread(thread)) return badge('Opted out', 'bad');
      if (thread.review_status === 'confirmed_open_house') return badge('Confirmed OH', 'ok');
      if (thread.review_status === 'accepted_open_house') return badge('Accepted OH', 'ok');
      if (thread.review_status === 'drip_scheduled') return badge('Drip scheduled', 'ok');
      if (thread.review_status === 'interested' || isInterestedThread(thread)) return badge('Interested', 'ok');
      if (needsReply(thread)) return badge('Needs reply', 'warn');
      if (thread.direction === 'outbound') return badge('Replied', 'ok');
      return badge('Inbound', 'info');
    }

    function filteredInbox() {
      const query = state.query.trim().toLowerCase();
      return state.inbox.filter((thread) => {
        if (state.outreachFilter === 'all') return true;
        if (state.outreachFilter === 'inbound') return thread.direction !== 'outbound';
        if (state.outreachFilter === 'needs_reply') return needsReply(thread);
        if (state.outreachFilter === 'interested') return isInterestedThread(thread);
        if (state.outreachFilter === 'opt_out') return isOptOutThread(thread);
        return true;
      }).filter((thread) => {
        if (!query) return true;
        const messages = Array.isArray(thread.messages) ? thread.messages : [];
        const haystack = [
          thread.agent_name,
          thread.brokerage,
          thread.address,
          thread.agent_phone,
          thread.from_phone,
          thread.selected_sms,
          thread.latest_reply_body,
          ...messages.map((message) => message.body)
        ].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function filterByQuery(rows) {
      const query = state.query.trim().toLowerCase();
      if (!query) return rows || [];
      return (rows || []).filter((row) => {
        try {
          return JSON.stringify(row || {}).toLowerCase().includes(query);
        } catch (_) {
          return false;
        }
      });
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...authHeaders(),
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed: ${response.status}`);
      }
      return data;
    }

    async function verify() {
      const cred = credential();
      if (!cred.uid && !cred.token) {
        state.verified = false;
        render();
        return;
      }

      try {
        await api('/api/admin/auth');
        state.verified = true;
        state.error = '';
        await loadAll();
      } catch (error) {
        state.verified = false;
        state.error = error.message || 'Unauthorized.';
        render();
      }
    }

    async function loadAll(options = {}) {
      const uiSnapshot = options.preserveUi === false ? null : captureUiState();
      state.loading = true;
      if (options.showLoading !== false) {
        render();
        restoreUiState(uiSnapshot);
      }
      try {
        const [dashboard, inbox] = await Promise.all([
          api('/api/admin/dashboard').catch((error) => ({ ok: false, error: error.message })),
          api('/api/admin/outreach-inbox?limit=120')
        ]);
        state.command = dashboard.ok === false ? null : dashboard;
        state.inbox = inbox.inbox || [];
        state.counts = inbox.counts || state.counts;
        state.loadedAt = inbox.loaded_at || dashboard.loaded_at || new Date().toISOString();
        const restoreSnapshot = isCommandEditing() ? captureUiState() : uiSnapshot;
        state.loading = false;
        render();
        restoreUiState(restoreSnapshot);
      } catch (error) {
        const restoreSnapshot = isCommandEditing() ? captureUiState() : uiSnapshot;
        state.loading = false;
        state.error = error.message || 'Unable to load command data.';
        render();
        restoreUiState(restoreSnapshot);
      }
    }

    function setArea(area) {
      state.area = area;

      state.drafts[key] = messageBody;
      saveDrafts();

      const visit = fieldVisitForThread(thread);
      const report = reportRowForThread(thread);
      const participant = primaryVisitParticipant(visit);
      const assignedUid = participant?.participant_uid || participant?.participant_profile_id || report?.loan_officer_uid || '';
      const assignedName = participant?.participant_name || report?.loan_officer_name || '';
      return {
        visit,
        report,
        participant,
        assignedUid,
        assignedName,
        assignedPhone: participant?.participant_phone || report?.loan_officer_phone || '',
        assignedCompany: participant?.participant_company || report?.loan_officer_company || '',
        acceptedAt: visit?.confirmed_at || visit?.created_at || report?.confirmed_at || '',
        scheduledStart: visit?.scheduled_start || report?.scheduled_start || thread?.open_start || '',

    function toLocalInputValue(date) {
      const d = new Date(date);
      if (!Number.isFinite(d.getTime())) return '';
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 16);
    }

    function dateInputValue(date) {
      const d = new Date(date);
      if (!Number.isFinite(d.getTime())) return '';
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function timeInputValue(date, fallback = '13:00') {
      const d = new Date(date || '');
      if (!Number.isFinite(d.getTime())) return fallback;
      const pad = (number) => String(number).padStart(2, '0');
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function dateTimeFromParts(dateText, timeText, fallbackHour = 13) {
      const dateMatch = String(dateText || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!dateMatch) return null;
      const timeMatch = String(timeText || '').trim().match(/^(\d{2}):(\d{2})$/);
      const hour = timeMatch ? Number(timeMatch[1]) : fallbackHour;
      const minute = timeMatch ? Number(timeMatch[2]) : 0;
      if (hour > 23 || minute > 59) return null;
      const year = Number(dateMatch[1]);
      const month = Number(dateMatch[2]) - 1;
      const day = Number(dateMatch[3]);
      const date = new Date(year, month, day, hour, minute, 0, 0);
      if (
        date.getFullYear() !== year ||
        date.getMonth() !== month ||
        date.getDate() !== day
      ) return null;
      return date;
    }

    function dateAtTime(dateText, timeSource, fallbackHour = 13) {
      const match = String(dateText || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      const source = new Date(timeSource || '');
      const hour = Number.isFinite(source.getTime()) ? source.getHours() : fallbackHour;
      const minute = Number.isFinite(source.getTime()) ? source.getMinutes() : 0;
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]), hour, minute, 0, 0);
    }

    function fallbackCoverageEnd(start) {
      const date = new Date(start || Date.now());
      if (!Number.isFinite(date.getTime())) return new Date(Date.now() + 2 * 60 * 60 * 1000);
      return new Date(date.getTime() + 2 * 60 * 60 * 1000);
    }

    function normalizeCoverageWindow(start, end, label) {
      const startDate = new Date(start || '');
      if (!Number.isFinite(startDate.getTime())) return null;
      const endDate = new Date(end || '');
      const finalEnd = Number.isFinite(endDate.getTime()) && endDate > startDate ? endDate : fallbackCoverageEnd(startDate);
      return {
        coverage_start: startDate.toISOString(),
        coverage_end: finalEnd.toISOString(),
        coverage_label: label || `${fmtDate(startDate)} - ${fmtDate(finalEnd)}`
      };
    }

    function coverageChoices(thread) {
      const start = new Date(thread?.open_start || '');
      if (!Number.isFinite(start.getTime())) return [];
      const endCandidate = new Date(thread?.open_end || '');
      const end = Number.isFinite(endCandidate.getTime()) && endCandidate > start ? endCandidate : fallbackCoverageEnd(start);
      const firstDay = dateInputValue(start);
      const lastDay = dateInputValue(end);
      const days = [];
      const cursor = dateAtTime(firstDay, start);
      const last = dateAtTime(lastDay, start);
      while (cursor && last && cursor <= last && days.length < 7) {
        const dayText = dateInputValue(cursor);
        const dayStart = dateAtTime(dayText, start);
        const dayEnd = dateAtTime(dayText, end, start.getHours() + 2);
        days.push(normalizeCoverageWindow(dayStart, dayEnd, `${fmtDate(dayStart)} - ${fmtDate(dayEnd)}`));
        cursor.setDate(cursor.getDate() + 1);
      }
      if (days.length > 1) {
        days.push(normalizeCoverageWindow(start, end, `All listed days: ${fmtDate(start)} - ${fmtDate(end)}`));
      }
      return days.filter(Boolean);
    }

    function defaultDripSendAt(thread) {
      const base = new Date(thread?.open_end || thread?.open_start || Date.now());
      const date = Number.isFinite(base.getTime()) ? base : new Date();
      date.setDate(date.getDate() + 2);
      date.setHours(10, 0, 0, 0);
      if (date.getTime() < Date.now() + 30 * 60 * 1000) {
        date.setTime(Date.now() + 24 * 60 * 60 * 1000);
        date.setHours(10, 0, 0, 0);
      }
      return toLocalInputValue(thread?.followup_send_at || date);
    }

    function defaultDripText(thread) {
      const first = String(thread?.agent_name || '').trim().split(/\s+/)[0] || '';
      const intro = first ? `${first}, ` : '';

      return `

          ${e164 ? `<a class="btn soft" href="sms:${esc(e164)}"><i data-lucide="message-square"></i><span>Text</span></a>` : ''}
          ${email ? `<a class="btn soft" href="mailto:${esc(email)}"><i data-lucide="mail"></i><span>Email</span></a>` : ''}
        </div>

    }

        showToast(action === 'auto_assign'

            ? 'Loan officer coverage ended.'
            : 'Loan officer assigned live.'

        showToast(error.message || 'Unable to update loan officer assignment.');
        render();
      }

      updateLoanOfficerAssignment('end', { event_id: eventId });

    function confirmCustomCoverage() {
      const thread = coveragePickerThread();
      if (!thread) return;
      const startDateText = document.getElementById('coverageStartDate')?.value || '';
      const endDateText = document.getElementById('coverageEndDate')?.value || startDateText;
      const startTimeText = document.getElementById('coverageStartTime')?.value || '13:00';
      const endTimeText = document.getElementById('coverageEndTime')?.value || '15:00';
      const start = dateTimeFromParts(startDateText, startTimeText, 13);
      const end = dateTimeFromParts(endDateText, endTimeText, 15);
      if (!start || !end) {
        showToast('Pick a date on the calendar first.');
        return;
      }
      if (end <= start) {
        showToast('Coverage end must be after the start.');
        return;
      }
      const label = dateInputValue(start) === dateInputValue(end)
        ? `${fmtDate(start)} - ${fmtDate(end)}`
        : `Custom window: ${fmtDate(start)} - ${fmtDate(end)}`;
      const coverage = normalizeCoverageWindow(start, end, label);
      if (!coverage) {
        showToast('Pick a valid coverage window.');
        return;
      }
      confirmCoverageWindow(coverage);
    }

      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      openCoveragePicker(key);

    function acceptOpenHouse(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      const select = document.getElementById(`accept_lo_${domId(key)}`);
      const loanOfficerUid = select?.value || '';
      const profile = activeLoanOfficers().find((row) => row.uid === loanOfficerUid);
      const target = thread.address || thread.open_house_id || thread.agent_name || 'this open house';
      const assignment = outreachAssignment(thread);
      const alreadyAccepted = thread.review_status === 'accepted_open_house' || assignment.participant;
      const prompt = alreadyAccepted
        ? `Update LO assignment for ${target}${profile ? ` to ${loanOfficerLabel(profile)}` : ''}?`
        : `Accept ${target}${profile ? ` and assign ${loanOfficerLabel(profile)}` : ' without a loan officer assignment yet'}?`;
      if (!window.confirm(prompt)) return;
      if (state.outreachFilter === 'needs_reply') state.outreachFilter = 'interested';
      runOutreachAction(key, 'accept_open_house', { loan_officer_uid: loanOfficerUid }, 'Open house accepted and assignment updated.');
    }

    function scheduleDrip(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      const textarea = document.getElementById(`drip_${domId(key)}`);
      const input = document.getElementById(`drip_at_${domId(key)}`);
      const body = textarea?.value?.trim() || '';
      const sendAt = input?.value || '';
      if (!body) {
        showToast('Write the drip message first.');
        return;
      }
      if (!sendAt) {
        showToast('Pick a drip send time.');
        return;
      }
      const sendAtDate = new Date(sendAt);
      if (!Number.isFinite(sendAtDate.getTime())) {
        showToast('Pick a valid drip send time.');
        return;
      }
      if (!window.confirm(`Schedule this drip SMS to ${thread.agent_name || fmtPhone(thread.agent_phone) || 'this contact'}?`)) return;
      runOutreachAction(key, 'schedule_drip', { body, send_at: sendAtDate.toISOString() }, 'Drip scheduled.');
    }

        <main class="app min-h-screen antialiased text-slate-900">
          <div class="command-shell shadow-glass ring-1 ring-white/70">
            <aside class="command-sidebar">
              <div>
                <div class="sidebar-brand">
                  <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion">
                  <div><strong>REL8TION</strong><span>Command</span></div>
                </div>
                <nav class="area-nav" aria-label="Command areas">
                  ${renderAreaNav()}
                </nav>
              </div>

              <div class="sidebar-card">
                <div class="mini-title">Needs attention</div>
                <div class="value">${esc(needsReplyCount)}</div>
                <div class="small">SMS threads waiting for a reply</div>
                <button class="btn primary" id="outreachJump"><i data-lucide="message-square-reply"></i><span>Open outreach</span></button>
              </div>

              <button class="btn soft" id="lockBtn"><i data-lucide="log-out"></i><span>Lock command</span></button>
            </aside>

            <section class="command-workspace">
              <header class="topbar sticky top-3 z-20 backdrop-blur-xl ring-1 ring-white/70">
                <div class="search-wrap">
                  <i data-lucide="search"></i>
                  <input id="globalSearch" class="field" value="${esc(state.query)}" autocomplete="off" placeholder="Search agents, signs, open houses, SMS">
                </div>
                <select id="areaSelect" class="select" aria-label="Dashboard area">
                  ${AREAS.map(([key, label]) => `<option value="${key}"${state.area === key ? ' selected' : ''}>${esc(label)}</option>`).join('')}
                </select>
                <div class="header-actions">
                  ${state.loading ? badge('Refreshing', 'info') : badge('Live', 'ok')}
                  ${state.error ? badge(state.error, 'bad') : badge(areaLabel, 'info')}
                  <button class="btn soft" id="refreshBtn"><i data-lucide="refresh-cw"></i><span>Refresh</span></button>
                </div>
              </header>

              <section class="command-hero">
                <div class="hero-panel">
                  <div>
                    <div class="hero-label">${esc(areaLabel)}</div>
                    <h1 class="hero-title">REL8TION COMMAND</h1>
                    <div class="hero-copy">Control outreach, agent CRM, smart signs, live loan officer coverage, payments, and reporting from one operational dashboard.</div>
                  </div>
                  <div class="hero-stack">
                    <div class="hero-mini">
                      <div class="mini-title">Updated</div>
                      <div class="small">${esc(loadedText)}</div>
                    </div>
                    <div class="hero-mini">
                      <div class="mini-title">Field activity</div>
                      <div class="small">${esc(o.active_signs || 0)} active signs | ${esc(o.open_events || 0)} open events</div>
                    </div>
                  </div>
                </div>

                <aside class="score-panel" style="--score:${esc(score)}">
                  <div class="score-ring"><span>${esc(score)}%</span></div>
                  <div>
                    <div class="mini-title">Command score</div>
                    <div class="address">${score >= 85 ? 'Clean' : score >= 60 ? 'Working' : 'Needs focus'}</div>
                    <div class="small">${esc(needsReplyCount)} open SMS replies, ${esc(o.open_events_without_lo || 0)} open houses need LO coverage.</div>
                  </div>
                </aside>
              </section>

              ${renderStats()}
              <section class="main-grid">${renderArea()}</section>
            </section>
          </div>
        </main>
        ${renderCoveragePicker()}
      `;

      document.getElementById('refreshBtn')?.addEventListener('click', () => loadAll());
      document.getElementById('lockBtn')?.addEventListener('click', signOut);
      document.getElementById('areaSelect')?.addEventListener('change', (event) => setArea(event.target.value));
      document.querySelectorAll('[data-area-nav]').forEach((button) => {
        button.addEventListener('click', () => setArea(button.dataset.areaNav));
      });
      document.getElementById('outreachJump')?.addEventListener('click', () => setArea('outreach'));
      document.getElementById('globalSearch')?.addEventListener('input', (event) => {
        state.query = event.target.value;
        window.clearTimeout(renderShell.searchTimer);
        renderShell.searchTimer = window.setTimeout(refreshAreaContent, 180);
      });
      bindAreaActions();
      window.lucide?.createIcons();
    }

    function refreshAreaContent() {
      const main = document.querySelector('.main-grid');
      if (!main) {
        render();
        return;
      }
      main.innerHTML = renderArea();
      bindAreaActions();
      window.lucide?.createIcons();
    }

    function bindAreaActions() {
      document.getElementById('outreachFilter')?.addEventListener('change', (event) => setOutreachFilter(event.target.value));
      document.querySelectorAll('[data-draft-key]').forEach((textarea) => {
        textarea.addEventListener('input', () => updateDraft(textarea.dataset.draftKey, textarea.value));
      });
      document.querySelectorAll('[data-send-key]').forEach((button) => {
        button.addEventListener('click', () => sendReply(button.dataset.sendKey));
      });
      document.querySelectorAll('[data-mark-interested]').forEach((button) => {
        button.addEventListener('click', () => markInterested(button.dataset.markInterested));
      });
      document.querySelectorAll('[data-confirm-open-house]').forEach((button) => {
        button.addEventListener('click', () => confirmOpenHouse(button.dataset.confirmOpenHouse));
      });
      document.querySelectorAll('[data-coverage-choice]').forEach((button) => {
        button.addEventListener('click', () => confirmCoverageChoice(Number(button.dataset.coverageChoice)));
      });
      document.querySelectorAll('[data-coverage-cancel]').forEach((button) => {
        button.addEventListener('click', closeCoveragePicker);
      });
      document.getElementById('coverageStartDate')?.addEventListener('change', (event) => {
        const endInput = document.getElementById('coverageEndDate');
        if (endInput && (!endInput.value || endInput.value < event.target.value)) endInput.value = event.target.value;
      });
      document.getElementById('coverageConfirmCustom')?.addEventListener('click', confirmCustomCoverage);
      document.querySelector('[data-coverage-backdrop]')?.addEventListener('click', (event) => {
        if (event.target === event.currentTarget) closeCoveragePicker();
      });
      document.querySelectorAll('[data-accept-open-house]').forEach((button) => {
        button.addEventListener('click', () => acceptOpenHouse(button.dataset.acceptOpenHouse));
      });
      document.querySelectorAll('[data-schedule-drip]').forEach((button) => {
        button.addEventListener('click', () => scheduleDrip(button.dataset.scheduleDrip));
      });
      document.querySelectorAll('[data-assign-lo]').forEach((button) => {
        button.addEventListener('click', () => assignLoanOfficer(button.dataset.assignLo));
      });
      document.querySelectorAll('[data-end-lo]').forEach((button) => {
        button.addEventListener('click', () => endLoanOfficer(button.dataset.endLo));
      });
      document.querySelectorAll('[data-end-event]').forEach((button) => {
        button.addEventListener('click', () => endEvent(button.dataset.endEvent));
      });
      document.getElementById('autoAssignLo')?.addEventListener('click', autoAssignLoanOfficers);
      document.getElementById('reportWindow')?.addEventListener('change', (event) => {
        state.reportWindow = event.target.value;
        refreshAreaContent();
      });
      document.getElementById('reportSort')?.addEventListener('change', (event) => {
        state.reportSort = event.target.value;
        refreshAreaContent();
      });
      document.getElementById('generateConfirmedPdf')?.addEventListener('click', generateConfirmedPdfReport);
    }

    function renderStats() {
      const o = state.command?.overview || {};
      const inbound = state.counts.inbound || o.incoming_threads || 0;
      const needs = state.counts.needs_reply || o.needs_reply || 0;
      const stats = [
        { label: 'Needs reply', value: needs, icon: 'message-square-reply', tone: needs ? 'orange' : 'green', meter: inbound ? (needs / inbound) * 100 : 4 },
        { label: 'Inbound', value: inbound, icon: 'inbox', tone: 'sky', meter: inbound ? 78 : 10 },
        { label: 'Confirmed OH', value: o.confirmed_open_houses || 0, icon: 'badge-check', tone: 'green', meter: o.confirmed_open_houses ? 82 : 8 },
        { label: 'Active signs', value: o.active_signs || 0, icon: 'scan-line', tone: 'violet', meter: o.active_signs ? 82 : 8 },
        { label: 'Open events', value: o.open_events || 0, icon: 'calendar-days', tone: 'green', meter: o.open_events ? 72 : 8 },
        { label: 'Needs LO', value: o.open_events_without_lo || 0, icon: 'user-plus', tone: o.open_events_without_lo ? 'rose' : 'green', meter: o.open_events ? ((o.open_events_without_lo || 0) / o.open_events) * 100 : 6 },
        { label: 'Leads', value: o.leads || 0, icon: 'contact-round', tone: 'green', meter: o.leads ? 82 : 8 },
        { label: 'Check-ins', value: o.checkins || 0, icon: 'badge-check', tone: 'sky', meter: o.checkins ? 86 : 12 },
        { label: 'Pay setup', value: o.payments_needing_setup || 0, icon: 'credit-card', tone: o.payments_needing_setup ? 'orange' : 'green', meter: o.payments_needing_setup ? 62 : 7 }
      ];
      return `<section class="stats-grid">${stats.map((stat) => `
        <div class="stat-card ${esc(stat.tone)}">
          <div class="stat-top">
            <div>
              <div class="value">${esc(stat.value)}</div>
              <div class="label">${esc(stat.label)}</div>
            </div>
            <div class="stat-icon"><i data-lucide="${esc(stat.icon)}"></i></div>
          </div>
          <div class="meter"><span style="width:${Math.max(4, Math.min(100, Math.round(stat.meter)))}%"></span></div>
        </div>
      `).join('')}</section>`;
    }

    function renderArea() {
      if (state.area === 'leads') return renderLeads();
      if (state.area === 'crm') return renderCrm();
      if (state.area === 'signs') return renderSigns();
      if (state.area === 'lo') return renderLoanOfficers();
      if (state.area === 'payments') return renderPayments();
      if (state.area === 'reports') return renderReports();
      return renderOutreach();
    }

    function renderOutreach() {
      const rows = filteredInbox();
      return `
        <div class="section-head">
          <div>
            <h2>Outreach command</h2>
            <div class="sub">${rows.length} conversations in this view</div>
          </div>
          <select id="outreachFilter" class="select" style="max-width:220px;">
            <option value="needs_reply"${state.outreachFilter === 'needs_reply' ? ' selected' : ''}>Needs reply</option>
            <option value="interested"${state.outreachFilter === 'interested' ? ' selected' : ''}>Interested / yes</option>
            <option value="inbound"${state.outreachFilter === 'inbound' ? ' selected' : ''}>Inbound</option>
            <option value="all"${state.outreachFilter === 'all' ? ' selected' : ''}>All threads</option>
            <option value="opt_out"${state.outreachFilter === 'opt_out' ? ' selected' : ''}>Opt-outs</option>
          </select>
        </div>
        <div class="outreach-grid">
          ${state.loading ? '<div class="glass-card" style="padding:18px;font-weight:900;">Loading...</div>' : ''}
          ${!state.loading && rows.length === 0 ? '<div class="glass-card" style="padding:18px;font-weight:900;">No conversations in this view.</div>' : ''}
          ${rows.map(renderOutreachCard).join('')}
        </div>
      `;
    }

    function renderOutreachCard(thread) {
      const key = thread.thread_key;
      const media = thread.mockup_image_url || thread.listing_photo_url || '';
      const draft = state.drafts[key] || '';
      const disabledReason = isOptOutThread(thread)
        ? 'Opted out'
        : !thread.queue_row_id
          ? 'No linked queue row'
          : '';
      const canSend = !disabledReason && state.sendingKey !== key;
      const messages = Array.isArray(thread.messages) ? thread.messages : [];
      const phone = fmtPhone(thread.agent_phone || thread.from_phone);

      return `
        <article class="outreach-card">
          <div class="outreach-main">
            <div class="media-col">
              ${media ? `<img class="listing-img" src="${esc(media)}" alt="${esc(thread.address || 'Outreach mockup')}">` : `<div class="image-fallback">${esc(thread.address || 'No image')}</div>`}
              <div class="agent-strip">
                ${thread.agent_photo_url ? `<img class="avatar" src="${esc(thread.agent_photo_url)}" alt="${esc(thread.agent_name || 'Agent')}">` : `<div class="avatar-fallback">${esc(initials(thread.agent_name))}</div>`}
                <div>
                  <div class="agent-name">${esc(thread.agent_name || 'Unknown agent')}</div>
                  <div class="agent-meta">${esc(thread.brokerage || 'No brokerage')}</div>
                </div>
              </div>
              <div class="badges">
                ${statusBadge(thread)}
                ${thread.template_key ? badge(thread.template_key.replace(/_/g, ' '), 'info') : ''}
              </div>
            </div>

            <div class="card-body">
              <div class="card-top">
                <div>
                  <div class="address">${esc(thread.address || 'No address')}</div>
                  <div class="open-time">${esc([fmtDate(thread.open_start), money(thread.price), phone].filter(Boolean).join(' | '))}</div>
                </div>
                ${thread.last_reply_at ? badge(fmtDate(thread.last_reply_at), 'info') : ''}
              </div>

              <div class="mini-panel">
                <div class="mini-title">My outreach</div>
                <div class="copy-body">${esc(thread.selected_sms || 'No initial outreach copy stored.')}</div>
              </div>

              <div class="mini-panel">
                <div class="mini-title">Conversation</div>
                <div class="message-list">
                  ${messages.length ? messages.map(renderMessage).join('') : `<div class="msg"><div class="msg-body">${esc(thread.latest_reply_body || 'No messages loaded.')}</div></div>`}
                </div>
              </div>

              ${renderOutreachActions(thread)}

              <div class="mini-panel reply-box">
                <div class="mini-title">Reply by SMS</div>
                <textarea id="reply_${domId(key)}" data-draft-key="${esc(key)}" ${canSend ? '' : 'disabled'} maxlength="1200" placeholder="${disabledReason ? esc(disabledReason) : 'Write reply'}">${esc(draft)}</textarea>
                <div class="reply-footer">
                  <button class="btn primary" data-send-key="${esc(key)}" ${canSend ? '' : 'disabled'}>
                    <i data-lucide="send"></i><span>${state.sendingKey === key ? 'Sending...' : 'Send SMS'}</span>
                  </button>
                  <span id="count_${domId(key)}" class="small">${draft.length} characters</span>
                  ${disabledReason ? badge(disabledReason, 'bad') : ''}
                </div>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderAcceptedSummary(thread) {
      const assignment = outreachAssignment(thread);
      const show = assignment.visit || assignment.report || thread.review_status === 'accepted_open_house' || thread.review_status === 'confirmed_open_house';
      if (!show) return '';
      const accepted = thread.review_status === 'accepted_open_house' || Boolean(assignment.participant);
      const statusText = accepted ? 'Accepted open house' : 'Confirmed open house';
      const acceptedLabel = accepted ? 'Accepted' : 'Confirmed';
      const coverage = [fmtDate(assignment.scheduledStart), fmtDate(assignment.scheduledEnd)].filter(Boolean).join(' - ') || 'No coverage time stored';
      const acceptedAt = fmtDate(assignment.acceptedAt) || 'Time not recorded';
      const officer = assignment.assignedName || 'No loan officer assigned';
      const officerMeta = [assignment.assignedCompany, fmtPhone(assignment.assignedPhone)].filter(Boolean).join(' | ');
      return `
        <div class="accepted-summary">
          <div class="reply-footer">
            <div>
              <div class="mini-title">${esc(statusText)}</div>
              <div class="small">${assignment.assignedName ? 'LO assignment is active on this field visit.' : 'Assign or reassign the loan officer below.'}</div>
            </div>
            ${badge(accepted ? 'Accepted' : 'Confirmed', 'ok')}
          </div>
          <div class="accepted-summary-grid">
            <div class="accepted-summary-item">
              <div class="mini-title">Coverage</div>
              <strong>${esc(coverage)}</strong>
            </div>
            <div class="accepted-summary-item">
              <div class="mini-title">${esc(acceptedLabel)}</div>
              <strong>${esc(acceptedAt)}</strong>
            </div>
            <div class="accepted-summary-item">
              <div class="mini-title">Loan officer</div>
              <strong>${esc(officer)}</strong>
              ${officerMeta ? `<div class="small">${esc(officerMeta)}</div>` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function renderOutreachActions(thread) {
      const key = thread.thread_key;
      const profiles = activeLoanOfficers();
      const assignment = outreachAssignment(thread);
      const disabled = isOptOutThread(thread) || !thread.queue_row_id;
      const interested = isInterestedThread(thread);
      const markBusy = state.actionKey === actionId('mark_interested', key);
      const confirmBusy = state.actionKey === actionId('confirm_open_house', key);
      const acceptBusy = state.actionKey === actionId('accept_open_house', key);
      const dripBusy = state.actionKey === actionId('schedule_drip', key);
      const hasVisit = Boolean(assignment.visit || assignment.report);
      const accepted = thread.review_status === 'accepted_open_house' || Boolean(assignment.participant);
      const confirmed = thread.review_status === 'confirmed_open_house' || (hasVisit && !accepted);
      const confirmDone = accepted || confirmed || hasVisit;
      const acceptDisabled = disabled || acceptBusy || (accepted && !profiles.length);
      const assignedIsActive = profiles.some((profile) => profile.uid === assignment.assignedUid);
      const selectedUid = assignedIsActive ? assignment.assignedUid : profiles[0]?.uid || '';
      const dripText = thread.followup_sms || defaultDripText(thread);
      const dripAt = defaultDripSendAt(thread);
      return `
        <div class="mini-panel action-panel">
          <div class="reply-footer">
            <div>
              <div class="mini-title">Open house workflow</div>
              <div class="small">${interested ? 'Reply looks positive or was marked interested.' : 'Use these controls when an agent says yes.'}</div>
            </div>
            <button class="btn soft" data-mark-interested="${esc(key)}" ${disabled || markBusy ? 'disabled' : ''}>
              <i data-lucide="thumbs-up"></i><span>${markBusy ? 'Marking...' : 'Mark interested'}</span>
            </button>
          </div>
          ${renderAcceptedSummary(thread)}
          <div class="action-grid">
            <button class="btn soft" data-confirm-open-house="${esc(key)}" ${disabled || confirmBusy || confirmDone ? 'disabled' : ''}>
              <i data-lucide="badge-check"></i><span>${confirmBusy ? 'Confirming...' : accepted ? 'Accepted OH' : confirmed ? 'Confirmed true OH' : 'Confirm true OH'}</span>
            </button>
            <select id="accept_lo_${domId(key)}" class="select" ${disabled || !profiles.length ? 'disabled' : ''}>
              ${profiles.length ? profiles.map((profile) => `
                <option value="${esc(profile.uid)}"${profile.uid === selectedUid ? ' selected' : ''}>${esc(loanOfficerLabel(profile))}</option>
              `).join('') : '<option>No active loan officers</option>'}
            </select>
            <button class="btn primary" data-accept-open-house="${esc(key)}" ${acceptDisabled ? 'disabled' : ''}>
              <i data-lucide="calendar-check"></i><span>${acceptBusy ? 'Saving...' : accepted ? (profiles.length ? 'Reassign LO' : 'Accepted OH') : profiles.length ? 'Accept + assign LO' : 'Accept open house'}</span>
            </button>
          </div>
          <div class="drip-grid">
            <textarea id="drip_${domId(key)}" ${disabled || dripBusy ? 'disabled' : ''} maxlength="1200">${esc(dripText)}</textarea>
            <input id="drip_at_${domId(key)}" class="field" type="datetime-local" value="${esc(dripAt)}" ${disabled || dripBusy ? 'disabled' : ''}>
            <button class="btn soft" data-schedule-drip="${esc(key)}" ${disabled || dripBusy ? 'disabled' : ''}>
              <i data-lucide="alarm-clock"></i><span>${dripBusy ? 'Scheduling...' : 'Schedule drip'}</span>
            </button>
          </div>
        </div>
      `;
    }

    function renderMessage(message) {
      const outbound = message.direction === 'outbound';
      const optout = message.opt_out ? ' optout' : '';
      return `
        <div class="msg ${outbound ? 'outbound' : 'inbound'}${optout}">
          <div class="msg-head">
            <span>${outbound ? 'Sent' : (message.opt_out ? 'Opt-out' : 'Inbound')}</span>
            <span>${esc(fmtDate(message.received_at))}</span>
          </div>
          <div class="msg-body">${esc(message.body || '')}</div>
        </div>
      `;
    }

    function renderLeads() {
      const rows = filterByQuery(state.command?.leads || []);
      return renderRows('Leads', `${rows.length} buyer leads and event check-ins`, rows.slice(0, 150), (row) => `
        <div>
          <div class="primary">${esc(row.lead_name || row.name || row.visitor_name || 'Buyer lead')}</div>
          <div class="secondary">${esc([fmtPhone(row.lead_phone || row.phone || row.visitor_phone), row.lead_email || row.email || row.visitor_email].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${badge(row.lead_source === 'event_checkin' ? 'check-in' : 'profile lead', row.lead_source === 'event_checkin' ? 'ok' : 'info')}</div>
        <div>${badge(row.financing_label || 'Unknown', /needs/i.test(row.financing_label || '') ? 'warn' : 'info')}</div>
        <div>
          <div class="primary">${esc(row.property_label || 'No property')}</div>
          <div class="secondary">${esc([row.agent_label, fmtDate(row.created_at)].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${contactActions(row.lead_phone || row.phone || row.visitor_phone, row.lead_email || row.email || row.visitor_email)}</div>
      `);
    }

    function renderCrm() {
      const rows = filterByQuery(state.command?.crm || []);
      return renderRows('Agent CRM', `${rows.length} agent records and outreach contacts`, rows.slice(0, 80), (row) => `
        <div>
          <div class="primary">${esc(row.name || 'Unknown agent')}</div>
          <div class="secondary">${esc([row.brokerage, fmtPhone(row.phone)].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${badge(`${row.keychain_count || 0} keys`, 'info')}</div>
        <div>${badge(`${row.outreach_count || 0} outreach`, 'info')}</div>
        <div>${badge(`${row.reply_count || 0} replies`, row.reply_count ? 'warn' : 'info')}</div>
        <div>${badge(`${row.lead_count || 0} leads`, row.lead_count ? 'ok' : 'info')}</div>
      `);
    }

    function renderSigns() {
      const signs = filterByQuery(state.command?.signs || []);
      const events = filterByQuery(state.command?.events || []);
      return `
        ${renderRows('Smart signs', `${signs.length} signs in inventory`, signs.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.public_code || row.id)}</div>
            <div class="secondary">${esc(row.owner_agent_slug || row.assigned_agent_slug || 'Unassigned')}</div>
          </div>
          <div>${badge(row.status || 'unknown', row.status === 'active' ? 'ok' : 'info')}</div>
          <div>${badge(`${row.inventory_alias_count || 0} QR`, 'info')}</div>
          <div>${badge(row.active_event_host || 'No event', row.active_event_host ? 'ok' : 'info')}</div>
          <div>
            ${row.active_event_id ? `<button class="btn bad" data-end-event="${esc(row.active_event_id)}" ${state.actionKey === `end_event:${row.active_event_id}` ? 'disabled' : ''}><i data-lucide="octagon-x"></i><span>${state.actionKey === `end_event:${row.active_event_id}` ? 'Ending...' : 'End event'}</span></button>` : badge(row.primary_device_type || 'front', 'info')}
          </div>
        `)}
        ${renderRows('Live and recent events', `${events.length} events`, events.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.host_agent_slug || 'No host')}</div>
            <div class="secondary">${esc(fmtDate(row.start_time) || row.id)}</div>
          </div>
          <div>${badge(row.status || 'unknown', row.status === 'active' ? 'ok' : 'info')}</div>
          <div>${badge(`${row.checkin_count || 0} check-ins`, 'info')}</div>
          <div>${badge(`${row.financing_need_count || 0} finance`, row.financing_need_count ? 'warn' : 'info')}</div>
          <div class="row-actions">
            ${badge(`${row.live_loan_officer_count || 0} LO`, row.live_loan_officer_count ? 'ok' : 'info')}
            ${row.status === 'active' && !row.ended_at ? `<button class="btn bad" data-end-event="${esc(row.id)}" ${state.actionKey === `end_event:${row.id}` ? 'disabled' : ''}><i data-lucide="octagon-x"></i><span>${state.actionKey === `end_event:${row.id}` ? 'Ending...' : 'End'}</span></button>` : ''}
          </div>
        `)}
      `;
    }

    function reportDateMs(value) {
      const date = new Date(value || '');
      return Number.isFinite(date.getTime()) ? date.getTime() : 0;
    }

    function sortDateValue(value, direction) {
      const time = reportDateMs(value);
      if (time) return time;
      return direction === 'desc' ? Number.NEGATIVE_INFINITY : Number.POSITIVE_INFINITY;
    }

    function compareTextSort(a, b) {
      const left = String(a || '').trim();
      const right = String(b || '').trim();
      if (!left && !right) return 0;
      if (!left) return 1;
      if (!right) return -1;
      return left.localeCompare(right, undefined, { sensitivity: 'base' });
    }

    function compareDateSort(a, b, direction = 'asc') {
      const left = sortDateValue(a, direction);
      const right = sortDateValue(b, direction);
      return direction === 'desc' ? right - left : left - right;
    }

    function compareConfirmedRows(a, b) {
      const fallback = () => compareDateSort(a.scheduled_start || a.confirmed_at, b.scheduled_start || b.confirmed_at, state.reportWindow === 'past' ? 'desc' : 'asc');
      switch (state.reportSort) {
        case 'open_start_asc':
          return compareDateSort(a.scheduled_start || a.confirmed_at, b.scheduled_start || b.confirmed_at, 'asc');
        case 'open_start_desc':
          return compareDateSort(a.scheduled_start || a.confirmed_at, b.scheduled_start || b.confirmed_at, 'desc');
        case 'confirmed_desc':
          return compareDateSort(a.confirmed_at || a.scheduled_start, b.confirmed_at || b.scheduled_start, 'desc');
        case 'confirmed_asc':
          return compareDateSort(a.confirmed_at || a.scheduled_start, b.confirmed_at || b.scheduled_start, 'asc');
        case 'loan_officer':
          return compareTextSort(a.loan_officer_name || 'Unassigned', b.loan_officer_name || 'Unassigned') || fallback();
        case 'agent':
          return compareTextSort(a.agent_name, b.agent_name) || fallback();
        case 'property':
          return compareTextSort(a.property_address, b.property_address) || fallback();
        case 'status':
          return compareTextSort(a.visit_status || a.review_status, b.visit_status || b.review_status) || fallback();
        default:
          return fallback();
      }
    }

    function confirmedReportRows() {
      const now = Date.now();
      return filterByQuery(state.command?.confirmed_open_houses || [])
        .filter((row) => {
          const end = reportDateMs(row.scheduled_end) || reportDateMs(row.scheduled_start) || reportDateMs(row.confirmed_at);
          if (state.reportWindow === 'upcoming') return end >= now - 2 * 60 * 60 * 1000;
          if (state.reportWindow === 'past') return end < now - 2 * 60 * 60 * 1000;
          return true;
        })
        .sort(compareConfirmedRows);
    }

    function compactReportDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return '';
      const hour24 = date.getHours();
      const hour = hour24 % 12 || 12;
      const minute = String(date.getMinutes()).padStart(2, '0');
      const ampm = hour24 >= 12 ? 'pm' : 'am';
      return `${date.getMonth() + 1}/${date.getDate()}${hour}:${minute}${ampm}`;
    }

    function compactReportWindow(start, end) {
      const first = compactReportDate(start);
      const second = compactReportDate(end);
      if (first && second && first !== second) return `${first}-${second}`;
      return first || second || '';
    }

    function reportDisplayWindow(start, end) {
      return [fmtDate(start), fmtDate(end)]
        .filter(Boolean)
        .filter((value, index, values) => index === 0 || value !== values[0])
        .join(' - ');
    }

    function generatedStamp(date = new Date()) {
      const stamp = new Intl.DateTimeFormat('en-US', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: 'numeric',
        minute: '2-digit'
      }).format(date).replace(',', '');
      const offset = -date.getTimezoneOffset();
      const sign = offset >= 0 ? '+' : '-';
      const absolute = Math.abs(offset);
      const hours = String(Math.floor(absolute / 60)).padStart(2, '0');
      const minutes = String(absolute % 60).padStart(2, '0');
      return `${stamp} ${sign}${hours}:${minutes}`;
    }

    function compactReportStatus(row) {
      return [
        row.visit_status || 'confirmed',
        row.review_status || 'confirmed_open_house',
        row.loan_officer_name ? `LO ${row.loan_officer_name}` : 'LO unassigned'
      ].filter(Boolean).join('/');
    }

    function reportOutboundBlocks(row) {
      const blocks = [];
      if (row.selected_sms) blocks.push(`<div><b>Initial:</b> ${esc(row.selected_sms)}</div>`);
      if (row.followup_sms) blocks.push(`<div><b>Follow-up:</b> ${esc(row.followup_sms)}</div>`);
      const outbound = (Array.isArray(row.messages) ? row.messages : [])
        .filter((message) => message.direction === 'outbound' && message.body)
        .filter((message) => message.body !== row.selected_sms && message.body !== row.followup_sms);
      outbound.forEach((message) => {
        blocks.push(`<div><b>${esc(compactReportDate(message.received_at || message.created_at))} Sent:</b> ${esc(message.body)}</div>`);
      });
      return blocks.length ? blocks.join('') : '<div class="muted">No outbound message text stored.</div>';
    }

    function reportAgentBlocks(row) {
      const inbound = (Array.isArray(row.messages) ? row.messages : [])
        .filter((message) => message.direction !== 'outbound');
      if (!inbound.length) return '<div class="muted">No inbound body in reply table.</div>';
      return inbound.map((message) => {
        const label = [compactReportDate(message.received_at || message.created_at), message.opt_out ? '[OPT OUT]' : '']
          .filter(Boolean)
          .join(' ');
        return `<div><b>${esc(label)} </b>${esc(message.body || '')}</div>`;
      }).join('');
    }

    function compactReportHtml(rows) {
      const title = 'Ultra Compact Confirmed Open Houses Report';
      const windowLabel = {
        upcoming: 'upcoming confirmed',
        past: 'previous confirmed',
        all: 'all confirmed'
      }[state.reportWindow] || state.reportWindow;
      const generated = generatedStamp();
      const rowsHtml = rows.map((row, index) => {
        const photo = row.listing_photo_url || row.mockup_image_url || '';
        const listedWindow = compactReportWindow(

        );

        );

        const facts = [
          money(row.price),
          compactReportStatus(row)
        ].filter(Boolean).join(' | ');

        const loanOfficerAssigned = [
          row.loan_officer_name || 'Unassigned',

          fmtPhone(row.loan_officer_phone),

        ].filter(Boolean).join(' | ');
        return `
          <tr>
            <td class="n">${esc(index + 1)}</td>
            <td class="pic">${photo ? `<img src="${esc(photo)}" alt="Listing">` : '<div class="ph">No pic</div>'}</td>
            <td class="meta">

              ${esc(facts || 'No property facts')}<br>
              <span class="report-line"><b>Open House Listed:</b> ${esc(listedWindow || 'No listed window')}</span>
              <span class="report-line confirm-line"><b>Confirmed Coverage:</b> ${esc(confirmedWindow || 'No confirmed coverage window')}</span>
              <span class="report-line"><b>Confirmed On:</b> ${esc(confirmedOn || 'No confirmed timestamp')}</span>
              <b>${esc(row.agent_name || 'Unknown agent')}</b><br>
              ${esc(agentMeta || row.brokerage || 'No agent contact')}<br>
              ${row.brokerage ? `<span class="muted">${esc(row.brokerage)}</span>` : ''}
              <span class="lo-line"><b>Loan Officer Assigned:</b> ${esc(loanOfficerAssigned)}</span>
            </td>
            <td class="me">${reportOutboundBlocks(row)}</td>
            <td class="agent">${reportAgentBlocks(row)}</td>
          </tr>
        `;
      }).join('');
      return `<!doctype html><html><head><meta charset="utf-8"><title>${esc(title)}</title>
<style>
@page { size: landscape; margin: 0.24in; }
body { font-family: Arial, sans-serif; font-size: 8.35pt; color:#111827; }
h1 { font-size: 10.5pt; margin:0 0 1px; }
