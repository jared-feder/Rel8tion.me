</style></head><body>
<h1>${esc(title)}</h1>
<p>${esc(rows.length)} ${esc(windowLabel)} open house records. Generated ${esc(generated)}. Full outbound message text, inbound agent replies, coverage windows, and loan officer assignment are included.</p>
<table><thead><tr><th class="n">#</th><th class="pic">Pic</th><th class="meta">Property + Agent</th><th class="me">Me</th><th class="agent">Agent</th></tr></thead><tbody>
${rowsHtml}
</tbody></table></body></html>`;
    }

    function downloadPrintableReportHtml(html) {
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const day = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `rel8tion-confirmed-open-houses-${state.reportWindow}-${day}.html`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function generateConfirmedPdfReport() {
      const rows = confirmedReportRows();
      if (!rows.length) {
        showToast('No confirmed open houses in this report view.');
        return;
      }
      const html = compactReportHtml(rows);
      const report = window.open('', '_blank');
      if (!report) {
        downloadPrintableReportHtml(html);
        showToast('Popup blocked. Downloaded the printable report HTML.');
        return;
      }
      report.document.open();
      report.document.write(html);
      report.document.close();
      report.focus();
      window.setTimeout(() => {
        try {
          report.print();
        } catch (_) {}
      }, 700);
      showToast(`Opened PDF-style report for ${rows.length} confirmed open houses.`);
    }

              </div>

                <div class="mini-title">Confirmed coverage</div>

    function renderReports() {
      const outreach = state.command?.outreach || {};
      const confirmed = confirmedReportRows();
      const allConfirmed = state.command?.confirmed_open_houses || [];
      const now = Date.now();
      const upcomingCount = allConfirmed.filter((row) => {
        const end = reportDateMs(row.scheduled_end) || reportDateMs(row.scheduled_start) || reportDateMs(row.confirmed_at);
        return end >= now - 2 * 60 * 60 * 1000;
      }).length;
      const pastCount = allConfirmed.length - upcomingCount;
      return `
        <div class="section-head">
          <div>
            <h2>Reports</h2>
            <div class="sub">${confirmed.length} confirmed open houses in this view | ${upcomingCount} upcoming | ${pastCount} previous</div>

            <select id="reportWindow" class="select" style="max-width:190px;">

            </select>

              <option value="open_start_asc"${state.reportSort === 'open_start_asc' ? ' selected' : ''}>Open date soonest</option>
              <option value="open_start_desc"${state.reportSort === 'open_start_desc' ? ' selected' : ''}>Open date latest</option>
              <option value="confirmed_desc"${state.reportSort === 'confirmed_desc' ? ' selected' : ''}>Confirmed newest</option>
              <option value="confirmed_asc"${state.reportSort === 'confirmed_asc' ? ' selected' : ''}>Confirmed oldest</option>
              <option value="loan_officer"${state.reportSort === 'loan_officer' ? ' selected' : ''}>Loan officer A-Z</option>
              <option value="agent"${state.reportSort === 'agent' ? ' selected' : ''}>Agent A-Z</option>
              <option value="property"${state.reportSort === 'property' ? ' selected' : ''}>Property A-Z</option>
              <option value="status"${state.reportSort === 'status' ? ' selected' : ''}>Status A-Z</option>
            </select>
            <button class="btn soft" id="generateConfirmedPdf"><i data-lucide="file-text"></i><span>Generate PDF</span></button>
          </div>
        </div>
        <div class="confirmed-report-grid">
          ${confirmed.length ? confirmed.slice(0, 120).map(renderConfirmedReportCard).join('') : '<div class="glass-card" style="padding:18px;font-weight:900;">No confirmed open houses match this report view.</div>'}
        </div>
        <div class="report-grid">
          ${renderBarCard('Review status', outreach.by_review_status || {})}
          ${renderBarCard('Initial status', outreach.by_initial_status || {})}
        </div>
      `;
    }

    function renderBarCard(title, values) {
      const entries = Object.entries(values || {}).sort((a, b) => b[1] - a[1]).slice(0, 12);
      const max = Math.max(1, ...entries.map(([, count]) => count));
      return `
        <div class="glass-card" style="padding:14px;">
          <div class="mini-title">${esc(title)}</div>
          ${entries.length ? entries.map(([label, count]) => `
            <div class="bar-row">
              <div>${esc(label)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, Math.round((count / max) * 100))}%"></div></div>
              <div>${esc(count)}</div>
            </div>
          `).join('') : '<div class="small" style="margin-top:10px;">No data</div>'}
        </div>
      `;
    }

    function renderRows(title, subtitle, rows, rowRenderer) {
      return `
        <div class="section-head">
          <div>
            <h2>${esc(title)}</h2>
            <div class="sub">${esc(subtitle)}</div>
          </div>
        </div>
        <div class="rows">
          ${rows.length ? rows.map((row) => `<div class="data-row">${rowRenderer(row)}</div>`).join('') : '<div class="glass-card" style="padding:18px;font-weight:900;">No rows loaded.</div>'}
        </div>
      `;
    }

    function render() {
      if (!state.verified) renderLock();
      else renderShell();
    }

    verify();
    window.setInterval(() => {
      if (state.verified && !state.loading && !state.sendingKey && !state.actionKey && !state.coveragePickerKey && !isCommandEditing()) {
        loadAll({ showLoading: false }).catch(() => null);
      }
    }, 45000);
  </script>
</body>
</html>
