<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REL8TION COMMAND</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --sky: #38bdf8;
      --sky-strong: #2563eb;
      --teal: #1f2a5a;
      --teal-strong: #161e40;
      --ink: #1f2a5a;
      --muted: #64748b;
      --soft: #f0f7ff;
      --line: rgba(255, 255, 255, .54);
      --glass: rgba(255, 255, 255, .66);
      --glass-strong: rgba(255, 255, 255, .88);
      --ok: #0f7b5f;
      --warn: #9a5b00;
      --bad: #b42318;
      --violet: #6657d9;
      --orange: #f97316;
      --shadow: 0 24px 70px rgba(23, 32, 51, .14);
      --soft-shadow: 0 14px 34px rgba(23, 32, 51, .08);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,0) 20%, rgba(240,247,255,.86) 74%, rgba(240,247,255,.98) 100%),
        linear-gradient(180deg, #38bdf8 0%, #f0f7ff 60%, #f0f7ff 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDYwMCAyMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZyI+PHBhdGggZD0iTTEyMCwxNTAgQzgwLDE1MCA2MCwxMzAgNjAsMTAwIEM2MCw4MCA4MCw2MCAxMTAsNjAgQzEyMCwzMCAxNTAsMTAgMTkwLDEwIEMyNDAsMTAgMjcwLDQwIDI4MCw3MCBDMzEwLDcwIDM0MCw5MCAzNDAsMTIwIEMzNDAsMTUwIDMxMCwxNTAgMjgwLDE1MCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjgyIi8+PHBhdGggZD0iTTQ1MCwxMjAgQzQyMCwxMjAgNDAwLDEwNSA0MDAsODUgQzQwMCw3MCA0MTUsNTUgNDM1LDU1IEM0NDUsMzUgNDY1LDIwIDQ5MCwyMCBDNTI1LDIwIDU0NSw0MCA1NTUsNjAgQzU3NSw2MCA1OTUsNzUgNTk1LDk1IEM1OTUsMTIwIDU3NSwxMjAgNTUwLDEyMCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjU4Ii8+PHBhdGggZD0iTTMwLDE4MCBDMTAsMTgwIDAsMTcwIDAsMTU1IEMwLDE0MCAxNSwxMzAgMzAsMTMwIEMzNSwxMTUgNTAsMTA1IDcwLDEwNSBDOTUsMTA1IDExMCwxMjAgMTE1LDEzNSBDMTMwLDEzNSAxNDUsMTQ1IDE0NSwxNjAgQzE0NSwxNjAgMTMwLDE4MCAxMTUsMTgwIFoiIGZpbGw9IiNmZmZmZmYiIG9wYWNpdHk9IjAuNjgiLz48L3N2Zz4=");
      background-repeat: repeat-x;
      background-size: 800px auto;
      background-position: 0 8px;
      opacity: .72;
      animation: drift 120s linear infinite;
    }

    body::after {
      z-index: 0;
      top: auto;
      height: 70vh;
      background:
        linear-gradient(180deg, rgba(240,247,255,.08), rgba(240,247,255,.92)),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
      opacity: .30;
    }

    @keyframes drift {
      from { background-position-x: 0; }
      to { background-position-x: 800px; }
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .58; }

    #app {
      position: relative;
      z-index: 1;
    }

    .app {
      min-height: 100vh;
      padding: 34px 22px;
    }

    .command-shell {
      width: min(1520px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      min-height: calc(100vh - 68px);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.76);
      border-radius: 8px;
      background: rgba(255,255,255,.26);
      backdrop-filter: blur(18px) saturate(150%);
      -webkit-backdrop-filter: blur(18px) saturate(150%);
      box-shadow: 0 25px 50px rgba(31, 42, 90, .12), inset 0 1px 1px rgba(255,255,255,.28);
    }

    .command-sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 18px;
      padding: 20px 12px;
      border-right: 1px solid rgba(122,148,173,.18);
      background: rgba(255,255,255,.34);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 10px 14px;
      border-bottom: 1px solid rgba(122,148,173,.16);
    }

    .sidebar-brand img {
      width: 64px;
      height: auto;
      flex: 0 0 auto;
    }

    .sidebar-brand strong {
      display: block;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .sidebar-brand span {
      display: block;
      margin-top: 4px;
      color: #62748a;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .12em;
    }

    .area-nav {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .nav-button {
      width: 100%;
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: #31465f;
      padding: 10px 11px;
      text-align: left;
      font-weight: 900;
    }

    .nav-button svg {
      width: 18px;
      height: 18px;
      color: #66839e;
    }

    .nav-button:hover,
    .nav-button.active {
      border-color: rgba(91,141,255,.20);
      background: linear-gradient(90deg, rgba(255,255,255,.92), rgba(236,245,255,.74));
      color: #2445d8;
      box-shadow: 0 10px 24px rgba(72, 91, 150, .08);
    }

    .nav-button.active svg { color: #2445d8; }

    .sidebar-card {
      margin: 0 6px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.84), rgba(229,246,255,.64)),
        rgba(255,255,255,.66);
      box-shadow: var(--soft-shadow);
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .sidebar-card .value {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    .command-workspace {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(240,247,255,.58), rgba(240,247,255,.88)),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
    }

    .topbar {
      min-height: 58px;
      display: grid;
      grid-template-columns: minmax(260px, 430px) minmax(190px, 280px) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.76);
      border-radius: 8px;
      background: rgba(255,255,255,.76);
      box-shadow: 0 10px 26px rgba(23,32,51,.05);
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 17px;
      height: 17px;
      color: #6b7d92;
      transform: translateY(-50%);
    }

    .search-wrap .field {
      padding-left: 38px;
      font-weight: 800;
    }

    .command-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, .8fr);
      gap: 12px;
      align-items: stretch;
    }

    .hero-panel,
    .score-panel {
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--soft-shadow);
      padding: 16px;
    }

    .hero-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(255,255,255,.86), rgba(236,249,255,.68)),
        rgba(255,255,255,.70);
    }

    .hero-label {
      color: #41708d;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .14em;
    }

    .hero-title {
      margin: 5px 0 0;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: clamp(30px, 4vw, 56px);
      font-weight: 800;
      line-height: .95;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 720px;
      margin-top: 9px;
      color: #4a6075;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.45;
    }

    .hero-stack {
      display: grid;
      gap: 8px;
      min-width: 190px;
    }

    .hero-mini {
      border: 1px solid rgba(122,148,173,.18);
      border-radius: 8px;
      background: rgba(255,255,255,.76);
      padding: 10px;
    }

    .score-panel {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .score-ring {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.92) 0 53%, transparent 54%),
        conic-gradient(var(--teal) calc(var(--score, 74) * 1%), rgba(207, 222, 235, .62) 0);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.86), 0 14px 32px rgba(23,32,51,.08);
    }

    .score-ring span {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .header-actions,
    .row-actions,
    .control-row,
    .badges {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass-strong);
      color: var(--ink);
      padding: 9px 12px;
      font-weight: 900;
      line-height: 1;
      max-width: 100%;
      white-space: normal;
      text-align: center;
      box-shadow: 0 8px 20px rgba(23,32,51,.04);
      transition: transform .16s ease, background .16s ease, border-color .16s ease;
    }

    .btn svg { width: 17px; height: 17px; }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
    .btn.primary:hover { background: var(--teal-strong); border-color: var(--teal-strong); }
    .btn.soft { background: rgba(255,255,255,.58); }
    .btn.bad { color: var(--bad); border-color: rgba(180,35,24,.25); background: rgba(255,247,247,.8); }

    .select,
    .field,
    textarea {
      width: 100%;
      min-height: 40px;
      border: 1px solid rgba(119, 146, 173, .42);
      border-radius: 8px;
      background: rgba(255,255,255,.86);
      color: var(--ink);
      outline: none;
      font-weight: 800;
      padding: 9px 11px;
    }

    textarea {
      resize: vertical;
      min-height: 104px;
      max-height: 240px;
      line-height: 1.45;
      font-weight: 600;
    }

    .select:focus,
    .field:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15,143,189,.16);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
      gap: 10px;
    }

    .stat-card,
    .glass-card,
    .outreach-card {
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(23,32,51,.08);
    }

    .stat-card {
      position: relative;
      overflow: hidden;
      padding: 13px;
      min-height: 108px;
      display: grid;
      align-content: space-between;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.92), rgba(246,251,255,.72)),
        var(--glass);
    }

    .stat-card::after {
      content: "";
      position: absolute;
      inset: auto -18px -28px auto;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(15,143,189,.12);
    }

    .stat-card.sky::after { background: rgba(40,168,223,.16); }
    .stat-card.violet::after { background: rgba(102,87,217,.14); }
    .stat-card.green::after { background: rgba(15,123,95,.14); }
    .stat-card.orange::after { background: rgba(249,115,22,.16); }
    .stat-card.rose::after { background: rgba(244,63,94,.13); }

    .stat-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .stat-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(122,148,173,.18);
      background: rgba(255,255,255,.72);
      color: var(--teal);
    }

    .stat-icon svg {
      width: 18px;
      height: 18px;
    }

    .stat-card .value {
      position: relative;
      z-index: 1;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
    }

    .stat-card .label {
      color: #446175;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .meter {
      position: relative;
      z-index: 1;
      height: 5px;
      border-radius: 999px;
      background: rgba(122,148,173,.16);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--teal), #13b287);
    }

    .main-grid {
      display: grid;
      gap: 12px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 14px;
      padding: 6px 2px 0;
    }

    .section-head h2 {
      margin: 0;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .section-head .sub {
      margin-top: 4px;
      color: #426175;
      font-size: 13px;
      font-weight: 800;
    }

    .outreach-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .outreach-card {
      overflow: visible;
      background: rgba(255,255,255,.70);
    }

    .outreach-main {
      display: grid;
      grid-template-columns: minmax(250px, 320px) minmax(0, 1fr);
      min-height: 100%;
    }

    .media-col {
      background: rgba(255,255,255,.28);
      border-right: 1px solid var(--line);
      padding: 10px;
      display: grid;
      gap: 9px;
      align-content: start;
    }

    .listing-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.72);
      background: #dff3ff;
      display: block;
    }

    .image-fallback {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.72);
      background: linear-gradient(135deg, rgba(55,189,244,.28), rgba(255,255,255,.74));
      display: grid;
      place-items: center;
      padding: 12px;
      text-align: center;
      color: #31566a;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .agent-strip {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.70);
      border: 1px solid rgba(255,255,255,.72);
    }

    .avatar,
    .avatar-fallback {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: #0f8fbd;
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .agent-name {
      font-weight: 900;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .agent-meta {
      color: #526a7b;
      font-size: 12px;
      font-weight: 800;
      margin-top: 3px;
      overflow-wrap: anywhere;
    }

    .card-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .address {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 19px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .open-time {
      color: #526a7b;
      font-size: 12px;
      font-weight: 800;
      margin-top: 5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.68);
      color: #334155;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.ok { border-color: rgba(15,123,95,.24); background: rgba(236,253,245,.78); color: var(--ok); }
    .badge.warn { border-color: rgba(154,91,0,.26); background: rgba(255,247,237,.86); color: var(--warn); }
    .badge.bad { border-color: rgba(180,35,24,.24); background: rgba(255,241,242,.82); color: var(--bad); }
    .badge.info { border-color: rgba(15,143,189,.24); background: rgba(240,249,255,.82); color: var(--teal-strong); }

    .mini-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.58);
      padding: 10px;
      display: grid;
      gap: 7px;
    }

    .mini-title {
      color: #456173;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .message-list {
      display: grid;
      gap: 7px;
      max-height: 220px;
      overflow: auto;
      padding-right: 3px;
    }

    .msg {
      border-radius: 8px;
      border: 1px solid rgba(136,164,190,.28);
      background: rgba(255,255,255,.76);
      padding: 8px 9px;
    }

    .msg.outbound {
      background: rgba(236,253,245,.74);
      border-color: rgba(15,123,95,.22);
    }

    .msg.optout {
      background: rgba(255,241,242,.84);
      border-color: rgba(180,35,24,.22);
    }

    .msg-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #64748b;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 4px;
    }

    .msg-body,
    .copy-body {
      color: #263545;
      font-size: 13px;
      line-height: 1.42;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .reply-box {
      display: grid;
      gap: 8px;
    }

    .reply-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-panel {
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(236,249,255,.64)),
        rgba(255,255,255,.58);
    }

    .action-grid {
      display: grid;
      grid-template-columns: max-content minmax(220px, 1fr) max-content;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .drip-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(210px, 260px) max-content;
      gap: 8px;
      align-items: end;
      min-width: 0;
    }

    .drip-grid textarea {
      grid-column: 1 / -1;
      min-height: 96px;
      max-height: 160px;
    }

    .action-grid .select,
    .drip-grid .field {
      min-width: 0;
    }

    .action-grid .btn,
    .drip-grid .btn {
      align-self: stretch;
    }

    .rows {
      display: grid;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 16px 42px rgba(23,32,51,.07);
    }

    .data-row {
      display: grid;
      grid-template-columns: minmax(170px, 1.2fr) repeat(4, minmax(80px, .5fr));
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(122,148,173,.17);
      background: rgba(255,255,255,.58);
    }

    .data-row:last-child { border-bottom: 0; }

    .data-row .primary {
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .data-row .secondary,
    .small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .report-toolbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .confirmed-report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .confirmed-card {
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.82), rgba(238,249,255,.68)),
        rgba(255,255,255,.70);
      box-shadow: 0 16px 42px rgba(23,32,51,.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      min-width: 0;
    }

    .report-media {
      position: relative;
      min-height: 220px;
      background: rgba(225,238,248,.75);
    }

    .report-media img.report-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .report-agent-photo {
      position: absolute;
      left: 10px;
      bottom: 10px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,.92);
      box-shadow: 0 12px 24px rgba(23,32,51,.2);
    }

    .confirmed-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .report-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .report-detail {
      border: 1px solid rgba(122,148,173,.16);
      border-radius: 8px;
      background: rgba(255,255,255,.58);
      padding: 8px;
      min-width: 0;
    }

    .conversation-preview {
      max-height: 190px;
      overflow: auto;
      border: 1px solid rgba(122,148,173,.18);
      border-radius: 8px;
      background: rgba(255,255,255,.64);
      padding: 8px;
      color: #263545;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .assignment-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .assignment-card {
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background: rgba(255,255,255,.70);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(23,32,51,.08);
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .assignment-title {
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .assignment-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 8px;
      align-items: center;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 150px minmax(0, 1fr) 48px;
      gap: 9px;
      align-items: center;
      margin: 8px 0;
      font-size: 12px;
      font-weight: 900;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      background: rgba(15,143,189,.12);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), #11a87e);
    }

    .lock {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .lock-panel {
      width: min(460px, 100%);
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .lock-panel img { width: 88px; margin-bottom: 14px; }
    .lock-panel h1 {
      margin: 0 0 14px;
      font-family: "Plus Jakarta Sans", Inter, sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .lock-panel form { display: grid; gap: 10px; }
    .error { color: var(--bad); font-weight: 900; }
    .muted { color: var(--muted); }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      max-width: min(420px, calc(100vw - 32px));
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 8px;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      display: none;
      font-weight: 900;
    }

    .toast.show { display: block; }

    @media (max-width: 1120px) {
      .command-shell { grid-template-columns: 1fr; }
      .command-sidebar {
        grid-template-rows: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(122,148,173,.18);
      }
      .area-nav { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .topbar { grid-template-columns: 1fr auto; }
      .search-wrap { grid-column: 1 / -1; }
      .command-hero { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .outreach-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 980px) {
      .outreach-main { grid-template-columns: 1fr; }
      .media-col { border-right: 0; border-bottom: 1px solid var(--line); }
      .action-grid,
      .drip-grid { grid-template-columns: 1fr; }
      .confirmed-report-grid { grid-template-columns: 1fr; }
      .confirmed-card { grid-template-columns: 1fr; }
      .report-media { min-height: 240px; }
    }

    @media (max-width: 760px) {
      .app { padding: 10px; }
      .command-shell { min-height: calc(100vh - 20px); }
      .command-sidebar,
      .command-workspace { padding: 10px; }
      .sidebar-brand { padding-inline: 4px; }
      .area-nav { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr; }
      .header-actions { justify-content: flex-start; }
      .hero-panel { grid-template-columns: 1fr; }
      .score-panel { grid-template-columns: 1fr; }
      .score-ring { width: 92px; height: 92px; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .action-grid,
      .drip-grid { grid-template-columns: 1fr; }
      .data-row { grid-template-columns: 1fr; }
      .report-grid { grid-template-columns: 1fr; }
      .assignment-grid { grid-template-columns: 1fr; }
      .assignment-actions { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
      .report-toolbar { justify-content: flex-start; }
      .report-detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast" class="toast"></div>

  <script>
    const ADMIN_UID_KEY = 'rel8tion_admin_uid';
    const ADMIN_TOKEN_KEY = 'rel8tion_admin_token';
    const DRAFTS_KEY = 'rel8tion_admin_reply_drafts';
    const AREA_KEY = 'rel8tion_admin_area';

    const AREAS = [
      ['outreach', 'Outreach command'],
      ['leads', 'Leads'],
      ['crm', 'Agent CRM'],
      ['signs', 'Signs and events'],
      ['lo', 'Loan officers'],
      ['payments', 'Payments'],
      ['reports', 'Reports']
    ];

    const state = {
      verified: false,
      loading: false,
      sendingKey: '',
      actionKey: '',
      error: '',
      area: window.localStorage.getItem(AREA_KEY) || 'outreach',
      query: '',
      outreachFilter: 'needs_reply',
      reportWindow: 'upcoming',
      inbox: [],
      counts: { all: 0, inbound: 0, needs_reply: 0, interested: 0, opt_out: 0 },
      command: null,
      loadedAt: '',
      drafts: readDrafts()
    };

    const app = document.getElementById('app');
    const toast = document.getElementById('toast');

    const params = new URLSearchParams(window.location.search);
    const uidParam = params.get('uid') || params.get('admin_uid') || '';
    const tokenParam = params.get('token') || params.get('admin_token') || '';
    if (uidParam) window.localStorage.setItem(ADMIN_UID_KEY, uidParam);
    if (tokenParam) window.localStorage.setItem(ADMIN_TOKEN_KEY, tokenParam);

    function credential() {
      return {
        uid: window.localStorage.getItem(ADMIN_UID_KEY) || '',
        token: window.localStorage.getItem(ADMIN_TOKEN_KEY) || ''
      };
    }

    function authHeaders() {
      const cred = credential();
      const headers = { 'Content-Type': 'application/json' };
      if (cred.uid) headers['x-admin-uid'] = cred.uid;
      if (cred.token) headers['x-admin-token'] = cred.token;
      return headers;
    }

    function readDrafts() {
      try {
        return JSON.parse(window.localStorage.getItem(DRAFTS_KEY) || '{}') || {};
      } catch (_) {
        return {};
      }
    }

    function saveDrafts() {
      window.localStorage.setItem(DRAFTS_KEY, JSON.stringify(state.drafts));
    }

    function editableControl(element) {
      if (!element || element === document.body || typeof element.closest !== 'function') return null;
      return element.closest('textarea, input, select, [contenteditable="true"]');
    }

    function isCommandEditing() {
      const active = editableControl(document.activeElement);
      if (!active || active.disabled || active.readOnly) return false;
      return Boolean(active.closest('.command-shell'));
    }

    function captureUiState() {
      const active = editableControl(document.activeElement);
      const hasSelection = active && typeof active.selectionStart === 'number';
      return {
        scrollX: window.scrollX || 0,
        scrollY: window.scrollY || 0,
        activeId: active?.id || '',
        activeValue: active && 'value' in active ? active.value : undefined,
        selectionStart: hasSelection ? active.selectionStart : null,
        selectionEnd: hasSelection ? active.selectionEnd : null
      };
    }

    function restoreUiState(snapshot) {
      if (!snapshot) return;
      window.requestAnimationFrame(() => {
        const active = snapshot.activeId ? document.getElementById(snapshot.activeId) : null;
        if (active && !active.disabled) {
          if (snapshot.activeValue !== undefined && 'value' in active && active.value !== snapshot.activeValue) {
            active.value = snapshot.activeValue;
          }
          active.focus({ preventScroll: true });
          if (typeof active.setSelectionRange === 'function' && snapshot.selectionStart !== null) {
            active.setSelectionRange(snapshot.selectionStart, snapshot.selectionEnd ?? snapshot.selectionStart);
          }
        }
        window.scrollTo(snapshot.scrollX || 0, snapshot.scrollY || 0);
      });
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function fmtDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (!Number.isFinite(date.getTime())) return '';
      return new Intl.DateTimeFormat('en-US', {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
    }

    function fmtPhone(value) {
      const digits = String(value || '').replace(/\D/g, '');
      const ten = digits.length === 11 && digits.startsWith('1') ? digits.slice(1) : digits;
      if (ten.length !== 10) return value || '';
      return `(${ten.slice(0, 3)}) ${ten.slice(3, 6)}-${ten.slice(6)}`;
    }

    function money(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) return '';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
    }

    function initials(value) {
      return String(value || 'R')
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0]?.toUpperCase())
        .join('') || 'R';
    }

    function domId(value) {
      return `k_${String(value || '').replace(/[^a-z0-9_-]/gi, '_')}`;
    }

    function isOptOutThread(thread) {
      return Boolean(thread?.any_opt_out || thread?.latest_reply_opt_out || thread?.review_status === 'opted_out');
    }

    function isHandledThread(thread) {
      return ['interested', 'confirmed_open_house', 'accepted_open_house', 'drip_scheduled'].includes(thread?.review_status);
    }

    function needsReply(thread) {
      return thread?.direction !== 'outbound' && !isOptOutThread(thread) && !isHandledThread(thread);
    }

    function threadText(thread) {
      const messages = Array.isArray(thread?.messages) ? thread.messages : [];
      return [
        thread?.latest_reply_body,
        ...messages
          .filter((message) => message.direction !== 'outbound')
          .map((message) => message.body)
      ].filter(Boolean).join(' ').toLowerCase();
    }

    function isInterestedThread(thread) {
      if (!thread || isOptOutThread(thread)) return false;
      if (isHandledThread(thread)) return true;
      const text = threadText(thread);
      if (!text) return false;
      if (/\b(no|stop|remove|unsubscribe|wrong number|not interested|do not|don't)\b/i.test(text)) return false;
      return /\b(yes|yeah|yep|sure|absolutely|ok|okay|come by|stop by|come over|please come|that works|sounds good|interested|available|schedule|call me|text me)\b/i.test(text);
    }

    function badge(text, type = 'info') {
      return `<span class="badge ${type}">${esc(text)}</span>`;
    }

    function statusBadge(thread) {
      if (isOptOutThread(thread)) return badge('Opted out', 'bad');
      if (thread.review_status === 'confirmed_open_house') return badge('Confirmed OH', 'ok');
      if (thread.review_status === 'accepted_open_house') return badge('Accepted OH', 'ok');
      if (thread.review_status === 'drip_scheduled') return badge('Drip scheduled', 'ok');
      if (thread.review_status === 'interested' || isInterestedThread(thread)) return badge('Interested', 'ok');
      if (needsReply(thread)) return badge('Needs reply', 'warn');
      if (thread.direction === 'outbound') return badge('Replied', 'ok');
      return badge('Inbound', 'info');
    }

    function filteredInbox() {
      const query = state.query.trim().toLowerCase();
      return state.inbox.filter((thread) => {
        if (state.outreachFilter === 'all') return true;
        if (state.outreachFilter === 'inbound') return thread.direction !== 'outbound';
        if (state.outreachFilter === 'needs_reply') return needsReply(thread);
        if (state.outreachFilter === 'interested') return isInterestedThread(thread);
        if (state.outreachFilter === 'opt_out') return isOptOutThread(thread);
        return true;
      }).filter((thread) => {
        if (!query) return true;
        const messages = Array.isArray(thread.messages) ? thread.messages : [];
        const haystack = [
          thread.agent_name,
          thread.brokerage,
          thread.address,
          thread.agent_phone,
          thread.from_phone,
          thread.selected_sms,
          thread.latest_reply_body,
          ...messages.map((message) => message.body)
        ].filter(Boolean).join(' ').toLowerCase();
        return haystack.includes(query);
      });
    }

    function filterByQuery(rows) {
      const query = state.query.trim().toLowerCase();
      if (!query) return rows || [];
      return (rows || []).filter((row) => {
        try {
          return JSON.stringify(row || {}).toLowerCase().includes(query);
        } catch (_) {
          return false;
        }
      });
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          ...authHeaders(),
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || `Request failed: ${response.status}`);
      }
      return data;
    }

    async function verify() {
      const cred = credential();
      if (!cred.uid && !cred.token) {
        state.verified = false;
        render();
        return;
      }

      try {
        await api('/api/admin/auth');
        state.verified = true;
        state.error = '';
        await loadAll();
      } catch (error) {
        state.verified = false;
        state.error = error.message || 'Unauthorized.';
        render();
      }
    }

    async function loadAll(options = {}) {
      const uiSnapshot = options.preserveUi === false ? null : captureUiState();
      state.loading = true;
      if (options.showLoading !== false) {
        render();
        restoreUiState(uiSnapshot);
      }
      try {
        const [dashboard, inbox] = await Promise.all([
          api('/api/admin/dashboard').catch((error) => ({ ok: false, error: error.message })),
          api('/api/admin/outreach-inbox?limit=120')
        ]);
        state.command = dashboard.ok === false ? null : dashboard;
        state.inbox = inbox.inbox || [];
        state.counts = inbox.counts || state.counts;
        state.loadedAt = inbox.loaded_at || dashboard.loaded_at || new Date().toISOString();
        const restoreSnapshot = isCommandEditing() ? captureUiState() : uiSnapshot;
        state.loading = false;
        render();
        restoreUiState(restoreSnapshot);
      } catch (error) {
        const restoreSnapshot = isCommandEditing() ? captureUiState() : uiSnapshot;
        state.loading = false;
        state.error = error.message || 'Unable to load command data.';
        render();
        restoreUiState(restoreSnapshot);
      }
    }

    function setArea(area) {
      state.area = area;
      window.localStorage.setItem(AREA_KEY, area);
      render();
    }

    function setOutreachFilter(filter) {
      state.outreachFilter = filter;
      render();
    }

    function updateDraft(key, value) {
      state.drafts[key] = value;
      saveDrafts();
      const count = document.getElementById(`count_${domId(key)}`);
      if (count) count.textContent = `${value.length} characters`;
    }

    async function sendReply(key) {
      const thread = state.inbox.find((item) => item.thread_key === key);
      const textarea = document.getElementById(`reply_${domId(key)}`);
      const messageBody = textarea?.value?.trim() || '';

      if (!thread?.queue_row_id) {
        showToast('No queue row is linked to this thread.');
        return;
      }
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      if (!messageBody) {
        showToast('Write the reply first.');
        return;
      }
      if (!window.confirm(`Send this SMS to ${thread.agent_name || fmtPhone(thread.agent_phone) || 'this contact'}?`)) {
        return;
      }

      state.drafts[key] = messageBody;
      saveDrafts();
      state.sendingKey = key;
      render();
      try {
        await api('/api/admin/outreach-reply', {
          method: 'POST',
          body: JSON.stringify({
            id: thread.queue_row_id,
            body: messageBody
          })
        });
        delete state.drafts[key];
        saveDrafts();
        state.sendingKey = '';
        showToast('Reply sent.');
        await loadAll();
      } catch (error) {
        state.sendingKey = '';
        showToast(error.message || 'Unable to send reply.');
        render();
      }
    }

    function eventAddress(event) {
      const context = event?.setup_context || {};
      return context.address || context.property_address || context.listing_address || context.open_house_address || event?.open_house_source_id || event?.id || 'Open house';
    }

    function eventWindow(event) {
      return [fmtDate(event?.start_time), fmtDate(event?.end_time)].filter(Boolean).join(' - ');
    }

    function loanOfficerLabel(profile) {
      return [profile?.full_name || profile?.slug || 'Loan Officer', profile?.company_name, fmtPhone(profile?.phone)]
        .filter(Boolean)
        .join(' | ');
    }

    function activeLoanOfficers() {
      return (state.command?.loan_officers || []).filter((row) => row.is_active !== false);
    }

    function findThread(key) {
      return state.inbox.find((item) => item.thread_key === key);
    }

    function actionId(action, key) {
      return `${action}:${key}`;
    }

    function toLocalInputValue(date) {
      const d = new Date(date);
      if (!Number.isFinite(d.getTime())) return '';
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 16);
    }

    function defaultDripSendAt(thread) {
      const base = new Date(thread?.open_end || thread?.open_start || Date.now());
      const date = Number.isFinite(base.getTime()) ? base : new Date();
      date.setDate(date.getDate() + 2);
      date.setHours(10, 0, 0, 0);
      if (date.getTime() < Date.now() + 30 * 60 * 1000) {
        date.setTime(Date.now() + 24 * 60 * 60 * 1000);
        date.setHours(10, 0, 0, 0);
      }
      return toLocalInputValue(thread?.followup_send_at || date);
    }

    function defaultDripText(thread) {
      const first = String(thread?.agent_name || '').trim().split(/\s+/)[0] || '';
      const intro = first ? `${first}, ` : '';
      return `${intro}thanks again. I can help with buyer preapproval support, check-in, and follow-up for your next open house too. What do you have coming up next?`;
    }

    function contactActions(phone, email) {
      const digits = String(phone || '').replace(/\D/g, '');
      const ten = digits.length === 11 && digits.startsWith('1') ? digits.slice(1) : digits;
      const e164 = ten.length === 10 ? `+1${ten}` : '';
      return `
        <div class="row-actions">
          ${e164 ? `<a class="btn soft" href="tel:${esc(e164)}"><i data-lucide="phone"></i><span>Call</span></a>` : ''}
          ${e164 ? `<a class="btn soft" href="sms:${esc(e164)}"><i data-lucide="message-square"></i><span>Text</span></a>` : ''}
          ${email ? `<a class="btn soft" href="mailto:${esc(email)}"><i data-lucide="mail"></i><span>Email</span></a>` : ''}
        </div>
      `;
    }

    async function updateLoanOfficerAssignment(action, body = {}) {
      const actionKey = body.event_id ? `${action}:${body.event_id}` : action;
      state.actionKey = actionKey;
      render();
      try {
        const result = await api('/api/admin/loan-officer-assignment', {
          method: 'POST',
          body: JSON.stringify({ action, ...body })
        });
        state.actionKey = '';
        showToast(action === 'auto_assign'
          ? `Auto assigned ${result.assignments?.length || 0} open houses.`
          : action === 'end'
            ? 'Loan officer coverage ended.'
            : 'Loan officer assigned live.'
        );
        await loadAll();
      } catch (error) {
        state.actionKey = '';
        showToast(error.message || 'Unable to update loan officer assignment.');
        render();
      }
    }

    function assignLoanOfficer(eventId) {
      const select = document.getElementById(`lo_${domId(eventId)}`);
      const loanOfficerUid = select?.value || '';
      if (!loanOfficerUid) {
        showToast('Choose a loan officer first.');
        return;
      }
      const profile = (state.command?.loan_officers || []).find((item) => item.uid === loanOfficerUid);
      const event = (state.command?.events || []).find((item) => item.id === eventId);
      if (!window.confirm(`Assign ${loanOfficerLabel(profile)} live to ${eventAddress(event)}?`)) return;
      updateLoanOfficerAssignment('assign', {
        event_id: eventId,
        loan_officer_uid: loanOfficerUid
      });
    }

    function endLoanOfficer(eventId) {
      const event = (state.command?.events || []).find((item) => item.id === eventId);
      if (!window.confirm(`End live loan officer coverage for ${eventAddress(event)}?`)) return;
      updateLoanOfficerAssignment('end', { event_id: eventId });
    }

    function autoAssignLoanOfficers() {
      if (!window.confirm('Auto assign active loan officers to active open houses without live coverage?')) return;
      updateLoanOfficerAssignment('auto_assign');
    }

    async function runOutreachAction(key, action, body = {}, message = 'Updated.') {
      const thread = findThread(key);
      if (!thread?.queue_row_id) {
        showToast('No queue row is linked to this thread.');
        return;
      }
      state.actionKey = actionId(action, key);
      render();
      try {
        await api('/api/admin/outreach-action', {
          method: 'POST',
          body: JSON.stringify({
            action,
            queue_row_id: thread.queue_row_id,
            ...body
          })
        });
        state.actionKey = '';
        showToast(message);
        await loadAll();
      } catch (error) {
        state.actionKey = '';
        showToast(error.message || 'Unable to update outreach workflow.');
        render();
      }
    }

    function markInterested(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      runOutreachAction(key, 'mark_interested', {}, 'Marked interested.');
    }

    function confirmOpenHouse(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      const target = thread.address || thread.open_house_id || thread.agent_name || 'this open house';
      if (!window.confirm(`Mark ${target} as a confirmed true open house and add it to Reports?`)) return;
      runOutreachAction(key, 'confirm_open_house', {}, 'Open house confirmed for Reports.');
    }

    function acceptOpenHouse(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      const select = document.getElementById(`accept_lo_${domId(key)}`);
      const loanOfficerUid = select?.value || '';
      const profile = activeLoanOfficers().find((row) => row.uid === loanOfficerUid);
      const target = thread.address || thread.open_house_id || thread.agent_name || 'this open house';
      const assignment = profile ? ` and assign ${loanOfficerLabel(profile)}` : ' without a loan officer assignment yet';
      if (!window.confirm(`Accept ${target}${assignment}?`)) return;
      runOutreachAction(key, 'accept_open_house', { loan_officer_uid: loanOfficerUid }, 'Open house accepted and assignment updated.');
    }

    function scheduleDrip(key) {
      const thread = findThread(key);
      if (!thread) return;
      if (isOptOutThread(thread)) {
        showToast('This contact is opted out.');
        return;
      }
      const textarea = document.getElementById(`drip_${domId(key)}`);
      const input = document.getElementById(`drip_at_${domId(key)}`);
      const body = textarea?.value?.trim() || '';
      const sendAt = input?.value || '';
      if (!body) {
        showToast('Write the drip message first.');
        return;
      }
      if (!sendAt) {
        showToast('Pick a drip send time.');
        return;
      }
      const sendAtDate = new Date(sendAt);
      if (!Number.isFinite(sendAtDate.getTime())) {
        showToast('Pick a valid drip send time.');
        return;
      }
      if (!window.confirm(`Schedule this drip SMS to ${thread.agent_name || fmtPhone(thread.agent_phone) || 'this contact'}?`)) return;
      runOutreachAction(key, 'schedule_drip', { body, send_at: sendAtDate.toISOString() }, 'Drip scheduled.');
    }

    async function endEvent(eventId) {
      const event = (state.command?.events || []).find((row) => row.id === eventId);
      if (!event) {
        showToast('Event not found.');
        return;
      }
      if (!window.confirm(`End the open house event for ${eventAddress(event)} and clear the active sign?`)) return;
      state.actionKey = `end_event:${eventId}`;
      render();
      try {
        await api('/api/admin/event-action', {
          method: 'POST',
          body: JSON.stringify({ action: 'end_event', event_id: eventId })
        });
        state.actionKey = '';
        showToast('Open house event ended.');
        await loadAll();
      } catch (error) {
        state.actionKey = '';
        showToast(error.message || 'Unable to end open house event.');
        render();
      }
    }

    function signOut() {
      window.localStorage.removeItem(ADMIN_UID_KEY);
      window.localStorage.removeItem(ADMIN_TOKEN_KEY);
      state.verified = false;
      state.inbox = [];
      state.command = null;
      render();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 3200);
    }

    function renderLock() {
      const cred = credential();
      app.innerHTML = `
        <main class="lock">
          <section class="lock-panel">
            <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion">
            <h1>REL8TION COMMAND</h1>
            <form id="authForm">
              <input id="uidInput" class="field" value="${esc(cred.uid)}" autocomplete="off" placeholder="Admin UID">
              <input id="tokenInput" class="field" type="password" value="${esc(cred.token)}" autocomplete="current-password" placeholder="Fallback admin token">
              ${state.error ? `<div class="error small">${esc(state.error)}</div>` : ''}
              <button class="btn primary" type="submit"><i data-lucide="lock-keyhole"></i><span>Unlock</span></button>
            </form>
          </section>
        </main>
      `;
      document.getElementById('authForm')?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const uid = document.getElementById('uidInput')?.value?.trim() || '';
        const token = document.getElementById('tokenInput')?.value?.trim() || '';
        if (uid) window.localStorage.setItem(ADMIN_UID_KEY, uid);
        if (token) window.localStorage.setItem(ADMIN_TOKEN_KEY, token);
        state.error = '';
        await verify();
      });
      window.lucide?.createIcons();
    }

    function areaIcon(area) {
      return {
        outreach: 'message-square-reply',
        leads: 'contact-round',
        crm: 'users-round',
        signs: 'scan-line',
        lo: 'user-check',
        payments: 'credit-card',
        reports: 'bar-chart-3'
      }[area] || 'layout-dashboard';
    }

    function renderAreaNav() {
      return AREAS.map(([key, label]) => `
        <button type="button" class="nav-button${state.area === key ? ' active' : ''}" data-area-nav="${esc(key)}">
          <i data-lucide="${areaIcon(key)}"></i><span>${esc(label)}</span>
        </button>
      `).join('');
    }

    function commandScore() {
      const inbound = Number(state.counts.inbound || state.command?.overview?.incoming_threads || 0);
      const needs = Number(state.counts.needs_reply || state.command?.overview?.needs_reply || 0);
      if (!inbound) return 100;
      return Math.max(0, Math.min(100, Math.round(((inbound - needs) / inbound) * 100)));
    }

                <button class="btn primary" id="outreachJump"><i data-lucide="message-square-reply"></i><span>Open outreach</span></button>
              </div>

              <button class="btn soft" id="lockBtn"><i data-lucide="log-out"></i><span>Lock command</span></button>

            <section class="command-workspace">

                  <div class="score-ring"><span>${esc(score)}%</span></div>
                  <div>

                    <div class="address">${score >= 85 ? 'Clean' : score >= 60 ? 'Working' : 'Needs focus'}</div>
                    <div class="small">${esc(needsReplyCount)} open SMS replies, ${esc(o.open_events_without_lo || 0)} open houses need LO coverage.</div>

      `;

      document.getElementById('refreshBtn')?.addEventListener('click', () => loadAll());

      document.querySelectorAll('[data-area-nav]').forEach((button) => {

      });
      document.getElementById('outreachJump')?.addEventListener('click', () => setArea('outreach'));
      document.getElementById('globalSearch')?.addEventListener('input', (event) => {

      bindAreaActions();

    function refreshAreaContent() {
      const main = document.querySelector('.main-grid');
      if (!main) {
        render();
        return;
      }
      main.innerHTML = renderArea();
      bindAreaActions();
      window.lucide?.createIcons();
    }

    function bindAreaActions() {
      document.getElementById('outreachFilter')?.addEventListener('change', (event) => setOutreachFilter(event.target.value));
      document.querySelectorAll('[data-draft-key]').forEach((textarea) => {
        textarea.addEventListener('input', () => updateDraft(textarea.dataset.draftKey, textarea.value));
      });
      document.querySelectorAll('[data-send-key]').forEach((button) => {
        button.addEventListener('click', () => sendReply(button.dataset.sendKey));
      });
      document.querySelectorAll('[data-mark-interested]').forEach((button) => {
        button.addEventListener('click', () => markInterested(button.dataset.markInterested));
      });
      document.querySelectorAll('[data-confirm-open-house]').forEach((button) => {
        button.addEventListener('click', () => confirmOpenHouse(button.dataset.confirmOpenHouse));
      });
      document.querySelectorAll('[data-accept-open-house]').forEach((button) => {
        button.addEventListener('click', () => acceptOpenHouse(button.dataset.acceptOpenHouse));
      });
      document.querySelectorAll('[data-schedule-drip]').forEach((button) => {
        button.addEventListener('click', () => scheduleDrip(button.dataset.scheduleDrip));
      });
      document.querySelectorAll('[data-assign-lo]').forEach((button) => {
        button.addEventListener('click', () => assignLoanOfficer(button.dataset.assignLo));
      });
      document.querySelectorAll('[data-end-lo]').forEach((button) => {
        button.addEventListener('click', () => endLoanOfficer(button.dataset.endLo));
      });
      document.querySelectorAll('[data-end-event]').forEach((button) => {
        button.addEventListener('click', () => endEvent(button.dataset.endEvent));
      });
      document.getElementById('autoAssignLo')?.addEventListener('click', autoAssignLoanOfficers);
      document.getElementById('reportWindow')?.addEventListener('change', (event) => {
        state.reportWindow = event.target.value;
        refreshAreaContent();
      });
      document.getElementById('downloadConfirmedCsv')?.addEventListener('click', downloadConfirmedCsv);
      document.getElementById('printConfirmedReport')?.addEventListener('click', () => window.print());
    }

    function renderStats() {
      const o = state.command?.overview || {};
      const inbound = state.counts.inbound || o.incoming_threads || 0;
      const needs = state.counts.needs_reply || o.needs_reply || 0;
      const stats = [
        { label: 'Needs reply', value: needs, icon: 'message-square-reply', tone: needs ? 'orange' : 'green', meter: inbound ? (needs / inbound) * 100 : 4 },
        { label: 'Inbound', value: inbound, icon: 'inbox', tone: 'sky', meter: inbound ? 78 : 10 },
        { label: 'Confirmed OH', value: o.confirmed_open_houses || 0, icon: 'badge-check', tone: 'green', meter: o.confirmed_open_houses ? 82 : 8 },
        { label: 'Active signs', value: o.active_signs || 0, icon: 'scan-line', tone: 'violet', meter: o.active_signs ? 82 : 8 },
        { label: 'Open events', value: o.open_events || 0, icon: 'calendar-days', tone: 'green', meter: o.open_events ? 72 : 8 },
        { label: 'Needs LO', value: o.open_events_without_lo || 0, icon: 'user-plus', tone: o.open_events_without_lo ? 'rose' : 'green', meter: o.open_events ? ((o.open_events_without_lo || 0) / o.open_events) * 100 : 6 },
        { label: 'Leads', value: o.leads || 0, icon: 'contact-round', tone: 'green', meter: o.leads ? 82 : 8 },
        { label: 'Check-ins', value: o.checkins || 0, icon: 'badge-check', tone: 'sky', meter: o.checkins ? 86 : 12 },
        { label: 'Pay setup', value: o.payments_needing_setup || 0, icon: 'credit-card', tone: o.payments_needing_setup ? 'orange' : 'green', meter: o.payments_needing_setup ? 62 : 7 }
      ];
      return `<section class="stats-grid">${stats.map((stat) => `
        <div class="stat-card ${esc(stat.tone)}">
          <div class="stat-top">
            <div>
              <div class="value">${esc(stat.value)}</div>
              <div class="label">${esc(stat.label)}</div>
            </div>
            <div class="stat-icon"><i data-lucide="${esc(stat.icon)}"></i></div>
          </div>
          <div class="meter"><span style="width:${Math.max(4, Math.min(100, Math.round(stat.meter)))}%"></span></div>
        </div>
      `).join('')}</section>`;
    }

    function renderArea() {
      if (state.area === 'leads') return renderLeads();
      if (state.area === 'crm') return renderCrm();
      if (state.area === 'signs') return renderSigns();
      if (state.area === 'lo') return renderLoanOfficers();
      if (state.area === 'payments') return renderPayments();
      if (state.area === 'reports') return renderReports();
      return renderOutreach();
    }

    function renderOutreach() {
      const rows = filteredInbox();

          <div>
            <h2>Outreach command</h2>
            <div class="sub">${rows.length} conversations in this view</div>
          </div>
          <select id="outreachFilter" class="select" style="max-width:220px;">
            <option value="needs_reply"${state.outreachFilter === 'needs_reply' ? ' selected' : ''}>Needs reply</option>
            <option value="interested"${state.outreachFilter === 'interested' ? ' selected' : ''}>Interested / yes</option>
            <option value="inbound"${state.outreachFilter === 'inbound' ? ' selected' : ''}>Inbound</option>
            <option value="all"${state.outreachFilter === 'all' ? ' selected' : ''}>All threads</option>
