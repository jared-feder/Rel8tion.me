          ${rows.map(renderOutreachCard).join('')}
        </div>
      `;
    }

    function renderOutreachCard(thread) {
      const key = thread.thread_key;
      const media = thread.mockup_image_url || thread.listing_photo_url || '';
      const draft = state.drafts[key] || '';
      const disabledReason = isOptOutThread(thread)
        ? 'Opted out'
        : !thread.queue_row_id
          ? 'No linked queue row'
          : '';
      const canSend = !disabledReason && state.sendingKey !== key;
      const messages = Array.isArray(thread.messages) ? thread.messages : [];
      const phone = fmtPhone(thread.agent_phone || thread.from_phone);

      return `
        <article class="outreach-card">
          <div class="outreach-main">
            <div class="media-col">
              ${media ? `<img class="listing-img" src="${esc(media)}" alt="${esc(thread.address || 'Outreach mockup')}">` : `<div class="image-fallback">${esc(thread.address || 'No image')}</div>`}
              <div class="agent-strip">
                ${thread.agent_photo_url ? `<img class="avatar" src="${esc(thread.agent_photo_url)}" alt="${esc(thread.agent_name || 'Agent')}">` : `<div class="avatar-fallback">${esc(initials(thread.agent_name))}</div>`}
                <div>
                  <div class="agent-name">${esc(thread.agent_name || 'Unknown agent')}</div>
                  <div class="agent-meta">${esc(thread.brokerage || 'No brokerage')}</div>
                </div>
              </div>
              <div class="badges">
                ${statusBadge(thread)}
                ${thread.template_key ? badge(thread.template_key.replace(/_/g, ' '), 'info') : ''}
              </div>
            </div>

            <div class="card-body">
              <div class="card-top">
                <div>
                  <div class="address">${esc(thread.address || 'No address')}</div>
                  <div class="open-time">${esc([fmtDate(thread.open_start), money(thread.price), phone].filter(Boolean).join(' | '))}</div>
                </div>
                ${thread.last_reply_at ? badge(fmtDate(thread.last_reply_at), 'info') : ''}
              </div>

              <div class="mini-panel">
                <div class="mini-title">My outreach</div>
                <div class="copy-body">${esc(thread.selected_sms || 'No initial outreach copy stored.')}</div>
              </div>

              <div class="mini-panel">
                <div class="mini-title">Conversation</div>
                <div class="message-list">
                  ${messages.length ? messages.map(renderMessage).join('') : `<div class="msg"><div class="msg-body">${esc(thread.latest_reply_body || 'No messages loaded.')}</div></div>`}
                </div>
              </div>

              ${renderOutreachActions(thread)}

              <div class="mini-panel reply-box">
                <div class="mini-title">Reply by SMS</div>
                <textarea id="reply_${domId(key)}" data-draft-key="${esc(key)}" ${canSend ? '' : 'disabled'} maxlength="1200" placeholder="${disabledReason ? esc(disabledReason) : 'Write reply'}">${esc(draft)}</textarea>
                <div class="reply-footer">
                  <button class="btn primary" data-send-key="${esc(key)}" ${canSend ? '' : 'disabled'}>
                    <i data-lucide="send"></i><span>${state.sendingKey === key ? 'Sending...' : 'Send SMS'}</span>
                  </button>
                  <span id="count_${domId(key)}" class="small">${draft.length} characters</span>
                  ${disabledReason ? badge(disabledReason, 'bad') : ''}
                </div>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function renderOutreachActions(thread) {
      const key = thread.thread_key;
      const profiles = activeLoanOfficers();
      const disabled = isOptOutThread(thread) || !thread.queue_row_id;
      const interested = isInterestedThread(thread);
      const markBusy = state.actionKey === actionId('mark_interested', key);
      const confirmBusy = state.actionKey === actionId('confirm_open_house', key);
      const acceptBusy = state.actionKey === actionId('accept_open_house', key);
      const dripBusy = state.actionKey === actionId('schedule_drip', key);
      const confirmed = thread.review_status === 'confirmed_open_house';
      const selectedUid = profiles[0]?.uid || '';
      const dripText = thread.followup_sms || defaultDripText(thread);
      const dripAt = defaultDripSendAt(thread);
      return `
        <div class="mini-panel action-panel">
          <div class="reply-footer">
            <div>
              <div class="mini-title">Open house workflow</div>
              <div class="small">${interested ? 'Reply looks positive or was marked interested.' : 'Use these controls when an agent says yes.'}</div>
            </div>
            <button class="btn soft" data-mark-interested="${esc(key)}" ${disabled || markBusy ? 'disabled' : ''}>
              <i data-lucide="thumbs-up"></i><span>${markBusy ? 'Marking...' : 'Mark interested'}</span>
            </button>
          </div>
          <div class="action-grid">
            <button class="btn soft" data-confirm-open-house="${esc(key)}" ${disabled || confirmBusy || confirmed ? 'disabled' : ''}>
              <i data-lucide="badge-check"></i><span>${confirmBusy ? 'Confirming...' : confirmed ? 'Confirmed true OH' : 'Confirm true OH'}</span>
            </button>
            <select id="accept_lo_${domId(key)}" class="select" ${disabled || !profiles.length ? 'disabled' : ''}>
              ${profiles.length ? profiles.map((profile) => `
                <option value="${esc(profile.uid)}"${profile.uid === selectedUid ? ' selected' : ''}>${esc(loanOfficerLabel(profile))}</option>
              `).join('') : '<option>No active loan officers</option>'}
            </select>
            <button class="btn primary" data-accept-open-house="${esc(key)}" ${disabled || acceptBusy ? 'disabled' : ''}>
              <i data-lucide="calendar-check"></i><span>${acceptBusy ? 'Accepting...' : profiles.length ? 'Accept + assign LO' : 'Accept open house'}</span>
            </button>
          </div>
          <div class="drip-grid">
            <textarea id="drip_${domId(key)}" ${disabled || dripBusy ? 'disabled' : ''} maxlength="1200">${esc(dripText)}</textarea>
            <input id="drip_at_${domId(key)}" class="field" type="datetime-local" value="${esc(dripAt)}" ${disabled || dripBusy ? 'disabled' : ''}>
            <button class="btn soft" data-schedule-drip="${esc(key)}" ${disabled || dripBusy ? 'disabled' : ''}>
              <i data-lucide="alarm-clock"></i><span>${dripBusy ? 'Scheduling...' : 'Schedule drip'}</span>
            </button>
          </div>
        </div>
      `;
    }

    function renderMessage(message) {
      const outbound = message.direction === 'outbound';
      const optout = message.opt_out ? ' optout' : '';
      return `
        <div class="msg ${outbound ? 'outbound' : 'inbound'}${optout}">
          <div class="msg-head">
            <span>${outbound ? 'Sent' : (message.opt_out ? 'Opt-out' : 'Inbound')}</span>
            <span>${esc(fmtDate(message.received_at))}</span>
          </div>
          <div class="msg-body">${esc(message.body || '')}</div>
        </div>
      `;
    }

    function renderLeads() {
      const rows = filterByQuery(state.command?.leads || []);
      return renderRows('Leads', `${rows.length} buyer leads and event check-ins`, rows.slice(0, 150), (row) => `
        <div>
          <div class="primary">${esc(row.lead_name || row.name || row.visitor_name || 'Buyer lead')}</div>
          <div class="secondary">${esc([fmtPhone(row.lead_phone || row.phone || row.visitor_phone), row.lead_email || row.email || row.visitor_email].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${badge(row.lead_source === 'event_checkin' ? 'check-in' : 'profile lead', row.lead_source === 'event_checkin' ? 'ok' : 'info')}</div>
        <div>${badge(row.financing_label || 'Unknown', /needs/i.test(row.financing_label || '') ? 'warn' : 'info')}</div>
        <div>
          <div class="primary">${esc(row.property_label || 'No property')}</div>
          <div class="secondary">${esc([row.agent_label, fmtDate(row.created_at)].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${contactActions(row.lead_phone || row.phone || row.visitor_phone, row.lead_email || row.email || row.visitor_email)}</div>
      `);
    }

    function renderCrm() {
      const rows = filterByQuery(state.command?.crm || []);
      return renderRows('Agent CRM', `${rows.length} agent records and outreach contacts`, rows.slice(0, 80), (row) => `
        <div>
          <div class="primary">${esc(row.name || 'Unknown agent')}</div>
          <div class="secondary">${esc([row.brokerage, fmtPhone(row.phone)].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${badge(`${row.keychain_count || 0} keys`, 'info')}</div>
        <div>${badge(`${row.outreach_count || 0} outreach`, 'info')}</div>
        <div>${badge(`${row.reply_count || 0} replies`, row.reply_count ? 'warn' : 'info')}</div>
        <div>${badge(`${row.lead_count || 0} leads`, row.lead_count ? 'ok' : 'info')}</div>
      `);
    }

    function renderSigns() {
      const signs = filterByQuery(state.command?.signs || []);
      const events = filterByQuery(state.command?.events || []);
      return `
        ${renderRows('Smart signs', `${signs.length} signs in inventory`, signs.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.public_code || row.id)}</div>
            <div class="secondary">${esc(row.owner_agent_slug || row.assigned_agent_slug || 'Unassigned')}</div>
          </div>
          <div>${badge(row.status || 'unknown', row.status === 'active' ? 'ok' : 'info')}</div>
          <div>${badge(`${row.inventory_alias_count || 0} QR`, 'info')}</div>
          <div>${badge(row.active_event_host || 'No event', row.active_event_host ? 'ok' : 'info')}</div>
          <div>
            ${row.active_event_id ? `<button class="btn bad" data-end-event="${esc(row.active_event_id)}" ${state.actionKey === `end_event:${row.active_event_id}` ? 'disabled' : ''}><i data-lucide="octagon-x"></i><span>${state.actionKey === `end_event:${row.active_event_id}` ? 'Ending...' : 'End event'}</span></button>` : badge(row.primary_device_type || 'front', 'info')}
          </div>
        `)}
        ${renderRows('Live and recent events', `${events.length} events`, events.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.host_agent_slug || 'No host')}</div>
            <div class="secondary">${esc(fmtDate(row.start_time) || row.id)}</div>
          </div>
          <div>${badge(row.status || 'unknown', row.status === 'active' ? 'ok' : 'info')}</div>
          <div>${badge(`${row.checkin_count || 0} check-ins`, 'info')}</div>
          <div>${badge(`${row.financing_need_count || 0} finance`, row.financing_need_count ? 'warn' : 'info')}</div>
          <div class="row-actions">
            ${badge(`${row.live_loan_officer_count || 0} LO`, row.live_loan_officer_count ? 'ok' : 'info')}
            ${row.status === 'active' && !row.ended_at ? `<button class="btn bad" data-end-event="${esc(row.id)}" ${state.actionKey === `end_event:${row.id}` ? 'disabled' : ''}><i data-lucide="octagon-x"></i><span>${state.actionKey === `end_event:${row.id}` ? 'Ending...' : 'End'}</span></button>` : ''}
          </div>
        `)}
      `;
    }

    function renderLoanOfficers() {
      const profiles = filterByQuery(state.command?.loan_officers || []);
      const sessions = filterByQuery(state.command?.loan_sessions || []);
      const visits = filterByQuery(state.command?.field_visits || []);
      const activeProfiles = profiles.filter((row) => row.is_active !== false);
      const events = filterByQuery(state.command?.events || [])
        .filter((row) => row.status === 'active' && !row.ended_at)
        .sort((a, b) => new Date(a.start_time || a.created_at || 0) - new Date(b.start_time || b.created_at || 0));
      return `
        <div class="section-head">
          <div>
            <h2>LO assignments</h2>
            <div class="sub">${events.length} active open houses, ${activeProfiles.length} active loan officers</div>
          </div>
          <button class="btn primary" id="autoAssignLo" ${activeProfiles.length && events.length ? '' : 'disabled'}>
            <i data-lucide="wand-sparkles"></i><span>${state.actionKey === 'auto_assign' ? 'Assigning...' : 'Auto assign open houses'}</span>
          </button>
        </div>
        <div class="assignment-grid">
          ${events.length ? events.map((event) => renderLoanOfficerAssignment(event, activeProfiles)).join('') : '<div class="glass-card" style="padding:18px;font-weight:900;">No active open house events are ready for LO assignment.</div>'}
        </div>
        ${renderRows('Accepted open houses', `${visits.length} scheduled field visits`, visits.slice(0, 80), (row) => {
          const participants = Array.isArray(row.participants) ? row.participants : [];
          const primary = participants.find((item) => item.is_primary) || participants[0] || null;
          const participantNames = participants.map((item) => item.participant_name || item.participant_uid).filter(Boolean).join(', ');
          return `
            <div>
              <div class="primary">${esc(row.agent_name || row.agent_slug || 'Accepted open house')}</div>
              <div class="secondary">${esc([row.open_house_id, row.brokerage].filter(Boolean).join(' | ') || row.notes || row.id)}</div>
            </div>
            <div>${badge(row.status || 'scheduled', row.status === 'cancelled' ? 'bad' : row.status === 'confirmed' ? 'ok' : 'info')}</div>
            <div>${badge(fmtDate(row.scheduled_start) || 'No time', 'info')}</div>
            <div>${badge(participantNames || 'No LO assigned', participantNames ? 'ok' : 'warn')}</div>
            <div>${primary?.participant_uid ? `<a class="btn soft" href="/lo-field-dashboard?uid=${esc(primary.participant_uid)}" target="_blank" rel="noopener"><i data-lucide="external-link"></i><span>LO view</span></a>` : badge(row.coverage_mode || 'coverage', 'info')}</div>
          `;
        })}
        ${renderRows('Loan officers', `${profiles.length} verified profiles`, profiles.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.full_name || row.slug || 'Unknown LO')}</div>
            <div class="secondary">${esc([row.company_name, fmtPhone(row.phone), row.email].filter(Boolean).join(' | '))}</div>
          </div>
          <div>${badge(row.is_active ? 'active' : 'inactive', row.is_active ? 'ok' : 'bad')}</div>
          <div>${badge(row.industry || 'profile', 'info')}</div>
          <div>${badge(row.calendar_url ? 'calendar' : 'no calendar', row.calendar_url ? 'ok' : 'warn')}</div>
          <div><a class="btn soft" href="/lo-field-dashboard?uid=${esc(row.uid)}" target="_blank" rel="noopener"><i data-lucide="external-link"></i><span>Open dashboard</span></a></div>
        `)}
        ${renderRows('LO coverage', `${sessions.length} recent sessions`, sessions.slice(0, 80), (row) => `
          <div>
            <div class="primary">${esc(row.loan_officer_name || row.loan_officer_slug || 'Coverage session')}</div>
            <div class="secondary">${esc(fmtPhone(row.loan_officer_phone) || row.open_house_event_id || '')}</div>
          </div>
          <div>${badge(row.status || 'unknown', row.status === 'live' ? 'ok' : 'info')}</div>
          <div>${badge(fmtDate(row.signed_in_at || row.created_at) || 'no date', 'info')}</div>
          <div>${badge(row.loan_officer_uid || 'no uid', 'info')}</div>
          <div>${badge(row.open_house_event_id ? 'event linked' : 'no event', row.open_house_event_id ? 'ok' : 'warn')}</div>
        `)}
      `;
    }

    function renderLoanOfficerAssignment(event, profiles) {
      const live = event.live_loan_officer || null;
      const actionKey = state.actionKey;
      const assigning = actionKey === `assign:${event.id}`;
      const ending = actionKey === `end:${event.id}`;
      const address = eventAddress(event);
      const selectedUid = live?.verified_profile_uid || live?.loan_officer_uid || profiles[0]?.uid || '';
      return `
        <article class="assignment-card">
          <div>
            <div class="assignment-title">${esc(address)}</div>
            <div class="secondary">${esc([event.host_agent_slug, eventWindow(event)].filter(Boolean).join(' | ') || event.id)}</div>
          </div>
          <div class="badges">
            ${live ? badge(`Live: ${live.loan_officer_name || live.loan_officer_slug || 'Loan Officer'}`, 'ok') : badge('No LO assigned', 'warn')}
            ${event.financing_need_count ? badge(`${event.financing_need_count} financing`, 'warn') : badge(`${event.checkin_count || 0} check-ins`, 'info')}
          </div>
          <div class="assignment-actions">
            <select id="lo_${domId(event.id)}" class="select" ${profiles.length ? '' : 'disabled'}>
              ${profiles.length ? profiles.map((profile) => `
                <option value="${esc(profile.uid)}"${profile.uid === selectedUid ? ' selected' : ''}>${esc(loanOfficerLabel(profile))}</option>
              `).join('') : '<option>No active loan officers</option>'}
            </select>
            <button class="btn primary" data-assign-lo="${esc(event.id)}" ${profiles.length && !assigning && !ending ? '' : 'disabled'}>
              <i data-lucide="user-check"></i><span>${assigning ? 'Assigning...' : live ? 'Reassign' : 'Assign live'}</span>
            </button>
            <button class="btn bad" data-end-lo="${esc(event.id)}" ${live && !assigning && !ending ? '' : 'disabled'}>
              <i data-lucide="circle-x"></i><span>${ending ? 'Ending...' : 'End'}</span>
            </button>
            <button class="btn bad" data-end-event="${esc(event.id)}" ${state.actionKey === `end_event:${event.id}` ? 'disabled' : ''}>
              <i data-lucide="octagon-x"></i><span>${state.actionKey === `end_event:${event.id}` ? 'Ending...' : 'End event'}</span>
            </button>
          </div>
          ${live?.loan_officer_calendar_url ? `<a class="small" href="${esc(live.loan_officer_calendar_url)}" target="_blank" rel="noopener">Open assigned LO calendar</a>` : ''}
        </article>
      `;
    }

    function renderPayments() {
      const rows = filterByQuery(state.command?.payments || []);
      return renderRows('Payment control', `${rows.length} billing records to create or reconcile`, rows.slice(0, 100), (row) => `
        <div>
          <div class="primary">${esc(row.agent_name || 'Unknown agent')}</div>
          <div class="secondary">${esc([row.brokerage, fmtPhone(row.phone)].filter(Boolean).join(' | '))}</div>
        </div>
        <div>${badge(row.payment_status || 'unknown', 'warn')}</div>
        <div>${badge(`${row.sign_count || 0} signs`, 'info')}</div>
        <div>${badge(`${row.lead_count || 0} leads`, 'info')}</div>
        <div>${badge(`${row.outreach_count || 0} outreach`, 'info')}</div>
      `);
    }

    function reportDateMs(value) {
      const date = new Date(value || '');
      return Number.isFinite(date.getTime()) ? date.getTime() : 0;
    }

    function confirmedReportRows() {
      const now = Date.now();
      return filterByQuery(state.command?.confirmed_open_houses || [])
        .filter((row) => {
          const end = reportDateMs(row.scheduled_end) || reportDateMs(row.scheduled_start) || reportDateMs(row.confirmed_at);
          if (state.reportWindow === 'upcoming') return end >= now - 2 * 60 * 60 * 1000;
          if (state.reportWindow === 'past') return end < now - 2 * 60 * 60 * 1000;
          return true;
        })
        .sort((a, b) => {
          const aTime = reportDateMs(a.scheduled_start) || reportDateMs(a.confirmed_at);
          const bTime = reportDateMs(b.scheduled_start) || reportDateMs(b.confirmed_at);
          return state.reportWindow === 'past' ? bTime - aTime : aTime - bTime;
        });
    }

    function csvCell(value) {
      let text = String(value ?? '').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      if (/^[=+\-@]/.test(text.trim())) text = `'${text}`;
      return `"${text.replace(/"/g, '""')}"`;
    }

    function downloadConfirmedCsv() {
      const rows = confirmedReportRows();
      if (!rows.length) {
        showToast('No confirmed open houses in this report view.');
        return;
      }
      const headers = [
        'Confirmed At',
        'Open Start',
        'Open End',
        'Property Address',
        'City',
        'State',
        'Zip',
        'Price',
        'Beds',
        'Baths',
        'Agent Name',
        'Agent Phone',
        'Agent Email',
        'Brokerage',
        'Loan Officer',
        'Loan Officer Phone',
        'Loan Officer Email',
        'Visit Status',
        'Review Status',
        'Listing Photo URL',
        'Agent Photo URL',
        'Mockup Image URL',
        'Conversation Snapshot'
      ];
      const lines = [
        headers.map(csvCell).join(','),
        ...rows.map((row) => [
          row.confirmed_at,
          row.scheduled_start,
          row.scheduled_end,
          row.property_address,
          row.city,
          row.state,
          row.zip,
          row.price,
          row.beds,
          row.baths,
          row.agent_name,
          row.agent_phone,
          row.agent_email,
          row.brokerage,
          row.loan_officer_name,
          row.loan_officer_phone,
          row.loan_officer_email,
          row.visit_status,
          row.review_status,
          row.listing_photo_url,
          row.agent_photo_url,
          row.mockup_image_url,
          row.conversation_snapshot
        ].map(csvCell).join(','))
      ];
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const day = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `rel8tion-confirmed-open-houses-${state.reportWindow}-${day}.csv`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast(`Downloaded ${rows.length} confirmed open houses.`);
    }

    function renderConfirmedReportCard(row) {
      const photo = row.listing_photo_url || row.mockup_image_url || '';
      const conversation = row.conversation_snapshot || 'No conversation snapshot loaded.';
      const facts = [money(row.price), row.beds ? `${row.beds} beds` : '', row.baths ? `${row.baths} baths` : ''].filter(Boolean).join(' | ');
      return `
        <article class="confirmed-card">
          <div class="report-media">
            ${photo ? `<img class="report-photo" src="${esc(photo)}" alt="${esc(row.property_address || 'Confirmed open house')}">` : `<div class="image-fallback">${esc(row.property_address || 'No property photo')}</div>`}
            ${row.agent_photo_url ? `<img class="report-agent-photo" src="${esc(row.agent_photo_url)}" alt="${esc(row.agent_name || 'Agent')}">` : ''}
          </div>
          <div class="confirmed-body">
            <div>
              <div class="address">${esc(row.property_address || 'Confirmed open house')}</div>
              <div class="open-time">${esc([fmtDate(row.scheduled_start), facts].filter(Boolean).join(' | '))}</div>
            </div>
            <div class="badges">
              ${badge(row.visit_status || 'confirmed', row.visit_status === 'cancelled' ? 'bad' : 'ok')}
              ${badge(row.review_status || 'confirmed open house', 'info')}
              ${badge(`${row.message_count || 0} messages`, row.message_count ? 'ok' : 'warn')}
            </div>
            <div class="report-detail-grid">
              <div class="report-detail">
                <div class="mini-title">Agent</div>
                <div class="primary">${esc(row.agent_name || 'Unknown agent')}</div>
                <div class="secondary">${esc([row.brokerage, fmtPhone(row.agent_phone), row.agent_email].filter(Boolean).join(' | '))}</div>
              </div>
              <div class="report-detail">
                <div class="mini-title">Loan officer</div>
                <div class="primary">${esc(row.loan_officer_name || 'Not assigned')}</div>
                <div class="secondary">${esc([row.loan_officer_company, fmtPhone(row.loan_officer_phone), row.loan_officer_email].filter(Boolean).join(' | ') || 'No LO coverage recorded')}</div>
              </div>
              <div class="report-detail">
                <div class="mini-title">Confirmed</div>
                <div class="primary">${esc(fmtDate(row.confirmed_at) || 'No date')}</div>
                <div class="secondary">${esc(row.open_house_id || row.queue_row_id || '')}</div>
              </div>
              <div class="report-detail">
                <div class="mini-title">Photos</div>
                <div class="secondary">${esc([row.listing_photo_url ? 'listing' : '', row.agent_photo_url ? 'agent' : '', row.mockup_image_url ? 'mockup' : ''].filter(Boolean).join(' | ') || 'No photo URLs')}</div>
              </div>
            </div>
            <div>
              <div class="mini-title">Conversation snapshot</div>
              <div class="conversation-preview">${esc(conversation)}</div>
            </div>
          </div>
        </article>
      `;
    }

    function renderReports() {
      const outreach = state.command?.outreach || {};
      const confirmed = confirmedReportRows();
      const allConfirmed = state.command?.confirmed_open_houses || [];
      const now = Date.now();
      const upcomingCount = allConfirmed.filter((row) => {
        const end = reportDateMs(row.scheduled_end) || reportDateMs(row.scheduled_start) || reportDateMs(row.confirmed_at);
        return end >= now - 2 * 60 * 60 * 1000;
      }).length;
      const pastCount = allConfirmed.length - upcomingCount;
      return `
        <div class="section-head">
          <div>
            <h2>Reports</h2>
            <div class="sub">${confirmed.length} confirmed open houses in this view | ${upcomingCount} upcoming | ${pastCount} previous</div>
          </div>
          <div class="report-toolbar">
            <select id="reportWindow" class="select" style="max-width:190px;">
              <option value="upcoming"${state.reportWindow === 'upcoming' ? ' selected' : ''}>Upcoming confirmed</option>
              <option value="past"${state.reportWindow === 'past' ? ' selected' : ''}>Previous confirmed</option>
              <option value="all"${state.reportWindow === 'all' ? ' selected' : ''}>All confirmed</option>
            </select>
            <button class="btn soft" id="downloadConfirmedCsv"><i data-lucide="file-spreadsheet"></i><span>Export CSV</span></button>
            <button class="btn soft" id="printConfirmedReport"><i data-lucide="printer"></i><span>Print</span></button>
          </div>
        </div>
        <div class="confirmed-report-grid">
          ${confirmed.length ? confirmed.slice(0, 120).map(renderConfirmedReportCard).join('') : '<div class="glass-card" style="padding:18px;font-weight:900;">No confirmed open houses match this report view.</div>'}
        </div>
        <div class="report-grid">
          ${renderBarCard('Review status', outreach.by_review_status || {})}
          ${renderBarCard('Initial status', outreach.by_initial_status || {})}
        </div>
      `;
    }

    function renderBarCard(title, values) {
      const entries = Object.entries(values || {}).sort((a, b) => b[1] - a[1]).slice(0, 12);
      const max = Math.max(1, ...entries.map(([, count]) => count));
      return `
        <div class="glass-card" style="padding:14px;">
          <div class="mini-title">${esc(title)}</div>
          ${entries.length ? entries.map(([label, count]) => `
            <div class="bar-row">
              <div>${esc(label)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, Math.round((count / max) * 100))}%"></div></div>
              <div>${esc(count)}</div>
            </div>
          `).join('') : '<div class="small" style="margin-top:10px;">No data</div>'}
        </div>
      `;
    }

    function renderRows(title, subtitle, rows, rowRenderer) {
      return `
        <div class="section-head">
          <div>
            <h2>${esc(title)}</h2>
            <div class="sub">${esc(subtitle)}</div>
          </div>
        </div>
        <div class="rows">
          ${rows.length ? rows.map((row) => `<div class="data-row">${rowRenderer(row)}</div>`).join('') : '<div class="glass-card" style="padding:18px;font-weight:900;">No rows loaded.</div>'}
        </div>
      `;
    }

    function render() {
      if (!state.verified) renderLock();
      else renderShell();
    }

    verify();
    window.setInterval(() => {
      if (state.verified && !state.loading && !state.sendingKey && !state.actionKey && !isCommandEditing()) {
        loadAll({ showLoading: false }).catch(() => null);
      }
    }, 45000);
  </script>
</body>
</html>
