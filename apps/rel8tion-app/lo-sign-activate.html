<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activate LO Coverage | Rel8tion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 10%, rgba(125,211,252,.42), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(167,243,208,.36), transparent 30%),
        linear-gradient(135deg, #eef8ff, #f8fbff 46%, #eefdf7);
      color: #0f172a;
    }
    .glass { border:1px solid rgba(255,255,255,.74); background:rgba(255,255,255,.68); box-shadow:0 24px 70px rgba(31,42,90,.12); backdrop-filter:blur(18px); }
    .btn { display:inline-flex; align-items:center; justify-content:center; min-height:56px; border-radius:999px; padding:1rem 1.25rem; font-weight:900; }
    .btn-primary { color:white; background:linear-gradient(90deg,#06b6d4,#2563eb); box-shadow:0 18px 38px rgba(37,99,235,.22); }
    .btn-soft { background:rgba(255,255,255,.84); border:1px solid rgba(255,255,255,.9); color:#334155; }
    .field { width:100%; border-radius:18px; border:1px solid rgba(203,213,225,.9); background:rgba(255,255,255,.9); padding:.95rem 1rem; font-weight:800; outline:none; }
    .field:focus { border-color:#38bdf8; box-shadow:0 0 0 4px rgba(56,189,248,.14); }
  </style>
</head>
<body>
  <main id="app" class="min-h-screen flex items-center justify-center px-4 py-7"></main>
  <script type="module">
    import { ASSETS, KEY, SUPABASE_URL } from '/apps/rel8tion-app/src/core/config.js';
    import { esc, money } from '/apps/rel8tion-app/src/core/utils.js';
    import { findNearestOpenHouses, searchOpenHouses } from '/apps/rel8tion-app/src/api/openHouses.js?v=20260528-lo-sign';
    import { findListingAgentsByOpenHouse } from '/apps/rel8tion-app/src/api/agents.js?v=20260528-lo-sign';

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    const uid = params.get('uid') || '';
    const state = {
      loading: true,
      busy: false,
      error: '',
      notice: '',
      resolved: null,
      houses: [],
      selectedHouse: null,
      manual: false,
      agent: { name: '', phone: '', email: '', brokerage: '', image_url: '' },
      agentCandidates: [],
      agentPhotoFile: null,
      agentPhotoPreviewUrl: ''
    };

    function app(html) {
      document.getElementById('app').innerHTML = html;
      bind();
    }

    function shell(content) {
      app(`
        <section class="w-full max-w-3xl glass rounded-[34px] p-5 sm:p-8">
          <div class="text-center mb-6"><img src="${ASSETS.rel8tionLogo}" alt="Rel8tion" class="h-16 w-auto mx-auto"></div>
          ${content}
        </section>
      `);
    }

    function label(text) {
      return `<div class="text-[11px] font-black uppercase tracking-[0.18em] text-slate-400 mb-2">${esc(text)}</div>`;
    }

    function profileLine() {
      const profile = state.resolved?.profile || {};
      return [profile.full_name || profile.slug, profile.company_name].filter(Boolean).join(', ') || 'Verified loan officer';
    }

    function houseImage(house) {
      return house?.listing_photo_url || house?.primary_photo_url || house?.photo_url || house?.image_url || '';
    }

    function houseFacts(house) {
      return [
        house?.price ? money(house.price) : '',
        house?.beds ? `${house.beds} beds` : '',
        house?.baths ? `${house.baths} baths` : ''
      ].filter(Boolean).join(' | ');
    }

    function timeText(house) {
      const start = house?.open_start ? new Date(house.open_start) : null;
      const end = house?.open_end ? new Date(house.open_end) : null;
      if (!start || Number.isNaN(start.getTime())) return '';
      const fmt = new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
      return end && !Number.isNaN(end.getTime()) ? `${fmt.format(start)} - ${fmt.format(end)}` : fmt.format(start);
    }

    function authHeaders() {
      return { apikey: KEY, Authorization: `Bearer ${KEY}` };
    }

    async function supabaseRows(path) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: authHeaders() });
      const raw = await res.text().catch(() => '');
      if (!res.ok) throw new Error(raw || `Supabase request failed: ${res.status}`);
      try {
        const rows = raw ? JSON.parse(raw) : [];
        return Array.isArray(rows) ? rows : [];
      } catch {
        return [];
      }
    }

    function phoneDigits(value) {
      return String(value || '').replace(/\D/g, '').replace(/^1(?=\d{10}$)/, '');
    }

    function agentImage(agent = {}) {
      return agent.image_url || agent.primary_photo_url || agent.directory_photo_url || agent.profile_photo_url || agent.photo_url || agent.agent_photo_url || '';
    }

    function normalizeCandidate(row = {}, source = 'agent') {
      return {
        source,
        slug: row.slug || row.agent_slug || '',
        name: row.name || row.agent_name || row.full_name || row.member_name || row.agent || 'Listing agent',
        phone: row.phone || row.agent_phone || '',
        email: row.email || row.agent_email || '',
        brokerage: row.brokerage || row.office_name || row.company || '',
        image_url: agentImage(row),
        open_house_id: row.open_house_id || ''
      };
    }

    function mergeCandidates(rows = []) {
      const seen = new Set();
      return rows
        .map((row) => normalizeCandidate(row.row || row, row.source || 'agent'))
        .filter((row) => row.name || row.phone || row.email || row.image_url)
        .filter((row) => {
          const key = [phoneDigits(row.phone), row.email.toLowerCase(), row.slug, row.name.toLowerCase()].filter(Boolean).join('|');
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .slice(0, 8);
    }

    async function searchAgentDirectory(term = '', openHouseId = '') {
      const q = String(term || '').trim();
      const digits = phoneDigits(q);
      const results = [];

      if (openHouseId) {
        const listingRows = await findListingAgentsByOpenHouse(openHouseId).catch(() => []);
        results.push(...listingRows.map((row) => ({ ...row, source: 'listing_agent' })));
      }

      if (q || digits) {
        const safeQ = q.replace(/[(),]/g, ' ').trim();
        const filters = [];
        if (safeQ) {
          const like = `*${safeQ}*`;
          filters.push(`name.ilike.${encodeURIComponent(like)}`);
          filters.push(`email.ilike.${encodeURIComponent(like)}`);
          filters.push(`brokerage.ilike.${encodeURIComponent(like)}`);
          filters.push(`phone.ilike.${encodeURIComponent(like)}`);
        }
        if (digits.length >= 4) {
          filters.push(`phone_normalized.ilike.${encodeURIComponent(`*${digits}*`)}`);
          filters.push(`phone.ilike.${encodeURIComponent(`*${digits}*`)}`);
        }
        if (filters.length) {
          const agentRows = await supabaseRows(`agents?select=slug,name,phone,phone_normalized,email,brokerage,image_url&or=(${filters.join(',')})&order=updated_at.desc.nullslast,created_at.desc&limit=8`).catch(() => []);
          results.push(...agentRows.map((row) => ({ ...row, source: 'agent_profile' })));
          const listingRows = await supabaseRows(`listing_agents?select=*&or=(${filters.join(',')})&order=created_at.desc&limit=8`).catch(() => []);
          results.push(...listingRows.map((row) => ({ ...row, source: 'listing_agent' })));
        }
      }

      return mergeCandidates(results);
    }

    function useAgentCandidate(candidate) {
      state.agent = {
        name: candidate.name || state.agent.name || '',
        phone: candidate.phone || state.agent.phone || '',
        email: candidate.email || state.agent.email || '',
        brokerage: candidate.brokerage || state.agent.brokerage || '',
        image_url: candidate.image_url || state.agent.image_url || ''
      };
      if (candidate.image_url) state.agentPhotoPreviewUrl = candidate.image_url;
    }

    function updateAgentFromInputs() {
      state.agent = {
        name: document.getElementById('agentName')?.value?.trim() || '',
        phone: document.getElementById('agentPhone')?.value?.trim() || '',
        email: document.getElementById('agentEmail')?.value?.trim() || '',
        brokerage: document.getElementById('brokerage')?.value?.trim() || '',
        image_url: state.agent.image_url || ''
      };
    }

    function selectedOrManualHouse() {
      if (state.selectedHouse) return state.selectedHouse;
      return {
        id: '',
        address: document.getElementById('manualAddress')?.value?.trim() || '',
        open_start: document.getElementById('manualStart')?.value || '',
        open_end: document.getElementById('manualEnd')?.value || '',
        price: document.getElementById('manualPrice')?.value || '',
        beds: document.getElementById('manualBeds')?.value || '',
        baths: document.getElementById('manualBaths')?.value || '',
        brokerage: state.agent.brokerage
      };
    }

    async function prefillAgentFromHouse(house) {
      if (!house?.id) return;
      const agents = await findListingAgentsByOpenHouse(house.id).catch(() => []);
      state.agentCandidates = mergeCandidates(agents.map((row) => ({ ...row, source: 'listing_agent' })));
      const agent = state.agentCandidates.find((row) => row.name || row.phone || row.email || row.image_url) || null;
      if (!agent) return;
      useAgentCandidate({
        name: state.agent.name || agent.name || '',
        phone: state.agent.phone || agent.phone || '',
        email: state.agent.email || agent.email || '',
        brokerage: state.agent.brokerage || agent.brokerage || house.brokerage || '',
        image_url: state.agent.image_url || agent.image_url || ''
      });
    }

    async function resolveSign() {
      if (!code && !uid) {
        state.loading = false;
        state.error = 'This activation link needs a Coverage Sign code or UID.';
        render();
        return;
      }
      try {
        const query = new URLSearchParams();
        if (code) query.set('code', code);
        if (uid) query.set('uid', uid);
        const res = await fetch(`/api/lo-sign/action?${query.toString()}`, { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.error || 'Unable to load this Coverage Sign.');
        if (!data.profile) {
          window.location.replace(data.profile_activation_url || `/nmb-activate${uid ? `?uid=${encodeURIComponent(uid)}` : ''}`);
          return;
        }
        if (data.live && data.event?.id) {
          window.location.replace(`/lo-field-dashboard?uid=${encodeURIComponent(data.profile.uid || uid || '')}&event=${encodeURIComponent(data.event.id)}`);
          return;
        }
        state.resolved = data;
        state.loading = false;
        render();
      } catch (error) {
        state.loading = false;
        state.error = error.message || 'Unable to load this Coverage Sign.';
        render();
      }
    }

    function renderHouseCard(house, index) {
      const image = houseImage(house);
      const selected = state.selectedHouse?.id && String(state.selectedHouse.id) === String(house.id);
      return `
        <button type="button" data-select-house="${esc(house.id || index)}" class="w-full text-left rounded-[24px] border ${selected ? 'border-sky-400 bg-sky-50/90' : 'border-white/80 bg-white/78'} overflow-hidden shadow-sm">
          ${image ? `<img src="${esc(image)}" alt="${esc(house.address || 'Open house')}" class="h-44 w-full object-cover bg-slate-100">` : ''}
          <div class="p-4">
            <div class="text-slate-950 font-black text-xl leading-tight">${esc(house.address || 'Open House')}</div>
            <div class="text-sky-700 font-black mt-1">${esc(houseFacts(house) || timeText(house) || 'Nearby open house')}</div>
            <div class="text-slate-500 font-bold text-sm mt-1">${esc([timeText(house), house.brokerage].filter(Boolean).join(' | '))}</div>
          </div>
        </button>
      `;
    }

    function renderAgentPhotoPreview() {
      const image = state.agentPhotoPreviewUrl || state.agent.image_url || '';
      if (image) {
        return `<img src="${esc(image)}" alt="${esc(state.agent.name || 'Agent photo')}" class="h-16 w-16 rounded-full border border-white bg-white object-cover shadow-sm">`;
      }
      return `<div class="flex h-16 w-16 items-center justify-center rounded-full border border-white bg-white text-lg font-black text-slate-500 shadow-sm">AG</div>`;
    }

    function renderAgentCandidates() {
      if (!state.agentCandidates.length) {
        return `<div class="rounded-[18px] bg-white/70 p-4 text-sm font-bold text-slate-500 ring-1 ring-slate-100">Search by agent name, phone, email, or brokerage if the listing feed did not return the right host.</div>`;
      }
      return `
        <div class="grid gap-2">
          ${state.agentCandidates.map((candidate, index) => `
            <button type="button" data-agent-candidate="${index}" class="flex w-full items-center gap-3 rounded-[18px] bg-white/85 p-3 text-left ring-1 ring-slate-100">
              ${agentImage(candidate) ? `<img src="${esc(agentImage(candidate))}" alt="${esc(candidate.name || 'Agent')}" class="h-12 w-12 rounded-full object-cover">` : `<div class="flex h-12 w-12 items-center justify-center rounded-full bg-slate-100 text-sm font-black text-slate-500">AG</div>`}
              <span class="min-w-0">
                <span class="block truncate text-sm font-black text-slate-900">${esc(candidate.name || 'Listing agent')}</span>
                <span class="block truncate text-xs font-bold text-slate-500">${esc([candidate.brokerage, candidate.phone, candidate.email].filter(Boolean).join(' | '))}</span>
              </span>
            </button>
          `).join('')}
        </div>
      `;
    }

    function renderForm() {
      const house = state.selectedHouse;
      return `
        <div class="grid gap-4">
          ${house ? `
            <div class="rounded-[26px] border border-white/80 bg-white/78 overflow-hidden">
              ${houseImage(house) ? `<img src="${esc(houseImage(house))}" alt="${esc(house.address || 'Open house')}" class="h-52 w-full object-cover bg-slate-100">` : ''}
              <div class="p-5">
                ${label('Selected Open House')}
                <div class="text-slate-950 font-black text-2xl leading-tight">${esc(house.address || 'Open House')}</div>
                <div class="text-sky-700 font-black mt-1">${esc(houseFacts(house) || timeText(house) || '')}</div>
                <button type="button" id="wrongHouse" class="btn btn-soft w-full mt-4">Wrong Open House</button>
              </div>
            </div>
          ` : `
            <div class="rounded-[24px] border border-white/80 bg-white/72 p-4">
              ${label('Open House')}
              <input id="manualAddress" class="field mb-3" placeholder="Property address">
              <div class="grid grid-cols-2 gap-3">
                <input id="manualStart" class="field" type="datetime-local" aria-label="Open house start">
                <input id="manualEnd" class="field" type="datetime-local" aria-label="Open house end">
                <input id="manualPrice" class="field" inputmode="numeric" placeholder="Price">
                <div class="grid grid-cols-2 gap-3">
                  <input id="manualBeds" class="field" inputmode="decimal" placeholder="Beds">
                  <input id="manualBaths" class="field" inputmode="decimal" placeholder="Baths">
                </div>
              </div>
            </div>
          `}
          <div class="rounded-[24px] border border-white/80 bg-white/72 p-4">
            ${label('Host Agent')}
            <form id="agentSearchForm" class="mb-3 flex gap-2">
              <input id="agentSearchTerm" class="field" placeholder="Search agent name, phone, email">
              <button class="btn btn-soft shrink-0" type="submit">Find</button>
            </form>
            <div class="mb-4">${renderAgentCandidates()}</div>
            <div class="mb-4 flex items-center gap-4 rounded-[20px] bg-white/70 p-3 ring-1 ring-slate-100">
              ${renderAgentPhotoPreview()}
              <div class="min-w-0 flex-1">
                <div class="text-sm font-black text-slate-900">Agent photo</div>
                <p class="text-xs font-bold leading-relaxed text-slate-500">Use a listing photo or upload a headshot for the buyer check-in page.</p>
                <input id="agentPhoto" type="file" accept="image/*" class="mt-2 block w-full text-xs font-bold text-slate-500">
              </div>
            </div>
            <div class="grid gap-3">
              <input id="agentName" class="field" value="${esc(state.agent.name)}" placeholder="Agent name">
              <input id="agentPhone" class="field" value="${esc(state.agent.phone)}" placeholder="Agent phone">
              <input id="agentEmail" class="field" value="${esc(state.agent.email)}" placeholder="Agent email optional">
              <input id="brokerage" class="field" value="${esc(state.agent.brokerage)}" placeholder="Brokerage">
            </div>
          </div>
          <div class="rounded-[24px] border border-white/80 bg-white/72 p-4">
            ${label('Optional Sponsored Event Pass')}
            <p class="text-slate-600 font-bold leading-relaxed mb-3">If you are leaving a Sponsored Event Pass with this agent, enter that pass public code here. The Coverage Sign stays with the loan officer.</p>
            <input id="eventPassCode" class="field" placeholder="Event Pass public code optional">
          </div>
          ${state.error ? `<div class="rounded-[18px] border border-rose-200 bg-rose-50 p-4 font-black text-rose-700">${esc(state.error)}</div>` : ''}
          ${state.notice ? `<div class="rounded-[18px] border border-sky-200 bg-sky-50 p-4 font-black text-sky-700">${esc(state.notice)}</div>` : ''}
          <button id="activateBtn" type="button" class="btn btn-primary w-full" ${state.busy ? 'disabled' : ''}>${state.busy ? 'Activating...' : 'Activate Coverage'}</button>
        </div>
      `;
    }

    function renderMain() {
      shell(`
        ${label('Loan Officer Coverage Sign')}
        <h1 class="font-['Plus_Jakarta_Sans'] text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-950 mb-3">Activate Coverage</h1>
        <p class="text-slate-700 text-lg font-bold leading-relaxed mb-2">Sponsor the technology layer agents actually use at the open house. Stay connected through live event coverage, not lead buying.</p>
        <p class="text-slate-500 text-sm font-bold mb-6">Assigned LO: ${esc(profileLine())}. The host agent remains the real estate/open-house host.</p>

        ${!state.selectedHouse && !state.manual ? `
          <div class="grid sm:grid-cols-3 gap-3 mb-5">
            <button id="useLocation" class="btn btn-primary sm:col-span-2" type="button">Use My Location</button>
            <button id="manualBtn" class="btn btn-soft" type="button">Search / Enter Manually</button>
          </div>
          <form id="searchForm" class="flex gap-2 mb-5">
            <input id="searchTerm" class="field" placeholder="Search by address">
            <button class="btn btn-soft shrink-0" type="submit">Search</button>
          </form>
          ${state.notice ? `<div class="rounded-[18px] border border-sky-200 bg-sky-50 p-4 mb-5 font-black text-sky-700">${esc(state.notice)}</div>` : ''}
          <div class="grid gap-3">${state.houses.map(renderHouseCard).join('')}</div>
        ` : renderForm()}
      `);
    }

    function render() {
      if (state.loading) {
        shell(`
          ${label('Loan Officer Coverage Sign')}
          <div class="mx-auto mb-5 h-14 w-14 rounded-full border-[6px] border-slate-200 border-t-sky-500 animate-spin"></div>
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold text-slate-950">Opening Coverage</h1>
        `);
        return;
      }
      if (state.error && !state.resolved) {
        shell(`
          ${label('Loan Officer Coverage Sign')}
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold text-slate-950 mb-3">Coverage Unavailable</h1>
          <p class="text-slate-700 font-bold mb-6">${esc(state.error)}</p>
          <a class="btn btn-soft w-full" href="/lo-sign${code ? `?code=${encodeURIComponent(code)}` : ''}">Back To Sign</a>
        `);
        return;
      }
      renderMain();
    }

    async function useLocation() {
      if (!navigator.geolocation) {
        state.notice = 'Location is not available on this device. Search or enter the address manually.';
        state.manual = true;
        render();
        return;
      }
      state.notice = 'Checking nearby open houses...';
      render();
      navigator.geolocation.getCurrentPosition(async (position) => {
        try {
          const rows = await findNearestOpenHouses(position.coords.latitude, position.coords.longitude);
          state.houses = Array.isArray(rows) ? rows : [];
          state.notice = state.houses.length ? 'Select the open house for coverage.' : 'No nearby listing was found. Enter the open house manually.';
          if (!state.houses.length) state.manual = true;
          render();
        } catch (error) {
          state.error = error.message || 'Unable to search nearby open houses.';
          state.notice = '';
          state.manual = true;
          render();
        }
      }, () => {
        state.notice = 'Location permission was not granted. Search or enter the open house manually.';
        state.manual = true;
        render();
      }, { enableHighAccuracy: true, timeout: 20000, maximumAge: 300000 });
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadAgentPhotoAfterActivation(agent) {
      if (!state.agentPhotoFile || !agent?.slug) return null;
      if (state.agentPhotoFile.size > 6 * 1024 * 1024) {
        throw new Error('Agent photo is too large. Choose a smaller image.');
      }
      const dataUrl = await fileToDataUrl(state.agentPhotoFile);
      const res = await fetch('/api/agent-profile-photo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slug: agent.slug,
          uid,
          fileName: state.agentPhotoFile.name || 'agent-photo.jpg',
          contentType: state.agentPhotoFile.type || 'image/jpeg',
          photo: dataUrl
        })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.ok === false) throw new Error(data.error || 'Agent photo upload failed.');
      return data.publicUrl || null;
    }

    async function activate() {
      updateAgentFromInputs();
      const house = selectedOrManualHouse();
      if (!house.address && !house.id) {
        state.error = 'Choose or enter the open house before activating coverage.';
        render();
        return;
      }
      if (!state.agent.name || !state.agent.phone) {
        state.error = 'Add the host agent name and phone before activating coverage.';
        render();
        return;
      }
      state.busy = true;
      state.error = '';
      render();
      try {
        const res = await fetch('/api/lo-sign/action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'activate_event_coverage',
            public_code: code,
            uid,
            open_house_id: house.id || '',
            open_house: house,
            agent: state.agent,
            event_pass_code: document.getElementById('eventPassCode')?.value?.trim() || ''
          })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.ok === false) throw new Error(data.error || 'Unable to activate coverage.');
        await uploadAgentPhotoAfterActivation(data.agent).catch((error) => {
          console.warn('Agent photo upload skipped', error);
        });
        window.location.replace(data.dashboard_url || `/lo-field-dashboard?uid=${encodeURIComponent(state.resolved?.profile?.uid || uid || '')}&event=${encodeURIComponent(data.event?.id || '')}`);
      } catch (error) {
        state.busy = false;
        state.error = error.message || 'Unable to activate coverage.';
        render();
      }
    }

    function bind() {
      document.getElementById('useLocation')?.addEventListener('click', useLocation);
      document.getElementById('manualBtn')?.addEventListener('click', () => {
        state.manual = true;
        state.notice = '';
        render();
      });
      document.getElementById('wrongHouse')?.addEventListener('click', () => {
        state.selectedHouse = null;
        state.manual = false;
        state.agentCandidates = [];
        render();
      });
      document.getElementById('activateBtn')?.addEventListener('click', activate);
      document.getElementById('agentPhoto')?.addEventListener('change', (event) => {
        updateAgentFromInputs();
        const file = event.target.files?.[0] || null;
        state.agentPhotoFile = file;
        state.agentPhotoPreviewUrl = file ? URL.createObjectURL(file) : (state.agent.image_url || '');
        render();
      });
      document.getElementById('agentSearchForm')?.addEventListener('submit', async (event) => {
        event.preventDefault();
        updateAgentFromInputs();
        const term = document.getElementById('agentSearchTerm')?.value?.trim() || '';
        state.notice = 'Searching agent profiles...';
        render();
        try {
          state.agentCandidates = await searchAgentDirectory(term, state.selectedHouse?.id || '');
          state.notice = state.agentCandidates.length ? 'Choose the host agent or keep typing manually.' : 'No matching agent was found. You can still enter the host manually.';
          render();
        } catch (error) {
          state.notice = '';
          state.error = error.message || 'Agent search failed.';
          render();
        }
      });
      document.getElementById('searchForm')?.addEventListener('submit', async (event) => {
        event.preventDefault();
        const term = document.getElementById('searchTerm')?.value?.trim() || '';
        if (!term) return;
        state.notice = 'Searching open houses...';
        render();
        try {
          const rows = await searchOpenHouses(term);
          state.houses = Array.isArray(rows) ? rows : [];
          state.notice = state.houses.length ? 'Select the matching open house.' : 'No listing matched. Enter it manually.';
          if (!state.houses.length) state.manual = true;
          render();
        } catch (error) {
          state.error = error.message || 'Search failed.';
          state.notice = '';
          state.manual = true;
          render();
        }
      });
      document.querySelectorAll('[data-select-house]').forEach((button, index) => {
        button.addEventListener('click', async () => {
          state.selectedHouse = state.houses[index] || null;
          state.notice = '';
          await prefillAgentFromHouse(state.selectedHouse);
          render();
        });
      });
      document.querySelectorAll('[data-agent-candidate]').forEach((button) => {
        button.addEventListener('click', () => {
          updateAgentFromInputs();
          const index = Number(button.getAttribute('data-agent-candidate'));
          const candidate = state.agentCandidates[index];
          if (candidate) useAgentCandidate(candidate);
          state.notice = 'Agent selected. Review the details, then activate coverage.';
          render();
        });
      });
    }

    resolveSign();
  </script>
</body>
</html>
