<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Officer Dashboard | REL8TION</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#172c76;--ink:#10213f;--muted:#5d6c84;--sky:#48c9f2;--line:rgba(23,44,118,.1);--glass:rgba(255,255,255,.76)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:radial-gradient(circle at 77% -8%,rgba(40,200,238,.62),transparent 34%),linear-gradient(180deg,#e8f8ff 0%,#f4fbff 48%,#edf3fa 100%)}
    a{color:inherit}.shell{width:min(1460px,100%);margin:auto;padding:22px}.glass{border:1px solid rgba(255,255,255,.78);background:var(--glass);box-shadow:0 26px 70px rgba(23,44,118,.1);backdrop-filter:blur(17px);border-radius:34px}
    .hero{padding:30px}.brand{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:24px}.brand img{width:108px;height:auto}.owner-pill,.status{display:inline-flex;align-items:center;border-radius:999px;padding:8px 12px;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.owner-pill{background:#eef4ff;color:var(--navy);border:1px solid rgba(23,44,118,.1)}.status.live{background:#dff9ee;color:#087554}.status.ended{background:#eef1f5;color:#667085}.status.pending{background:#fff2cf;color:#9b6400}
    .hero-grid{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start}.identity{display:flex;gap:20px;align-items:center}.avatar{width:96px;height:96px;border-radius:26px;object-fit:cover;background:white;border:4px solid rgba(255,255,255,.85);box-shadow:0 14px 34px rgba(23,44,118,.15)}h1,h2,h3{font-family:"Plus Jakarta Sans",Inter,sans-serif;margin:0}h1{font-size:clamp(38px,5vw,68px);line-height:.96;color:var(--navy);letter-spacing:-.045em}.subtitle{margin:10px 0 0;color:var(--muted);font-weight:800}.actions{display:grid;gap:10px;min-width:230px}.button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;border-radius:999px;padding:11px 18px;text-decoration:none;font-size:13px;font-weight:900;border:1px solid var(--line);background:rgba(255,255,255,.82);color:var(--navy)}.button.primary{background:var(--navy);color:white;border-color:transparent}.button.disabled{pointer-events:none;opacity:.55}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:28px}.stat{padding:18px;border-radius:22px;background:rgba(255,255,255,.67);border:1px solid rgba(255,255,255,.9)}.stat span{display:block;font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}.stat strong{display:block;margin-top:8px;font-size:30px;color:var(--navy)}
    .grid{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;margin-top:18px}.panel{padding:24px}.panel h2{font-size:26px;color:var(--navy);margin-bottom:16px}.cards{display:grid;gap:12px}.card{padding:17px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid rgba(23,44,118,.07)}.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.card h3{font-size:17px}.meta{margin:7px 0 0;color:var(--muted);font-size:12px;font-weight:700;line-height:1.5}.card-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}.mini{display:inline-flex;align-items:center;justify-content:center;padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:white;color:var(--navy);font-size:11px;font-weight:900;text-decoration:none;cursor:pointer}.empty{padding:24px;border-radius:22px;background:rgba(255,255,255,.52);border:1px dashed rgba(23,44,118,.18);color:var(--muted);font-weight:700;line-height:1.55}.tool-grid{display:grid;gap:11px}.tool{padding:17px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid rgba(23,44,118,.07)}.tool h3{font-size:16px}.tool p{margin:7px 0 12px;color:var(--muted);font-size:12px;font-weight:700;line-height:1.5}.inbox{margin-top:18px}.request{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}.request-name{font-weight:900}.loading{text-align:center;padding:70px 20px;font-weight:900;color:var(--navy)}.notice{margin-bottom:18px;padding:14px 17px;border-radius:18px;background:#fff3d7;color:#855a00;font-weight:800;font-size:13px}.footer-note{margin:16px 4px 0;color:var(--muted);font-size:11px;font-weight:700;text-align:center}
    .chat{display:none;margin-top:16px;border-radius:26px;background:rgba(238,249,255,.9);border:1px solid rgba(56,189,248,.3);padding:18px}.chat.active{display:block}.chat-head{display:flex;justify-content:space-between;gap:14px;align-items:start}.chat-log{display:grid;gap:9px;max-height:390px;overflow-y:auto;margin-top:16px;padding:4px}.bubble{max-width:82%;padding:12px 14px;border-radius:18px;background:white;border:1px solid var(--line);color:#344054}.bubble.own{justify-self:end;background:var(--navy);color:white;border-color:transparent}.bubble small{display:block;margin-bottom:5px;font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;opacity:.7}.bubble div{font-size:13px;font-weight:700;line-height:1.5}.composer{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px}.composer textarea{width:100%;resize:vertical;min-height:78px;border:1px solid rgba(23,44,118,.16);border-radius:18px;padding:13px 15px;font:700 13px Inter;color:var(--ink);outline:none}.send{border:0;border-radius:18px;background:var(--navy);color:white;padding:13px 20px;font-weight:900;cursor:pointer}.send:disabled{opacity:.55;cursor:wait}.chat-status{min-height:18px;margin-top:9px;color:var(--muted);font-size:11px;font-weight:800}
    .schedule{margin-top:18px}.availability-form{display:grid;grid-template-columns:1.1fr 1.1fr .6fr .55fr auto;gap:10px;align-items:end}.field label{display:block;margin:0 0 6px 3px;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.field input{width:100%;min-height:46px;border:1px solid rgba(23,44,118,.15);border-radius:15px;background:white;padding:10px 12px;color:var(--ink);font:700 12px Inter;outline:none}.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:15px}.slot{padding:15px;border-radius:19px;background:rgba(255,255,255,.78);border:1px solid var(--line)}.slot strong{display:block;color:var(--navy);font-size:14px}.slot .mini{margin-top:10px}.availability-status{min-height:20px;margin-top:10px;color:var(--muted);font-size:12px;font-weight:800}
    .agent-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.agent-card{padding:17px;border-radius:22px;background:rgba(255,255,255,.78);border:1px solid rgba(23,44,118,.07)}.agent-card .send{margin-top:12px}.agent-status{min-height:18px;margin-top:8px;color:var(--muted);font-size:11px;font-weight:800}
    @media(max-width:900px){.hero-grid,.grid{grid-template-columns:1fr}.actions{grid-template-columns:repeat(2,1fr);min-width:0}.stats{grid-template-columns:repeat(2,1fr)}.availability-form{grid-template-columns:1fr 1fr}.slot-grid,.agent-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.shell{padding:10px}.hero,.panel{padding:18px}.hero-grid{gap:18px}.identity{align-items:flex-start}.avatar{width:72px;height:72px;border-radius:21px}h1{font-size:38px}.actions{grid-template-columns:1fr}.request{grid-template-columns:1fr}.brand img{width:82px}}
  </style>
</head>
<body>
  <main class="shell">
    <div id="app" class="glass loading">Opening your Loan Officer Dashboard...</div>
  </main>
  <script type="module">
    import { KEY, SUPABASE_URL } from '/apps/rel8tion-app/src/core/config.js?v=20260717-lo-owner-dashboard';

    const params = new URLSearchParams(window.location.search);
    const uid = params.get('uid') || '';
    const slug = params.get('slug') || '';
    const demoMode = params.get('demo') === '1';
    const app = document.getElementById('app');
    let currentProfile = null;
    let currentData = null;
    let activeConversationId = '';
    const headers = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };
    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[char]));
    const fmt = (value) => { const date = new Date(value || ''); return Number.isNaN(date.getTime()) ? 'Not scheduled' : date.toLocaleString([], { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }); };
    const titleize = (value) => String(value || '').replace(/_/g, ' ').replace(/\b\w/g, (m) => m.toUpperCase());
    const localInput = (date) => { const value = new Date(date); value.setMinutes(value.getMinutes() - value.getTimezoneOffset()); return value.toISOString().slice(0,16); };

    async function request(path) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers });
      const raw = await response.text();
      if (!response.ok) throw new Error(raw || `Request failed: ${response.status}`);
      return raw ? JSON.parse(raw) : [];
    }
    async function api(path, body) {
      const response = await fetch(path, { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify(body) });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.error || 'Request failed.');
      return data;
    }
    const safe = (promise, fallback = []) => promise.catch((error) => { console.log('dashboard load skipped', error); return fallback; });

    async function loadProfile() {
      if (uid) return (await request(`verified_profiles?uid=eq.${encodeURIComponent(uid)}&is_active=eq.true&select=*&limit=1`))[0] || null;
      if (slug) return (await request(`verified_profiles?slug=eq.${encodeURIComponent(slug)}&is_active=eq.true&select=*&limit=1`))[0] || null;
      return null;
    }

    async function loadData(profile) {
      const profileUid = profile.uid;
      const [sessions, availabilityPayload, participantRows, conversations] = await Promise.all([
        safe(request(`event_loan_officer_sessions?or=(verified_profile_uid.eq.${encodeURIComponent(profileUid)},loan_officer_uid.eq.${encodeURIComponent(profileUid)})&select=*&order=signed_in_at.desc&limit=100`)),
        safe(api('/api/field-demo/availability', { action:'list', uid:profileUid, days:90 }), { availability:[] }),
        safe(request(`field_demo_visit_participants?or=(participant_profile_id.eq.${encodeURIComponent(profileUid)},participant_uid.eq.${encodeURIComponent(profileUid)})&select=*,field_demo_visits(*)&order=created_at.desc&limit=100`)),
        profile.slug ? safe(request(`event_conversations?loan_officer_slug=eq.${encodeURIComponent(profile.slug)}&select=*&order=updated_at.desc&limit=100`)) : []
      ]);
      const messagesByConversation = {};
      await Promise.all(conversations.map(async (conversation) => {
        const payload = await safe(api('/api/event-chat/list', { conversation_id:conversation.id }), { messagesByConversation:{} });
        messagesByConversation[conversation.id] = payload.messagesByConversation?.[conversation.id] || [];
      }));
      const eventIds = [...new Set(sessions.map((row) => row.open_house_event_id).filter(Boolean))];
      const events = eventIds.length ? await safe(request(`open_house_events?id=in.(${eventIds.map(encodeURIComponent).join(',')})&select=*&order=created_at.desc&limit=100`)) : [];
      const houseIds = [...new Set(events.map((row) => row.open_house_source_id).filter(Boolean))];
      const houses = houseIds.length ? await safe(request(`open_houses?id=in.(${houseIds.map(encodeURIComponent).join(',')})&select=id,address,city,state,zip,open_start,open_end&limit=100`)) : [];
      if (demoMode && !conversations.length) {
        conversations.push({ id:'demo-financing-thread', open_house_event_id:'demo-event', buyer_name:'Demo Buyer', buyer_phone:'(555) 010-2026', agent_name:'Demo Host Agent', agent_slug:'demo-agent', status:'waiting', updated_at:new Date().toISOString(), metadata:{ needs_reply:true, demo:true } });
        messagesByConversation['demo-financing-thread'] = [
          { sender_role:'buyer', sender_name:'Demo Buyer', body:'Hi, I am at the open house and would like help understanding my financing options.', created_at:new Date(Date.now()-180000).toISOString() },
          { sender_role:'system', sender_name:'REL8TION', body:'The buyer explicitly requested financing help and was routed to the assigned loan officer.', created_at:new Date(Date.now()-170000).toISOString() }
        ];
      }
      if (demoMode && !participantRows.length) {
        participantRows.push({ id:'demo-participant', field_demo_visits:{ id:'demo-visit', agent_slug:'demo-host-agent', agent_name:'Demo Host Agent', agent_phone:'(555) 010-1144', agent_email:'agent@example.com', brokerage:'Demo Realty', scheduled_start:new Date(Date.now()+86400000).toISOString(), scheduled_end:new Date(Date.now()+93600000).toISOString(), status:'scheduled' } });
      }
      return { sessions, availability:availabilityPayload.availability || [], participantRows, conversations, messagesByConversation, events, houses };
    }

    function dashboardHref(profile, section = 'lo-overview') {
      const query = new URLSearchParams({ role:'loan_officer', section });
      if (profile.uid) query.set('uid', profile.uid);
      if (profile.slug) query.set('slug', profile.slug);
      return `/field-dashboard?${query.toString()}`;
    }

    function eventAddress(event, houseMap) {
      const house = houseMap[event?.open_house_source_id] || {};
      const context = event?.setup_context || {};
      return house.address || context.address || context.property_address || 'Open house';
    }

    function defaultAvailability(profile) {
      const start = new Date();
      start.setDate(start.getDate() + 1);
      start.setHours(10, 0, 0, 0);
      const end = new Date(start);
      end.setHours(16, 0, 0, 0);
      const zip = String([profile.areas, profile.coverage_areas, profile.address].filter(Boolean).join(' ')).match(/\b\d{5}\b/)?.[0] || '';
      return { start:localInput(start), end:localInput(end), zip };
    }

    function renderAvailability(profile, availability) {
      const defaults = defaultAvailability(profile);
      const future = availability.filter((row) => ['open','held','booked','unavailable'].includes(row.status) && new Date(row.available_end).getTime() > Date.now());
      return `<section id="availability" class="glass panel schedule"><h2>My Availability</h2>
        <p class="meta">Add the exact times you can provide remote or in-person financing coverage. Assignment matching can use the time, ZIP and travel radius.</p>
        <form id="availability-form" class="availability-form">
          <div class="field"><label for="available-start">Start</label><input id="available-start" type="datetime-local" value="${esc(defaults.start)}" required></div>
          <div class="field"><label for="available-end">End</label><input id="available-end" type="datetime-local" value="${esc(defaults.end)}" required></div>
          <div class="field"><label for="available-zip">Service ZIP</label><input id="available-zip" inputmode="numeric" maxlength="5" pattern="[0-9]{5}" value="${esc(defaults.zip)}" placeholder="11563" required></div>
          <div class="field"><label for="available-radius">Radius</label><input id="available-radius" type="number" min="1" max="250" value="15" required></div>
          <button id="availability-save" class="send" type="submit">Add Time</button>
        </form><div id="availability-status" class="availability-status"></div>
        <div class="slot-grid">${future.length ? future.map((slot) => `<article class="slot"><strong>${esc(fmt(slot.available_start))}</strong><p class="meta">Until ${esc(fmt(slot.available_end))}<br>ZIP ${esc(slot.service_zip)} · ${esc(slot.service_radius_miles)} miles · ${esc(titleize(slot.status))}</p>${slot.status === 'open' ? `<button class="mini" type="button" onclick="window.cancelLoanOfficerAvailability('${esc(slot.id)}')">Remove</button>` : ''}</article>`).join('') : '<div class="empty">No future availability has been added yet.</div>'}</div>
      </section>`;
    }

    function workedAgents(participantRows) {
      const agents = new Map();
      participantRows.forEach((row) => {
        const visit = row.field_demo_visits || {};
        const key = visit.agent_slug || visit.agent_email || visit.agent_phone || visit.agent_name;
        if (!key) return;
        const existing = agents.get(key) || { slug:visit.agent_slug || '', name:visit.agent_name || visit.agent_slug || 'Agent', phone:visit.agent_phone || '', email:visit.agent_email || '', brokerage:visit.brokerage || '', events:0 };
        existing.events += 1;
        existing.phone ||= visit.agent_phone || '';
        existing.email ||= visit.agent_email || '';
        agents.set(key, existing);
      });
      return [...agents.values()].sort((a,b) => a.name.localeCompare(b.name));
    }

    function renderMyAgents(profile, participantRows) {
      const agents = workedAgents(participantRows);
      return `<section id="my-agents" class="glass panel schedule"><h2>My Agents</h2>
        <p class="meta">Send one simple offer for a REL8TION Event Pass and remote live financing coverage. The agent decides whether to continue.</p>
        <div class="agent-grid">${agents.length ? agents.map((agent, index) => `<article class="agent-card"><h3>${esc(agent.name)}</h3><p class="meta">${esc(agent.brokerage || 'Brokerage not set')} · ${agent.events} shared event${agent.events === 1 ? '' : 's'}<br>${esc(agent.phone || agent.email || 'Contact information missing')}</p><button id="agent-send-${index}" class="send" type="button" onclick="window.sendAgentSupportOffer(${index})">Send Support Offer</button><div id="agent-status-${index}" class="agent-status"></div></article>`).join('') : '<div class="empty">Agents appear here after this loan officer is connected to one of their open houses.</div>'}</div>
      </section>`;
    }

    function renderMessages(conversation) {
      const messages = currentData?.messagesByConversation?.[conversation.id] || [];
      if (!messages.length) return '<div class="empty">No messages yet. Send the first message to start this buyer thread.</div>';
      return messages.map((message) => {
        const own = ['loan_officer','field_specialist'].includes(message.sender_role);
        return `<div class="bubble ${own ? 'own' : ''}"><small>${esc(message.sender_name || titleize(message.sender_role))} · ${esc(fmt(message.created_at))}</small><div>${esc(message.body)}</div></div>`;
      }).join('');
    }

    function renderConversation(conversation) {
      const previewWarning = conversation.metadata?.demo
        ? '<div class="notice">Demo thread: replies stay in this browser and do not write data or send SMS.</div>'
        : window.location.hostname.endsWith('.vercel.app')
        ? '<div class="notice">Preview safety: sending from this page writes to production conversation data and may text the buyer.</div>'
        : '';
      return `<section id="chat-${esc(conversation.id)}" class="chat ${conversation.id === activeConversationId ? 'active' : ''}">
        ${previewWarning}<div class="chat-head"><div><h3>${esc(conversation.buyer_name || conversation.buyer_phone || 'Buyer conversation')}</h3><p class="meta">${esc([conversation.agent_name, conversation.buyer_phone, titleize(conversation.status || 'open')].filter(Boolean).join(' · '))}</p></div><button class="mini" type="button" onclick="window.closeLoanOfficerChat()">Close</button></div>
        <div id="chat-log-${esc(conversation.id)}" class="chat-log">${renderMessages(conversation)}</div>
        <div class="composer"><textarea id="chat-draft-${esc(conversation.id)}" placeholder="Reply to the buyer..."></textarea><button id="chat-send-${esc(conversation.id)}" class="send" type="button" onclick="window.sendLoanOfficerChat('${esc(conversation.id)}')">Send Reply</button></div>
        <div id="chat-status-${esc(conversation.id)}" class="chat-status"></div>
      </section>`;
    }

    function render(profile, data) {
      const now = Date.now();
      const houseMap = Object.fromEntries(data.houses.map((row) => [row.id, row]));
      const eventMap = Object.fromEntries(data.events.map((row) => [row.id, row]));
      const liveSessions = data.sessions.filter((row) => row.status === 'live' && !eventMap[row.open_house_event_id]?.ended_at);
      const openAvailability = data.availability.filter((row) => row.status === 'open' && new Date(row.available_end).getTime() > now);
      const upcomingVisits = data.participantRows.map((row) => ({ ...row.field_demo_visits, participant:row })).filter((row) => row.id && new Date(row.scheduled_end || row.scheduled_start || 0).getTime() >= now).sort((a,b) => new Date(a.scheduled_start)-new Date(b.scheduled_start));
      const openConversations = data.conversations.filter((row) => row.status !== 'closed');
      const unread = openConversations.filter((row) => row.status === 'waiting' || row.metadata?.needs_reply === true);
      const photo = profile.photo_url || profile.image_url || 'https://rel8tion.me/wp-content/uploads/2026/04/updateprofile.png';
      const publicUrl = profile.slug ? `/nmb-verified?slug=${encodeURIComponent(profile.slug)}` : '#';
      const editUrl = `/nmb-activate?uid=${encodeURIComponent(profile.uid)}&edit=profile`;

      app.className = '';
      app.innerHTML = `
        <section class="glass hero">
          <div class="brand"><img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="REL8TION"><span class="owner-pill">Personal Loan Officer Dashboard</span></div>
          <div class="hero-grid">
            <div class="identity"><img class="avatar" src="${esc(photo)}" alt="${esc(profile.full_name)}"><div><h1>${esc(profile.full_name || 'Loan Officer')}</h1><p class="subtitle">${esc([profile.title, profile.company_name].filter(Boolean).join(' · '))}</p></div></div>
            <div class="actions">
              <a class="button primary" href="${esc(publicUrl)}">Open Public Profile</a>
              <a class="button" href="${esc(editUrl)}">Edit Profile</a>
              <a class="button" href="#availability">Set Availability</a>
              <a class="button" href="#my-agents">My Agents</a>
            </div>
          </div>
          <div class="stats">
            <div class="stat"><span>Live coverage</span><strong>${liveSessions.length}</strong></div>
            <div class="stat"><span>Upcoming assignments</span><strong>${upcomingVisits.length}</strong></div>
            <div class="stat"><span>Available slots</span><strong>${openAvailability.length}</strong></div>
            <div class="stat"><span>Needs reply</span><strong>${unread.length}</strong></div>
          </div>
        </section>

        <div class="grid">
          <section class="glass panel">
            <h2>Coverage & Open Houses</h2>
            <div class="cards">
              ${liveSessions.length ? liveSessions.map((session) => { const event = eventMap[session.open_house_event_id] || {}; return `
                <article class="card"><div class="card-top"><div><h3>${esc(eventAddress(event, houseMap))}</h3><p class="meta">${esc(event.host_agent_slug ? `Host: ${titleize(event.host_agent_slug)}` : 'Host agent')} · Live since ${esc(fmt(session.signed_in_at))}</p></div><span class="status live">Live</span></div>
                <div class="card-actions"><a class="mini" href="${esc(dashboardHref(profile, 'lo-open-houses'))}">Open Coverage Workspace</a>${event.id ? `<a class="mini" href="/event?event=${encodeURIComponent(event.id)}">View Event</a>` : ''}</div></article>`; }).join('') : '<div class="empty">No live open-house coverage is assigned. Accepted remote or in-person coverage will appear here.</div>'}
              ${upcomingVisits.slice(0,6).map((visit) => `<article class="card"><div class="card-top"><div><h3>${esc(visit.property_address || visit.address || visit.agent_name || 'Upcoming agent support')}</h3><p class="meta">${esc(fmt(visit.scheduled_start))} · ${esc(titleize(visit.status || visit.participant?.status || 'scheduled'))}</p></div><span class="status pending">Upcoming</span></div><div class="card-actions"><a class="mini" href="${esc(dashboardHref(profile, 'lo-open-houses'))}">Open Assignment</a></div></article>`).join('')}
            </div>
          </section>

          <aside class="glass panel">
            <h2>Loan Officer Tools</h2>
            <div class="tool-grid">
              <div class="tool"><h3>Availability</h3><p>${openAvailability.length} open future slots. Set working days, unavailable periods, ZIP and coverage radius.</p><a class="mini" href="#availability">Manage Schedule</a></div>
              <div class="tool"><h3>My Agents</h3><p>Send a simple Event Pass and remote live-coverage offer to agents you work with.</p><a class="mini" href="#my-agents">View My Agents</a></div>
              <div class="tool"><h3>Event Pass & Coverage Sign</h3><p>Activate sponsored Event Pass support or configure loan-officer-owned Coverage Sign hardware.</p><div class="card-actions"><a class="mini" href="/lo-sign-setup?uid=${encodeURIComponent(profile.uid)}">Coverage Sign</a><a class="mini" href="/sponsored-pass-activate">Event Pass</a></div></div>
              <div class="tool"><h3>Affordability Guidance</h3><p>Add property-fit guidance only after completing your own preapproval workflow outside REL8TION.</p><a class="mini" href="/lo-affordability-guidance?uid=${encodeURIComponent(profile.uid)}">Open Guidance</a></div>
            </div>
          </aside>
        </div>

        ${renderAvailability(profile, data.availability)}
        ${renderMyAgents(profile, data.participantRows)}

        <section class="glass panel inbox">
          <h2>Financing Help Inbox</h2>
          <div class="cards">
            ${openConversations.length ? openConversations.slice(0,12).map((conversation) => `<article class="card request"><div><div class="request-name">${esc(conversation.buyer_name || 'Buyer financing request')}</div><p class="meta">${esc([conversation.agent_name, conversation.status ? titleize(conversation.status) : '', fmt(conversation.updated_at)].filter(Boolean).join(' · '))}</p></div><button class="mini" type="button" onclick="window.openLoanOfficerChat('${esc(conversation.id)}')">Open Message</button></article>`).join('') : '<div class="empty">No buyer financing conversations are assigned to this profile yet. Explicit buyer requests will appear here when the event is assigned to this loan officer.</div>'}
          </div>
          ${openConversations.map(renderConversation).join('')}
        </section>
        <p class="footer-note">Preview owner dashboard. Authenticated account ownership and recurring weekly templates are the next security/build step.</p>`;
      document.getElementById('availability-form')?.addEventListener('submit', saveLoanOfficerAvailability);
    }

    async function saveLoanOfficerAvailability(event) {
      event.preventDefault();
      const status = document.getElementById('availability-status');
      const button = document.getElementById('availability-save');
      const start = new Date(document.getElementById('available-start').value);
      const end = new Date(document.getElementById('available-end').value);
      const zip = document.getElementById('available-zip').value.trim();
      const radius = Number(document.getElementById('available-radius').value || 15);
      if (!Number.isFinite(start.getTime()) || !Number.isFinite(end.getTime()) || end <= start) { status.textContent = 'Choose a valid start and end time.'; return; }
      if (!/^\d{5}$/.test(zip)) { status.textContent = 'Enter a five-digit service ZIP.'; return; }
      if (window.location.hostname.endsWith('.vercel.app') && !window.confirm('This preview uses the live availability database. Add this time now?')) return;
      try {
        button.disabled = true;
        status.textContent = 'Saving availability...';
        await api('/api/field-demo/availability', { action:'upsert', uid:currentProfile.uid, role:'loan_officer', responsibility:'financing_support', status:'open', available_start:start.toISOString(), available_end:end.toISOString(), service_zip:zip, service_radius_miles:radius });
        currentData = await loadData(currentProfile);
        render(currentProfile, currentData);
        document.getElementById('availability-status').textContent = 'Availability added.';
        document.getElementById('availability')?.scrollIntoView({ behavior:'smooth', block:'start' });
      } catch (error) { status.textContent = error.message || 'Availability could not be saved.'; }
      finally { if (button?.isConnected) button.disabled = false; }
    }

    async function init() {
      if (!uid && !slug) {
        app.className = 'glass panel';
        app.innerHTML = '<h2>Loan Officer Account Required</h2><p class="empty">Register or open this dashboard from your verified Rel8tionChip so REL8TION can identify your loan officer profile.</p><div class="card-actions"><a class="button primary" href="/loan-officer-support">Register as a Loan Officer</a><a class="button" href="/nmb-activate">Activate Existing Chip</a></div>';
        return;
      }
      const profile = await loadProfile();
      if (!profile) throw new Error('An active verified loan officer profile was not found.');
      currentProfile = profile;
      currentData = await loadData(profile);
      render(profile, currentData);
    }
    window.openLoanOfficerChat = (conversationId) => {
      activeConversationId = conversationId;
      document.querySelectorAll('.chat').forEach((node) => node.classList.toggle('active', node.id === `chat-${conversationId}`));
      const log = document.getElementById(`chat-log-${conversationId}`);
      if (log) log.scrollTop = log.scrollHeight;
    };
    window.closeLoanOfficerChat = () => {
      activeConversationId = '';
      document.querySelectorAll('.chat').forEach((node) => node.classList.remove('active'));
    };
    window.cancelLoanOfficerAvailability = async (availabilityId) => {
      if (!availabilityId || !window.confirm('Remove this availability time?')) return;
      const status = document.getElementById('availability-status');
      try {
        if (status) status.textContent = 'Removing availability...';
        await api('/api/field-demo/availability', { action:'cancel', uid:currentProfile.uid, id:availabilityId });
        currentData = await loadData(currentProfile);
        render(currentProfile, currentData);
        document.getElementById('availability-status').textContent = 'Availability removed.';
        document.getElementById('availability')?.scrollIntoView({ behavior:'smooth', block:'start' });
      } catch (error) { if (status) status.textContent = error.message || 'Availability could not be removed.'; }
    };
    window.sendAgentSupportOffer = async (index) => {
      const agent = workedAgents(currentData?.participantRows || [])[index];
      if (!agent) return;
      const button = document.getElementById(`agent-send-${index}`);
      const status = document.getElementById(`agent-status-${index}`);
      if (demoMode) { status.textContent = 'Demo only: no message was sent.'; return; }
      if (!window.confirm(`Send the Event Pass and live-coverage offer to ${agent.name}?`)) return;
      try {
        button.disabled = true;
        status.textContent = 'Sending offer...';
        const result = await api('/api/loan-officer-agent-offer', { loan_officer_uid:currentProfile.uid, agent_key:agent.slug || agent.email || agent.phone || agent.name });
        const sent = result.results?.filter((item) => item.status === 'sent').length || 0;
        const emailPending = result.results?.some((item) => item.channel === 'email' && item.status === 'not_configured');
        status.textContent = `${sent} message${sent === 1 ? '' : 's'} sent.${emailPending ? ' Email setup is still pending.' : ''}`;
      } catch (error) { status.textContent = error.message || 'The support offer could not be sent.'; }
      finally { button.disabled = false; }
    };
    window.sendLoanOfficerChat = async (conversationId) => {
      const conversation = currentData?.conversations?.find((row) => row.id === conversationId);
      const draft = document.getElementById(`chat-draft-${conversationId}`);
      const button = document.getElementById(`chat-send-${conversationId}`);
      const status = document.getElementById(`chat-status-${conversationId}`);
      const body = draft?.value?.trim() || '';
      if (!conversation || !body) { if (status) status.textContent = 'Type a message first.'; return; }
      if (conversation.metadata?.demo) {
        currentData.messagesByConversation[conversation.id].push({ sender_role:'loan_officer', sender_name:currentProfile.full_name || 'Loan Officer', body, created_at:new Date().toISOString() });
        draft.value = '';
        document.getElementById(`chat-log-${conversationId}`).innerHTML = renderMessages(conversation);
        document.getElementById(`chat-log-${conversationId}`).scrollTop = document.getElementById(`chat-log-${conversationId}`).scrollHeight;
        status.textContent = 'Demo reply added locally. No SMS or database write occurred.';
        return;
      }
      if (window.location.hostname.endsWith('.vercel.app') && !window.confirm('This preview uses production messaging. Send this reply and possibly text the buyer now?')) return;
      try {
        button.disabled = true;
        status.textContent = 'Sending...';
        const payload = await api('/api/event-chat/send', {
          conversation_id:conversation.id,
          open_house_event_id:conversation.open_house_event_id,
          buyer_name:conversation.buyer_name || '',
          buyer_phone:conversation.buyer_phone || '',
          agent_slug:conversation.agent_slug || '',
          agent_name:conversation.agent_name || '',
          agent_phone:conversation.agent_phone || '',
          loan_officer_slug:currentProfile.slug || '',
          loan_officer_name:currentProfile.full_name || '',
          loan_officer_phone:currentProfile.phone || '',
          sender_role:'loan_officer',
          sender_name:currentProfile.full_name || 'Loan Officer',
          sender_phone:currentProfile.phone || '',
          sender_uid:currentProfile.uid || '',
          sender_slug:currentProfile.slug || '',
          body
        });
        const refreshed = await api('/api/event-chat/list', { conversation_id:conversation.id });
        currentData.messagesByConversation[conversation.id] = refreshed.messagesByConversation?.[conversation.id] || [];
        draft.value = '';
        document.getElementById(`chat-log-${conversationId}`).innerHTML = renderMessages(conversation);
        document.getElementById(`chat-log-${conversationId}`).scrollTop = document.getElementById(`chat-log-${conversationId}`).scrollHeight;
        status.textContent = payload.notification?.warning ? `Message saved. SMS warning: ${payload.notification.warning}` : 'Message sent and buyer notified.';
      } catch (error) {
        status.textContent = error.message || 'Message could not be sent.';
      } finally {
        button.disabled = false;
      }
    };
    init().catch((error) => { app.className = 'glass panel'; app.innerHTML = `<h2>Dashboard could not load</h2><p class="empty">${esc(error.message || error)}</p>`; });
  </script>
</body>
</html>
