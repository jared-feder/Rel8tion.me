<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/field-dashboard?role=loan_officer">
  <title>Opening Loan Officer Dashboard</title>
</head>
<body>
  <script>
    const target = new URL('/field-dashboard', window.location.origin);
    target.searchParams.set('role', 'loan_officer');
    for (const [key, value] of new URLSearchParams(window.location.search).entries()) {
      if (key !== 'role') target.searchParams.set(key, value);
    }
    window.location.replace(`${target.pathname}${target.search}${window.location.hash}`);
  </script>
  <p>Opening loan officer dashboard...</p>
</body>
</html>
