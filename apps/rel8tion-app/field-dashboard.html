<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>REL8TION Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

      article,section{scroll-margin-top:16px}
      input,select,textarea{font-size:16px!important}

</head>
<body class="bg-[#eef8ff] text-slate-900">
  <main class="min-h-screen px-4 py-5" style="background:linear-gradient(180deg,#55cfee 0%,#e8f8ff 42%,#f8fbff 100%);">
    <section class="mx-auto max-w-7xl">
      <header class="mb-4 rounded-[28px] border border-white/80 bg-white/45 p-4 shadow-[0_18px_50px_rgba(15,23,42,.10)] backdrop-blur">
        <div class="flex items-center justify-between gap-4">
          <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion" class="h-9 w-auto">
          <div class="text-right">
            <div id="dashboardRoleLabel" class="text-xs font-black uppercase tracking-[.18em] text-sky-700">Field Operations</div>
            <div id="profileLabel" class="font-['Plus_Jakarta_Sans'] text-xl font-extrabold">Loading...</div>
          </div>
        </div>
      </header>

      <div id="app" class="rounded-[32px] border border-white/80 bg-white/55 p-5 shadow-[0_24px_70px_rgba(15,23,42,.12)] backdrop-blur md:p-8">
        <div class="py-14 text-center">
          <div class="mx-auto mb-5 h-14 w-14 animate-spin rounded-full border-8 border-white border-t-blue-600"></div>
          <h1 class="font-['Plus_Jakarta_Sans'] text-4xl font-extrabold">Opening Dashboard</h1>
          <p class="mt-3 text-lg font-semibold text-slate-600">Loading assigned REL8TION demo visits.</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { SUPABASE_URL, KEY } from '/apps/rel8tion-app/src/core/config.js?v=20260512-field-chat';

    const params = new URLSearchParams(window.location.search);
    const state = {
      uid: params.get('uid') || params.get('participant_uid') || '',
      slug: params.get('slug') || '',
      role: params.get('role') || '',
      profile: null,
      availability: [],
      visits: [],
      relationshipVisits: [],
      outreachCandidates: [],
      buyerRequests: {},
      conversations: {},
      messages: {},
      activeConversationByVisit: {},
      scheduleOpen: false,
      activeSection: params.get('section') || window.location.hash.replace(/^#/, '') || 'lo-overview',
      authSession: null,
      busy: false,
      message: '',
      error: ''
    };

    const headers = { apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json' };
    const app = document.getElementById('app');
    const profileLabel = document.getElementById('profileLabel');
    const dashboardRoleLabel = document.getElementById('dashboardRoleLabel');
    const authClient = window.supabase.createClient(SUPABASE_URL, KEY);

    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
    const isUuid = (value) => /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || ''));
    const titleize = (value) => String(value || '').replace(/_/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    const cleanPhone = (phone) => String(phone || '').replace(/[^\d+]/g, '');
    const telHref = (phone) => phone ? `tel:${cleanPhone(phone)}` : '#';
    const smsHref = (phone, body = '') => phone ? `sms:${cleanPhone(phone)}${body ? `?&body=${encodeURIComponent(body)}` : ''}` : '#';
    const WEEKDAY_OPTIONS = [
      [0, 'Sun'],
      [1, 'Mon'],
      [2, 'Tue'],
      [3, 'Wed'],
      [4, 'Thu'],
      [5, 'Fri'],
      [6, 'Sat']
    ];
    const extractZip = (...values) => {
      for (const value of values) {
        const match = String(value || '').match(/\b(\d{5})(?:-\d{4})?\b/);
        if (match) return match[1];
      }
      return '';
    };

    const fmtTime = (value) => {
      if (!value) return 'Not scheduled';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return 'Not scheduled';
      return date.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    };

    const fmtShort = (value) => {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString([], { hour: 'numeric', minute: '2-digit' });
    };

    function defaultScheduleDate(offsetDays = 1) {
      const date = new Date();
      date.setDate(date.getDate() + offsetDays);
      return localDateValue(date);
    }

    function localDateValue(value) {
      const date = value instanceof Date ? new Date(value) : new Date(value || Date.now());
      if (Number.isNaN(date.getTime())) return '';
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function localDateFromInput(value) {
      const date = new Date(`${value || ''}T00:00:00`);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function addDays(value, days) {
      const date = new Date(value);
      date.setDate(date.getDate() + days);
      return date;
    }

    function isLoanOfficerDashboard() {
      return state.role === 'loan_officer';
    }

    function buildAvailabilitySlots(data) {
      const startDate = localDateFromInput(data.get('date'));
      const rangeDays = Math.max(1, Math.min(Number(data.get('range_days') || 1), 90));
      const startTime = String(data.get('start_time') || '').trim();
      const endTime = String(data.get('end_time') || '').trim();
      const selectedDays = data.getAll('weekdays').map(Number).filter((day) => day >= 0 && day <= 6);
      const allowedDays = selectedDays.length ? selectedDays : WEEKDAY_OPTIONS.map(([day]) => day);
      const status = data.get('status') === 'unavailable' ? 'unavailable' : 'open';

      if (!startDate || !startTime || !endTime) throw new Error('Choose a valid date and time window.');

      const slots = [];
      for (let offset = 0; offset < rangeDays; offset += 1) {
        const day = addDays(startDate, offset);
        if (rangeDays > 1 && !allowedDays.includes(day.getDay())) continue;
        const dayValue = localDateValue(day);
        const availableStart = new Date(`${dayValue}T${startTime}`);
        const availableEnd = new Date(`${dayValue}T${endTime}`);
        if (Number.isNaN(availableStart.getTime()) || Number.isNaN(availableEnd.getTime()) || availableEnd <= availableStart) {
          throw new Error('Use a valid availability start and end time.');
        }
        slots.push({
          status,
          available_start: availableStart.toISOString(),
          available_end: availableEnd.toISOString()
        });
      }

      if (!slots.length) throw new Error('No matching days were selected in that date range.');
      return slots;
    }

    async function request(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: { ...headers, ...(options.headers || {}) }
      });
      const raw = await res.text().catch(() => '');
      if (!res.ok) throw new Error(raw || `Request failed: ${res.status}`);
      return raw ? JSON.parse(raw) : null;
    }

    async function api(path, body) {
      const apiHeaders = { 'Content-Type': 'application/json' };
      if (state.authSession?.access_token) apiHeaders.Authorization = `Bearer ${state.authSession.access_token}`;
      const res = await fetch(path, {
        method: 'POST',
        headers: apiHeaders,
        body: JSON.stringify(body || {})
      });
      const raw = await res.text().catch(() => '');
      const payload = raw ? JSON.parse(raw) : null;
      if (!res.ok || payload?.ok === false) throw new Error(payload?.error || raw || `Request failed: ${res.status}`);
      return payload;
    }

    function dashboardRange() {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(end.getDate() + 8);
      return { start, end };
    }

    async function loadVisitContexts(visits = []) {
      if (!visits.length) return visits;
      let contextRows = [];
      if (state.authSession?.access_token) {
        const ids = visits.map((visit) => visit.id).filter(Boolean).join(',');
        const res = await fetch(`/api/loan-officer-account?visit_ids=${encodeURIComponent(ids)}`, { headers:{ Authorization:`Bearer ${state.authSession.access_token}` } });
        const payload = await res.json().catch(() => ({}));
        if (res.ok) contextRows = payload.visit_contexts || [];
      }
      const contexts = new Map(contextRows.map((row) => [row.visit_id, row]));
      const queueIds = [...new Set(visits.map((visit) => visit.outreach_queue_id).filter(Boolean))];
      for (const queueId of queueIds) {
        if (contextRows.some((row) => row.id === queueId)) continue;
        const rows = await request(`agent_outreach_queue?id=eq.${encodeURIComponent(queueId)}&select=id,address,listing_photo_url,agent_name,agent_phone,agent_email,brokerage,open_house_id&limit=1`).catch(() => []);
        const queue = Array.isArray(rows) ? rows[0] : null;
        visits.filter((visit) => visit.outreach_queue_id === queueId).forEach((visit) => { if (queue) contexts.set(visit.id, { visit_id:visit.id, ...queue }); });
      }
      return visits.map((visit) => ({ ...contexts.get(visit.id), ...visit, listing_photo_url:contexts.get(visit.id)?.listing_photo_url || visit.listing_photo_url || '', address:contexts.get(visit.id)?.address || visit.address || '' }));
    }

    function relationshipRange() {
      const start = new Date();
      start.setHours(0, 0, 0, 0);
      start.setDate(start.getDate() - 180);
      const end = new Date();
      end.setHours(0, 0, 0, 0);
      end.setDate(end.getDate() + 31);
      return { start, end };
    }

    async function loadProfile() {
      if (state.uid) {
        const rows = await request(`verified_profiles?uid=eq.${encodeURIComponent(state.uid)}&is_active=eq.true&select=*&limit=1`).catch(() => []);
        if (Array.isArray(rows) && rows[0]) return rows[0];
      }
      if (state.slug) {
        const rows = await request(`verified_profiles?slug=eq.${encodeURIComponent(state.slug)}&is_active=eq.true&select=*&limit=1`).catch(() => []);
        if (Array.isArray(rows) && rows[0]) return rows[0];
      }
      return null;
    }

    async function loadParticipantRows(range = dashboardRange()) {
      const { start, end } = range;
      const queries = [];
      if (state.profile?.uid) {
        queries.push(`participant_profile_id=eq.${encodeURIComponent(state.profile.uid)}`);
        queries.push(`participant_uid=eq.${encodeURIComponent(state.profile.uid)}`);
      }
      if (state.uid && state.uid !== state.profile?.uid) queries.push(`participant_uid=eq.${encodeURIComponent(state.uid)}`);
      if (!queries.length) return [];

      const seen = new Map();
      for (const filter of queries) {
        const rows = await request(
          `field_demo_visit_participants?${filter}&select=*,field_demo_visits(*)&order=created_at.asc&limit=200`
        ).catch((error) => {
          console.log('field demo participant load skipped', error);
          return [];
        });
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          const visit = row.field_demo_visits;
          if (!visit?.id) return;
          const scheduled = new Date(visit.scheduled_start || '');
          if (!Number.isNaN(scheduled.getTime()) && (scheduled < start || scheduled >= end)) return;
          seen.set(row.id, row);
        });
      }
      return [...seen.values()];
    }

    function groupVisits(participantRows) {
      const visits = new Map();
      participantRows.forEach((participant) => {
        const visit = participant.field_demo_visits;
        if (!visit?.id) return;
        if (!visits.has(visit.id)) visits.set(visit.id, { ...visit, participants: [] });
        visits.get(visit.id).participants.push({ ...participant, field_demo_visits: undefined });
      });
      return [...visits.values()].sort((a, b) => new Date(a.scheduled_start || 0) - new Date(b.scheduled_start || 0));
    }

    function responsibilities(visit) {
      return [...new Set((visit.participants || []).map((row) => row.responsibility).filter(Boolean))];
    }

    function hasFinance(visit) {
      return responsibilities(visit).includes('financing_support');
    }

    function hasDemoWork(visit) {
      return responsibilities(visit).some((item) => ['product_demo', 'sign_setup', 'agent_onboarding'].includes(item));
    }

    async function loadBuyerRequestsForVisits(visits = []) {
      const next = {};
      for (const visit of visits) {
        if (!visit.open_house_event_id) continue;
        const eventId = visit.open_house_event_id;
        next[eventId] = await request(
          `event_checkins?open_house_event_id=eq.${encodeURIComponent(eventId)}&select=id,open_house_event_id,buyer_id,visitor_name,visitor_phone,visitor_email,pre_approved,metadata,created_at&order=created_at.desc&limit=50`
        ).catch((error) => {
          console.log('buyer request load skipped', eventId, error);
          return [];
        });
      }
      state.buyerRequests = next;
    }

    async function loadChatsForVisits(visits = []) {
      const nextConversations = {};
      const nextMessages = {};
      for (const visit of visits) {
        if (!visit.open_house_event_id) continue;
        const payload = await api('/api/event-chat/list', {
          open_house_event_id: visit.open_house_event_id
        }).catch((error) => {
          console.log('event chat load skipped', visit.open_house_event_id, error);
          return { conversations: [], messagesByConversation: {} };
        });
        nextConversations[visit.open_house_event_id] = payload.conversations || [];
        Object.assign(nextMessages, payload.messagesByConversation || {});
      }
      state.conversations = nextConversations;
      state.messages = nextMessages;
    }

    async function loadOutreachCandidates() {
      if (isLoanOfficerDashboard()) return [];
      if (!state.profile?.uid && !state.uid && !state.slug) return [];
      const payload = await api('/api/field-demo/outreach-candidates', {
        uid: state.profile?.uid || state.uid || '',
        slug: state.profile?.slug || state.slug || '',
        days: 10,
        limit: 50
      }).catch((error) => {
        console.log('outreach candidates load skipped', error);
        return { candidates: [] };
      });
      return payload.candidates || [];
    }

    async function loadAvailability() {
      if (!state.profile?.uid && !state.uid && !state.slug) return [];
      const payload = await api('/api/field-demo/availability', {
        action: 'list',
        uid: state.profile?.uid || state.uid || '',
        slug: state.profile?.slug || state.slug || '',
        days: 90
      }).catch((error) => {
        console.log('availability load skipped', error);
        return { availability: [] };
      });
      return payload.availability || [];
    }

    function visitStats() {
      const now = new Date();
      const today = now.toDateString();
      const tomorrowDate = new Date();
      tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrow = tomorrowDate.toDateString();
      const allRequests = Object.values(state.buyerRequests).flat();
      return {
        today: state.visits.filter((visit) => new Date(visit.scheduled_start || '').toDateString() === today).length,
        tomorrow: state.visits.filter((visit) => new Date(visit.scheduled_start || '').toDateString() === tomorrow).length,
        live: state.visits.filter((visit) => visit.status === 'live').length,
        buyers: allRequests.length,
        financing: allRequests.filter((row) => row.pre_approved === false || row.metadata?.financing_requested === true).length
      };
    }

    function formatMoney(value) {
      const number = Number(value);
      if (!Number.isFinite(number) || number <= 0) return '';
      return number.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
    }

    function stat(label, value, tone = 'slate') {
      const color = tone === 'green' ? 'text-emerald-700' : tone === 'blue' ? 'text-sky-700' : tone === 'rose' ? 'text-rose-700' : 'text-slate-900';
      return `<div class="rounded-[26px] border border-white/80 bg-white/75 p-5 shadow-sm">
        <div class="text-xs font-black uppercase tracking-[.16em] text-slate-500">${esc(label)}</div>
        <div class="mt-2 text-4xl font-black ${color}">${esc(value)}</div>
      </div>`;
    }

    function visitStatusPill(status) {
      const color = status === 'live' ? 'bg-emerald-100 text-emerald-700'
        : status === 'completed' || status === 'converted' ? 'bg-slate-100 text-slate-700'
          : status === 'cancelled' ? 'bg-rose-100 text-rose-700'
            : 'bg-sky-100 text-sky-700';
      return `<span class="rounded-full px-3 py-1 text-xs font-black uppercase tracking-[.12em] ${color}">${esc(status || 'scheduled')}</span>`;
    }

    function actionButton(label, onclick, tone = 'blue') {
      const palette = tone === 'green'
        ? 'bg-emerald-600 text-white'
        : tone === 'white'
          ? 'bg-white text-slate-700 ring-1 ring-slate-200'
          : 'bg-sky-600 text-white';
      return `<button type="button" onclick="${onclick}" class="rounded-full px-4 py-3 text-sm font-black ${palette}">${esc(label)}</button>`;
    }

    function primaryParticipant(visit, responsibility) {
      return (visit.participants || []).find((row) => row.responsibility === responsibility && row.is_primary)
        || (visit.participants || []).find((row) => row.responsibility === responsibility)
        || (visit.participants || [])[0]
        || {};
    }

    function participantName(row) {
      return row?.participant_name || state.profile?.full_name || 'Field Specialist';
    }

    function firstName(value) {
      const clean = String(value || '').trim();
      return clean.split(/\s+/)[0] || '';
    }

    function dashboardTitle() {
      if (!isLoanOfficerDashboard()) return 'Field Dashboard';
      const first = firstName(state.profile?.full_name || state.profile?.name || '');
      return first ? `${first}'s Dashboard` : 'Loan Officer Dashboard';
    }

    function dashboardKicker() {
      return isLoanOfficerDashboard() ? 'Loan Officer Command Center' : 'Next 7 Days';
    }

    function dashboardIntro() {
      if (!isLoanOfficerDashboard()) {
        return 'Schedule visits, go live for financing support, see buyer requests, and keep the event conversation in one place.';
      }
      return 'One place for open houses, buyer check-ins, affordability guidance, event chat, and agent relationships.';
    }

    function loanOfficerUid() {
      return state.profile?.uid || state.uid || '';
    }

    function normalizeLoanOfficerSection(value) {
      return ['lo-overview', 'lo-account', 'lo-availability', 'lo-agents', 'lo-open-houses'].includes(value) ? value : 'lo-overview';
    }

    function dashboardSectionHref(section) {
      const next = new URLSearchParams(window.location.search);
      next.set('role', 'loan_officer');
      next.set('section', normalizeLoanOfficerSection(section));
      if (state.profile?.uid && !next.get('uid')) next.set('uid', state.profile.uid);
      if (state.profile?.slug && !next.get('slug')) next.set('slug', state.profile.slug);
      return `/field-dashboard?${next.toString()}`;
    }

    function editProfileHref() {
      return dashboardSectionHref('lo-account');
    }

    function coverageSignSetupHref() {
      const query = new URLSearchParams();
      const uid = loanOfficerUid();
      if (uid) query.set('uid', uid);
      if (state.profile?.slug) query.set('slug', state.profile.slug);
      return `/lo-sign-setup${query.toString() ? `?${query.toString()}` : ''}`;
    }

    function affordabilityDashboardHref() {
      const query = new URLSearchParams();
      const uid = loanOfficerUid();
      if (uid) query.set('uid', uid);
      query.set('return_to', `/loan-officer-dashboard${uid ? `?uid=${encodeURIComponent(uid)}` : ''}`);
      return `/lo-affordability-guidance?${query.toString()}`;
    }

    function affordabilityHref(visit, row = {}) {
      const query = new URLSearchParams();
      const uid = state.profile?.uid || state.uid || '';
      if (uid) query.set('uid', uid);
      if (visit?.open_house_event_id) query.set('event', visit.open_house_event_id);
      if (row?.id) query.set('checkin_id', row.id);
      if (row?.buyer_id) query.set('buyer_id', row.buyer_id);
      if (visit?.agent_slug) query.set('agent', visit.agent_slug);
      const returnTo = new URLSearchParams();
      if (uid) returnTo.set('uid', uid);
      if (visit?.open_house_event_id) returnTo.set('event', visit.open_house_event_id);
      query.set('return_to', `/loan-officer-dashboard${returnTo.toString() ? `?${returnTo.toString()}` : ''}`);
      return `/lo-affordability-guidance?${query.toString()}`;
    }

    function renderLoanOfficerNav() {
      if (!isLoanOfficerDashboard()) return '';
      const active = normalizeLoanOfficerSection(state.activeSection);
      const items = [
        ['lo-overview', 'Home'],
        ['lo-account', 'Profile'],
        ['lo-availability', 'Times'],
        ['lo-agents', 'Agents'],
        ['lo-open-houses', 'Houses']
      ];
      return `
        <aside class="hidden rounded-[28px] border border-white/80 bg-white/75 p-4 shadow-sm lg:sticky lg:top-4 lg:block lg:self-start">
          <div class="text-xs font-black uppercase tracking-[.16em] text-slate-500">Dashboard Sections</div>
          <nav class="mt-3 grid gap-2">
            ${items.map(([id, label]) => `<a href="${esc(dashboardSectionHref(id))}" class="rounded-2xl px-3 py-3 text-sm font-black ring-1 ${id === active ? 'bg-sky-600 text-white ring-sky-600' : 'bg-white text-slate-700 ring-slate-100'}">${esc(label === 'Home' ? 'Overview' : label === 'Times' ? 'Availability' : label === 'Agents' ? 'My Agents' : 'Open Houses + Buyers')}</a>`).join('')}
          </nav>
        </aside>
        <nav class="lo-mobile-nav fixed inset-x-2 bottom-2 z-50 grid grid-cols-5 gap-1 rounded-[22px] border border-white/80 bg-white/95 p-2 shadow-[0_14px_45px_rgba(15,23,42,.24)] backdrop-blur lg:hidden">
          ${items.map(([id,label])=>`<a href="${esc(dashboardSectionHref(id))}" class="flex min-h-12 items-center justify-center rounded-2xl px-1 text-center text-[11px] font-black ${id===active?'bg-sky-600 text-white':'text-slate-600'}">${esc(label)}</a>`).join('')}
        </nav>
      `;
    }

    function buyerRequestCard(visit, row) {
      const meta = row.metadata || {};
      const name = row.visitor_name || meta.name || 'Buyer';
      const phone = row.visitor_phone || meta.phone || '';
      const email = row.visitor_email || meta.email || '';
      const preApproved = row.pre_approved === true ? 'Pre-approved'
        : row.pre_approved === false ? 'Needs financing'
          : 'Not shared';
      const financingRequested = row.pre_approved === false || meta.financing_requested === true;
      const textBody = `Hi ${name}, this is ${state.profile?.full_name || 'your NMB loan officer'} with REL8TION. I am live for this open house and can help with financing questions.`;
      return `

          <div class="flex flex-wrap items-start justify-between gap-3">
            <div>
              <div class="text-base font-black text-slate-900">${esc(name)}</div>
              <div class="mt-1 text-xs font-black uppercase tracking-[.1em] ${financingRequested ? 'text-rose-600' : 'text-slate-500'}">${esc(preApproved)}</div>

            </div>
            <div class="flex flex-wrap gap-2">
              <a href="${esc(telHref(phone))}" class="rounded-full bg-emerald-600 px-3 py-2 text-xs font-black text-white ${phone ? '' : 'pointer-events-none opacity-40'}">Call</a>
              <a href="${esc(smsHref(phone, textBody))}" class="rounded-full bg-white px-3 py-2 text-xs font-black text-emerald-700 ring-1 ring-emerald-200 ${phone ? '' : 'pointer-events-none opacity-40'}">Text</a>
              <a href="${esc(affordabilityHref(visit, row))}" class="rounded-full bg-white px-3 py-2 text-xs font-black text-violet-700 ring-1 ring-violet-200">Affordability</a>
              <button type="button" onclick="window.openBuyerChat('${esc(visit.id)}','${esc(row.id)}')" class="rounded-full bg-sky-600 px-3 py-2 text-xs font-black text-white">Open Chat</button>

    function renderBuyerRequests(visit) {
      if (!visit.open_house_event_id) {
        return `<div class="mt-4 rounded-2xl bg-white/75 p-4 text-sm font-bold text-slate-500 ring-1 ring-emerald-100">Attach this visit to an open house event before buyer requests can appear here.</div>`;

      const needsHelp = rows.filter((row) => row.pre_approved === false || row.metadata?.financing_requested === true);
      return `
        <div class="mt-4 rounded-[22px] bg-white/80 p-4 ring-1 ring-emerald-100">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-xs font-black uppercase tracking-[.14em] text-emerald-700">Buyer Requests + Affordability</div>
              <div class="mt-1 text-sm font-extrabold text-slate-600">${rows.length} check-ins - ${needsHelp.length} financing follow-up</div>
            </div>
            <button type="button" onclick="window.refreshDashboard()" class="rounded-full bg-emerald-50 px-3 py-2 text-xs font-black text-emerald-700 ring-1 ring-emerald-100">Refresh</button>

          <div class="mt-3 grid gap-2">
            ${rows.length ? rows.map((row) => buyerRequestCard(visit, row)).join('') : `<div class="rounded-2xl bg-white/75 p-4 text-sm font-bold text-slate-500 ring-1 ring-slate-100">No buyer check-ins yet. New financing opt-ins and affordability work will appear here without opening the agent dashboard.</div>`}
          </div>
        </div>
      `;
    }

    function workedAgents() {
      const agents = new Map();
      const visits = state.relationshipVisits?.length ? state.relationshipVisits : state.visits;
      visits.forEach((visit) => {
        const key = visit.agent_slug || cleanPhone(visit.agent_phone) || String(visit.agent_email || '').toLowerCase() || visit.agent_name || visit.id;
        if (!key) return;
        const existing = agents.get(key) || {
          agent_slug: visit.agent_slug || '',
          agent_name: visit.agent_name || visit.agent_slug || 'Agent',
          agent_phone: visit.agent_phone || '',
          agent_email: visit.agent_email || '',
          brokerage: visit.brokerage || '',
          visits: 0,
          buyer_count: 0,
          live_count: 0,
          latest_time: '',
          latest_visit: visit
        };
        existing.agent_slug = existing.agent_slug || visit.agent_slug || '';
        existing.agent_name = existing.agent_name || visit.agent_name || visit.agent_slug || 'Agent';
        existing.agent_phone = existing.agent_phone || visit.agent_phone || '';
        existing.agent_email = existing.agent_email || visit.agent_email || '';
        existing.brokerage = existing.brokerage || visit.brokerage || '';
        existing.visits += 1;
        existing.buyer_count += (state.buyerRequests[visit.open_house_event_id] || []).length;
        existing.live_count += visit.status === 'live' ? 1 : 0;
        const visitTime = visit.scheduled_start || visit.created_at || '';
        if (!existing.latest_time || new Date(visitTime || 0) > new Date(existing.latest_time || 0)) {
          existing.latest_time = visitTime;
          existing.latest_visit = visit;
        }
        agents.set(key, existing);
      });
      return [...agents.values()].sort((a, b) => new Date(b.latest_time || 0) - new Date(a.latest_time || 0));
    }

    function agentEventDashboardHref(agent) {
      const visit = agent.latest_visit || {};
      const query = new URLSearchParams();
      if (agent.agent_slug) query.set('agent', agent.agent_slug);
      if (visit.open_house_event_id) query.set('event', visit.open_house_event_id);
      return query.toString() ? `/agent-dashboard?${query.toString()}` : '';
    }

    function renderWorkedAgentsPanel(agents = workedAgents()) {
      if (!isLoanOfficerDashboard()) return '';
      return `
        <section id="lo-agents" class="mb-6 scroll-mt-5 rounded-[30px] border border-white/80 bg-white/75 p-5 shadow-sm">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <div class="text-xs font-black uppercase tracking-[.18em] text-violet-700">Agent Relationships</div>
              <h2 class="mt-1 font-['Plus_Jakarta_Sans'] text-3xl font-extrabold">Worked Agents</h2>
              <p class="mt-1 max-w-2xl text-sm font-semibold text-slate-500">Agents tied to assigned open houses, coverage sign activations, and buyer-support sessions appear here.</p>
            </div>
            <div class="rounded-full bg-violet-50 px-4 py-2 text-sm font-black text-violet-700 ring-1 ring-violet-100">${agents.length} agent${agents.length === 1 ? '' : 's'}</div>
          </div>
          <div class="mt-4 grid gap-3 lg:grid-cols-2">
            ${agents.length ? agents.map((agent) => {
              const dashboardHref = agentEventDashboardHref(agent);
              const textBody = `Hi ${agent.agent_name || 'there'}, this is ${state.profile?.full_name || 'your loan officer'} from Rel8tion. I am checking in from our open-house coverage.`;
              return `
                <article class="rounded-[24px] bg-white/85 p-4 ring-1 ring-slate-100">
                  <div class="flex flex-wrap items-start justify-between gap-3">
                    <div>
                      <h3 class="text-xl font-black leading-tight">${esc(agent.agent_name || 'Agent')}</h3>
                      <p class="mt-1 text-sm font-bold text-slate-500">${esc(agent.brokerage || 'Brokerage not set')}</p>
                      <p class="mt-1 text-xs font-black uppercase tracking-[.12em] text-slate-400">${esc(agent.visits)} coverage event${agent.visits === 1 ? '' : 's'} - ${esc(agent.buyer_count)} buyer check-in${agent.buyer_count === 1 ? '' : 's'}</p>
                    </div>
                    ${agent.live_count ? `<span class="rounded-full bg-emerald-100 px-3 py-1 text-xs font-black uppercase tracking-[.12em] text-emerald-700">Live</span>` : ''}
                  </div>
                  <div class="mt-3 flex flex-wrap gap-2">
                    <a href="${esc(telHref(agent.agent_phone))}" class="rounded-full bg-white px-3 py-2 text-xs font-black text-slate-700 ring-1 ring-slate-200 ${agent.agent_phone ? '' : 'pointer-events-none opacity-40'}">Call</a>
                    <a href="${esc(smsHref(agent.agent_phone, textBody))}" class="rounded-full bg-white px-3 py-2 text-xs font-black text-slate-700 ring-1 ring-slate-200 ${agent.agent_phone ? '' : 'pointer-events-none opacity-40'}">Text</a>
                    ${dashboardHref ? `<a href="${esc(dashboardHref)}" class="rounded-full bg-sky-600 px-3 py-2 text-xs font-black text-white">Event Dashboard</a>` : ''}
                  </div>
                  <p class="mt-3 text-xs font-bold text-slate-400">Latest: ${esc(fmtTime(agent.latest_time))}</p>
                </article>
              `;
            }).join('') : `<div class="rounded-2xl bg-white/70 p-5 text-sm font-bold text-slate-500 ring-1 ring-slate-100 lg:col-span-2">No worked agents yet. Once this LO covers an open house or activates a coverage sign, agent relationships will collect here.</div>`}
          </div>
        </section>
      `;
    }

    function renderLoanOfficerQuickActions() {
      if (!isLoanOfficerDashboard()) return '';
      const actions = [
        {
          href: coverageSignSetupHref(),
          label: 'Set Up Coverage Sign',
          text: 'Scan the sign QR, then tap both sign chips.',
          tone: 'bg-sky-600 text-white ring-sky-600'

        {
          href: editProfileHref(),
          label: 'Edit Profile',
          text: 'Update photo, phone, company, and verified page details.',
          tone: 'bg-white text-slate-800 ring-slate-100'
        },
        {
          href: affordabilityDashboardHref(),

          tone: 'bg-white text-slate-800 ring-slate-100'

    function loanOfficerUrgentItems() {
      const items = [];
      const financingRows = [];
      state.visits.forEach((visit) => {
        const rows = state.buyerRequests[visit.open_house_event_id] || [];
        rows.forEach((row) => {
          if (row.pre_approved === false || row.metadata?.financing_requested === true) {
            financingRows.push({ visit, row });
          }
        });
      });

      financingRows.slice(0, 3).forEach(({ visit, row }) => {
        items.push({
          tone: 'rose',
          title: `${row.visitor_name || row.metadata?.name || 'Buyer'} requested financing help`,
          body: [visit.agent_name, visit.open_house_id || visit.open_house_event_id, fmtTime(row.created_at)].filter(Boolean).join(' - '),
          href: affordabilityHref(visit, row),
          action: 'Open Affordability'
        });
      });

      state.visits.filter((visit) => visit.status === 'live').slice(0, 2).forEach((visit) => {
        items.push({
          tone: 'emerald',
          title: `Live coverage: ${visit.agent_name || visit.agent_slug || 'Open house'}`,
          body: [visit.open_house_id || visit.open_house_event_id, fmtTime(visit.scheduled_start)].filter(Boolean).join(' - '),
          href: dashboardSectionHref('lo-open-houses'),
          action: 'Open Events'
        });
      });

      if (state.profile && !state.profile.photo_url) {
        items.push({
          tone: 'sky',
          title: 'Add your profile photo',
          body: 'Buyer check-in and event support pages look stronger with your verified photo.',
          href: editProfileHref(),

        });

      if (!state.availability.length) {

          title: 'Set coverage availability',

      return items.slice(0, 4);

      const toneClass = (tone) => tone === 'rose'
        ? 'border-rose-200 bg-rose-50 text-rose-800'
        : tone === 'emerald'
          ? 'border-emerald-200 bg-emerald-50 text-emerald-800'
          : tone === 'sky'
            ? 'border-sky-200 bg-sky-50 text-sky-800'

      return `
        <section class="mb-6 rounded-[30px] border border-white/80 bg-white/75 p-5 shadow-sm">

          </div>
        </section>
      `;
    }

    function renderLoanOfficerTopOpenHouses() {
      if (!isLoanOfficerDashboard()) return '';

        .sort((a, b) => (b.status === 'live') - (a.status === 'live') || new Date(a.scheduled_start || 0) - new Date(b.scheduled_start || 0))
        .slice(0, 3);
      return `
        <section class="mb-6 rounded-[30px] border border-white/80 bg-white/75 p-5 shadow-sm">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <div>
              <div class="text-xs font-black uppercase tracking-[.18em] text-sky-700">Coverage</div>
              <h2 class="mt-1 font-['Plus_Jakarta_Sans'] text-3xl font-extrabold">Next Open Houses</h2>
            </div>
            <a href="${esc(dashboardSectionHref('lo-open-houses'))}" class="rounded-full bg-sky-600 px-4 py-2 text-sm font-black text-white">View All</a>

                  <div class="flex flex-wrap items-center gap-2">${visitStatusPill(visit.status)}</div>
                  <h3 class="mt-3 text-lg font-black leading-tight">${esc(agentLine || 'Assigned coverage')}</h3>
                  <p class="mt-1 text-sm font-bold text-slate-500">${esc(visit.open_house_id || visit.open_house_event_id || 'Open house')}</p>
                  <p class="mt-1 text-sm font-bold text-slate-500">${esc(fmtTime(visit.scheduled_start))} - ${esc(fmtTime(visit.scheduled_end))}</p>

                </article>
              `;
            }).join('') : `<div class="rounded-[24px] bg-white/70 p-5 text-sm font-bold text-slate-500 ring-1 ring-slate-100 lg:col-span-3">No upcoming open houses yet. At the open house, scan your Coverage Sign QR to start live coverage and link a Sponsored Event Pass.</div>`}
          </div>
        </section>
      `;

    function conversationTitle(conversation) {

        return `<div class="rounded-2xl bg-white/70 p-4 text-sm font-bold text-slate-500 ring-1 ring-slate-100">No messages yet. Send the first note to start the event thread.</div>`;

        return `<div class="flex ${own ? 'justify-end' : 'justify-start'}">
          <div class="max-w-[86%] rounded-2xl ${own ? 'bg-emerald-600 text-white' : 'bg-white text-slate-700 ring-1 ring-slate-100'} px-4 py-3">
            <div class="text-[10px] font-black uppercase tracking-[.12em] ${own ? 'text-emerald-50' : 'text-slate-400'}">${esc(message.sender_name || titleize(message.sender_role))} - ${esc(fmtShort(message.created_at))}</div>
            <div class="mt-1 text-sm font-bold leading-relaxed">${esc(message.body)}</div>
          </div>
        </div>`;
      }).join('');

      if (!visit.open_house_event_id) return '';
      const conversations = state.conversations[visit.open_house_event_id] || [];
      const activeId = state.activeConversationByVisit[visit.id] || conversations[0]?.id || '';
      const active = conversations.find((row) => row.id === activeId) || conversations[0] || null;
      return `
        <section class="rounded-[24px] border border-sky-200 bg-sky-50/80 p-4">

              <div class="mt-3 grid gap-2">

              </div>

            ${hasFinance(visit) ? `
              <section class="rounded-[24px] border border-emerald-200 bg-emerald-50/85 p-4">

          ${renderLoanOfficerTopOpenHouses()}
        ` : ''}

        ${isLoanOfficerDashboard() ? '' : renderSchedulePanel()}

        ${isLoanOfficerDashboard() && activeSection === 'lo-account' ? renderAccountPanel() : ''}

        ${!isLoanOfficerDashboard() || activeSection === 'lo-availability' ? `<div id="lo-availability" class="scroll-mt-5">${renderAvailabilityPanel()}</div>` : ''}

        ${!isLoanOfficerDashboard() || activeSection === 'lo-agents' ? renderWorkedAgentsPanel(agents) : ''}

        ${isLoanOfficerDashboard() ? '' : renderOutreachPanel()}

        ${!isLoanOfficerDashboard() || activeSection === 'lo-open-houses' ? `
        <section id="lo-open-houses" class="grid scroll-mt-5 gap-4">
          ${state.visits.length ? state.visits.map(renderVisit).join('') : `<div class="rounded-[28px] border border-dashed border-slate-300 bg-white/65 p-8 text-center">
            <h2 class="font-['Plus_Jakarta_Sans'] text-2xl font-extrabold">${isLoanOfficerDashboard() ? 'No Upcoming Open Houses Assigned' : 'No Assigned Visits In The Next 7 Days'}</h2>
            <p class="mt-2 font-semibold text-slate-500">${isLoanOfficerDashboard() ? 'Assigned open houses will appear here with agent, listing, buyer financing, and live-event context.' : 'Use Schedule Visit to create the next field coverage, then send outreach with a concrete appointment path.'}</p>
          </div>`}
        </section>
        ` : ''}
      `;
      app.innerHTML = isLoanOfficerDashboard()
        ? `<div class="grid gap-5 lg:grid-cols-[220px_minmax(0,1fr)]">${renderLoanOfficerNav()}<div class="min-w-0">${dashboardBody}</div></div>`
        : dashboardBody;
      document.getElementById('schedule-form')?.addEventListener('submit', handleScheduleSubmit);
      document.getElementById('availability-form')?.addEventListener('submit', handleAvailabilitySubmit);
      document.getElementById('lo-account-form')?.addEventListener('submit', handleAccountSubmit);
    }

    async function photoDataUrl(file) {
      if (!file || !file.size) return '';
      if (!/^image\/(jpeg|png|webp)$/i.test(file.type) || file.size > 12 * 1024 * 1024) throw new Error('Choose a JPG, PNG, or WebP image smaller than 12 MB.');
      const bitmap = await createImageBitmap(file);
      const scale = Math.min(1, 640 / Math.max(bitmap.width, bitmap.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(bitmap.width * scale)); canvas.height = Math.max(1, Math.round(bitmap.height * scale));
      canvas.getContext('2d').drawImage(bitmap, 0, 0, canvas.width, canvas.height); bitmap.close();
      return canvas.toDataURL('image/jpeg', .82);
    }

    async function handleAccountSubmit(event) {
      event.preventDefault();
      if (!state.authSession?.access_token) { state.error = 'Sign in through the Loan Officer Account page before editing your profile.'; render(); return; }
      const data = new FormData(event.currentTarget);
      try {
        state.message = 'Saving account...'; state.error = ''; render();
        const image = await photoDataUrl(data.get('photo'));
        const response = await fetch('/api/loan-officer-account', { method:'PATCH', headers:{ Authorization:`Bearer ${state.authSession.access_token}`, 'Content-Type':'application/json' }, body:JSON.stringify({ full_name:data.get('full_name'), email:data.get('email'), phone:data.get('phone'), company_name:data.get('company_name'), title:data.get('title'), photo_data_url:image }) });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || 'Unable to save account.');
        state.profile = payload.profile;
        if (payload.email_changed) { await authClient.auth.signOut(); window.location.href='/loan-officer'; return; }
        await refresh('Account and public profile updated.');
      } catch (error) { state.error = error.message || 'Unable to save account.'; state.message = ''; render(); }
    }

    function selectedVisit(visitId) {
      return state.visits.find((visit) => visit.id === visitId);
    }

    function currentParticipantPayload(responsibility, isPrimary = false, overrides = {}) {
      const profileUid = state.profile?.uid || '';
      const participantUid = profileUid || state.uid || '';
      const roleByResponsibility = {
        financing_support: 'loan_officer',
        product_demo: 'demo_presenter',
        sign_setup: 'field_sales_rep',
        agent_onboarding: 'onboarding_specialist'
      };
      return {
        participant_profile_id: isUuid(profileUid) ? profileUid : null,
        participant_uid: participantUid || null,
        participant_name: state.profile?.full_name || document.querySelector('[name="participant_name"]')?.value || null,
        participant_phone: state.profile?.phone || document.querySelector('[name="participant_phone"]')?.value || null,
        participant_email: state.profile?.email || document.querySelector('[name="participant_email"]')?.value || null,
        participant_company: state.profile?.company_name || document.querySelector('[name="participant_company"]')?.value || 'Nationwide Mortgage Bankers',
        role: roleByResponsibility[responsibility],
        responsibility,
        is_primary: isPrimary,
        ...overrides
      };
    }

    async function handleScheduleSubmit(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = new FormData(form);
      const responsibilitiesSelected = data.getAll('responsibilities');
      if (!responsibilitiesSelected.length) {
        state.error = 'Select at least one responsibility for the visit.';
        render();
        return;
      }
      const scheduledStart = new Date(`${data.get('date')}T${data.get('start_time')}`);
      const scheduledEnd = new Date(`${data.get('date')}T${data.get('end_time')}`);
      if (Number.isNaN(scheduledStart.getTime()) || Number.isNaN(scheduledEnd.getTime()) || scheduledEnd <= scheduledStart) {
        state.error = 'Use a valid start and end time.';
        render();
        return;
      }

      try {
        state.error = '';
        state.message = 'Creating scheduled visit...';
        render();
        const participants = responsibilitiesSelected.map((responsibility, index) => currentParticipantPayload(responsibility, index === 0));
        await api('/api/field-demo/create', {
          agent_name: data.get('agent_name') || null,
          agent_phone: data.get('agent_phone') || null,
          agent_email: data.get('agent_email') || null,
          brokerage: data.get('brokerage') || null,
          open_house_event_id: data.get('open_house_event_id') || null,
          open_house_id: data.get('open_house_id') || null,
          demo_public_code: data.get('demo_public_code') || null,
          coverage_mode: data.get('coverage_mode') || 'physical_demo',
          demo_type: responsibilitiesSelected.includes('agent_onboarding') ? 'agent_onboarding' : 'buyer_financing_support',
          scheduled_start: scheduledStart.toISOString(),
          scheduled_end: scheduledEnd.toISOString(),
          source: 'field_dashboard',
          notes: data.get('notes') || null,
          participants
        });
        state.scheduleOpen = false;
        await refresh('Scheduled visit created.');
      } catch (error) {
        state.error = error.message || 'Could not create scheduled visit.';
        render();
      }
    }

    async function handleAvailabilitySubmit(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = new FormData(form);
      let slots = [];
      try {
        slots = buildAvailabilitySlots(data);
      } catch (error) {
        state.error = error.message || 'Use a valid availability start and end time.';
        render();
        return;
      }

      try {
        state.error = '';
        state.message = `Saving ${slots.length} coverage ${slots.length === 1 ? 'window' : 'windows'}...`;
        render();
        for (const slot of slots) {
          await api('/api/field-demo/availability', {
            action: 'upsert',
            uid: state.profile?.uid || state.uid || '',
            slug: state.profile?.slug || state.slug || '',
            role: data.get('role') || 'loan_officer',
            responsibility: data.get('responsibility') || 'financing_support',
            service_zip: data.get('service_zip') || '',
            service_radius_miles: data.get('service_radius_miles') || 15,
            available_start: slot.available_start,
            available_end: slot.available_end,
            status: slot.status,
            notes: data.get('notes') || (slot.status === 'unavailable' ? 'Not available' : null)
          });
        }
        await refresh(`${slots.length} coverage ${slots.length === 1 ? 'window' : 'windows'} saved.`);
      } catch (error) {
        state.error = error.message || 'Could not save availability.';
        render();
      }
    }

    function publicProfileHref() {
      return state.profile?.slug ? `/nmb-verified?slug=${encodeURIComponent(state.profile.slug)}` : '#';
    }

    function renderProfileHeader() {
      if (!isLoanOfficerDashboard() || !state.profile) return '';
      const photo = state.profile.photo_url || '';
      return `<section class="mb-6 flex flex-col gap-4 rounded-[28px] border border-white/80 bg-white/80 p-4 shadow-sm sm:flex-row sm:items-center sm:p-5">
        ${photo ? `<img src="${esc(photo)}" alt="${esc(state.profile.full_name)}" class="h-24 w-24 shrink-0 rounded-[24px] object-cover ring-4 ring-white sm:h-28 sm:w-28">` : `<div class="grid h-24 w-24 shrink-0 place-items-center rounded-[24px] bg-sky-100 text-3xl font-black text-sky-700 sm:h-28 sm:w-28">${esc((state.profile.full_name || 'LO').split(/\s+/).map((part)=>part[0]).join('').slice(0,2))}</div>`}
        <div class="min-w-0 flex-1"><div class="text-xs font-black uppercase tracking-[.16em] text-sky-700">Verified Loan Officer</div><h1 class="mt-1 break-words font-['Plus_Jakarta_Sans'] text-3xl font-extrabold sm:text-4xl">${esc(state.profile.full_name || 'Loan Officer')}</h1><p class="mt-1 font-bold text-slate-500">${esc([state.profile.title,state.profile.company_name].filter(Boolean).join(' · '))}</p><p class="mt-1 break-all text-sm font-bold text-slate-400">${esc([state.profile.phone,state.profile.email].filter(Boolean).join(' · '))}</p></div>
        <div class="grid shrink-0 gap-2"><a href="${esc(dashboardSectionHref('lo-account'))}" class="rounded-full bg-sky-600 px-4 py-3 text-center text-sm font-black text-white">Edit Account</a><a href="${esc(publicProfileHref())}" target="_blank" rel="noopener" class="rounded-full bg-white px-4 py-3 text-center text-sm font-black text-slate-700 ring-1 ring-slate-200">View / Share Profile</a></div>
      </section>`;
    }

    function renderAccountPanel() {
      if (!isLoanOfficerDashboard()) return '';
      const p = state.profile || {};
      return `<section id="lo-account" class="mb-6 rounded-[30px] border border-white/80 bg-white/80 p-5 shadow-sm"><div class="text-xs font-black uppercase tracking-[.18em] text-sky-700">Account + Shared Profile</div><h2 class="mt-1 font-['Plus_Jakarta_Sans'] text-3xl font-extrabold">Edit Your Profile</h2><p class="mt-2 text-sm font-semibold text-slate-500">These details and your photo also appear on the public profile you share with potential clients.</p><form id="lo-account-form" class="mt-5 grid gap-3 sm:grid-cols-2"><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Headshot<input name="photo" type="file" accept="image/jpeg,image/png,image/webp" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base"></label><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Name<input name="full_name" required value="${esc(p.full_name)}" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold normal-case tracking-normal"></label><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Email<input name="email" type="email" required value="${esc(p.email)}" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold normal-case tracking-normal"></label><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Mobile Phone<input name="phone" required value="${esc(p.phone)}" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold normal-case tracking-normal"></label><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Company<input name="company_name" required value="${esc(p.company_name)}" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold normal-case tracking-normal"></label><label class="grid gap-1 text-xs font-black uppercase tracking-[.12em] text-slate-500">Title<input name="title" required value="${esc(p.title || 'Loan Officer')}" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-base font-bold normal-case tracking-normal"></label><button type="submit" class="rounded-full bg-sky-600 px-5 py-4 text-base font-black text-white sm:col-span-2">Save Account + Public Profile</button></form></section>`;
    }

    async function refresh(message = '') {
      state.message = message;
      state.error = '';
      state.profile = await loadProfile();
      state.availability = await loadAvailability();
      state.outreachCandidates = await loadOutreachCandidates();
      const rows = await loadParticipantRows(dashboardRange());
      state.visits = await loadVisitContexts(groupVisits(rows));
      if (isLoanOfficerDashboard()) {
        const relationshipRows = await loadParticipantRows(relationshipRange());
        state.relationshipVisits = groupVisits(relationshipRows);
      } else {
        state.relationshipVisits = state.visits;
      }
      const buyerVisitMap = new Map();
      [...state.visits, ...state.relationshipVisits].forEach((visit) => {
        if (visit?.id) buyerVisitMap.set(visit.id, visit);
      });
      await loadBuyerRequestsForVisits([...buyerVisitMap.values()]);
      await loadChatsForVisits(state.visits);
      render();
    }

    window.toggleSchedule = () => {
      state.scheduleOpen = !state.scheduleOpen;
      render();
    };

    window.refreshDashboard = () => refresh('Dashboard refreshed.');

    window.cancelAvailability = async (availabilityId) => {
      try {
        await api('/api/field-demo/availability', {
          action: 'cancel',
          uid: state.profile?.uid || state.uid || '',
          slug: state.profile?.slug || state.slug || '',
          id: availabilityId
        });
        await refresh('Availability slot cancelled.');
      } catch (error) {
        state.error = error.message || 'Could not cancel availability.';
        render();
      }
    };

    function participantFromAvailability(candidate, isPrimary = true) {
      return {
        participant_profile_id: candidate.participant_profile_id || null,
        participant_uid: candidate.participant_uid || candidate.participant_profile_id || null,
        participant_name: candidate.participant_name || 'Available Field Support',
        participant_phone: candidate.participant_phone || null,
        participant_email: candidate.participant_email || null,
        participant_company: candidate.participant_company || 'Nationwide Mortgage Bankers',
        role: candidate.role || 'loan_officer',
        responsibility: candidate.responsibility || 'financing_support',
        availability_id: candidate.id,
        assignment_score: candidate.assignment_score,
        assignment_reason: candidate.assignment_reason,
        is_primary: isPrimary
      };
    }

    window.scheduleFromOutreach = async (queueId) => {
      try {
        if (isLoanOfficerDashboard()) throw new Error('Outreach scheduling is not available on the loan officer dashboard.');
        const row = (state.outreachCandidates || []).find((candidate) => candidate.id === queueId);
        if (!row?.id) throw new Error('Outreach row not found.');
        const scheduledStart = row.open_start ? new Date(row.open_start) : new Date();
        const scheduledEnd = row.open_end ? new Date(row.open_end) : new Date(scheduledStart.getTime() + 2 * 60 * 60 * 1000);
        if (Number.isNaN(scheduledStart.getTime()) || Number.isNaN(scheduledEnd.getTime())) {
          throw new Error('This outreach row does not have a usable open house time.');
        }
        const zip = row.zip || extractZip(row.address);
        const support = await api('/api/field-demo/available-support', {
          responsibility: 'financing_support',
          open_house_id: row.open_house_id || null,
          address: row.address || '',
          property_zip: zip,
          scheduled_start: scheduledStart.toISOString(),
          scheduled_end: scheduledEnd.toISOString(),
          limit: 1
        }).catch(() => ({ candidates: [] }));
        const bestFinancing = support.candidates?.[0] || null;
        const participants = [];
        if (bestFinancing) {
          participants.push(participantFromAvailability(bestFinancing, true));
        } else {
          participants.push(currentParticipantPayload('financing_support', true, {
            assignment_reason: 'No matching open availability found; assigned to scheduler profile.'
          }));
        }
        participants.push(currentParticipantPayload('product_demo', false));
        participants.push(currentParticipantPayload('sign_setup', false));
        participants.push(currentParticipantPayload('agent_onboarding', false));
        await api('/api/field-demo/create', {
          outreach_queue_id: row.id,
          agent_name: row.agent_name || row.agent_first_name || null,
          agent_phone: row.agent_phone || null,
          agent_email: row.agent_email || null,
          brokerage: row.brokerage || null,
          open_house_id: row.open_house_id || null,
          property_zip: zip || null,
          assignment_source: bestFinancing ? 'availability_zip_match' : 'scheduler_fallback',
          assigned_by_availability_id: bestFinancing?.id || null,
          coverage_mode: 'physical_demo',
          demo_type: 'agent_onboarding',
          scheduled_start: scheduledStart.toISOString(),
          scheduled_end: scheduledEnd.toISOString(),
          source: 'agent_outreach',
          notes: `Scheduled from outreach queue for ${row.address || row.open_house_id || 'open house'}.`,
          participants
        });
        await refresh(bestFinancing ? `Outreach visit scheduled with ${bestFinancing.participant_name || 'available support'}.` : 'Outreach visit scheduled with scheduler fallback.');
      } catch (error) {
        state.error = error.message || 'Could not schedule outreach visit.';
        render();
      }
    };

    window.selectConversation = (visitId, conversationId) => {
      state.activeConversationByVisit[visitId] = conversationId;
      render();
    };

    window.openBuyerChat = async (visitId, checkinId) => {
      try {
        const visit = selectedVisit(visitId);
        const checkin = (state.buyerRequests[visit?.open_house_event_id] || []).find((row) => row.id === checkinId);
        if (!visit?.open_house_event_id || !checkin?.id) throw new Error('Missing visit or buyer request.');
        const meta = checkin.metadata || {};
        const payload = await api('/api/event-chat/send', {
          open_house_event_id: visit.open_house_event_id,
          field_demo_visit_id: visit.id,
          buyer_checkin_id: checkin.id,
          buyer_name: checkin.visitor_name || meta.name || 'Buyer',
          buyer_phone: checkin.visitor_phone || meta.phone || '',
          agent_slug: visit.agent_slug || '',
          agent_name: visit.agent_name || '',
          agent_phone: visit.agent_phone || '',
          loan_officer_slug: state.profile?.slug || '',
          loan_officer_name: state.profile?.full_name || '',
          loan_officer_phone: state.profile?.phone || '',
          metadata: {
            loan_officer_company: state.profile?.company_name || '',
            loan_officer_photo_url: state.profile?.photo_url || ''
          },
          sender_role: 'system',
          sender_name: 'REL8TION',
          body: 'Field support opened this buyer financing conversation.'
        });
        state.activeConversationByVisit[visit.id] = payload.conversation?.id || '';
        await refresh('Buyer chat opened.');
      } catch (error) {
        state.error = error.message || 'Could not open buyer chat.';
        render();
      }
    };

    window.sendEventMessage = async (visitId, conversationId) => {
      try {
        const visit = selectedVisit(visitId);
        const textarea = document.getElementById(`chat-draft-${visitId}-${conversationId}`);
        const body = textarea?.value?.trim() || '';
        if (!body) throw new Error('Type a message first.');
        const payload = await api('/api/event-chat/send', {
          conversation_id: conversationId,
          open_house_event_id: visit?.open_house_event_id || '',
          field_demo_visit_id: visit?.id || null,
          agent_slug: visit?.agent_slug || '',
          agent_name: visit?.agent_name || '',
          agent_phone: visit?.agent_phone || '',
          loan_officer_slug: state.profile?.slug || '',
          loan_officer_name: state.profile?.full_name || '',
          loan_officer_phone: state.profile?.phone || '',
          metadata: {
            loan_officer_company: state.profile?.company_name || '',
            loan_officer_photo_url: state.profile?.photo_url || ''
          },
          sender_role: hasFinance(visit) ? 'loan_officer' : 'field_specialist',
          sender_name: state.profile?.full_name || 'Field Specialist',
          sender_phone: state.profile?.phone || '',
          sender_uid: state.profile?.uid || state.uid || '',
          sender_slug: state.profile?.slug || '',
          body
        });
        textarea.value = '';
        state.activeConversationByVisit[visitId] = conversationId;
        await refresh(payload.notification?.warning ? 'Message saved. Buyer SMS notification needs review.' : 'Message sent and buyer notified.');
      } catch (error) {
        state.error = error.message || 'Could not send message.';
        render();
      }
    };

    window.updateVisit = async (visitId, status) => {
      try {
        await api('/api/field-demo/update-status', { visit_id: visitId, status });
        await refresh(`Visit marked ${titleize(status)}.`);
      } catch (error) {
        state.error = error.message || 'Could not update visit.';
        render();
      }
    };

    window.updateParticipant = async (participantId, status) => {
      try {
        if (!participantId) throw new Error('No participant id was available for this action.');
        await api('/api/field-demo/update-participant-status', { participant_id: participantId, status });
        await refresh(`Participant marked ${titleize(status)}.`);
      } catch (error) {
        state.error = error.message || 'Could not update participant.';
        render();
      }
    };

    window.updateVisitAndParticipant = async (visitId, participantId, status) => {
      try {
        await api('/api/field-demo/update-status', { visit_id: visitId, status });
        if (participantId) await api('/api/field-demo/update-participant-status', { participant_id: participantId, status });
        await refresh(`Visit marked ${titleize(status)}.`);
      } catch (error) {
        state.error = error.message || 'Could not update visit.';
        render();
      }
    };

    window.startVisit = async (visitId, participantId) => {
      try {
        await api('/api/field-demo/start', { visit_id: visitId, participant_id: participantId || null });
        await refresh('Field demo is live. Financing coverage is linked when this visit has an event and financing participant.');
      } catch (error) {
        state.error = error.message || 'Could not start field demo.';
        render();
      }
    };

    window.convertVisit = async (visitId) => {
      try {
        await api('/api/field-demo/convert-agent', { visit_id: visitId, agent_onboarded: true });
        await refresh('Agent converted to virtual support.');
      } catch (error) {
        state.error = error.message || 'Could not convert agent.';
        render();
      }
    };

    authClient.auth.getSession().then(({data}) => { state.authSession=data.session || null; return refresh(); }).catch((error) => { state.error=error.message || 'Could not load field dashboard.'; render(); });
  </script>
</body>
