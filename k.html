<!-- REL8TION /k PAGE
     Keeps ALL /k functionality
     Uses homepage styling + moving house/agents background
     Cleaned: one logo, one header, no duplicate visual header
-->

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<div id="kapp" class="rel8tion-wrapper">
  <div class="moving-clouds"></div>

  <div class="scene-stage">
    <img
      src="https://rel8tion.me/wp-content/uploads/2026/04/trythisbackround.png"
      class="house-img"
      alt="House Background"
    >
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/agent1A.png" class="agent-cutout agent-1" alt="Agent">
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/agent2A.png" class="agent-cutout agent-2" alt="Agent">
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/agent3a.png" class="agent-cutout agent-3" alt="Agent">
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/agent4A.png" class="agent-cutout agent-4" alt="Agent">
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/agent5a.png" class="agent-cutout agent-5" alt="Moving Agent">
  </div>

  <div class="fade-overlay"></div>

  <div class="k-shell">
    <div class="glass-card k-card">
      <div class="k-logo-wrap">
        <img
          src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png"
          alt="Rel8tion"
          class="k-logo"
        >
      </div>

      <h1 id="status" class="k-title">Connecting...</h1>

      <p id="substatus" class="k-subtitle">
        Syncing your Rel8tion chip and checking setup.
      </p>

      <div class="k-progress-track">
        <div id="progressBar" class="k-progress-bar"></div>
      </div>

      <div class="k-spinner"></div>

      <p class="k-footer-note">
        This only takes a second
      </p>
    </div>
  </div>
</div>

<style>

    margin: 0 !important;
    padding: 0 !important;
    overflow-x: hidden !important;
    background-color: #f0f7ff;

  .rel8tion-wrapper {

    color: #1f2a5a;
    background: linear-gradient(180deg, #38bdf8 0%, #f0f7ff 60%, #f0f7ff 100%);
    background-attachment: fixed;
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

    top: 0;
    left: 0;

    z-index: 1;

    background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjIwMCIgdmlld0JveD0iMCAwIDYwMCAyMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTEyMCwxNTAgQzgwLDE1MCA2MCwxMzAgNjAsMTAwIEM2MCw4MCA4MCw2MCAxMTAsNjAgQzEyMCwzMCAxNTAsMTAgMTkwLDEwIEMyNDAsMTAgMjcwLDQwIDI4MCw3MCBDMzEwLDcwIDM0MCw5MCAzNDAsMTIwIEMzNDAsMTUwIDMxMCwxNTAgMjgwLDE1MCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjgiLz48cGF0aCBkPSJNNDUwLDEyMCBDNDIwLDEyMCA0MDAsMTA1IDQwMCw4NSBDNDAwLDcwIDQxNSw1NSA0MzUsNTUgQzQ0NSwzNSA0NjUsMjAgNDkwLDIwIEM1MjUsMjAgNTQ1LDQwIDU1NSw2MCBDNTc1LDYwIDU5NSw3NSA1OTUsOTUgQzU5NSwxMjAgNTc1LDEyMCA1NTAsMTIwIFoiIGZpbGw9IiNmZmZmZmYiIG9wYWNpdHk9IjAuNCIvPjxwYXRoIGQ9Ik0zMCwxODAgQzEwLDE4MCAwLDE3MCAwLDE1NSBDMCwxNDAgMTUsMTMwIDMwLDEzMCBDMzUsMTE1IDUwLDEwNSA3MCwxMDUgQzk1LDEwNSAxMTAsMTIwIDExNSwxMzUgQzEzMCwxMzUgMTQ1LDE0NSAxNDUsMTYwIEMxNDUsMTYwIDEzMCwxODAgMTE1LDE4MCBaIiBmaWxsPSIjZmZmZmZmIiBvcGFjaXR5PSIwLjYiLz48L3N2Zz4=");
    background-repeat: repeat-x;
    background-size: 800px auto;
    animation: driftClouds 120s linear infinite;
  }

  @keyframes driftClouds {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .scene-stage {
    position: fixed;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1400px;
    aspect-ratio: 16 / 9;
    z-index: 2;
    pointer-events: none;
  }

  .house-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.1);
  }

  .fade-overlay {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 5;
    pointer-events: none;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 20%, rgba(240,247,255,0.95) 100%);
  }

  .agent-cutout {
    position: absolute;
    width: 3.5%;
    height: auto;
    z-index: 10;
    opacity: 0;
    animation-fill-mode: both !important;
  }

  @keyframes walk1 { 0% { left: 50%; top: 70%; opacity: 0; } 10% { opacity: 1; } 100% { left:25%; top: 56%; opacity: 0; } }
  @keyframes walk2 { 0% { left: 47%; top: 52%; opacity: 0; } 10% { opacity: 1; } 100% { left: 15%; top: 79%; opacity: 0; } }
  @keyframes walk3 { 0% { left: 77%; top: 57%; opacity: 0; } 10% { opacity: 1; } 100% { left: 50%; top: 75%; opacity: 0; } }
  @keyframes walk4 { 0% { left: 25%; top: 55%; opacity: 0; } 10% { opacity: 1; } 100% { left: 75%; top: 88%; opacity: 0; } }
  @keyframes walk5 { 0% { left: 33%; top: 44%; opacity: 0; } 10% { opacity: 1; } 100% { left: 78%; top: 89%; opacity: 0; } }

  .agent-1 { animation: walk1 37s infinite linear; }
  .agent-2 { animation: walk2 33s infinite linear; animation-delay: 5s; }
  .agent-3 { animation: walk3 24s infinite linear; animation-delay: 2s; }
  .agent-4 { animation: walk4 30s infinite linear; animation-delay: 6s; }
  .agent-5 { animation: walk5 50s infinite linear; animation-delay: 3s; }

  .k-shell {
    position: relative;
    z-index: 20;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .glass-card {
    background: rgba(255, 255, 255, 0.16) !important;
    backdrop-filter: blur(8px) saturate(165%);
    -webkit-backdrop-filter: blur(8px) saturate(165%);
    border: 1px solid rgba(255, 255, 255, 0.58) !important;
    box-shadow:
      0 25px 50px rgba(31, 42, 90, 0.10),
      inset 0 1px 1px rgba(255, 255, 255, 0.30) !important;
  }

  .k-card {
    width: 100%;
    max-width: 560px;
    border-radius: 40px;
    padding: 28px 22px 24px;
    text-align: center;
  }

  .k-logo-wrap {
    margin-bottom: 18px;
  }

  .k-logo {
    height: 58px;
    max-width: 180px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
  }

  .k-title {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 34px;
    line-height: 0.98;
    font-weight: 800;
    letter-spacing: -0.05em;
    color: #0f172a;
    margin: 0 0 10px;
  }

  .k-subtitle {
    color: #64748b;
    font-size: 17px;
    line-height: 1.6;
    font-weight: 600;
    max-width: 390px;
    margin: 0 auto 24px;
  }

  .k-progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(207, 225, 248, 0.95);
    overflow: hidden;
    margin: 0 auto 18px;
  }

  .k-progress-bar {
    height: 100%;
    width: 42%;
    border-radius: 999px;
    background: linear-gradient(90deg,#38bdf8,#2563eb);
    animation: progressMove 1.3s ease-in-out infinite alternate;
  }

  .k-spinner {
    width: 72px;
    height: 72px;
    margin: 0 auto 12px;
    border-radius: 999px;
    border: 8px solid rgba(239,246,255,0.95);
    border-top: 8px solid #2563eb;
    animation: spin 1s linear infinite;
  }

  .k-footer-note {
    margin: 0;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #94a3b8;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes progressMove {
    from { transform: translateX(-15%); width: 35%; }
    to   { transform: translateX(90%);  width: 45%; }
  }

  @media (max-width: 1024px) {
    .scene-stage {
      width: 180vw;
      top: 70%;
    }
  }

  @media (max-width: 768px) {
    .scene-stage {
      width: 280vw;
      top: 45%;
    }

    .k-card {
      max-width: 100%;
      border-radius: 34px;
      padding: 22px 16px 20px;
    }

    .k-title {
      font-size: 29px;
    }

    .k-subtitle {
      font-size: 15px;
    }
  }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const SUPABASE_URL = "https://nicanqrfqlbnlmnoernb.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pY2FucXJmcWxibmxtbm9lcm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEwNzcsImV4cCI6MjA3NjczNzA3N30.FNE_8qVT4BZBrgdhYqvdwEzeCdbtUzBXndq_Us-WUjg";

  const params = new URLSearchParams(window.location.search);
  const uid = params.get("uid");

  const statusEl = document.getElementById("status");
  const substatusEl = document.getElementById("substatus");

  function setStatus(title, subtitle = "") {
    if (statusEl) statusEl.innerText = title;
    if (substatusEl && subtitle) substatusEl.innerText = subtitle;
  }

  function goToClaim() {
    window.location.href = "/claim?uid=" + encodeURIComponent(uid);
  }

  function goToBuyer(agentSlug) {
    window.location.href = "/b?agent=" + encodeURIComponent(agentSlug);
  }

  if (!uid) {
    setStatus("Invalid Key", "This page is missing a chip uid.");
    return;
  }

  if (
    !SUPABASE_KEY ||
    SUPABASE_KEY.includes("PASTE_YOUR_FULL_REAL_ANON_KEY_HERE") ||
    SUPABASE_KEY.includes("...")
  ) {
    console.error("Missing or fake Supabase anon key on /k page.");
    setStatus("Config Error", "Your Supabase key is missing or incomplete.");
    return;
  }

  setStatus("Checking Key...", "Looking up your Rel8tion chip.");

  fetch(
    `${SUPABASE_URL}/rest/v1/keys?uid=eq.${encodeURIComponent(uid)}&select=*`,
    {
      method: "GET",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json"
      }
    }
  )
    .then(async (res) => {
      const raw = await res.text().catch(() => "");

      if (!res.ok) {
        console.error("Supabase error on /k:", raw);
        setStatus("Database Error", "We could not read your chip record.");
        return null;
      }

      try {
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        console.error("JSON parse error on /k:", raw);
        setStatus("Response Error", "The chip lookup returned an invalid response.");
        return null;
      }
    })
    .then((data) => {
      if (!data) return;

      console.log("KEY LOOKUP RESULT:", data);

      if (!Array.isArray(data) || data.length === 0) {
        setStatus("First Time Setup...", "Sending you to activation.");
        goToClaim();
        return;
      }

      const record = data[0];
      const claimed = record.claimed === true;
      const agentSlug = record.agent_slug || null;

      console.log("KEY RECORD:", record);

      if (!claimed) {
        setStatus("Setting Up Profile...", "This key has not been activated yet.");
        goToClaim();
        return;
      }

      if (claimed && agentSlug) {
        setStatus("Connecting You...", "Opening your live Rel8tion experience.");
        goToBuyer(agentSlug);
        return;
      }

      setStatus("Setup Incomplete...", "This key needs to finish activation.");
      goToClaim();
    })
    .catch((err) => {
      console.error("Fetch crash on /k:", err);
      setStatus("Connection Error", "Something interrupted the chip lookup.");
    });
});
</script>
