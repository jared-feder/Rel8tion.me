<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>REL8TION COMMAND</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(56,189,248,.88), rgba(248,252,255,.94)),
        url("https://rel8tion.info/wp-content/uploads/2026/04/trythisbackround.png");
      background-size: cover;
      background-position: center bottom;
      color: #1f2a5a;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .boot {
      width: min(420px, calc(100% - 32px));
      padding: 22px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 22px;
      background: rgba(255,255,255,.48);
      backdrop-filter: blur(20px) saturate(165%);
      -webkit-backdrop-filter: blur(20px) saturate(165%);
      box-shadow: 0 24px 70px rgba(23,34,79,.16), inset 0 1px 0 rgba(255,255,255,.45);
      text-align: center;
      font-weight: 900;
    }

    .boot img {
      display: block;
      width: 96px;
      height: auto;
      margin: 0 auto 12px;
    }

    .boot p {
      margin: 6px 0 0;
      color: #526a7b;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main class="boot" aria-live="polite">
    <img src="https://rel8tion.me/wp-content/uploads/2026/04/logo150x100trans.png" alt="Rel8tion">
    <div>Opening REL8TION COMMAND</div>
    <p>Loading the full admin dashboard.</p>
  </main>
  <script>
    const target = `/apps/rel8tion-app/admin.html${window.location.search}${window.location.hash}`;
    window.location.replace(target);
  </script>
</body>
</html>
