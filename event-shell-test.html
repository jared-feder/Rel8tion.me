<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rel8tion Live Event Shell Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(120,100,255,.25), transparent 40%),
        radial-gradient(circle at 80% 100%, rgba(80,200,255,.25), transparent 40%),
        linear-gradient(180deg,#f3f5ff,#eef2ff);
      color:#1f2a5a;
    }
    #app{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      box-sizing:border-box;
    }
    .shell{
      width:100%;
      max-width:760px;
      background:rgba(255,255,255,.93);
      border:1px solid rgba(255,255,255,.55);
      backdrop-filter:blur(14px);
      border-radius:32px;
      box-shadow:0 30px 80px rgba(0,0,0,.10);
      padding:26px;
    }
    .logo{max-width:180px;width:100%;display:block;margin:0 auto 8px;}
    .pill{display:inline-block;padding:8px 14px;border-radius:999px;font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;background:#eef2ff;color:#4f46e5;margin-bottom:14px;}
    .loading{width:52px;height:52px;border:5px solid rgba(109,94,255,.15);border-top:5px solid #6d5eff;border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{margin:0 0 10px;font-family:Poppins,sans-serif;font-size:clamp(32px,5vw,48px);line-height:1;letter-spacing:-0.03em;text-align:center;}
    .sub{text-align:center;color:#6b76a8;font-size:16px;line-height:1.5;margin:0 0 20px;}
    .hero-card{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 16px 40px rgba(31,42,90,.08);margin-top:10px;}
    .hero-card img{width:100%;height:260px;object-fit:cover;display:block;background:#eef2ff;}
    .hero-body{padding:22px;}
    .address{font-family:Poppins,sans-serif;font-size:30px;line-height:1.08;margin-bottom:8px;color:#1f2a5a;}
    .price{font-weight:800;font-size:22px;color:#2563eb;margin-bottom:10px;}
    .meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px;}
    .meta-box{background:#f8faff;border:1px solid rgba(31,42,90,.08);border-radius:16px;padding:12px;}
    .label{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7c86b6;margin-bottom:4px;}
    .value{font-size:15px;font-weight:700;color:#1f2a5a;word-break:break-word;}
    .section{background:#fff;border-radius:24px;box-shadow:0 16px 40px rgba(31,42,90,.08);padding:22px;margin-top:18px;}
    .section h2{margin:0 0 10px;font-family:Poppins,sans-serif;font-size:28px;line-height:1.05;}
    .section p{margin:0;color:#6b76a8;line-height:1.55;}
    .btn{display:block;width:100%;box-sizing:border-box;padding:18px;border:none;border-radius:999px;text-decoration:none;text-align:center;font-weight:800;font-size:17px;cursor:pointer;margin-top:16px;background:linear-gradient(135deg,#40c8ff,#6d5eff);color:#fff;box-shadow:0 18px 40px rgba(100,100,255,.25);}
    .btn.secondary{background:#fff;color:#1f2a5a;border:1px solid rgba(31,42,90,.10);box-shadow:none;}
    .grid{display:grid;gap:14px;grid-template-columns:repeat(2,minmax(0,1fr));}
    .bullet{display:flex;gap:10px;align-items:flex-start;margin-top:10px;color:#1f2a5a;font-weight:600;}
    .muted{font-size:13px;color:#7c86b6;text-align:center;margin-top:14px;}
    @media (max-width:640px){.meta,.grid{grid-template-columns:1fr}.shell{padding:18px}.hero-card img{height:220px}.address{font-size:26px}.section h2{font-size:24px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const SUPABASE_URL = "https://nicanqrfqlbnlmnoernb.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pY2FucXJmcWxibmxtbm9lcm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjExNjEwNzcsImV4cCI6MjA3NjczNzA3N30.FNE_8qVT4BZBrgdhYqvdwEzeCdbtUzBXndq_Us-WUjg";
    const REL8TION_LOGO = "https://rel8tion.info/wp-content/uploads/2026/03/rel8tionlogo.png";
    const params = new URLSearchParams(location.search);
    const eventId = params.get("event");

    function esc(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
    function money(v){ const n = Number(v || 0); return n ? "$" + n.toLocaleString() : ""; }
    function render(html){ document.getElementById("app").innerHTML = html; }
    function loading(msg){
      render(`
        <div class="shell">
          <img src="${REL8TION_LOGO}" class="logo" alt="Rel8tion">
          <div style="text-align:center"><div class="pill">Live Event Shell</div></div>
          <div class="loading"></div>
          <h1>Loading Event</h1>
          <p class="sub">${esc(msg)}</p>
        </div>
      `);
    }
    function errorView(title,message){
      render(`
        <div class="shell">
          <img src="${REL8TION_LOGO}" class="logo" alt="Rel8tion">
          <div style="text-align:center"><div class="pill">Live Event Shell</div></div>
          <h1>${esc(title)}</h1>
          <p class="sub">${esc(message)}</p>
          <a href="/" class="btn secondary">Go Home</a>
        </div>
      `);
    }
    function houseStatus(h){
      try{
        const now = new Date();
        const start = h?.open_start ? new Date(h.open_start) : null;
        const end = h?.open_end ? new Date(h.open_end) : null;
        if(start && end && now >= start && now <= end) return {label:"Live Now", color:"#16a34a"};
        if(start && now < start) return {label:"Upcoming", color:"#2563eb"};
        return {label:"Ended", color:"#6b7280"};
      }catch(e){ return {label:"Open House", color:"#6b7280"}; }
    }
    function safeUrl(url){
      if(!url) return "#";
      if(url.startsWith("http://") || url.startsWith("https://")) return url;
      return "https://" + url;
    }
    function renderShell(eventRow, house, agent){
      const image = house?.image || "https://images.unsplash.com/photo-1568605114967-8130f3a36994?auto=format&fit=crop&w=1200&q=80";
      const status = houseStatus(house);
      const agentName = agent?.name || eventRow?.agent_slug || "Listing Representative";
      render(`
        <div class="shell">
          <img src="${REL8TION_LOGO}" class="logo" alt="Rel8tion">
          <div style="text-align:center"><div class="pill">Live Event Shell</div></div>
          <h1>Welcome In</h1>
          <p class="sub">This is the shared live event destination for smart sign QR and both sign NFC tags.</p>

          <div class="hero-card">
            <img src="${esc(image)}" alt="Property">
            <div class="hero-body">
              <div class="pill" style="background:${status.color};color:#fff;margin-bottom:10px;">${esc(status.label)}</div>
              <div class="address">${esc(house?.address || "Open House Event")}</div>
              ${house?.price ? `<div class="price">${money(house.price)}</div>` : ""}
              <div style="color:#6b76a8;font-size:15px;line-height:1.55;">${house?.brokerage ? esc(house.brokerage) : "Brokerage info available on event record"}</div>

              <div class="meta">
                <div class="meta-box"><div class="label">Event ID</div><div class="value">${esc(eventRow?.id || "")}</div></div>
                <div class="meta-box"><div class="label">Agent</div><div class="value">${esc(agentName)}</div></div>
                <div class="meta-box"><div class="label">Beds</div><div class="value">${esc(house?.beds || "—")}</div></div>
                <div class="meta-box"><div class="label">Baths</div><div class="value">${esc(house?.baths || "—")}</div></div>
              </div>
            </div>
          </div>

          <div class="grid">
            <div class="section">
              <h2>Buyer Check-In</h2>
              <p>Next phase: visitor check-in, represented-buyer confirmation, and compliance-friendly event records should live here.</p>
              <div class="bullet">✅ Property context is loading from the active event.</div>
              <div class="bullet">✅ This route is now the common shell destination.</div>
              <a href="#" class="btn">Check In Coming Next</a>
            </div>

            <div class="section">
              <h2>Represented Buyer Flow</h2>
              <p>Next phase: verify whether the buyer is represented, collect broker-to-broker info requests, and protect the buyer agent relationship.</p>
              <div class="bullet">✅ Event lookup works.</div>
              <div class="bullet">✅ Property lookup works.</div>
              <a href="#" class="btn secondary">Protected Flow Coming Next</a>
            </div>
          </div>

          <div class="section">
            <h2>Debug Snapshot</h2>
            <p>This is temporary, but useful while you wire the rest of the live shell.</p>
            <div class="meta" style="margin-top:14px;">
              <div class="meta-box"><div class="label">Open House Source</div><div class="value">${esc(eventRow?.open_house_source_id || "")}</div></div>
              <div class="meta-box"><div class="label">Agent Slug</div><div class="value">${esc(eventRow?.agent_slug || "")}</div></div>
              <div class="meta-box"><div class="label">Event Status</div><div class="value">${esc(eventRow?.status || "")}</div></div>
              <div class="meta-box"><div class="label">Listing Link</div><div class="value">${house?.link ? `<a href="${esc(safeUrl(house.link))}" target="_blank" rel="noopener noreferrer">Open Listing</a>` : "—"}</div></div>
            </div>
          </div>

          <p class="muted">Checkpoint passed: sign resolver is now landing on a real event shell page.</p>
        </div>
      `);
    }

    async function fetchJson(url, options = {}){
      const res = await fetch(url, options);
      const text = await res.text();
      if(!res.ok) throw new Error(text || `Request failed: ${res.status}`);
      return text ? JSON.parse(text) : null;
    }

    async function init(){
      if(!eventId){
        errorView("Missing Event ID", "This route needs ?event=YOUR_EVENT_ID");
        return;
      }
      loading("Resolving active event record...");
      try{
        const eventRows = await fetchJson(`${SUPABASE_URL}/rest/v1/open_house_events?id=eq.${encodeURIComponent(eventId)}&select=*`, {
          headers:{ apikey: KEY, Authorization: "Bearer " + KEY }
        });
        if(!Array.isArray(eventRows) || !eventRows.length){
          errorView("Event Not Found", "No open house event was found for that event id.");
          return;
        }
        const eventRow = eventRows[0];

        loading("Loading linked property...");
        let house = null;
        if(eventRow.open_house_source_id){
          const houseRows = await fetchJson(`${SUPABASE_URL}/rest/v1/open_houses?id=eq.${encodeURIComponent(eventRow.open_house_source_id)}&select=*`, {
            headers:{ apikey: KEY, Authorization: "Bearer " + KEY }
          });
          if(Array.isArray(houseRows) && houseRows.length) house = houseRows[0];
        }

        let agent = null;
        if(eventRow.agent_slug){
          try{
            const agentRows = await fetchJson(`${SUPABASE_URL}/rest/v1/agents?slug=eq.${encodeURIComponent(eventRow.agent_slug)}&select=*`, {
              headers:{ apikey: KEY, Authorization: "Bearer " + KEY }
            });
            if(Array.isArray(agentRows) && agentRows.length) agent = agentRows[0];
          }catch(e){ console.log("Agent lookup skipped", e); }
        }

        renderShell(eventRow, house, agent);
      }catch(err){
        console.error(err);
        errorView("Event Shell Failed", err.message || "Something went wrong while loading this live event shell.");
      }
    }
    init();
  </script>
</body>
</html>
