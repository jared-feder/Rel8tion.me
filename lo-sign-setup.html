<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>Set Up LO Coverage Sign</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #69d9f6, #f4fbff);
      color: #17224f;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(420px, calc(100% - 32px));
      padding: 22px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 22px;
      background: rgba(255,255,255,.55);
      text-align: center;
      font-weight: 900;
    }
    p { color: #526a7b; font-size: 13px; line-height: 1.45; }
  </style>
</head>
<body>
  <main>
    <div>Opening Coverage Sign Setup</div>
    <p>Loading without changing this URL.</p>
  </main>
  <script>
    (async () => {
      const target = `/apps/rel8tion-app/lo-sign-setup.html${window.location.search}${window.location.hash}`;
      try {
        const response = await fetch(target, { cache: 'no-store' });
        if (!response.ok) throw new Error(`Coverage sign setup app returned ${response.status}`);
        const html = await response.text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.textContent = '';
        const shell = document.createElement('main');
        const title = document.createElement('div');
        title.textContent = 'Coverage Sign setup could not load.';
        const detail = document.createElement('p');
        detail.textContent = String(error && error.message ? error.message : error);
        const action = document.createElement('p');
        const link = document.createElement('a');
        link.href = target;
        link.textContent = 'Open directly';
        action.appendChild(link);
        shell.append(title, detail, action);
        document.body.appendChild(shell);
      }
    })();
  </script>
</body>
</html>
